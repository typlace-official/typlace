<!DOCTYPE html>
<html lang="ru">
<head>
  <script>
    document.titleKey = "page.title";
  </script>

  <title>TyPlace</title>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="/header.css">
  <link rel="stylesheet" href="/footer.css">

  <style>
    body{
      margin:0;
      background:#f6f7f9;
      font-family:Inter, Arial, sans-serif;
      color:#111827;
    }

    html, body{
      height:100%;
    }

    .page-content{
      min-height:100%;
    }

    .page{
      max-width:1000px;
      margin:40px auto;
      padding:0 16px 80px;
    }

    .card{
      background:#ffffff;
      border:1px solid #e5e7eb;
      border-radius:18px;
      padding:32px;
      box-shadow:0 12px 32px rgba(0,0,0,.06);
    }

    h1{
      font-size:28px;
      font-weight:900;
      margin:0 0 24px;
      letter-spacing:-.2px;
    }

    .section{
      margin-bottom:28px;
    }

    .section:last-child{
      margin-bottom:0;
    }

    .section-title{
      font-size:16px;
      font-weight:800;
      margin-bottom:8px;
    }

    .section-text{
      font-size:14px;
      line-height:1.7;
      color:#4b5563;
      margin-bottom:6px;
    }

    .email{
      display:inline-block;
      font-size:14px;
      font-weight:400;
      line-height:1.7;
      color:#2563eb;
      text-decoration:none;
      margin-top:4px;
    }

    .email:hover{
      text-decoration:underline;
    }

    .help-link{
      font-size:14px;
      font-weight:400;
      line-height:1.7;
      color:#2563eb;
      text-decoration:none;
    }

    .help-link:hover{
      text-decoration:underline;
    }

    @media(max-width:600px){
      h1{
        font-size:22px;
      }

      .card{
        padding:20px;
        border-radius:16px;
      }
    }
  </style>
</head>

<body>

<div id="header-container"></div>

<main class="page-content">
  <div class="page">
    <article class="card">

      <h1 data-i18n="page.title"></h1>

      <div class="section">
        <div class="section-title" data-i18n="page.legal.title"></div>
        <div class="section-text" data-i18n="page.legal.text"></div>
        <a href="mailto:legal@typlace.com" class="email">legal@typlace.com</a>
      </div>

      <div class="section">
        <div class="section-title" data-i18n="page.finance.title"></div>
        <div class="section-text" data-i18n="page.finance.text"></div>
        <a href="mailto:business@typlace.com" class="email">business@typlace.com</a>
      </div>

      <div class="section">
        <div class="section-title" data-i18n="page.partners.title"></div>
        <div class="section-text" data-i18n="page.partners.text"></div>
        <a href="mailto:business@typlace.com" class="email">business@typlace.com</a>
      </div>

      <div class="section">
        <div class="section-title" data-i18n="page.support.title"></div>
        <div class="section-text">
          <span data-i18n="page.support.text1"></span>
          <a href="/help.html" class="help-link" data-i18n="page.support.link"></a>.
        </div>
      </div>

    </article>
  </div>
</main>

<div id="footer-container"></div>

<script src="/i18n.js"></script>
<script src="/header.js"></script>
<script src="/footer.js"></script>

</body>
</html>
