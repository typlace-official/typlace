<header class="tp-header">
  <div class="tp-inner">

    <!-- LEFT -->
    <a class="tp-brand" href="/index.html" aria-label="TyPlace">
      <span class="tp-logo">TyPlace</span>
    </a>

    <!-- CENTER: SEARCH -->
    <div class="tp-search" role="search">
      <svg class="tp-search-icon" viewBox="0 0 24 24" aria-hidden="true">
        <circle cx="11" cy="11" r="7"></circle>
        <line x1="16.5" y1="16.5" x2="21" y2="21"></line>
      </svg>

      <input
        id="tpSearch"
        class="tp-searchbox"
        type="text"
        autocomplete="off"
      />

      <button id="tpClear" class="tp-clear" type="button" hidden aria-label="Clear">
        <svg viewBox="0 0 24 24">
          <line x1="6" y1="6" x2="18" y2="18"></line>
          <line x1="18" y1="6" x2="6" y2="18"></line>
        </svg>
      </button>

      <!-- SEARCH DROP -->
      <div class="tp-drop" id="tpDrop">
        <div class="tp-drop-list" id="tpDropList"></div>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="tp-actions">

      <!-- LANGUAGE -->
      <div class="tp-pill-wrap">
  <button class="tp-pill" id="tpLangBtn" type="button">
    <span id="tpLangText"></span>
    <svg class="tp-caret" viewBox="0 0 16 16">
      <path d="M4 6l4 4 4-4"></path>
    </svg>
  </button>
  <div class="tp-panel" id="tpLangPanel"></div>
</div>

      <!-- CURRENCY -->
      <div class="tp-pill-wrap">
  <button class="tp-pill" id="tpCurBtn" type="button">
    <span id="tpCurText"></span>
    <svg class="tp-caret" viewBox="0 0 16 16">
      <path d="M4 6l4 4 4-4"></path>
    </svg>
  </button>
  <div class="tp-panel" id="tpCurPanel"></div>
</div>

      <!-- HELP -->
      <a class="tp-help" href="/help.html">
  <svg class="tp-help-svg" viewBox="0 0 24 24" aria-hidden="true">
  <path fill="currentColor"
    d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm1 15h-2v-2h2zm1.1-6.1-.9.9A2.5 2.5 0 0 0 12 13h-1v-1a3.5 3.5 0 0 1 1-2.5l1.2-1.2a1.5 1.5 0 1 0-2.6-1H9a3 3 0 1 1 6 2.6z"/>
</svg>
  <span>Помощь</span>
</a>

      <!-- AUTH -->
      <a id="tpLogin" class="tp-btn" href="/auth.html?mode=login"></a>
      <a id="tpRegister" class="tp-btn" href="/auth.html?mode=register"></a>

      <!-- CHATS -->
      <!-- CHATS -->
<a id="tpChats" class="tp-chat" href="/chats.html" style="display:none;">
  <svg class="tp-chat-svg" viewBox="0 0 24 24" aria-hidden="true">
    <path
      fill="currentColor"
      fill-rule="evenodd"
      d="M4 3
         h16
         a2 2 0 0 1 2 2
         v11
         a2 2 0 0 1-2 2
         h-6
         l-4 4
         v-4
         h-6
         a2 2 0 0 1-2-2
         v-11
         a2 2 0 0 1 2-2
         z"
    />
    <circle cx="9"  cy="10" r="1.4"/>
    <circle cx="12" cy="10" r="1.4"/>
    <circle cx="15" cy="10" r="1.4"/>
  </svg>

  <span id="tpChatsLabel"></span>

  <!-- 🔴 BADGE -->
  <span id="tpChatsBadge" class="tp-badge" style="display:none;">0</span>
</a>

      <!-- PROFILE -->
      <a id="tpProfile" class="tp-profile" href="/profile.html" style="display:none;">
        <img id="tpAvatar" class="tp-avatar" alt="avatar">
        <div class="tp-profilelabel" id="tpProfileLabel"></div>
      </a>

    </div>
  </div>

</header>

<div class="tp-overlay" id="tpOverlay"></div>
