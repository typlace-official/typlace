    body{
      margin:0;
      background:#f6f7f9;
      font-family:Inter, Arial, sans-serif;
      color:#111827;
    }

    .page{
      max-width:900px;
      margin:40px auto;
      padding:0 16px;
    }

    .content{
      background:#fff;
      padding:40px;
      border-radius:18px;
      border:1px solid #e5e7eb;
      box-shadow:0 12px 32px rgba(0,0,0,.06);
    }

    .content h1{
      font-size:26px;
      margin:0 0 10px 0;
      letter-spacing:-.2px;
    }

    .content h2{
      font-size:19px;
      margin:34px 0 12px;
      font-weight:800;
      letter-spacing:-.15px;
    }

    .content p,
    .content li{
      font-size:14px;
      line-height:1.7;
      color:#374151;
      margin-bottom:12px;
    }

    .content ul{
      margin:10px 0 16px 18px;
    }

    .meta{
      font-size:13px;
      color:#6b7280;
      margin-bottom:20px;
      line-height:1.6;
    }

    .doc-link{
      color:#2563eb;
      text-decoration:none;
      font-weight:400;
    }

    .doc-link:hover{
      text-decoration:underline;
    }

    hr{
      border:none;
      height:1px;
      background:#e5e7eb;
      margin:28px 0;
    }

    @media(max-width:900px){
      .content{
        padding:22px;
        border-radius:16px;
      }

      .content h1{
        font-size:22px;
      }

      .content h2{
        font-size:17px;
      }
    }
  </style>
</head>
