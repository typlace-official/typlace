<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TyPlace</title>

  <link rel="stylesheet" href="/header.css">
  <link rel="stylesheet" href="/game.css">
  <link rel="stylesheet" href="/footer.css">

</head>

<body>
  <div id="header-container"></div>

  <main class="page-content">
  <div class="page">

    <div class="container">

      <div class="breadcrumb" id="breadcrumb">
        <img id="crumbIcon" src="" alt="" class="crumb-icon">
        <span class="crumb-game" id="crumbGame"></span>
        <span class="crumb-mode" id="crumbMode"></span>
      </div>

      <div class="modes-wrap">
        <button class="scroll-arrow left hidden" id="arrowLeft" aria-label="Влево">
          <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
        </button>

        <div class="modes-viewport">
          <div class="modes" id="modes">
            <div class="modes-row"></div>
            <div class="modes-row"></div>
            <div class="modes-row"></div>
            <div class="modes-row"></div>
          </div>
        </div>

        <button class="scroll-arrow right hidden" id="arrowRight" aria-label="Вправо">
          <svg viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg>
        </button>
      </div>

      <div class="topbar">
        <div class="filters">
          <div id="extraFilters" style="display:none;"></div>
          <select class="select" id="subcatSelect" style="display:none;"></select>
          <select class="select" id="methodSelect" style="display:none;"></select>

          <div class="sort-chip" id="priceSort">
            <span>Цена</span>
            <span class="state" id="priceState">—</span>
          </div>

          <div class="sort-chip" id="stockSort" style="display:none;">
            <span>Количество</span>
            <span class="state" id="stockState">—</span>
          </div>
        </div>

        <div class="search">
          <input id="searchInput" type="text" placeholder="Поиск по названию">
          <span class="icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <circle cx="11" cy="11" r="7"></circle>
              <path d="M20 20l-3.5-3.5"></path>
            </svg>
          </span>
        </div>

        <button class="sell-btn" id="sellBtn">Продать</button>
      </div>

      <div id="offersList" class="offers-list"></div>

    </div>
  </div>
</main>

<div id="footer-container"></div>

<script src="/socket.io/socket.io.js"></script>
<script src="/games.list.js"></script>
<script src="/header.js"></script>
<script src="/games.config.js"></script>
<script src="/tp-money.js"></script>
<script src="/offer-title.js"></script>
<script src="/footer.js"></script>

  <script>
    // ===== GAME FROM URL =====
    const urlParams = new URLSearchParams(location.search);
    const extraFilterValues = {};

    // 🔥 ВОССТАНАВЛЕНИЕ ФИЛЬТРОВ ИЗ URL
urlParams.forEach((value, key) => {
  if (["game", "mode"].includes(key)) return;

  extraFilterValues[key] = value;
});
const GAME_ID = urlParams.get("game");
const MODE_FROM_URL = urlParams.get("mode");

    if(!GAME_ID || !window.GAMES || !window.GAMES[GAME_ID]){
      document.body.innerHTML = "<h2 style='padding:24px'>Game not specified / unknown</h2>";
      throw new Error("Game not specified / unknown");
    }

    const GAME = window.GAMES[GAME_ID];

    // ===== set breadcrumb game =====
    const crumbIcon = document.getElementById("crumbIcon");
    const crumbGame = document.getElementById("crumbGame");
    const crumbMode = document.getElementById("crumbMode");

    crumbIcon.src = GAME.icon || "/img/game-default.png";
    crumbIcon.alt = GAME.title || "Game";
    crumbGame.textContent = GAME.title || "Game";

    // ===== Roblox-only defaults (пока) =====
    // позже мы вынесем FILTERS в config для каждой игры
    const MODES = Array.isArray(GAME.modes)
  ? GAME.modes
  : Object.keys(GAME.modes || {});
    let currentMode =
  MODE_FROM_URL ||
  localStorage.getItem("tp_last_mode_" + GAME_ID) ||
  GAME.defaultMode ||
  (MODES[0] || "");
    crumbMode.textContent = currentMode;

    // ===== Elements =====
    const modesEl = document.getElementById("modes");
    const arrowLeft = document.getElementById("arrowLeft");
    const arrowRight = document.getElementById("arrowRight");
    // ===== FILTERS =====
const methodSelect = document.getElementById("methodSelect");
const subcatSelect = document.getElementById("subcatSelect");
let selectedCategory = urlParams.get("category") || null;
// ===== EXTRA FILTERS (YouTube, TikTok и т.д.) =====

let selectedSearch = "";
const searchInput = document.getElementById("searchInput");

searchInput.addEventListener("input", () => {
  selectedSearch = searchInput.value.trim();
  loadOffers();
});

subcatSelect.addEventListener("change", () => {
  selectedCategory = subcatSelect.value || null;
  loadOffers();
});

const priceSort = document.getElementById("priceSort");
const priceState = document.getElementById("priceState");
const stockSort = document.getElementById("stockSort");
const stockState = document.getElementById("stockState");

let sortPrice = null; // asc | desc
let sortAmount = null; // asc | desc

// ===== SORT PRICE =====
priceSort.addEventListener("click", ()=>{
  // ❌ сбрасываем сортировку количества
  sortAmount = null;
  stockState.textContent = "—";

  // ✅ включаем цену
  sortPrice = sortPrice === "asc" ? "desc" : "asc";
  priceState.textContent = sortPrice === "asc" ? "↑" : "↓";

  loadOffers();
});

// ===== SORT AMOUNT =====
stockSort.addEventListener("click", ()=>{
  // ❌ сбрасываем сортировку цены
  sortPrice = null;
  priceState.textContent = "—";

  // ✅ включаем количество
  sortAmount = sortAmount === "asc" ? "desc" : "asc";
  stockState.textContent = sortAmount === "asc" ? "↑" : "↓";

  loadOffers();
});


    function updateBreadcrumb(){
      crumbMode.textContent = currentMode;
      document.title = (GAME.title || "Game") + " — TyPlace";
    }
function updateCategoryFilter() {
  subcatSelect.style.display = "none";
  subcatSelect.innerHTML = "";

  const modeConfig = GAME.modes?.[currentMode];
  const categories = modeConfig?.categories;

  if (Array.isArray(categories) && categories.length) {
    subcatSelect.style.display = "";
    subcatSelect.innerHTML = `<option value="">Все</option>`;

    categories.forEach(cat => {
      subcatSelect.innerHTML += `<option value="${cat}">${cat}</option>`;
    });
  }
}
    // ===== Render Modes (4 rows) =====
    function renderModes(){
      const rows = modesEl.querySelectorAll(".modes-row");
      rows.forEach(r => r.innerHTML = "");

      MODES.forEach((name, index)=>{
        const pill = document.createElement("div");
        pill.className = "mode-pill" + (name === currentMode ? " active" : "");
        pill.textContent = name;

        pill.onclick = () => {
          for (const k in extraFilterValues) delete extraFilterValues[k];
  localStorage.setItem("tp_last_mode_" + GAME_ID, name);
  currentMode = name;

  const url = new URL(window.location);
  url.searchParams.set("mode", name);
  history.replaceState({}, "", url);

  // ✅ КНОПКА "ПРОДАТЬ" — ВСЕГДА ВИДНА НА СТРАНИЦЕ ИГРЫ
document.getElementById("sellBtn").style.display = "";
  

  // сброс фильтров
  selectedSearch = "";
searchInput.value = "";
  sortPrice = null;
  sortAmount = null;
  priceState.textContent = "—";
  stockState.textContent = "—";
  stockSort.style.display = "none";
  methodSelect.style.display = "none";

  // скрываем все фильтры
methodSelect.style.display = "none";

stockSort.style.display = "none";

  renderModes();
  // 🛡 защита от скрытия кнопки
document.getElementById("sellBtn").style.display = "";
  updateBreadcrumb();
  updateCategoryFilter();
  renderExtraFilters();
  // 🔥 ВОССТАНАВЛЕНИЕ ЗНАЧЕНИЙ В SELECT
Object.entries(extraFilterValues).forEach(([key, value]) => {
  const el = document.querySelector(`[data-key="${key}"] select`);
  if (el) el.value = value;

  const input = document.querySelector(`[data-key="${key}"] input`);
  if (input) input.value = value;
});
loadOffers();
};

        rows[index % 4].appendChild(pill);
      });

      requestAnimationFrame(updateArrows);
    }

    // ===== Arrows =====
    function updateArrows(){
      const el = modesEl;
      const hasOverflow = el.scrollWidth > el.clientWidth + 5;

      if (!hasOverflow){
        arrowLeft.classList.add("hidden");
        arrowRight.classList.add("hidden");
        return;
      }

      const x = el.scrollLeft;
      const maxScroll = el.scrollWidth - el.clientWidth;

      if (x <= 2) arrowLeft.classList.add("hidden");
      else arrowLeft.classList.remove("hidden");

      if (x >= maxScroll - 2) arrowRight.classList.add("hidden");
      else arrowRight.classList.remove("hidden");
    }

    arrowLeft.onclick = ()=> {
      modesEl.scrollBy({ left: -420, behavior: "smooth" });
      setTimeout(updateArrows, 220);
    };
    arrowRight.onclick = ()=> {
      modesEl.scrollBy({ left: 420, behavior: "smooth" });
      setTimeout(updateArrows, 220);
    };

    modesEl.addEventListener("scroll", updateArrows);
    window.addEventListener("resize", updateArrows);
const extraFiltersWrap = document.getElementById("extraFilters");
function renderExtraFilters() {
  extraFiltersWrap.innerHTML = "";
  extraFiltersWrap.style.display = "none";

const modeConfig = GAME.modes?.[currentMode];
if (!modeConfig || !modeConfig.filters) return;

  extraFiltersWrap.style.display = "";

Object.entries(modeConfig.filters).forEach(([key, field]) => {
    // ❌ YouTube: subscribers НЕ рендерим как обычное поле
if (
  GAME_ID === "youtube" &&
  currentMode === "Каналы" &&
  key === "subscribers"
) {
  return;
}
    let el;
if (field.type === "range") {
  const wrap = document.createElement("div");
  wrap.className = "filter-range";
  wrap.dataset.key = key;

if (field.showIf) {
  wrap.style.display = "none";
}

  const label = document.createElement("div");
  label.className = "range-label";
  label.textContent = field.label;

  const row = document.createElement("div");
  row.className = "filter-range-row";

  const from = document.createElement("input");
  from.type = "number";
  from.placeholder = "От";
  from.className = "select range-input";

  const to = document.createElement("input");
  to.type = "number";
  to.placeholder = "До";
  to.className = "select range-input";

  from.addEventListener("input", () => {
extraFilterValues[key + "_from"] = from.value || null;
    loadOffers();
  });

  to.addEventListener("input", () => {
extraFilterValues[key + "_to"] = to.value || null;

    loadOffers();
  });

  row.appendChild(from);
  row.appendChild(to);

  wrap.appendChild(label);
  wrap.appendChild(row);

  extraFiltersWrap.appendChild(wrap);
  return;
}

if (field.type === "number") {
  el = document.createElement("input");
  el.type = "number";
  el.placeholder = field.label;
  el.className = "select";

  el.addEventListener("change", () => {
    extraFilterValues[key] = el.value || null;
    loadOffers();
  });
}

if (field.type === "select") {
  const wrap = document.createElement("div");
  wrap.dataset.key = key;

  const el = document.createElement("select");
  el.className = "select";
  el.innerHTML = `<option value="">${field.label}</option>`;

  field.options.forEach(opt => {
    el.innerHTML += `<option value="${opt}">${opt}</option>`;
  });

  if (field.showIf) {
    wrap.style.display = "none";
  }

  el.addEventListener("change", () => {
    extraFilterValues[key] = el.value || null;
    // ===== Показ range-фильтров по showIfValue =====
Object.entries(modeConfig.filters).forEach(([fKey, fField]) => {
  if (fField.type !== "range") return;
  if (!fField.showIfValue) return;

  const need = fField.showIfValue[key];
  if (!need) return;

  const rangeWrap = extraFiltersWrap.querySelector(
    `[data-key="${fKey}"]`
  );
  if (!rangeWrap) return;

  if (el.value === need) {
    rangeWrap.style.display = "";
  } else {
    rangeWrap.style.display = "none";
    delete extraFilterValues[fKey + "_from"];
    delete extraFilterValues[fKey + "_to"];
  }
});
    Object.entries(modeConfig.filters).forEach(([otherKey, otherField]) => {
      if (!otherField.showIf) return;
      if (otherField.showIf[key] === undefined) return;

      const otherWrap = extraFiltersWrap.querySelector(
        `[data-key="${otherKey}"]`
      );
      if (!otherWrap) return;

      let ok = false;

// обычный showIf
if (otherField.showIf && otherField.showIf[key] !== undefined) {
  const cond = otherField.showIf[key];
  ok =
    (Array.isArray(cond) && cond.includes(el.value)) ||
    el.value === cond;
}

// showIfValue (другое количество)
if (
  !ok &&
  otherField.showIfValue &&
  otherField.showIfValue[key] === el.value
) {
  ok = true;
}

      if (ok) {
        otherWrap.style.display = "";
      } else {
        otherWrap.style.display = "none";
        delete extraFilterValues[otherKey];
        delete extraFilterValues[otherKey + "_from"];
        delete extraFilterValues[otherKey + "_to"];
      }
    });
    loadOffers();
  });

  wrap.appendChild(el);
  extraFiltersWrap.appendChild(wrap);
  return;
}

    extraFiltersWrap.appendChild(el);
  });
}
    // ===== OFFERS LOAD (минимально, твоё API уже есть) =====
async function loadOffers() {
  const params = new URLSearchParams();

  params.set("game", GAME_ID);
  params.set("mode", currentMode);

  // 🔹 extra filters
  Object.entries(extraFilterValues).forEach(([key, value]) => {
    if (value !== null && value !== "") {
      params.set(key, value);
    }
  });

  if (selectedSearch) {
    params.set("search", selectedSearch);
  }

  if (selectedCategory) {
    params.set("category", selectedCategory);
  }

  if (sortPrice) {
    params.set(
      "sort",
      sortPrice === "asc" ? "price_asc" : "price_desc"
    );
  }

  if (sortAmount) {
    params.set(
      "sort",
      sortAmount === "asc" ? "amount_asc" : "amount_desc"
    );
  }

  // 🔥 ОБНОВЛЯЕМ URL ПОСЛЕ ДОБАВЛЕНИЯ ВСЕГО
  const newUrl = new URL(window.location);
  newUrl.search = params.toString();
  history.replaceState({}, "", newUrl);

  const res = await fetch("/api/offers?" + params.toString());
  const data = await res.json();

  if (!data.success) return;

  renderOffers(data.offers || []);
  updatePrices();
}

    // ===== Favorites =====
    function getFavorites(){
      try{ return JSON.parse(localStorage.getItem("tp_favorites") || "[]"); }
      catch{ return []; }
    }
    function isFavorite(id){ return getFavorites().includes(id); }
    function toggleFavorite(id){
      let favs = getFavorites();
      if(favs.includes(id)) favs = favs.filter(x=>x!==id);
      else favs.push(id);
      localStorage.setItem("tp_favorites", JSON.stringify(favs));
    }

    // ===== Stars =====
    function renderStars(avg){
      const rounded = Math.round(avg || 0);
      let cls = "r1";
      if(avg >= 4.5) cls="r5";
      else if(avg >= 3.5) cls="r4";
      else if(avg >= 2.5) cls="r3";
      else if(avg >= 1.5) cls="r2";

      let html = `<span class="stars ${cls}">`;
      for(let i=1;i<=5;i++){
        html += `<span class="star ${i<=rounded?"filled":""}">★</span>`;
      }
      html += `</span>`;
      return html;
    }

    function timeOnSite(createdAt){
      if (!createdAt) return "на сайте недавно";
      const diff = Date.now() - new Date(createdAt).getTime();
      const minutes = Math.floor(diff / 60000);
      const hours = Math.floor(diff / 3600000);
      const days = Math.floor(diff / 86400000);
      if (minutes < 60) return `на сайте ${minutes} мин`;
      if (hours < 24) return `на сайте ${hours} ч`;
      return `на сайте ${days} дн`;
    }
const METHOD_LABELS = {
  gamepass: "Game Pass",
  private_server: "Приватный сервер",
  official_store: "Официальный магазин",
  gift_card: "Подарочная карта",
  premium: "Премиум"
};

const COUNTRY_LABELS = {
  EU: "Европа",
  US: "Америка",
  RU: "Россия",
  UA_CIS: "Украина + СНГ",
  OTHER: "Другие"
};
const ACCOUNT_TYPE_LABELS = {
  sale: "Продажа",
  rent: "Аренда"
};

const ACCOUNT_REGION_LABELS = {
  RU: "Россия",
  UA: "Украина",
  KZ: "Казахстан",
  EU: "Европа",
  US: "Америка",
  OTHER: "Другие"
};

    function renderOffers(offers){
      const list = document.getElementById("offersList");
      list.innerHTML = "";

      if(!offers.length){
        list.innerHTML = `<div class="empty">Пока нет объявлений</div>`;
        return;
      }

      offers.forEach(o=>{
        const card = document.createElement("div");
        card.className = "offer-card";
        card.style.position = "relative";
        card.style.cursor = "pointer";

        card.addEventListener("click", ()=> location.href = `/offer.html?id=${o.id}`);

        const avatar =
          o.seller?.avatarUrl ||
          o.seller?.avatarDataUrl ||
          "/img/avatar-default.svg";

        const online = o.seller?.online === true;
        const rating = o.seller?.rating || 0;
        const reviews = o.seller?.reviewsCount || 0;
        const onSiteText = timeOnSite(o.seller?.createdAt);
        const offerImage =
  o.imageUrl ||
  o.imageDataUrl ||
  o.image ||
  "/img/offer-default.png";

        card.innerHTML = `
          <div class="offer-heart ${isFavorite(o.id) ? "active" : ""}">
            <svg viewBox="0 0 24 24">
              <path d="M12 21s-7-4.35-10-8.5C-1.5 7.5 3 3 7.5 6.5
                       9.5 8 12 10.5 12 10.5S14.5 8 16.5 6.5
                       C21 3 25.5 7.5 22 12.5
                       19 16.65 12 21 12 21z"/>
            </svg>
          </div>

          <div class="offer-image">
  ${
  currentMode !== "Робуксы" &&
  (o.stock || o.amount) &&
  Number(o.stock || o.amount) > 1
    ? `<div class="offer-amount-badge">×${o.stock || o.amount}</div>`
    : ``
}
  <img src="${offerImage}" onerror="this.src='/img/offer-default.png'">
</div>

          <div class="offer-body">
           <div class="offer-title">
  ${buildOfferTitle(o)}
</div>
            <div class="offer-price" data-price="${o.price}">—</div>

            <div class="offer-seller">
              <div class="seller-avatar">
                <img src="${avatar}" onerror="this.src='/img/avatar-default.svg'">
                <span class="seller-status" style="background:${online ? "#22c55e" : "#9ca3af"}"></span>
              </div>

              <div>
                <div class="seller-name">${o.seller?.username || "Продавец"}</div>

                <div class="seller-rating">
  ${
    reviews === 0
      ? `<span class="no-reviews">Нет отзывов</span>`
      : `${renderStars(rating)}
         <span style="margin-left:6px;color:#6b7280;font-weight:600;">
           ${reviews}
         </span>`
  }
</div>

                <div style="font-size:12px;color:#6b7280;margin-top:2px;">${onSiteText}</div>
              </div>
            </div>
          </div>
        `;

        const heart = card.querySelector(".offer-heart");
        heart.addEventListener("click", (e)=>{
          e.stopPropagation();
          toggleFavorite(o.id);
          heart.classList.toggle("active");
        });

        list.appendChild(card);
      });
    }

    // ===== Sell =====
    document.getElementById("sellBtn").addEventListener("click", ()=>{
      const token = localStorage.getItem("tp_token");
      if(!token){
        location.href = "/auth.html?mode=login";
        return;
      }
      location.href = "/offer-create.html?game=" + GAME_ID + "&mode=" + encodeURIComponent(currentMode);
    });

    // INIT
    async function updatePrices(){
  const els = document.querySelectorAll(".offer-price");

  for (const el of els) {
    const eur = Number(el.dataset.price);
    if (!eur) continue;

    el.textContent = await tpMoney.formatPrice(eur);
  }
}

// INIT
renderModes();
updateBreadcrumb();
updateCategoryFilter();
renderExtraFilters();

if (selectedCategory) {
  subcatSelect.value = selectedCategory;
}

// 🔥 восстановление фильтров
Object.entries(extraFilterValues).forEach(([key, value]) => {
  const wrap = document.querySelector(`[data-key="${key}"]`);
  if (!wrap) return;

  const select = wrap.querySelector("select");
  if (select) select.value = value;

  const input = wrap.querySelector("input");
  if (input) input.value = value;
});

loadOffers();

window.addEventListener("tp:currency-change", updatePrices);
  </script>
</body>
</html>
