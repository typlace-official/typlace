<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TyPlace</title>

  <link rel="stylesheet" href="/header.css">
  <link rel="stylesheet" href="/game.css">
  <link rel="stylesheet" href="/footer.css">

</head>

<body>
  <div id="header-container"></div>

  <main class="page-content">
  <div class="page">

    <div class="container">

      <div class="breadcrumb" id="breadcrumb">
        <img id="crumbIcon" src="" alt="" class="crumb-icon">
        <span class="crumb-game" id="crumbGame"></span>
        <span class="crumb-mode" id="crumbMode"></span>
      </div>

      <div class="modes-wrap">
        <button class="scroll-arrow left hidden" id="arrowLeft" aria-label="Влево">
          <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
        </button>

        <div class="modes-viewport">
          <div class="modes" id="modes">
            <div class="modes-row"></div>
            <div class="modes-row"></div>
            <div class="modes-row"></div>
            <div class="modes-row"></div>
          </div>
        </div>

        <button class="scroll-arrow right hidden" id="arrowRight" aria-label="Вправо">
          <svg viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg>
        </button>
      </div>

<div class="topbar">

  <!-- 🔹 1. Кнопка фильтров + сортировка -->
  <div class="mobile-controls">

<button class="sort-chip" id="filterToggle">
  <svg class="filter-icon" viewBox="0 0 24 24">
    <line x1="4" y1="6" x2="20" y2="6"/>
    <circle cx="9" cy="6" r="2"/>
    <line x1="4" y1="12" x2="20" y2="12"/>
    <circle cx="15" cy="12" r="2"/>
    <line x1="4" y1="18" x2="20" y2="18"/>
    <circle cx="11" cy="18" r="2"/>
  </svg>
  <span data-i18n="common.filters"></span>
</button>

    <div class="sort-chip" id="priceSort">
      <span data-i18n="common.price"></span>
      <span class="state" id="priceState">—</span>
    </div>

    <div class="sort-chip" id="stockSort" style="display:none;">
      <span data-i18n="common.amount"></span>
      <span class="state" id="stockState">—</span>
    </div>

  </div>

  <!-- 🔹 2. Скрытая панель фильтров -->
  <div class="filters-panel" id="filtersPanel">

    <div id="extraFilters"></div>
    <select class="select" id="subcatSelect"></select>
<select class="select" id="methodSelect" style="display:none;"></select>
  </div>

  <!-- 🔹 3. Поиск + Продать -->
  <div class="mobile-search-row">

    <div class="search">
      <input
        id="searchInput"
        type="text"
        data-i18n-placeholder="common.search_by_name">
      <span class="icon" aria-hidden="true">
        <svg viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="7"></circle>
          <path d="M20 20l-3.5-3.5"></path>
        </svg>
      </span>
    </div>

    <button
      class="sell-btn"
      id="sellBtn"
      data-i18n="common.sell">
    </button>

  </div>

  <!-- 🔹 4. Количество объявлений -->
  <div class="offers-count" id="offersCount"></div>

</div>

      <div id="offersList" class="offers-list"></div>

    </div>
  </div>
</main>

<div id="footer-container"></div>

<script src="/socket.io/socket.io.js"></script>
<script src="/games.list.js"></script>
<script src="/header.js"></script>
<script src="/i18n.js"></script>
<script type="module" src="/games/index.js"></script>
<script src="/tp-money.js"></script>
<script src="/offer-title.js"></script>
<script src="/offer-card.js"></script>
<script src="/footer.js"></script>

<script>
(async () => {

  // ✅ ждём пока /games/index.js успеет создать window.GAMES
  await new Promise(resolve => {
    const check = () => {
      if (window.GAMES) resolve();
      else setTimeout(check, 10);
    };
    check();
  });

  // ===== GAME FROM URL =====
  const urlParams = new URLSearchParams(location.search);
    const extraFilterValues = {};

    // 🔥 ВОССТАНАВЛЕНИЕ ФИЛЬТРОВ ИЗ URL
urlParams.forEach((value, key) => {
  if (["game", "mode"].includes(key)) return;

  extraFilterValues[key] = value;
});
const GAME_ID = urlParams.get("game");
const MODE_FROM_URL = urlParams.get("mode");

    if(!GAME_ID || !window.GAMES || !window.GAMES[GAME_ID]){
      document.body.innerHTML =
  `<h2 style="padding:24px">${window.tpI18n?.t("errors.game_not_found") || ""}</h2>`;
      throw new Error("Game not specified / unknown");
    }

    const GAME = window.GAMES[GAME_ID];

    // ===== set breadcrumb game =====
    const crumbIcon = document.getElementById("crumbIcon");
    const crumbGame = document.getElementById("crumbGame");
    const crumbMode = document.getElementById("crumbMode");

    crumbIcon.src = GAME.icon || "/img/game-default.png";
    crumbIcon.alt = GAME.title || "Game";
    crumbGame.textContent = GAME.title || "Game";

    // ===== Roblox-only defaults (пока) =====
    // позже мы вынесем FILTERS в config для каждой игры
const MODES = Object.entries(GAME.modes || {});

let currentMode =
  MODE_FROM_URL ||
  localStorage.getItem("tp_last_mode_" + GAME_ID) ||
  GAME.defaultMode ||
  (MODES[0] ? MODES[0][0] : null);
// если mode не был в URL — добавляем его
if (!MODE_FROM_URL && currentMode) {

  const url = new URL(window.location);

  url.searchParams.set("mode", currentMode);

  history.replaceState({}, "", url);

}
  const currentModeData = GAME.modes?.[currentMode];
crumbMode.textContent =
  currentModeData?.labelKey && window.tpI18n?.t
    ? window.tpI18n.t(currentModeData.labelKey)
    : currentMode;

    // ===== Elements =====
    const modesEl = document.getElementById("modes");
    const arrowLeft = document.getElementById("arrowLeft");
    const arrowRight = document.getElementById("arrowRight");
    // ===== FILTERS =====
const methodSelect = document.getElementById("methodSelect");
const subcatSelect = document.getElementById("subcatSelect");
let selectedCategory = urlParams.get("category") || null;
// ===== EXTRA FILTERS (YouTube, TikTok и т.д.) =====

let selectedSearch = "";
const searchInput = document.getElementById("searchInput");

// 🔥 ВСТАВЛЯЕШЬ ВОТ СЮДА
const filterToggle = document.getElementById("filterToggle");
const filtersPanel = document.getElementById("filtersPanel");

if (filterToggle && filtersPanel) {
  filterToggle.addEventListener("click", () => {
    filtersPanel.classList.toggle("show");
filterToggle.classList.toggle("active");
  });
}
searchInput.addEventListener("input", () => {
  selectedSearch = searchInput.value.trim();
  loadOffers();
});

subcatSelect.addEventListener("change", () => {
  selectedCategory = subcatSelect.value || null;
  loadOffers();
});

const priceSort = document.getElementById("priceSort");
const priceState = document.getElementById("priceState");
const stockSort = document.getElementById("stockSort");
const stockState = document.getElementById("stockState");

let sortPrice = null; // asc | desc
let sortAmount = null; // asc | desc

// ===== SORT PRICE =====
priceSort.addEventListener("click", ()=>{
  // ❌ сбрасываем сортировку количества
  sortAmount = null;
  stockState.textContent = "—";

  // ✅ включаем цену
  sortPrice = sortPrice === "asc" ? "desc" : "asc";
  priceState.textContent = sortPrice === "asc" ? "↑" : "↓";

  loadOffers();
});

// ===== SORT AMOUNT =====
stockSort.addEventListener("click", ()=>{
  // ❌ сбрасываем сортировку цены
  sortPrice = null;
  priceState.textContent = "—";

  // ✅ включаем количество
  sortAmount = sortAmount === "asc" ? "desc" : "asc";
  stockState.textContent = sortAmount === "asc" ? "↑" : "↓";

  loadOffers();
});


function updateBreadcrumb(){
  const modeData = GAME.modes?.[currentMode];

  crumbMode.textContent =
    modeData?.labelKey && window.tpI18n?.t
      ? window.tpI18n.t(modeData.labelKey)
      : currentMode;

  document.title = (GAME.title || "Game") + " — TyPlace";
}

function updateCategoryFilter() {
  subcatSelect.style.display = "none";
  subcatSelect.innerHTML = "";

  const modeConfig = GAME.modes?.[currentMode];
  const categories = modeConfig?.categories;

  if (Array.isArray(categories) && categories.length) {
    subcatSelect.style.display = "";
    subcatSelect.innerHTML = `
  <option value="">
    ${window.tpI18n?.t("common.category_placeholder")}
  </option>
`;

categories.forEach(cat => {
  const key = `${GAME_ID}.categories.${cat}`;
  const tr = window.tpI18n?.t ? window.tpI18n.t(key) : key;

  const label = (tr === key) ? cat : tr;

  subcatSelect.innerHTML += `
    <option value="${cat}">${label}</option>
  `;
});
  }
}
function renderModes(){
  const rows = modesEl.querySelectorAll(".modes-row");
  rows.forEach(r => r.innerHTML = "");

  MODES.forEach(([modeId, modeData], index)=>{

    const label =
      modeData.labelKey && window.tpI18n?.t
        ? window.tpI18n.t(modeData.labelKey)
        : modeId;

    const pill = document.createElement("div");
    pill.className = "mode-pill" + (modeId === currentMode ? " active" : "");
    pill.textContent = label;

    pill.onclick = () => {

      for (const k in extraFilterValues) delete extraFilterValues[k];

      localStorage.setItem("tp_last_mode_" + GAME_ID, modeId);
      currentMode = modeId;

      const url = new URL(window.location);
      url.searchParams.set("mode", modeId);
      history.replaceState({}, "", url);

      selectedSearch = "";
      searchInput.value = "";

      sortPrice = null;
      sortAmount = null;
      priceState.textContent = "—";
      stockState.textContent = "—";

      renderModes();
      updateBreadcrumb();
      updateCategoryFilter();
      renderExtraFilters();
      loadOffers();
    };

    rows[index % 4].appendChild(pill);
  });

  requestAnimationFrame(updateArrows);
}

    // ===== Arrows =====
    function updateArrows(){
      const el = modesEl;
      const hasOverflow = el.scrollWidth > el.clientWidth + 5;

      if (!hasOverflow){
        arrowLeft.classList.add("hidden");
        arrowRight.classList.add("hidden");
        return;
      }

      const x = el.scrollLeft;
      const maxScroll = el.scrollWidth - el.clientWidth;

      if (x <= 2) arrowLeft.classList.add("hidden");
      else arrowLeft.classList.remove("hidden");

      if (x >= maxScroll - 2) arrowRight.classList.add("hidden");
      else arrowRight.classList.remove("hidden");
    }

    arrowLeft.onclick = ()=> {
      modesEl.scrollBy({ left: -420, behavior: "smooth" });
      setTimeout(updateArrows, 220);
    };
    arrowRight.onclick = ()=> {
      modesEl.scrollBy({ left: 420, behavior: "smooth" });
      setTimeout(updateArrows, 220);
    };

    modesEl.addEventListener("scroll", updateArrows);
    window.addEventListener("resize", updateArrows);
const extraFiltersWrap = document.getElementById("extraFilters");
function renderExtraFilters() {
  const t = (key, fallback="") => (window.tpI18n?.t ? window.tpI18n.t(key) : (fallback || key || ""));
  extraFiltersWrap.innerHTML = "";

const modeConfig = GAME.modes?.[currentMode];
if (!modeConfig || !modeConfig.filters) return;


Object.entries(modeConfig.filters).forEach(([key, field]) => {
    // ❌ YouTube: subscribers НЕ рендерим как обычное поле
if (
  GAME_ID === "youtube" &&
  currentMode === "Каналы" &&
  key === "subscribers"
) {
  return;
}
    let el;
if (field.type === "range") {

  const wrap = document.createElement("div");
  wrap.className = "filter-range";
  wrap.dataset.key = key;

  // 🔥 ВСЕГДА скрываем range по умолчанию
  wrap.style.display = "none";

  const label = document.createElement("div");
  label.className = "range-label";
  label.textContent = field.labelKey ? t(field.labelKey, field.label) : (field.label || "");

  const row = document.createElement("div");
  row.className = "filter-range-row";

  const from = document.createElement("input");
  from.type = "number";
  from.placeholder = window.tpI18n?.t("common.from") || "From";
  from.className = "select range-input";

  const to = document.createElement("input");
  to.type = "number";
  to.placeholder   = window.tpI18n?.t("common.to") || "To";
  to.className = "select range-input";

  from.addEventListener("input", () => {
extraFilterValues[key + "_from"] = from.value || null;
    loadOffers();
  });

  to.addEventListener("input", () => {
extraFilterValues[key + "_to"] = to.value || null;

    loadOffers();
  });

  row.appendChild(from);
  row.appendChild(to);

  wrap.appendChild(label);
  wrap.appendChild(row);

  extraFiltersWrap.appendChild(wrap);
  return;
}

if (field.type === "number") {
  return;
}

if (field.type === "select") {
  const wrap = document.createElement("div");
  wrap.dataset.key = key;

  const el = document.createElement("select");
  el.className = "select";
const first = t(field.labelKey) || field.label || "";
el.innerHTML = `<option value="">${first}</option>`;

field.options.forEach(opt => {
  if (typeof opt === "object") {
    const text = opt.labelKey ? t(opt.labelKey, opt.label) : (opt.label ?? opt.value);
    el.innerHTML += `<option value="${opt.value}">${text}</option>`;
  } else {
    el.innerHTML += `<option value="${opt}">${opt}</option>`;
  }
});

  if (field.showIf) {
    wrap.style.display = "none";
  }

  el.addEventListener("change", () => {
    extraFilterValues[key] = el.value || null;
    // ===== Показ range-фильтров по showIfValue =====
Object.entries(modeConfig.filters).forEach(([fKey, fField]) => {
  if (fField.type !== "range") return;
  if (!fField.showIfValue) return;

  const need = fField.showIfValue[key];
  if (!need) return;

  const rangeWrap = extraFiltersWrap.querySelector(
    `[data-key="${fKey}"]`
  );
  if (!rangeWrap) return;

  if (el.value === need) {
    rangeWrap.style.display = "";
  } else {
    rangeWrap.style.display = "none";
    delete extraFilterValues[fKey + "_from"];
    delete extraFilterValues[fKey + "_to"];
  }
});
// ===== Показ range-фильтров по showIf (method) =====
Object.entries(modeConfig.filters).forEach(([fKey, fField]) => {
  if (fField.type !== "range") return;
  if (!fField.showIf) return;

  const need = fField.showIf[key];
  if (!need) return;

  const rangeWrap = extraFiltersWrap.querySelector(
    `[data-key="${fKey}"]`
  );
  if (!rangeWrap) return;

  const match =
    (Array.isArray(need) && need.includes(el.value)) ||
    el.value === need;

  if (match) {
    rangeWrap.style.display = "";
  } else {
    rangeWrap.style.display = "none";
    delete extraFilterValues[fKey + "_from"];
    delete extraFilterValues[fKey + "_to"];
  }
});
    Object.entries(modeConfig.filters).forEach(([otherKey, otherField]) => {
      if (!otherField.showIf) return;
      if (otherField.showIf[key] === undefined) return;

      const otherWrap = extraFiltersWrap.querySelector(
        `[data-key="${otherKey}"]`
      );
      if (!otherWrap) return;

      let ok = false;

// обычный showIf
if (otherField.showIf && otherField.showIf[key] !== undefined) {
  const cond = otherField.showIf[key];
  ok =
    (Array.isArray(cond) && cond.includes(el.value)) ||
    el.value === cond;
}

// showIfValue (другое количество)
if (
  !ok &&
  otherField.showIfValue &&
  otherField.showIfValue[key] === el.value
) {
  ok = true;
}

      if (ok) {
        otherWrap.style.display = "";
      } else {
        otherWrap.style.display = "none";
        delete extraFilterValues[otherKey];
        delete extraFilterValues[otherKey + "_from"];
        delete extraFilterValues[otherKey + "_to"];
      }
    });
    loadOffers();
  });

  wrap.appendChild(el);
  extraFiltersWrap.appendChild(wrap);
  return;
}

    extraFiltersWrap.appendChild(el);
  });
}
    // ===== OFFERS LOAD (минимально, твоё API уже есть) =====
async function loadOffers() {
  const params = new URLSearchParams();

params.set("game", GAME_ID);
params.set("mode", currentMode);

let currentLang = localStorage.getItem("tp_lang") || "ru";
if (currentLang === "ua") {
  currentLang = "uk";
}

params.set("lang", currentLang);

  // 🔹 extra filters
  Object.entries(extraFilterValues).forEach(([key, value]) => {
    if (value !== null && value !== "") {
      params.set(key, value);
    }
  });

  if (selectedSearch) {
    params.set("search", selectedSearch);
  }

  if (selectedCategory) {
    params.set("category", selectedCategory);
  }

  if (sortPrice) {
    params.set(
      "sort",
      sortPrice === "asc" ? "price_asc" : "price_desc"
    );
  }

  if (sortAmount) {
    params.set(
      "sort",
      sortAmount === "asc" ? "amount_asc" : "amount_desc"
    );
  }

  // 🔥 ОБНОВЛЯЕМ URL ПОСЛЕ ДОБАВЛЕНИЯ ВСЕГО
  const newUrl = new URL(window.location);
  newUrl.search = params.toString();
  history.replaceState({}, "", newUrl);

  const res = await fetch("/api/offers?" + params.toString());
  const data = await res.json();

  if (!data.success) return;

  renderOffers(data.offers || []);
  window.tpOfferCard.updatePrices();
}

    // ===== Favorites =====
function getFavorites(){
  try{ return JSON.parse(localStorage.getItem("tp_favorites") || "[]"); }
  catch{ return []; }
}

function isFavorite(id){

let lang = localStorage.getItem("tp_lang") || "ru";
if (lang === "ua") {
  lang = "uk";
}
  return getFavorites().some(f => {
    if(typeof f === "string") return f === id;
    return f.id === id && f.lang === lang;
  });

}

function toggleFavorite(id){

  const lang = localStorage.getItem("tp_lang") || "ru";

  let favs = getFavorites();

const index = favs.findIndex(f => typeof f === "object" && f.id === id && f.lang === lang);
  if(index >= 0){
    favs.splice(index,1);
  }else{
    favs.push({ id, lang });
  }

  localStorage.setItem("tp_favorites", JSON.stringify(favs));

}

function renderOffers(offers){

  const lang = localStorage.getItem("tp_lang") || "ru";

  // 🔥 фильтруем по языку
  const visibleOffers = offers.filter(o => {
    return o.title && o.title[lang] && o.title[lang].trim();
  });

  const countEl = document.getElementById("offersCount");

  if (countEl) {
    const n = visibleOffers.length;
    const text = window.tpI18n.pluralKey("common.offers_found", n);
    countEl.textContent = text;
  }

  const list = document.getElementById("offersList");
  list.innerHTML = "";

  if(!visibleOffers.length){
    return;
  }

  visibleOffers.forEach(o => {

    const card = window.tpOfferCard.createOfferCard(o, {
      showHeart: true,
      heartActive: isFavorite(o.id),

      onHeartClick: (offer, cardEl, heartEl) => {
        toggleFavorite(offer.id);
        heartEl.classList.toggle("active");
      },

      onClick: (offer) => {
        location.href = "/offer.html?id=" + encodeURIComponent(offer.id);
      },

      showAmountBadge: true
    });

    list.appendChild(card);
  });

  window.tpOfferCard.updatePrices(list);

  if (window.tpI18n?.apply) {
    window.tpI18n.apply();
  }
}

// INIT
(async () => {

  const lang = localStorage.getItem("tp_lang") || "ru";

  if (window.tpI18n?.load) {
    await window.tpI18n.load(lang);
  }

  renderModes();
  updateBreadcrumb();
  updateCategoryFilter();
  renderExtraFilters();
  loadOffers();

})();

if (selectedCategory) {
  subcatSelect.value = selectedCategory;
}

// 🔥 восстановление фильтров
Object.entries(extraFilterValues).forEach(([key, value]) => {
  const wrap = document.querySelector(`[data-key="${key}"]`);
  if (!wrap) return;

  const select = wrap.querySelector("select");
  if (select) select.value = value;

  const input = wrap.querySelector("input");
  if (input) input.value = value;
});

window.addEventListener("tp:currency-change", () => {
  const list = document.getElementById("offersList");
  window.tpOfferCard.updatePrices(list);
});
// ===== SELL BUTTON =====
const sellBtn = document.getElementById("sellBtn");

sellBtn.addEventListener("click", () => {
  // если не выбран режим — не пускаем
  if (!currentMode) return;

  const url = new URL("/offer-create.html", location.origin);
  url.searchParams.set("game", GAME_ID);
  url.searchParams.set("mode", currentMode);

  location.href = url.toString();
});
window.addEventListener("tp:lang-change", async (e) => {
  const lang = e.detail?.lang || (localStorage.getItem("tp_lang") || "ru");

  if (window.tpI18n?.load) {
    await window.tpI18n.load(lang);
  }

  // 🔥 ПЕРЕРИСОВЫВАЕМ ВСЁ
  renderModes();
  updateBreadcrumb();
  updateCategoryFilter();
  renderExtraFilters();

  // 🔥 восстановить значения фильтров
  Object.entries(extraFilterValues).forEach(([key, value]) => {
    const wrap = document.querySelector(`[data-key="${key}"]`);
    if (!wrap) return;

    const select = wrap.querySelector("select");
    if (select) select.value = value;

    const input = wrap.querySelector("input");
    if (input) input.value = value;
  });

  loadOffers();
});
})();
  </script>
</body>
</html>
