<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title data-i18n="page.title"></title>

  <link rel="stylesheet" href="/header.css">
  <link rel="stylesheet" href="/footer.css">
  <link rel="stylesheet" href="/card.css">

<style>
  :root{
    --tp-header-space:110px;
    --tp-bottom-space:calc(28px + env(safe-area-inset-bottom, 0px));

    --bg:#f6f7f9;
    --card:#fff;
    --text:#111827;
    --muted:#6b7280;
    --muted-soft:#9ca3af;
    --line:#e5e7eb;
    --line-soft:#edf0f3;
    --radius:16px;
    --shadow:0 10px 30px rgba(17,24,39,.05);

    --tp-empty-shadow:rgba(79,125,243,.14);
  }

  *{
    box-sizing:border-box;
  }

  html,
  body{
    margin:0;
    padding:0;
    min-height:100%;
    background:var(--bg);
    overflow-x:hidden;
  }

  body{
    min-height:100svh;
    display:flex;
    flex-direction:column;
    font-family:Inter, Arial, sans-serif;
    background:var(--bg);
    color:var(--text);
  }

  .page-content{
    flex:1 0 auto;
    width:100%;
    padding-top:var(--tp-header-space);
    box-sizing:border-box;
  }

  .page{
    width:100%;
    min-height:calc(100svh - var(--tp-header-space));
    padding:18px 14px var(--tp-bottom-space);
    box-sizing:border-box;
  }

  .container{
    width:100%;
    max-width:1200px;
    margin:0 auto;
    min-height:calc(100svh - var(--tp-header-space) - var(--tp-bottom-space));
    display:flex;
    flex-direction:column;
  }

  .top{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:14px;
    flex-wrap:wrap;
    margin:6px 0 18px;
    flex-shrink:0;
  }

  h1{
    margin:0;
    font-size:clamp(28px, 4vw, 34px);
    line-height:1.05;
    font-weight:900;
    letter-spacing:-0.03em;
    color:var(--text);
  }

  .meta{
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
    margin-top:10px;
  }

  .count{
    color:var(--muted);
    font-weight:700;
    font-size:14px;
  }

  .stars{
    display:inline-flex;
    gap:3px;
    font-size:18px;
    line-height:1;
  }

  .star{
    color:#9ca3af;
  }

  .star.filled{
    color:currentColor;
  }

  .stars.r5{ color:#facc15; }
  .stars.r4{ color:#fbbf24; }
  .stars.r3{ color:#f59e0b; }
  .stars.r2{ color:#ef4444; }
  .stars.r1{ color:#991b1b; }

  .review-dropdown{
    position:relative;
    min-width:240px;
    z-index:20;
  }

  .review-selected{
    min-height:42px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    padding:0 14px;
    border-radius:14px;
    border:1px solid var(--line);
    background:#fff;
    font-size:15px;
    font-weight:700;
    cursor:pointer;
    box-shadow:var(--shadow);
  }

  .review-selected:hover{
    background:#f9fafb;
  }

  .tp-caret{
    width:18px;
    height:18px;
    opacity:.7;
    transition:transform .18s ease;
    flex-shrink:0;
  }

  .review-dropdown.open .tp-caret{
    transform:rotate(180deg);
  }

  .review-menu{
    position:absolute;
    top:100%;
    left:0;
    width:100%;
    margin-top:8px;
    padding:8px;
    border:1px solid var(--line);
    border-radius:14px;
    background:#fff;
    box-shadow:0 16px 36px rgba(17,24,39,.08);
    display:none;
    z-index:30;
  }

  .review-dropdown.open .review-menu{
    display:block;
  }

  .review-option{
    min-height:40px;
    padding:8px 12px;
    border-radius:10px;
    display:flex;
    align-items:center;
    gap:8px;
    cursor:pointer;
    font-size:15px;
    font-weight:700;
  }

  .review-option:hover{
    background:#f3f4f6;
  }

  .reviews-content{
    flex:1 1 auto;
    width:100%;
    display:flex;
    flex-direction:column;
  }

  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
    gap:18px;
    align-items:stretch;
    width:100%;
  }

  .grid.is-hidden{
    display:none;
  }

  .offer-card{
    background:#fff;
    border:1px solid var(--line);
    border-radius:18px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    height:100%;
    cursor:pointer;
    box-shadow:var(--shadow);
    transition:transform .15s ease, box-shadow .15s ease;
  }

  .offer-card:hover{
    transform:translateY(-1px);
    box-shadow:0 14px 34px rgba(17,24,39,.08);
  }

  .offer-image{
    width:100%;
    aspect-ratio:4/3;
    background:#f3f4f6;
    border-bottom:1px solid var(--line-soft);
  }

  .offer-image img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }

  .offer-body{
    padding:14px;
    display:flex;
    flex-direction:column;
    gap:10px;
    flex:1;
  }

  .review-user{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:10px;
  }

  .review-user-left{
    display:flex;
    align-items:center;
    gap:10px;
    min-width:0;
    flex:1;
  }

  .avatar{
    width:36px;
    height:36px;
    border-radius:50%;
    object-fit:cover;
    flex-shrink:0;
    border:1px solid var(--line);
    background:#f3f4f6;
  }

  .username{
    font-size:15px;
    font-weight:800;
    line-height:1.2;
    color:var(--text);
    min-width:0;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }

  .review-stars{
    font-size:15px;
    line-height:1;
    flex-shrink:0;
  }

  .order-date{
    margin-top:-2px;
    font-size:12px;
    font-weight:700;
    color:var(--muted-soft);
  }

  .text{
    font-family:Inter, Arial, sans-serif;
    font-size:15px;
    font-weight:400;
    line-height:1.65;
    color:#374151;
    display:-webkit-box;
    -webkit-line-clamp:3;
    -webkit-box-orient:vertical;
    overflow:hidden;
    min-height:74px;
    max-width:100%;
    word-break:break-word;
    overflow-wrap:anywhere;
  }

  .review-more{
    margin-top:auto;
    font-size:14px;
    font-weight:700;
    color:#2563eb;
    cursor:pointer;
    min-height:20px;
    width:fit-content;
  }

  .review-more:hover{
    text-decoration:underline;
  }

  .review-more.is-hidden{
    visibility:hidden;
    pointer-events:none;
  }

  .empty-state{
    display:none;
    flex:1 1 auto;
    width:min(100%, 430px);
    margin:0 auto;
    padding:12px 18px 0;
    box-sizing:border-box;
    align-items:center;
    justify-content:center;
    text-align:center;
  }

  .empty-state.show{
    display:flex;
  }

  .empty-illustration{
    width:min(270px, 74vw);
    margin:0 auto 22px;
    filter:drop-shadow(0 20px 40px var(--tp-empty-shadow));
  }

  .empty-illustration svg{
    display:block;
    width:100%;
    height:auto;
  }

  .empty-text{
    color:#9ca3af;
    font-size:16px;
    line-height:1.45;
    font-weight:300;
    max-width:320px;
    margin:0 auto;
  }

  .modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.65);
    display:none;
    align-items:center;
    justify-content:center;
    padding:18px;
    z-index:9999;
  }

  .modal.open{
    display:flex;
  }

  .modal img{
    max-width:min(980px, 96vw);
    max-height:92vh;
    border-radius:12px;
    background:#111;
  }

  .review-modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.55);
    display:none;
    align-items:center;
    justify-content:center;
    padding:20px;
    z-index:2000;
  }

  .review-modal.open{
    display:flex;
  }

  body.modal-open{
    overflow:hidden;
  }

  .review-modal-card{
    position:relative;
    background:#fff;
    border-radius:20px;
    max-width:620px;
    width:100%;
    padding:24px;
    box-shadow:0 24px 60px rgba(0,0,0,.18);
  }

  .review-modal-card .text{
    display:block;
    overflow:visible;
    -webkit-line-clamp:unset;
    min-height:auto;
    color:#111827;
  }

  .modal-close{
    position:absolute;
    top:18px;
    right:18px;
    width:40px;
    height:40px;
    border:none;
    border-radius:50%;
    background:#f3f4f6;
    cursor:pointer;
    font-size:18px;
    font-weight:700;
    color:#374151;
  }

  .modal-close:hover{
    background:#e5e7eb;
  }

  @media (max-width:768px){
    :root{
      --tp-header-space:100px;
      --tp-bottom-space:calc(24px + env(safe-area-inset-bottom, 0px));
    }

    .page{
      padding:14px 12px var(--tp-bottom-space);
    }

    .top{
      margin:4px 0 16px;
    }

    .review-dropdown{
      min-width:220px;
    }

    .grid{
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:12px;
    }

    .offer-body{
      padding:12px;
      gap:8px;
    }

    .text{
      font-size:14px;
      line-height:1.58;
      min-height:66px;
      -webkit-line-clamp:3;
    }

    .review-more{
      font-size:13px;
    }

    .avatar{
      width:32px;
      height:32px;
    }

    .username{
      font-size:14px;
    }

    .review-stars{
      font-size:14px;
    }

    .empty-state{
      padding:8px 10px 0;
    }

    .empty-illustration{
      width:min(235px, 76vw);
      margin:0 auto 18px;
    }

    .empty-text{
      font-size:15px;
    }
  }

  @media (max-width:640px){
    .top{
      flex-direction:column;
      align-items:flex-start;
      gap:12px;
    }

    .review-dropdown{
      width:auto;
      min-width:0;
      max-width:240px;
    }

    .review-selected{
      width:auto;
      min-width:190px;
      max-width:240px;
    }

    .review-user{
      flex-direction:column;
      align-items:flex-start;
      gap:6px;
    }

    .review-modal{
      padding:14px;
      align-items:flex-end;
    }

    .review-modal-card{
      max-width:none;
      border-radius:18px 18px 0 0;
      padding:22px 18px 20px;
    }
  }
</style>
</head>

<body>
  <div id="header-container"></div>

  <main class="page-content">
    <div class="page">
      <div class="container">
        <div class="top">
          <div>
            <h1 id="reviewsTitle"></h1>
            <div class="meta" id="titleRating"></div>
          </div>

          <div class="review-dropdown tp-pill-wrap">
            <div class="review-selected tp-pill" id="reviewSelected">
              <span id="reviewSelectedText"></span>
              <svg class="tp-caret" viewBox="0 0 20 20" fill="none">
                <path d="M6 8l4 4 4-4" stroke="currentColor" stroke-width="2"/>
              </svg>
            </div>

            <div class="review-menu tp-panel" id="reviewMenu"></div>
          </div>
        </div>

        <div class="reviews-content">
          <div id="grid" class="grid"></div>

          <div id="empty" class="empty-state">
            <div>
              <div class="empty-illustration" aria-hidden="true">
                <svg viewBox="0 0 260 220" xmlns="http://www.w3.org/2000/svg" fill="none">
                  <defs>
                    <linearGradient id="reviewBubbleFill" x1="52" y1="42" x2="198" y2="184" gradientUnits="userSpaceOnUse">
                      <stop offset="0" stop-color="#ffffff" stop-opacity=".9"/>
                      <stop offset=".48" stop-color="#edf3ff" stop-opacity=".76"/>
                      <stop offset="1" stop-color="#dbe7ff" stop-opacity=".56"/>
                    </linearGradient>

                    <linearGradient id="reviewBubbleStroke" x1="65" y1="54" x2="194" y2="184" gradientUnits="userSpaceOnUse">
                      <stop offset="0" stop-color="#5e88f7" stop-opacity=".6"/>
                      <stop offset="1" stop-color="#7ea2ff" stop-opacity=".22"/>
                    </linearGradient>

                    <radialGradient id="reviewGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
                      gradientTransform="translate(130 112) rotate(90) scale(86 98)">
                      <stop offset="0" stop-color="#7ea2ff" stop-opacity=".34"/>
                      <stop offset=".65" stop-color="#7ea2ff" stop-opacity=".1"/>
                      <stop offset="1" stop-color="#7ea2ff" stop-opacity="0"/>
                    </radialGradient>

                    <radialGradient id="reviewShine" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
                      gradientTransform="translate(101 82) rotate(120) scale(66 74)">
                      <stop offset="0" stop-color="#ffffff" stop-opacity=".95"/>
                      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
                    </radialGradient>

                    <filter id="reviewBlurGlow" x="-50%" y="-50%" width="200%" height="200%">
                      <feGaussianBlur stdDeviation="16"/>
                    </filter>

                    <filter id="reviewShadow" x="-30%" y="-30%" width="160%" height="180%">
                      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#6f95ff" flood-opacity=".14"/>
                    </filter>
                  </defs>

                  <ellipse cx="130" cy="185" rx="68" ry="15" fill="#dfe7fb" opacity=".72"/>
                  <circle cx="130" cy="108" r="72" fill="url(#reviewGlow)" filter="url(#reviewBlurGlow)"/>

                  <g filter="url(#reviewShadow)">
                    <path
                      d="M69 63c0-15.5 12.5-28 28-28h66c15.5 0 28 12.5 28 28v51c0 15.5-12.5 28-28 28h-30.5l-23.8 21.3c-3.6 3.2-9.2.7-9.2-4.1V142H97c-15.5 0-28-12.5-28-28V63Z"
                      fill="url(#reviewBubbleFill)"
                      stroke="url(#reviewBubbleStroke)"
                      stroke-width="3"
                    />

                    <path
                      d="M81 61.5c0-9.9 8-17.9 17.9-17.9h61.2c9.9 0 17.9 8 17.9 17.9v46.3c0 9.9-8 17.9-17.9 17.9h-32.8c-1.5 0-2.9.5-4 1.5l-14.7 13.3v-10.4c0-2.4-1.9-4.4-4.4-4.4H98.9c-9.9 0-17.9-8-17.9-17.9V61.5Z"
                      fill="url(#reviewShine)"
                      opacity=".8"
                    />

                    <path d="M95 82h48" stroke="#7ea2ff" stroke-width="7" stroke-linecap="round" opacity=".45"/>
                    <path d="M95 101h67" stroke="#7ea2ff" stroke-width="7" stroke-linecap="round" opacity=".32"/>
                    <path d="M95 120h38" stroke="#7ea2ff" stroke-width="7" stroke-linecap="round" opacity=".24"/>

                    <g transform="translate(168 120)">
                      <path d="M18 0l4.4 9 10 1.5-7.2 7 1.7 10-8.9-4.7-8.9 4.7 1.7-10-7.2-7 10-1.5L18 0Z" fill="#facc15" opacity=".92"/>
                    </g>
                  </g>

                  <g opacity=".9">
                    <path d="M201 55v8" stroke="#6f95ff" stroke-width="3.5" stroke-linecap="round"/>
                    <path d="M197 59h8" stroke="#6f95ff" stroke-width="3.5" stroke-linecap="round"/>
                  </g>

                  <g opacity=".72">
                    <path d="M58 150v6" stroke="#7f9fff" stroke-width="3" stroke-linecap="round"/>
                    <path d="M55 153h6" stroke="#7f9fff" stroke-width="3" stroke-linecap="round"/>
                  </g>
                </svg>
              </div>

              <div id="emptyText" class="empty-text"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="modal" id="modal">
      <img id="modalImg" alt="">
    </div>
  </main>

  <div id="footer-container"></div>

<script src="/socket.io/socket.io.js"></script>
<script src="/games.list.js"></script>
<script src="/header.js"></script>
<script src="/i18n.js"></script>
<script src="/tp-money.js"></script>
<script src="/footer.js"></script>

<div class="review-modal" id="reviewModal">
  <button class="modal-close" id="reviewModalClose">✕</button>

  <div class="review-modal-card">
    <div id="reviewModalContent"></div>
  </div>
</div>

<script>
  function qs(name){
    return new URLSearchParams(location.search).get(name);
  }

  function getCurrentLang(){
    const lang =
      String(window.tpI18n?.currentLang || localStorage.getItem("tp_lang") || "ru")
        .trim()
        .toLowerCase();

    return ["ru", "uk", "en"].includes(lang) ? lang : "ru";
  }

  function pageT(key, params = {}){
    return window.tpI18n?.t(`page.${key}`, params) || key;
  }

  function buildUserReviewsTitle(username){
    const safeUsername = String(username || "").trim();
    if (!safeUsername) {
      return pageT("user");
    }

    const translated = window.tpI18n?.t?.("page.user_named", { username: safeUsername });
    if (translated && translated !== "page.user_named") {
      return translated;
    }

    const lang = getCurrentLang();

    if (lang === "uk") {
      return `Відгуки ${safeUsername}`;
    }

    if (lang === "en") {
      return `Reviews for ${safeUsername}`;
    }

    return `Отзывы ${safeUsername}`;
  }

  function fmtDate(d){
    if(!d) return "";
    const dt = new Date(d);
    if(String(dt) === "Invalid Date") return "";
    const dd = String(dt.getDate()).padStart(2,"0");
    const mm = String(dt.getMonth()+1).padStart(2,"0");
    const yy = dt.getFullYear();
    return `${dd}.${mm}.${yy}`;
  }

  function renderStars(avg){
    const a = Number(avg) || 0;
    const rounded = Math.round(a);
    let cls = "r1";
    if(a >= 4.5) cls="r5";
    else if(a >= 3.5) cls="r4";
    else if(a >= 2.5) cls="r3";
    else if(a >= 1.5) cls="r2";

    let html = `<span class="stars ${cls}" title="${a.toFixed(2)} / 5">`;
    for(let i=1;i<=5;i++){
      html += `<span class="star ${i<=rounded ? "filled" : ""}">★</span>`;
    }
    html += `</span>`;
    return html;
  }

  const modal = document.getElementById("modal");
  const modalImg = document.getElementById("modalImg");
  modal.addEventListener("click", ()=> modal.classList.remove("open"));

  function openImg(url){
    modalImg.src = url;
    modal.classList.add("open");
  }

  const userId = qs("id");
  const grid = document.getElementById("grid");
  const empty = document.getElementById("empty");
  const emptyText = document.getElementById("emptyText");

  let allReviews = [];
  let currentFilter = "all";

  function showEmpty(textKey = "empty"){
    grid.classList.add("is-hidden");
    emptyText.textContent = pageT(textKey);
    empty.classList.add("show");
  }

  function hideEmpty(){
    empty.classList.remove("show");
    emptyText.textContent = "";
    grid.classList.remove("is-hidden");
  }

  function setSelectedFilterLabel(){
    const selectedText = document.getElementById("reviewSelectedText");
    if(!selectedText) return;

    if(currentFilter === "all"){
      selectedText.textContent = pageT("all");
      return;
    }

    selectedText.innerHTML = renderStars(Number(currentFilter || 0));
  }

  function makeFilters(){
    const wrapper = document.querySelector(".review-dropdown");
    const menu = document.getElementById("reviewMenu");
    const selected = document.getElementById("reviewSelected");

    menu.innerHTML = "";

    const items = [
      { id: "all", label: pageT("all") },
      { id: "5", stars: 5 },
      { id: "4", stars: 4 },
      { id: "3", stars: 3 },
      { id: "2", stars: 2 },
      { id: "1", stars: 1 }
    ];

    items.forEach(item => {
      const option = document.createElement("div");
      option.className = "review-option";

      if(item.id === "all"){
        option.textContent = item.label;
      } else {
        option.innerHTML = renderStars(item.stars);
      }

      option.onclick = () => {
        currentFilter = item.id;
        setSelectedFilterLabel();
        wrapper.classList.remove("open");
        render();
      };

      menu.appendChild(option);
    });

    selected.onclick = () => {
      wrapper.classList.toggle("open");
    };

    setSelectedFilterLabel();
  }

  function computeHeader(){
    const count = allReviews.length;
    const titleRating = document.getElementById("titleRating");

    if(count === 0){
      titleRating.innerHTML = "";
      return;
    }

    const avg = allReviews.reduce(
      (sum, review) => sum + (Number(review.rating) || 0),
      0
    ) / count;

    titleRating.innerHTML = `
      ${renderStars(avg)}
      <span class="count">${formatReviewsCount(count)}</span>
    `;
  }

  function normalizeReview(r){
    return {
      rating: Number(r.rating) || 0,
      createdAt: r.createdAt,
      text: r.text || "",
      orderId: r.orderId,
      orderNumber: r.orderNumber,
      buyerName: r.buyer?.username || pageT("buyer_fallback"),
      buyerAvatar:
        r.buyer?.avatarUrl ||
        r.buyer?.avatarDataUrl ||
        "/img/avatar-default.svg",
      offerId: r.offer?.id,
      offerImage:
        r.offer?.imageUrl ||
        r.offer?.imageDataUrl ||
        "/img/offer-default.png",
      price: Number(r.offer?.price || 0)
    };
  }

  function render(){
    grid.innerHTML = "";

    const list = allReviews
      .map(normalizeReview)
      .filter(x =>
        currentFilter === "all"
          ? true
          : String(Math.round(x.rating)) === currentFilter
      );

    if (!list.length) {
      showEmpty("empty");
      return;
    }

    hideEmpty();

    list.forEach(x => {
      const card = document.createElement("div");
      card.className = "offer-card";

      const date = fmtDate(x.createdAt);

      card.innerHTML = `
        <div class="offer-image">
          <img src="${x.offerImage}" onerror="this.src='/img/offer-default.png'">
        </div>

        <div class="offer-body">
          <div class="review-user">
            <div class="review-user-left">
              <img class="avatar"
                   src="${x.buyerAvatar}"
                   onerror="this.src='/img/avatar-default.svg'">
              <span class="username">
                ${escapeHtml(x.buyerName)}
              </span>
            </div>

            <div class="review-stars">
              ${renderStars(x.rating)}
            </div>
          </div>

          <div class="order-date">
            ${date || ""}
          </div>

          <div class="text">
            ${x.text ? escapeHtml(x.text) : ""}
          </div>

          <div class="review-more is-hidden">
            ${pageT("show_more")}
          </div>
        </div>
      `;

      if(x.offerId){
        card.onclick = () => {
          location.href = "/offer.html?id=" + encodeURIComponent(x.offerId);
        };
      }

      grid.appendChild(card);

      const textEl = card.querySelector(".text");
      const moreBtn = card.querySelector(".review-more");

      if(!x.text || !x.text.trim()){
        moreBtn.classList.add("is-hidden");
      } else {
        requestAnimationFrame(() => {
          const clipped = textEl.scrollHeight > textEl.clientHeight + 1;

          if(clipped){
            moreBtn.classList.remove("is-hidden");
            moreBtn.addEventListener("click", (e) => {
              e.stopPropagation();
              openFullReview(x);
            });
          }
        });
      }
    });

    updatePrices();
    window.tpI18n.apply(document);
  }

  function escapeHtml(str){
    return String(str)
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;")
      .replaceAll("'","&#039;");
  }

  function formatReviewsCount(n){
    return window.tpI18n.pluralKey("page.count", n);
  }

  document.addEventListener("click", (e) => {
    const wrapper = document.querySelector(".review-dropdown");

    if(wrapper && !wrapper.contains(e.target)){
      wrapper.classList.remove("open");
    }
  });

  async function updatePrices(){
    const els = document.querySelectorAll(".offer-price");

    for(const el of els){
      const base = Number(el.dataset.price);
      if (!Number.isFinite(base)) continue;

      el.textContent = await tpMoney.formatPrice(base);
    }
  }

  window.addEventListener("tp:currency-change", updatePrices);

  async function init(){
    hideEmpty();
    makeFilters();
    setSelectedFilterLabel();

    const reviewsTitle = document.getElementById("reviewsTitle");

    if (modalImg) {
      modalImg.alt = pageT("modal_image_alt");
    }

    if(!userId){
      allReviews = [];
      computeHeader();
      showEmpty("no_user");
      return;
    }

    const token = localStorage.getItem("tp_token");

    const mePromise = token
      ? fetch("/auth/me", {
          headers: { Authorization: "Bearer " + token }
        }).then(r => r.json()).catch(() => ({}))
      : Promise.resolve({});

    const userPromise = fetch(`/api/users/by-id/${encodeURIComponent(userId)}`)
      .then(r => r.json())
      .catch(() => ({}));

    const [meData, userData] = await Promise.all([mePromise, userPromise]);

    const isMyPage = Boolean(meData.success && meData.user?.userId === userId);
    const targetUser = userData?.success ? userData.user : null;

    if (isMyPage) {
      reviewsTitle.textContent = pageT("my");
      document.title = pageT("my") + " — TyPlace";
    } else if (targetUser?.username) {
      const userTitle = buildUserReviewsTitle(targetUser.username);
      reviewsTitle.textContent = userTitle;
      document.title = userTitle + " — TyPlace";
    } else {
      reviewsTitle.textContent = pageT("user");
      document.title = pageT("user") + " — TyPlace";
    }

    if (!targetUser && !isMyPage) {
      allReviews = [];
      computeHeader();
      showEmpty("no_user");
      return;
    }

    const res = await fetch(`/api/users/${encodeURIComponent(userId)}/reviews-by-id`);
    const data = await res.json().catch(() => ({}));

    allReviews = data?.success && Array.isArray(data.reviews) ? data.reviews : [];

    computeHeader();
    render();
  }

  document.addEventListener("DOMContentLoaded", async () => {
    await window.tpI18n.load(window.tpI18n.currentLang);
    await init();
  });

  function openFullReview(data){
    const review = typeof data === "string" ? JSON.parse(data) : data;
    const modal = document.getElementById("reviewModal");
    const content = document.getElementById("reviewModalContent");

    content.innerHTML = `
      <div class="review-user" style="margin-bottom:12px;">
        <div class="review-user-left">
          <img class="avatar" src="${review.buyerAvatar}">
          <span class="username">${escapeHtml(review.buyerName)}</span>
        </div>
        <div class="review-stars">
          ${renderStars(review.rating)}
        </div>
      </div>

      <div class="order-date" style="margin-bottom:14px;">
        ${fmtDate(review.createdAt)}
      </div>

      <div class="text">
        ${escapeHtml(review.text)}
      </div>
    `;

    modal.classList.add("open");
    document.body.classList.add("modal-open");
  }

  const reviewModal = document.getElementById("reviewModal");
  const closeBtn = document.getElementById("reviewModalClose");

  function closeReviewModal(){
    reviewModal.classList.remove("open");
    document.body.classList.remove("modal-open");
  }

  reviewModal.addEventListener("click", (e) => {
    if(e.target === reviewModal){
      closeReviewModal();
    }
  });

  closeBtn.addEventListener("click", closeReviewModal);

  document.addEventListener("keydown", (e) => {
    if(e.key === "Escape" && reviewModal.classList.contains("open")){
      closeReviewModal();
    }
  });

  window.addEventListener("tp:lang-change", async () => {
    await init();
    window.tpI18n.apply(document);
  });
</script>

</body>
</html>
