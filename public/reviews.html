<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Отзывы — TyPlace</title>

  <link rel="stylesheet" href="/header.css">
  <link rel="stylesheet" href="/footer.css">
  <link rel="stylesheet" href="/card.css">


  <style>
    :root{
      --bg:#f6f7f9;
      --card:#fff;
      --text:#111;
      --muted:#6b7280;
      --line:#e5e7eb;
      --radius:14px;
    }

    body{
      margin:0;
      font-family: Inter, Arial, sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .page{
      display:flex;
      justify-content:center;
      padding: 18px 14px 40px;
    }
.container{
  width:100%;
  max-width:1200px;
}

    .top{
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:14px;
      flex-wrap:wrap;
      margin: 12px 0 16px;
    }

    h1{
      margin:0;
      font-size:26px;
      font-weight:800;
    }

    .meta{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      margin-top:6px;
    }

    .count{
      color:var(--muted);
      font-weight:700;
      font-size:14px;
    }

.stars{
  display:inline-flex;
  gap:3px;
  font-size:18px; /* БОЛЬШЕ */
  line-height:1;
}
    .star{
      color:#9ca3af; /* серый контур/пустая */
    }
    .star.filled{
      color:currentColor;
    }

    .stars.r5{ color:#facc15; }
    .stars.r4{ color:#fbbf24; }
    .stars.r3{ color:#f59e0b; }
    .stars.r2{ color:#ef4444; }
    .stars.r1{ color:#991b1b; }

    .row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }

    .deal{
      font-weight:900;
      font-size:14px;
    }

    .date{
      color:var(--muted);
      font-size:12px;
      font-weight:700;
      white-space:nowrap;
    }

    .buyer{
      margin-top:6px;
      color:var(--muted);
      font-weight:700;
      font-size:12px;
    }


    .screens{
      display:flex;
      gap:6px;
      flex-wrap:wrap;
      margin-top:10px;
    }

    .shot{
      width:62px;
      height:62px;
      border-radius:10px;
      border:1px solid var(--line);
      overflow:hidden;
      cursor:pointer;
      background:#f3f4f6;
    }
    .shot img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

.empty{
  margin-top:40px;
  padding:0;
  border:none;
  background:transparent;

  color:#9ca3af;
  text-align:center;
  font-size:15px;
  font-weight:600;
}

    /* простая модалка для картинки */
    .modal{
      position:fixed;
      inset:0;
      background: rgba(0,0,0,.65);
      display:none;
      align-items:center;
      justify-content:center;
      padding:18px;
      z-index:9999;
    }
    .modal.open{ display:flex; }
    .modal img{
      max-width:min(980px, 96vw);
      max-height:92vh;
      border-radius:12px;
      background:#111;
    }
    .filters{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  align-items:center;
}

/* ===== DROPDOWN REVIEW FILTER ===== */

.review-dropdown{
  position:relative;
  min-width:240px;
}

.review-selected{
  font-size:15px;
font-weight:700;
  height:40px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 14px;
  border-radius:12px;
  border:1px solid var(--line);
  background:#fff;
  cursor:pointer;
  font-weight:600;
}

.review-selected:hover{
  background:#f3f4f6;
}

.review-option{
  font-size:15px;
font-weight:700;
  padding:10px 14px;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:6px;
}

.review-option:hover{
  background:#f3f4f6;
}
.tp-caret{
  width:18px;
  height:18px;
  opacity:.7;
}
.review-menu{
  width:100%;
}

.review-dropdown.open .tp-caret{
  transform: rotate(180deg);
  transition: transform .18s ease;
}
.review-dropdown .tp-panel{
  min-width: 100%;
}
.review-option{
  border-radius: 8px;
}
.price{
  font-size:18px;
  font-weight:800;
  margin-top:6px;
}

.review-user-left{
  display:flex;
  align-items:center;
  gap:8px;
}

.review-stars{
  font-size:14px;
}

.deal{
  font-weight:800;
  font-size:15px;
  line-height:1.2;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;
}

.order-date{
  font-size:12px;
  color:#9ca3af;
  margin-top:4px;
}

.offer-image{
  aspect-ratio: 4 / 3;
}
/* ===== FINAL REVIEW CARD ===== */

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:18px;
  align-items:stretch;
}
@media (max-width:640px){

  .grid{
    grid-template-columns:repeat(2,1fr);
    gap:12px;
  }

}
.offer-card{
  background:#fff;
  border:1px solid #e5e7eb;
  border-radius:16px;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  height:100%;
  cursor:pointer;
}

.offer-image{
  width:100%;
  aspect-ratio:4/3;
  background:#f3f4f6;
}

.offer-image img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

.offer-body{
  padding:14px;
  display:flex;
  flex-direction:column;
  gap:2px;
  flex:1;
}

/* TITLE (2 строки фиксировано) */
.offer-title{
  font-size:15px;
  font-weight:700;
  line-height:1.35;

  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;

  min-height:40px;

  word-break:break-word;
  overflow-wrap:anywhere;
}

/* PRICE */
.offer-price{
  font-size:16px;
  font-weight:800;
}

/* USER BLOCK */
.review-user{
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.review-user-left{
  display:flex;
  align-items:center;
  gap:10px;
}

.avatar{
  width:36px;
  height:36px;
  border-radius:50%;
  object-fit:cover;
  flex-shrink:0;
}

.username{
  font-size:15px;
  font-weight:700;
}

.review-stars{
  font-size:15px;
}

/* DATE */
.order-date{
  font-size:12px;
  color:#9ca3af;
}

.text{
  font-family: Inter, Arial, sans-serif;
  font-size:15px;
  font-weight:400;
  line-height:1.6;
  color:#111;

  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;

  min-height:36px;

  word-break:break-word;
  overflow-wrap:anywhere;
  max-width:100%;
}
.review-dropdown{
  position:relative;
  min-width:240px;
  z-index:10;
}

.review-menu{
  position:absolute;
  top:100%;
  left:0;
  width:100%;
  background:#fff;
  border:1px solid var(--line);
  border-radius:12px;
  margin-top:6px;
  display:none;
  z-index:20;
}
.review-dropdown.open .review-menu{
  display:block;
}
.review-more{
  margin-top:2px;
  font-size:14px;
  font-weight:600;
  color:#2563eb;
  cursor:pointer;

  min-height:20px; /* место под кнопку всегда */
}

.review-more:hover{
  text-decoration:underline;
}
.review-more.is-hidden{
  visibility:hidden;  /* место остаётся, кнопки не видно */
  pointer-events:none;
}
/* модалка */
.review-modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.55);
  display:none;
  align-items:center;
  justify-content:center;
  padding:20px;
  z-index:2000;
}

.review-modal.open{
  display:flex;
}

.review-modal-card{
  background:#fff;
  border-radius:16px;
  max-width:600px;
  width:100%;
  padding:24px;
}

.review-modal-card .text{
  -webkit-line-clamp:unset;
  display:block;
  overflow:visible;
}
body.modal-open{
  overflow:hidden;
}
.review-modal-card{
  position:relative;
  background:#fff;
  border-radius:16px;
  max-width:600px;
  width:100%;
  padding:24px;
}

.modal-close{
  position:absolute;
  top:24px;
  right:32px;

  width:40px;
  height:40px;

  border:none;
  border-radius:50%;

  background:rgba(255,255,255,.9);
  backdrop-filter:blur(6px);

  cursor:pointer;
  font-size:18px;
  font-weight:700;
}

.modal-close:hover{
  background:#f3f4f6;
}

@media (max-width:640px){

  .review-user{
    flex-direction:column;
    align-items:flex-start;
    gap:6px;
  }

}
@media (max-width:640px){

  .avatar{
    width:28px;
    height:28px;
  }

}
@media (max-width:640px){

  .username{
    font-size:14px;
  }

}
@media (max-width:640px){

  .text{
    font-size:14px;
    line-height:1.5;
  }

}
@media (max-width:640px){

  .review-more{
    font-size:13px;
  }

}
  </style>
</head>

<body>
  <div id="header-container"></div>

  <main class="page-content">

  <div class="page">

    <div class="container">
      <div class="top">
        <div>
          <h1 id="reviewsTitle" data-i18n="page.title"></h1>
<div class="meta" id="titleRating"></div>

        </div>

<div class="review-dropdown tp-pill-wrap">
<div class="review-selected tp-pill" id="reviewSelected">
  <span id="reviewSelectedText"></span>
  <svg class="tp-caret" viewBox="0 0 20 20" fill="none">
    <path d="M6 8l4 4 4-4" stroke="currentColor" stroke-width="2"/>
  </svg>
</div>

  <div class="review-menu tp-panel" id="reviewMenu"></div>
</div>
      </div>

      <div id="grid" class="grid"></div>
      <div id="empty" class="empty" style="display:none;" data-i18n="page.empty"></div>
    </div>
  </div>

  <div class="modal" id="modal">
    <img id="modalImg" alt="screenshot">
  </div>
  </main>

  <div id="footer-container"></div>

<script src="/socket.io/socket.io.js"></script>
<script src="/games.list.js"></script>
<script src="/header.js"></script>
<script src="/i18n.js"></script>
<script src="/tp-money.js"></script>
<script src="/footer.js"></script>

<div class="review-modal" id="reviewModal">

  <button class="modal-close" id="reviewModalClose">✕</button>

  <div class="review-modal-card">
    <div id="reviewModalContent"></div>
  </div>

</div>
  <script>
    // ===== helpers =====
    function qs(name){
      return new URLSearchParams(location.search).get(name);
    }

    function fmtDate(d){
      if(!d) return "";
      const dt = new Date(d);
      if(String(dt) === "Invalid Date") return "";
      const dd = String(dt.getDate()).padStart(2,"0");
      const mm = String(dt.getMonth()+1).padStart(2,"0");
      const yy = dt.getFullYear();
      return `${dd}.${mm}.${yy}`;
    }

    function pick(obj, keys){
      for(const k of keys){
        const v = obj?.[k];
        if(v !== undefined && v !== null && v !== "") return v;
      }
      return null;
    }

    function renderStars(avg){
      const a = Number(avg) || 0;
      const rounded = Math.round(a);
      let cls = "r1";
      if(a >= 4.5) cls="r5";
      else if(a >= 3.5) cls="r4";
      else if(a >= 2.5) cls="r3";
      else if(a >= 1.5) cls="r2";

      let html = `<span class="stars ${cls}" title="${a.toFixed(2)} / 5">`;
      for(let i=1;i<=5;i++){
        html += `<span class="star ${i<=rounded ? "filled" : ""}">★</span>`;
      }
      html += `</span>`;
      return html;
    }

    // ===== modal =====
    const modal = document.getElementById("modal");
    const modalImg = document.getElementById("modalImg");
    modal.addEventListener("click", ()=> modal.classList.remove("open"));

    function openImg(url){
      modalImg.src = url;
      modal.classList.add("open");
    }

    // ===== load =====
    const userId = qs("id");
    const grid = document.getElementById("grid");
    const empty = document.getElementById("empty");
    const filtersEl = document.getElementById("filters");

    let allReviews = [];
    let currentFilter = "all"; // all | "5".."1"

function makeFilters(){

  const wrapper = document.querySelector(".review-dropdown");
  const menu = document.getElementById("reviewMenu");
  const selected = document.getElementById("reviewSelected");

  menu.innerHTML = "";

  const items = [
    {id:"all", label: window.tpI18n.t("page.all")},
    {id:"5", stars:5},
    {id:"4", stars:4},
    {id:"3", stars:3},
    {id:"2", stars:2},
    {id:"1", stars:1},
  ];

  items.forEach(item=>{
    const option = document.createElement("div");
    option.className = "review-option";

    if(item.id === "all"){
      option.textContent = item.label;
    } else {
      option.innerHTML = renderStars(item.stars);
    }

    option.onclick = ()=>{
      currentFilter = item.id;

      if(item.id === "all"){
        selected.innerHTML = `
          ${window.tpI18n.t("page.all")}
          <svg class="tp-caret" viewBox="0 0 20 20" fill="none">
            <path d="M6 8l4 4 4-4" stroke="currentColor" stroke-width="2"/>
          </svg>
        `;
      } else {
        selected.innerHTML = `
          ${renderStars(item.stars)}
          <svg class="tp-caret" viewBox="0 0 20 20" fill="none">
            <path d="M6 8l4 4 4-4" stroke="currentColor" stroke-width="2"/>
          </svg>
        `;
      }

      wrapper.classList.remove("open");
      menu.classList.remove("show");
      render();
    };

    menu.appendChild(option);
  });

  // Открытие
  selected.onclick = ()=>{
    wrapper.classList.toggle("open");
    menu.classList.toggle("show");
  };

}

function computeHeader(){
  const count = allReviews.length;
  const titleRating = document.getElementById("titleRating");

  if(count === 0){
    titleRating.innerHTML = "";
    return;
  }

  // меньше 10 отзывов — только количество
  if(count < 10){
    titleRating.innerHTML = `
      <span class="count">${formatReviewsCount(count)}</span>
    `;
    return;
  }

  // 10 и больше — звезды + количество
  const avg = allReviews.reduce(
    (s,r)=> s + (Number(r.rating)||0),
    0
  ) / count;

  titleRating.innerHTML = `
    ${renderStars(avg)}
    <span class="count">${formatReviewsCount(count)}</span>
  `;
}


function normalizeReview(r){
  return {
    rating: Number(r.rating) || 0,
    createdAt: r.createdAt,
    text: r.text || "",

    orderId: r.orderId,
    orderNumber: r.orderNumber,

    buyerName: r.buyer?.username || "Покупатель",
    buyerAvatar:
      r.buyer?.avatarUrl ||
      r.buyer?.avatarDataUrl ||
      "/img/avatar-default.svg",

    offerId: r.offer?.id,
    offerTitle: r.offer?.description || "Без описания",
    offerImage:
      r.offer?.imageUrl ||
      r.offer?.imageDataUrl ||
      "/img/offer-default.png",

    price: Number(r.offer?.price || 0)
  };
}

function render(){
  grid.innerHTML = "";

  const list = allReviews
    .map(normalizeReview)
    .filter(x =>
      currentFilter==="all"
        ? true
        : String(Math.round(x.rating)) === currentFilter
    );

  empty.style.display = list.length ? "none" : "block";

  list.forEach(x => {

    const card = document.createElement("div");
    card.className = "offer-card";

    const date = fmtDate(x.createdAt);

    card.innerHTML = `
      <div class="offer-image">
        <img src="${x.offerImage}" onerror="this.src='/img/offer-default.png'">
      </div>

      <div class="offer-body">

        <div class="review-user">
          <div class="review-user-left">
            <img class="avatar"
                 src="${x.buyerAvatar}"
                 onerror="this.src='/img/avatar-default.svg'">
            <span class="username">
              ${escapeHtml(x.buyerName)}
            </span>
          </div>

          <div class="review-stars">
            ${renderStars(x.rating)}
          </div>
        </div>

        <div class="order-date">
          ${date || ""}
        </div>

<div class="text">
  ${x.text ? escapeHtml(x.text) : ""}
</div>

<div class="review-more is-hidden">
  ${window.tpI18n.t("page.show_more")}
</div>

      </div>
    `;

    // переход на оффер
    if(x.offerId){
      card.onclick = () => {
        location.href = "/offer.html?id=" + encodeURIComponent(x.offerId);
      };
    }

    grid.appendChild(card);

    // 🔥 ВАЖНО — проверяем обрезался ли текст
    const textEl = card.querySelector(".text");
    const moreBtn = card.querySelector(".review-more");

    if(!x.text || !x.text.trim()){
      moreBtn.classList.add("is-hidden");
    } else {
      requestAnimationFrame(()=>{
        const clipped = textEl.scrollHeight > textEl.clientHeight + 1;

        if(clipped){
          moreBtn.classList.remove("is-hidden");
          moreBtn.addEventListener("click",(e)=>{
            e.stopPropagation();
            openFullReview(x);
          });
        }
      });
    }

  });

updatePrices();

window.tpI18n.apply();
}


    function escapeHtml(str){
      return String(str)
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }
    function escapeAttr(str){
      // для атрибутов достаточно базового экранирования
      return escapeHtml(str);
    }
function formatReviewsCount(n){
  return window.tpI18n.pluralKey("page.count", n);
}
// Закрытие dropdown при клике вне (один раз)
document.addEventListener("click", (e)=>{
  const wrapper = document.querySelector(".review-dropdown");
  const menu = document.getElementById("reviewMenu");

  if(wrapper && !wrapper.contains(e.target)){
    wrapper.classList.remove("open");
    menu.classList.remove("show");
  }
});
async function updatePrices(){
  const els = document.querySelectorAll(".offer-price");

  for(const el of els){
    const base = Number(el.dataset.price);
    if(!base) continue;

    el.textContent = await tpMoney.formatPrice(base);
  }
}

window.addEventListener("tp:currency-change", updatePrices);

async function init(){
  makeFilters();

  document.getElementById("reviewSelectedText").textContent =
    window.tpI18n.t("page.all");
const reviewsTitle = document.getElementById("reviewsTitle");

// Проверяем: это свои отзывы или чужие
const token = localStorage.getItem("tp_token");

if (token) {
  const meRes = await fetch("/auth/me", {
    headers: { Authorization: "Bearer " + token }
  });
  const meData = await meRes.json().catch(()=>({}));

  if (meData.success && meData.user?.userId === userId) {
    reviewsTitle.textContent = window.tpI18n.t("page.my");
    document.title = window.tpI18n.t("page.my") + " — TyPlace";
  } else {
    reviewsTitle.textContent = window.tpI18n.t("page.user");
    document.title = window.tpI18n.t("page.user") + " — TyPlace";
  }
} else {
  reviewsTitle.textContent = window.tpI18n.t("page.user");
  document.title = window.tpI18n.t("page.user") + " — TyPlace";
}
if(!userId){
  empty.style.display = "block";
  empty.textContent = window.tpI18n.t("page.no_user");
  return;
}

const res = await fetch(`/api/users/${encodeURIComponent(userId)}/reviews-by-id`);

      const data = await res.json().catch(()=>({}));

      allReviews = data?.success && Array.isArray(data.reviews) ? data.reviews : [];

      computeHeader();
      render();
    }

document.addEventListener("DOMContentLoaded", async () => {
  await window.tpI18n.load(window.tpI18n.currentLang);
  init();
});
function openFullReview(data){
  const review = typeof data === "string" ? JSON.parse(data) : data;

  const modal = document.getElementById("reviewModal");
  const content = document.getElementById("reviewModalContent");

  content.innerHTML = `
    <div class="review-user" style="margin-bottom:12px;">
      <div class="review-user-left">
        <img class="avatar" src="${review.buyerAvatar}">
        <span class="username">${escapeHtml(review.buyerName)}</span>
      </div>
      <div class="review-stars">
        ${renderStars(review.rating)}
      </div>
    </div>

    <div class="order-date" style="margin-bottom:14px;">
      ${fmtDate(review.createdAt)}
    </div>

    <div class="text">
      ${escapeHtml(review.text)}
    </div>
  `;

  modal.classList.add("open");
  document.body.classList.add("modal-open");
}

const reviewModal = document.getElementById("reviewModal");
const closeBtn = document.getElementById("reviewModalClose");

function closeReviewModal(){
  reviewModal.classList.remove("open");
  document.body.classList.remove("modal-open");
}

// закрытие по фону
reviewModal.addEventListener("click", (e)=>{
  if(e.target === reviewModal){
    closeReviewModal();
  }
});

// закрытие по крестику
closeBtn.addEventListener("click", closeReviewModal);

// закрытие по ESC
document.addEventListener("keydown", (e)=>{
  if(e.key === "Escape" && reviewModal.classList.contains("open")){
    closeReviewModal();
  }
});
window.addEventListener("tp:lang-change", () => {

  document.getElementById("reviewSelectedText").textContent =
    window.tpI18n.t("page.all");

  makeFilters();
  computeHeader();
  render();

  window.tpI18n.apply();
});
  </script>

</body>
</html>
