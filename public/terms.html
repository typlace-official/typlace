<!DOCTYPE html>
<html lang="ru">
<head>
  <title data-i18n="page.title"></title>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="/header.css">
  <link rel="stylesheet" href="/footer.css">

  <style>
    body{
      margin:0;
      background:#f6f7f9;
      font-family:Inter, Arial, sans-serif;
      color:#111827;
    }

    html, body{
      overflow-x:hidden;
    }

    .page{
      max-width:900px;
      margin:40px auto;
      padding:0 16px;
    }

    .content{
      background:#fff;
      padding:40px;
      border-radius:18px;
      border:1px solid #e5e7eb;
      box-shadow:0 12px 32px rgba(0,0,0,.06);
      min-width:0;
    }

    .content h1{
      font-size:26px;
      margin:0 0 10px 0;
      letter-spacing:-.2px;
    }

    .meta{
      font-size:13px;
      color:#6b7280;
      line-height:1.6;
      margin-bottom:20px;
    }

    .note{
      background:#f8fafc;
      border:1px solid #e5e7eb;
      border-radius:12px;
      padding:12px 14px;
      margin:14px 0 22px;
      color:#374151;
      font-size:13.5px;
      line-height:1.6;
    }

    .content h2{
      font-size:19px;
      margin:34px 0 12px;
      font-weight:800;
      letter-spacing:-.15px;
      scroll-margin-top:120px;
    }

    .content p,
    .content li{
      font-size:14px;
      line-height:1.7;
      color:#374151;
      margin:0 0 12px 0;
    }

    .content ul{
      margin:10px 0 16px 18px;
    }

    .content b{
      color:#111827;
    }

    .doc-link{
      color:#2563eb;
      text-decoration:none;
      font-weight:400;
    }

    .doc-link:hover{
      text-decoration:underline;
    }

    hr{
      border:none;
      height:1px;
      background:#e5e7eb;
      margin:28px 0;
    }

    @media(max-width:900px){
      .content{
        padding:22px;
        border-radius:16px;
      }

      .content h1{
        font-size:22px;
      }

      .content h2{
        font-size:17px;
      }
    }
  </style>
</head>
