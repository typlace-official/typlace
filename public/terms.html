  <style>
body{
  margin:0;
  background:#f6f7f9;
  font-family:Inter, Arial, sans-serif;
  color:#111827;
}

html, body{
  overflow-x: hidden;
}

.page{
  max-width:900px;
  margin:40px auto;
  padding:0 16px;
}

    .sidebar{
      position:sticky;
      top:120px;
      align-self:start;
      background:#ffffff;
      border:1px solid #e5e7eb;
      border-radius:16px;
      padding:16px;
      box-shadow:0 10px 26px rgba(0,0,0,.05);
    }

    .nav-title{
      font-size:12px;
      font-weight:800;
      color:#6b7280;
      letter-spacing:.04em;
      text-transform:uppercase;
      margin:4px 6px 10px;
    }

    .sidebar a{
      display:block;
      padding:10px 12px;
      border-radius:10px;
      font-size:14px;
      color:#6b7280;
      text-decoration:none;
      transition:.15s;
      line-height:1.2;
    }

    .sidebar a:hover{
      background:#f3f4f6;
      color:#2563eb;
    }

    .sidebar a.active{
      background:rgba(37,99,235,.10);
      color:#2563eb;
      font-weight:700;
    }

    .content{
      background:#fff;
      padding:40px;
      border-radius:18px;
      border:1px solid #e5e7eb;
      box-shadow:0 12px 32px rgba(0,0,0,.06);
      min-width:0;
    }

    .content h1{
      font-size:26px;
      margin:0 0 10px 0;
      letter-spacing:-.2px;
    }

    .meta{
      font-size:13px;
      color:#6b7280;
      line-height:1.6;
      margin-bottom:20px;
    }

    .note{
      background:#f8fafc;
      border:1px solid #e5e7eb;
      border-radius:12px;
      padding:12px 14px;
      margin:14px 0 22px;
      color:#374151;
      font-size:13.5px;
      line-height:1.6;
    }

    .content h2{
      font-size:19px;
      margin:34px 0 12px;
      font-weight:800;
      letter-spacing:-.15px;
    }

    .content p, .content li{
      font-size:14px;
      line-height:1.7;
      color:#374151;
      margin:0 0 12px 0;
    }

    .content ul{
      margin:10px 0 16px 18px;
    }

    .content b{
      color:#111827;
    }

    hr{
      border:none;
      height:1px;
      background:#e5e7eb;
      margin:28px 0;
    }

    code.k{
      background:#f3f4f6;
      border:1px solid #e5e7eb;
      padding:2px 6px;
      border-radius:8px;
      font-size:12.5px;
    }

@media(max-width:900px){
  .content{ padding:22px; border-radius:16px; }
  .content h1{ font-size:22px; }
  .content h2{ font-size:17px; }
}

.content h2{
  scroll-margin-top:120px;
}
.doc-link{
  color:#2563eb;
  text-decoration:none;
  font-weight:600;
}

.doc-link:hover{
  text-decoration:underline;
}
  </style>
