<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title data-i18n="page.title"></title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<script>
  (() => {
    const lang = localStorage.getItem("tp_lang");
    const safeLang = ["ru", "uk", "en"].includes(lang) ? lang : "ru";
    document.documentElement.lang = safeLang;
    document.documentElement.setAttribute("data-page-ready", "0");
  })();
</script>

  <link rel="stylesheet" href="/header.css">
  <link rel="stylesheet" href="/footer.css">
  <link rel="stylesheet" href="/game.css">

  <style>
    :root{
      --bg:#f6f6f6;
      --card:#fff;
      --text:#111;
      --muted:#6b7280;
      --line:#e5e7eb;
      --blue:#1E50D4;
      --radius:12px;
    }

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:var(--bg);
  color:var(--text);
}

html[data-page-ready="0"] body{
  opacity:0;
}

html[data-page-ready="1"] body{
  opacity:1;
  transition:opacity .12s ease;
}

    .container{
      max-width:960px;
      margin:28px auto;
      background:var(--card);
      border:1px solid #ddd;
      border-radius:var(--radius);
      padding:20px;
    }

    h1{
      margin:0 0 18px;
      font-size:28px;
    }

    .profile-header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      margin-bottom:18px;
    }

    .profile-top{
      display:flex;
      gap:16px;
      align-items:center;
      flex-wrap:wrap;
    }

    .avatar{
      width:96px;
      height:96px;
      border-radius:50%;
      object-fit:cover;
      background:#ddd;
      border:1px solid #ccc;
    }

    .info{
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    .username{
      font-size:20px;
      font-weight:900;
    }

    .user-id{
      font-size:13px;
      font-weight:700;
      color:var(--muted);
      cursor:pointer;
      user-select:none;
      display:inline-block;
      transition:color .2s ease;
    }

    .user-id.copied{
      color:#16a34a;
    }

    .rating-line{
      display:inline-flex;
      align-items:center;
      gap:8px;
      font-weight:800;
      cursor:pointer;
      user-select:none;
    }

    .rating-line:hover{
      text-decoration:underline;
    }

    .rating-count{
      font-size:14px;
      color:var(--muted);
      font-weight:700;
    }

    .since{
      font-size:13px;
      color:var(--muted);
    }

    .stars{
      display:inline-flex;
      gap:2px;
      font-size:16px;
    }

    .star{ color:#9ca3af; }
    .star.filled{ color:currentColor; }
    .stars.r5{ color:#facc15; }
    .stars.r4{ color:#fbbf24; }
    .stars.r3{ color:#f59e0b; }
    .stars.r2{ color:#ef4444; }
    .stars.r1{ color:#991b1b; }

    .nav{
      margin-top:24px;
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:12px;
    }

    .nav-item{
      border:1px solid var(--line);
      border-radius:12px;
      padding:14px;
      text-decoration:none;
      color:var(--text);
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      font-weight:900;
      background:#fff;
    }

    .nav-item:hover{
      background:#fafafa;
    }

    .profile-menu-btn{
      display:flex;
      align-items:center;
      justify-content:center;
      width:36px;
      height:36px;
      background:#fff;
      border:1px solid #e5e7eb;
      border-radius:10px;
      cursor:pointer;
      color:#6b7280;
      flex-shrink:0;
    }

    .profile-menu-btn:hover{
      background:#f3f4f6;
      color:var(--blue);
    }

    .profile-menu{
      position:fixed;
      inset:0;
      z-index:5000;
      display:flex;
      justify-content:center;
      align-items:center;
      background:rgba(0,0,0,.45);
      opacity:0;
      pointer-events:none;
      transition:opacity .2s ease;
    }

    .profile-menu.active{
      opacity:1;
      pointer-events:auto;
    }

    .profile-menu-inner{
      background:#fff;
      width:100%;
      max-width:420px;
      max-height:90vh;
      overflow-y:auto;
      border-radius:18px;
      box-shadow:0 30px 80px rgba(0,0,0,.25);
      transform:scale(.95);
      transition:transform .2s ease;
    }

    .profile-menu.active .profile-menu-inner{
      transform:scale(1);
    }

    .menu-screen-head{
      position:relative;
      height:56px;
      display:flex;
      align-items:center;
      justify-content:center;
      border-bottom:1px solid #eee;
    }

    .menu-title{
      font-size:17px;
      font-weight:700;
    }

    .menu-back,
    .menu-close{
      position:absolute;
      top:50%;
      transform:translateY(-50%);
      width:40px;
      height:40px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:22px;
      color:#6b7280;
      background:none;
      border:none;
      cursor:pointer;
      border-radius:50%;
    }

    .menu-back{ left:12px; }
    .menu-close{ right:12px; }

    .menu-back:hover,
    .menu-close:hover{
      background:#f3f4f6;
    }

    .mobile-avatar-block{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      padding:28px 16px 10px;
    }

    .menu-avatar-wrap{
      width:74px;
      height:74px;
      border-radius:50%;
      overflow:hidden;
      cursor:pointer;
      background:#e5e7eb;
      flex-shrink:0;
    }

    .big-avatar{
      width:120px;
      height:120px;
    }

    .menu-avatar{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .menu-change-photo{
      text-align:center;
      padding:8px 14px 12px;
      font-weight:700;
      color:var(--blue);
      cursor:pointer;
    }

    .menu-item{
      padding:14px 16px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      cursor:pointer;
      font-weight:700;
      border-top:1px solid #f1f5f9;
    }

    .menu-item:hover{
      background:#f3f4f6;
    }

    .menu-item.logout-item{
      color:#d12c2c;
    }

    .menu-arrow{
      color:#9ca3af;
      font-size:18px;
    }

    .menu-screen-body{
      padding:14px 16px 16px;
    }

    .menu-hint{
      margin-top:10px;
      font-size:12px;
      color:var(--muted);
      font-weight:600;
    }

    .menu-input{
      width:100%;
      margin-top:14px;
      padding:14px;
      font-size:16px;
      border-radius:12px;
      border:1px solid #e5e7eb;
      outline:none;
      box-sizing:border-box;
    }

    .menu-input:focus{
      border-color:var(--blue);
    }

    .menu-btn{
      margin-top:14px;
      width:100%;
      padding:12px 12px;
      border-radius:12px;
      border:1px solid var(--line);
      background:#fff;
      font-weight:800;
      cursor:pointer;
    }

    .menu-btn:hover{
      background:#f3f4f6;
    }

    .menu-btn:disabled{
      opacity:.55;
      cursor:not-allowed;
    }

    .menu-subhint{
  margin-top:10px;
  font-size:12px;
  color:var(--muted);
  font-weight:600;
  line-height:1.4;
}

.menu-actions{
  display:flex;
  flex-direction:column;
  gap:10px;
  margin-top:12px;
}

.menu-btn-secondary{
  color:var(--text);
  background:#fff;
}

    .menu-toggle{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:14px 0;
      border-bottom:1px solid #f1f5f9;
      font-weight:700;
    }

    .switch{
      position:relative;
      display:inline-block;
      width:46px;
      height:26px;
      flex-shrink:0;
    }

    .switch.is-disabled{
  opacity:.5;
  pointer-events:none;
}

    .switch input{
      opacity:0;
      width:0;
      height:0;
    }

    .slider{
      position:absolute;
      inset:0;
      background:#d1d5db;
      border-radius:999px;
      transition:.2s ease;
      cursor:pointer;
    }

    .slider::before{
      content:"";
      position:absolute;
      width:20px;
      height:20px;
      left:3px;
      top:3px;
      background:#fff;
      border-radius:50%;
      transition:.2s ease;
      box-shadow:0 1px 3px rgba(0,0,0,.18);
    }

    .switch input:checked + .slider{
      background:var(--blue);
    }

    .switch input:checked + .slider::before{
      transform:translateX(20px);
    }

    #externalOffers{
      max-width:960px;
      margin:20px auto;
      display:none;
    }

    #externalOffersTitle{
      margin:10px 0 20px;
    }

    @media(max-width:720px){
      .nav{
        grid-template-columns:repeat(2,1fr);
      }
    }

@media(max-width:640px){
  .container{
    border:none;
    border-radius:0;
    background:transparent;
    padding:16px;
    margin:0;
  }

  .profile-menu{
    background:#fff;
    align-items:stretch;
  }

  .profile-menu-inner{
    width:100%;
    height:100%;
    max-width:none;
    max-height:none;
    border-radius:0;
    box-shadow:none;
    transform:none;
  }

  .menu-item{
    height:56px;
    padding:0 16px;
    font-size:16px;
  }

  .nav-favorites-mobile-hide{
    display:none;
  }
}

    @media(max-width:420px){
      .nav{
        grid-template-columns:1fr;
      }
    }
    .avatar-crop-modal{
      position:fixed;
      inset:0;
      z-index:7000;
      display:flex;
      align-items:center;
      justify-content:center;
      background:rgba(0,0,0,.55);
      opacity:0;
      pointer-events:none;
      transition:opacity .2s ease;
    }

    .avatar-crop-modal.active{
      opacity:1;
      pointer-events:auto;
    }

    .avatar-crop-card{
      width:min(92vw, 460px);
      background:#fff;
      border-radius:18px;
      box-shadow:0 30px 80px rgba(0,0,0,.28);
      overflow:hidden;
    }

    .avatar-crop-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:14px 16px;
      border-bottom:1px solid #eee;
    }

    .avatar-crop-title{
      font-size:17px;
      font-weight:800;
    }

    .avatar-crop-close{
      width:38px;
      height:38px;
      border:none;
      background:#fff;
      border-radius:10px;
      cursor:pointer;
      font-size:18px;
      color:#6b7280;
    }

    .avatar-crop-close:hover{
      background:#f3f4f6;
    }

    .avatar-crop-body{
      padding:16px;
    }

    .avatar-crop-stage{
      position:relative;
      width:min(100%, 320px);
      aspect-ratio:1 / 1;
      margin:0 auto;
      overflow:hidden;
      border-radius:18px;
      background:#111827;
      touch-action:none;
      user-select:none;
    }

    .avatar-crop-image{
      position:absolute;
      left:0;
      top:0;
      transform-origin:0 0;
      will-change:transform, width, height;
      -webkit-user-drag:none;
      user-select:none;
      pointer-events:none;
    }

.avatar-crop-circle{
  position:absolute;
  inset:0;
  border-radius:50%;
  border:2px solid rgba(255,255,255,.95);
  box-shadow:0 0 0 9999px rgba(0,0,0,.45);
  pointer-events:none;
}

    .avatar-crop-tip{
      margin-top:12px;
      font-size:12px;
      color:var(--muted);
      text-align:center;
      font-weight:600;
    }

    .avatar-crop-controls{
      margin-top:16px;
    }

    .avatar-crop-label{
      display:block;
      margin-bottom:8px;
      font-size:13px;
      font-weight:700;
      color:#374151;
    }

    .avatar-crop-range{
      width:100%;
    }

    .avatar-crop-actions{
      display:flex;
      gap:10px;
      margin-top:16px;
    }

    .avatar-crop-actions .menu-btn{
      margin-top:0;
    }

    @media(max-width:640px){
      .avatar-crop-modal{
        align-items:flex-end;
      }

      .avatar-crop-card{
        width:100%;
        max-width:none;
        border-radius:18px 18px 0 0;
      }

      .avatar-crop-stage{
        width:min(100%, 300px);
      }
    }
    
  </style>
</head>

  <div id="header-container"></div>

  <main class="page-content">
    <div class="container">
      <div class="profile-header">
        <h1 id="profileTitle"></h1>

        <button id="profileEditBtn" class="profile-menu-btn edit-btn" onclick="openProfileMenu()">
          <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
            <path fill="currentColor"

      <div class="profile-top">
        <img id="avatar" class="avatar" alt="">

        <div class="info">

  <div id="footer-container"></div>

  <div id="profileMenu" class="profile-menu">
    <div class="profile-menu-inner" id="menuRoot">

      <div id="menuMain">
        <div class="menu-screen-head mobile-head">
          <div class="menu-title" data-i18n="page.title"></div>
          <button class="menu-close" onclick="closeProfileMenu()">✕</button>

        <div class="mobile-avatar-block">

        <div class="menu-item" onclick="openNickScreen()">
          <span id="menuUsername"></span>
          <span class="menu-arrow">›</span>
        </div>

        <div class="menu-item" onclick="openNotifyScreen()">
          <span data-i18n="page.menu.notifications"></span>
          <span class="menu-arrow">›</span>
        </div>

        <div class="menu-item logout-item" onclick="logout()">
          <span data-i18n="page.menu.logout"></span>
        </div>
      </div>

      <div id="menuNick" style="display:none;">
        <div class="menu-screen-head">
          <button class="menu-back" onclick="backToMain()">‹</button>
          <div class="menu-title" data-i18n="page.menu.profile"></div>
          <button class="menu-close" onclick="closeProfileMenu()">✕</button>

        <div class="menu-screen-body">
          <div id="nickHint" class="menu-hint" data-i18n="page.menu.nickHint"></div>

          <input
            id="nickInput"
            class="menu-input"
            type="text"
            maxlength="20"
            autocomplete="off"
            spellcheck="false"
          >

          <button id="saveNickBtn" class="menu-btn" onclick="saveNickFromMenu()" data-i18n="page.menu.save"></button>
        </div>
      </div>

<div id="menuNotify" style="display:none;">
  <div class="menu-screen-head">
    <button class="menu-back" onclick="backToMain()">‹</button>
    <div class="menu-title" data-i18n="page.menu.notifications"></div>
    <button class="menu-close" onclick="closeProfileMenu()">✕</button>

    <button

</div>

    </div>

  <div id="avatarCropModal" class="avatar-crop-modal">
    <div class="avatar-crop-card">
      <div class="avatar-crop-head">
        <div id="avatarCropTitle" class="avatar-crop-title" data-i18n="page.avatar.cropTitle"></div>
<button
  type="button"
  class="avatar-crop-close"
  onclick="closeAvatarCropModal()"

>✕</button>

      <div class="avatar-crop-body">
        <div id="avatarCropStage" class="avatar-crop-stage">
          <img id="avatarCropImage" class="avatar-crop-image" alt="">
          <div class="avatar-crop-circle"></div>
        </div>

        <div class="avatar-crop-controls">

  <script>
    const TOKEN_KEY = "tp_token";
    const USERNAME_CHANGE_INTERVAL_MS = 30 * 24 * 60 * 60 * 1000;

    const DEFAULT_AVATAR =
      "data:image/svg+xml;utf8," +
      encodeURIComponent(
        '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">' +
          '<rect width="64" height="64" rx="32" fill="#d9d9d9"/>' +
          '<circle cx="32" cy="26" r="12" fill="#bdbdbd"/>' +
          '<path d="M12 56c4-12 14-18 20-18s16 6 20 18" fill="#bdbdbd"/>' +
        '</svg>'
      );

const state = {
  currentUser: null,
  isExternal: false,

  notify: {
    site: true,
    email: true,
    telegram: false
  },

  telegramLinked: false,
  telegramUsername: "",
  telegramBotUsername: "",

  telegramPollTimer: null,
  telegramPollStartedAt: 0
};

const avatarCropState = {
  objectUrl: "",
  naturalWidth: 0,
  naturalHeight: 0,
  scale: 1,
  minScale: 1,
  maxScale: 3,
  x: 0,
  y: 0,
  dragging: false,
  pointerStartX: 0,
  pointerStartY: 0,
  dragStartX: 0,
  dragStartY: 0,

  pointers: new Map(),
  pinchStartDistance: 0,
  pinchStartScale: 1,
  pinchAnchorX: 0,
  pinchAnchorY: 0
};

    function pageT(key, params = {}) {
      return window.tpI18n.t(`page.${key}`, params);
    }

    function getToken() {
      return localStorage.getItem(TOKEN_KEY) || "";
    }

    function goLogin() {
      location.href = "/auth.html?mode=login";
    }

    function getCurrentLang() {
      return window.tpI18n?.currentLang || "ru";
    }

    function getLocale() {
      const lang = getCurrentLang();

      if (lang === "uk") return "uk-UA";
      if (lang === "en") return "en-US";
      return "ru-RU";
    }

    function formatDate(value) {
      const date = value instanceof Date ? value : new Date(value);

      if (Number.isNaN(date.getTime())) {
        return "";
      }

      return date.toLocaleDateString(getLocale(), {
        day: "numeric",
        month: "long",
        year: "numeric"
      });
    }

    function getNextUsernameChangeAt(user) {
      if (!user) return 0;

      if (user.nextUsernameChangeAt) {
        return Number(user.nextUsernameChangeAt) || 0;
      }

      const changedAt = Number(user.usernameChangedAt || 0);
      return changedAt ? changedAt + USERNAME_CHANGE_INTERVAL_MS : 0;
    }

    function getReviewWordKey(count) {
      const lang = getCurrentLang();

      if (lang === "en") {
        return count === 1 ? "reviews.one" : "reviews.many";
      }

      const abs = Math.abs(Number(count) || 0);
      const lastTwo = abs % 100;
      const last = abs % 10;

      if (lastTwo >= 11 && lastTwo <= 14) return "reviews.many";
      if (last === 1) return "reviews.one";
      if (last >= 2 && last <= 4) return "reviews.few";
      return "reviews.many";
    }

    function formatReviewsCount(count) {
      const safeCount = Math.abs(Number(count) || 0);

      if (safeCount === 0) {
        return pageT("noReviews");
      }

      return `${safeCount} ${pageT(getReviewWordKey(safeCount))}`;
    }

    function renderStars(avg) {
      const rounded = Math.round(avg);
      let cls = "r1";

      if (avg >= 4.5) cls = "r5";
      else if (avg >= 3.5) cls = "r4";
      else if (avg >= 2.5) cls = "r3";
      else if (avg >= 1.5) cls = "r2";

      let html = `<span class="stars ${cls}">`;

      for (let i = 1; i <= 5; i++) {
        html += `<span class="star ${i <= rounded ? "filled" : ""}">★</span>`;
      }

      html += "</span>";
      return html;
    }

    async function copyTextSafe(text) {
      const safeText = String(text || "").trim();
      if (!safeText) return false;

      if (navigator.clipboard && window.isSecureContext) {
        try {
          await navigator.clipboard.writeText(safeText);
          return true;
        } catch (e) {}
      }

      const textarea = document.createElement("textarea");
      textarea.value = safeText;
      textarea.setAttribute("readonly", "");
      textarea.style.position = "fixed";
      textarea.style.top = "0";
      textarea.style.left = "0";
      textarea.style.opacity = "0";
      textarea.style.pointerEvents = "none";
      textarea.style.fontSize = "16px";

      document.body.appendChild(textarea);

      const selection = document.getSelection();
      const selectedRange =
        selection && selection.rangeCount > 0
          ? selection.getRangeAt(0)
          : null;

      textarea.focus();
      textarea.select();
      textarea.setSelectionRange(0, textarea.value.length);

      let copied = false;

      try {
        copied = document.execCommand("copy");
      } catch (e) {
        copied = false;
      }

      document.body.removeChild(textarea);

      if (selectedRange && selection) {
        selection.removeAllRanges();
        selection.addRange(selectedRange);
      }

      return copied;
    }

    function getAvatarCropStageSize() {
      const stage = document.getElementById("avatarCropStage");
      return stage ? stage.clientWidth : 320;
    }

    function syncAvatarZoomInput() {
      const zoom = document.getElementById("avatarZoomRange");
      if (!zoom) return;

      zoom.min = String(avatarCropState.minScale);
      zoom.max = String(avatarCropState.maxScale);
      zoom.step = String(
        Math.max((avatarCropState.maxScale - avatarCropState.minScale) / 200, 0.01)
      );
      zoom.value = String(avatarCropState.scale);
    }

    function clampAvatarScale(value) {
  return Math.min(
    avatarCropState.maxScale,
    Math.max(avatarCropState.minScale, value)
  );
}

function getStagePointerPoint(stage, e) {
  const rect = stage.getBoundingClientRect();

  return {
    x: e.clientX - rect.left,
    y: e.clientY - rect.top
  };
}

function getPointerDistance(a, b) {
  const dx = b.x - a.x;
  const dy = b.y - a.y;
  return Math.hypot(dx, dy);
}

function getPointerCenter(a, b) {
  return {
    x: (a.x + b.x) / 2,
    y: (a.y + b.y) / 2
  };
}

function startAvatarPinch() {
  const points = Array.from(avatarCropState.pointers.values());
  if (points.length < 2) return;

  const [a, b] = points;
  const center = getPointerCenter(a, b);

  const displayWidth = avatarCropState.naturalWidth * avatarCropState.scale;
  const displayHeight = avatarCropState.naturalHeight * avatarCropState.scale;

  avatarCropState.pinchStartDistance = getPointerDistance(a, b);
  avatarCropState.pinchStartScale = avatarCropState.scale;

  avatarCropState.pinchAnchorX = (center.x - avatarCropState.x) / displayWidth;
  avatarCropState.pinchAnchorY = (center.y - avatarCropState.y) / displayHeight;
}

function continueAvatarPinch() {
  const points = Array.from(avatarCropState.pointers.values());
  if (points.length < 2) return;

  const [a, b] = points;

  if (!avatarCropState.pinchStartDistance) {
    startAvatarPinch();
    return;
  }

  const center = getPointerCenter(a, b);
  const distance = getPointerDistance(a, b);

  const nextScale = clampAvatarScale(
    avatarCropState.pinchStartScale * (distance / avatarCropState.pinchStartDistance)
  );

  avatarCropState.scale = nextScale;

  const displayWidth = avatarCropState.naturalWidth * avatarCropState.scale;
  const displayHeight = avatarCropState.naturalHeight * avatarCropState.scale;

  avatarCropState.x = center.x - avatarCropState.pinchAnchorX * displayWidth;
  avatarCropState.y = center.y - avatarCropState.pinchAnchorY * displayHeight;

  clampAvatarCropPosition();
  syncAvatarZoomInput();
  renderAvatarCropImage();
}

    function clampAvatarCropPosition() {
      const stageSize = getAvatarCropStageSize();

      const displayWidth = avatarCropState.naturalWidth * avatarCropState.scale;
      const displayHeight = avatarCropState.naturalHeight * avatarCropState.scale;

      const minX = Math.min(0, stageSize - displayWidth);
      const minY = Math.min(0, stageSize - displayHeight);

      avatarCropState.x = Math.min(0, Math.max(minX, avatarCropState.x));
      avatarCropState.y = Math.min(0, Math.max(minY, avatarCropState.y));
    }

    function renderAvatarCropImage() {
      const img = document.getElementById("avatarCropImage");
      if (!img || !avatarCropState.naturalWidth || !avatarCropState.naturalHeight) return;

      const displayWidth = avatarCropState.naturalWidth * avatarCropState.scale;
      const displayHeight = avatarCropState.naturalHeight * avatarCropState.scale;

      img.style.width = `${displayWidth}px`;
      img.style.height = `${displayHeight}px`;
      img.style.transform = `translate(${avatarCropState.x}px, ${avatarCropState.y}px)`;
    }

    function initAvatarCropForImage(naturalWidth, naturalHeight) {
      const stageSize = getAvatarCropStageSize();

      avatarCropState.naturalWidth = naturalWidth;
      avatarCropState.naturalHeight = naturalHeight;

      avatarCropState.minScale = Math.max(
        stageSize / naturalWidth,
        stageSize / naturalHeight
      );

      avatarCropState.maxScale = Math.max(
        avatarCropState.minScale * 4,
        avatarCropState.minScale + 1
      );

      avatarCropState.scale = avatarCropState.minScale;

      const displayWidth = naturalWidth * avatarCropState.scale;
      const displayHeight = naturalHeight * avatarCropState.scale;

      avatarCropState.x = (stageSize - displayWidth) / 2;
      avatarCropState.y = (stageSize - displayHeight) / 2;

      clampAvatarCropPosition();
      syncAvatarZoomInput();
      renderAvatarCropImage();
    }

    function openAvatarCropModal() {
      const modal = document.getElementById("avatarCropModal");
      if (!modal) return;

      setAvatarEditorTexts();
      modal.classList.add("active");
      document.body.style.overflow = "hidden";
    }

    function resetAvatarCropState() {
      if (avatarCropState.objectUrl) {
        URL.revokeObjectURL(avatarCropState.objectUrl);
      }

      avatarCropState.objectUrl = "";
      avatarCropState.naturalWidth = 0;
      avatarCropState.naturalHeight = 0;
      avatarCropState.scale = 1;
      avatarCropState.minScale = 1;
      avatarCropState.maxScale = 3;
      avatarCropState.x = 0;
      avatarCropState.y = 0;
      avatarCropState.dragging = false;
      avatarCropState.pointers.clear();
avatarCropState.pinchStartDistance = 0;
avatarCropState.pinchStartScale = 1;
avatarCropState.pinchAnchorX = 0;
avatarCropState.pinchAnchorY = 0;

      const img = document.getElementById("avatarCropImage");
      if (img) {
        img.removeAttribute("src");
        img.style.width = "";
        img.style.height = "";
        img.style.transform = "";
      }
    }

    function closeAvatarCropModal() {
      const modal = document.getElementById("avatarCropModal");
      if (modal) {
        modal.classList.remove("active");
      }

      resetAvatarCropState();

      const profileMenu = document.getElementById("profileMenu");

      }
    }

    function onAvatarZoomChange(e) {
      const newScale = Number(e.target.value || 0);
      const oldScale = avatarCropState.scale;

      if (!newScale || !oldScale || !avatarCropState.naturalWidth || !avatarCropState.naturalHeight) {
        return;
      }

      const stageSize = getAvatarCropStageSize();
      const stageCenterX = stageSize / 2;
      const stageCenterY = stageSize / 2;

      const oldDisplayWidth = avatarCropState.naturalWidth * oldScale;
      const oldDisplayHeight = avatarCropState.naturalHeight * oldScale;

      const relativeCenterX = (stageCenterX - avatarCropState.x) / oldDisplayWidth;
      const relativeCenterY = (stageCenterY - avatarCropState.y) / oldDisplayHeight;

      avatarCropState.scale = newScale;

      const newDisplayWidth = avatarCropState.naturalWidth * newScale;
      const newDisplayHeight = avatarCropState.naturalHeight * newScale;

      avatarCropState.x = stageCenterX - relativeCenterX * newDisplayWidth;
      avatarCropState.y = stageCenterY - relativeCenterY * newDisplayHeight;

      clampAvatarCropPosition();
      renderAvatarCropImage();
    }

function startAvatarDrag(e) {
  if (!avatarCropState.naturalWidth || !avatarCropState.naturalHeight) return;

  const stage = e.currentTarget;
  const point = getStagePointerPoint(stage, e);

  avatarCropState.pointers.set(e.pointerId, point);
  stage.setPointerCapture?.(e.pointerId);

  if (avatarCropState.pointers.size === 1) {
    avatarCropState.dragging = true;
    avatarCropState.pointerStartX = point.x;
    avatarCropState.pointerStartY = point.y;
    avatarCropState.dragStartX = avatarCropState.x;
    avatarCropState.dragStartY = avatarCropState.y;
  } else if (avatarCropState.pointers.size === 2) {
    avatarCropState.dragging = false;
    startAvatarPinch();
  }

  e.preventDefault();
}

function moveAvatarDrag(e) {
  const stage = e.currentTarget;

  if (!avatarCropState.pointers.has(e.pointerId)) return;

  const point = getStagePointerPoint(stage, e);
  avatarCropState.pointers.set(e.pointerId, point);

  if (avatarCropState.pointers.size >= 2) {
    continueAvatarPinch();
    e.preventDefault();
    return;
  }

  if (!avatarCropState.dragging) return;

  avatarCropState.x =
    avatarCropState.dragStartX + (point.x - avatarCropState.pointerStartX);

  avatarCropState.y =
    avatarCropState.dragStartY + (point.y - avatarCropState.pointerStartY);

  clampAvatarCropPosition();
  renderAvatarCropImage();
  e.preventDefault();
}

function endAvatarDrag(e) {
  const stage = e.currentTarget;

  avatarCropState.pointers.delete(e.pointerId);
  stage.releasePointerCapture?.(e.pointerId);

  if (avatarCropState.pointers.size === 1) {
    const [remainingPoint] = Array.from(avatarCropState.pointers.values());

    avatarCropState.dragging = true;
    avatarCropState.pointerStartX = remainingPoint.x;
    avatarCropState.pointerStartY = remainingPoint.y;
    avatarCropState.dragStartX = avatarCropState.x;
    avatarCropState.dragStartY = avatarCropState.y;
    return;
  }

  avatarCropState.dragging = false;
  avatarCropState.pinchStartDistance = 0;
}

    function bindAvatarCropEvents() {
      const modal = document.getElementById("avatarCropModal");
      const stage = document.getElementById("avatarCropStage");
      const zoom = document.getElementById("avatarZoomRange");

      if (!modal || !stage || !zoom || stage.dataset.bound === "1") {
        return;

      stage.dataset.bound = "1";

      stage.addEventListener("pointerdown", startAvatarDrag);
      stage.addEventListener("pointermove", moveAvatarDrag);
      stage.addEventListener("pointerup", endAvatarDrag);
      stage.addEventListener("pointercancel", endAvatarDrag);
      stage.addEventListener("lostpointercapture", endAvatarDrag);

      stage.addEventListener("dragstart", (e) => e.preventDefault());

      zoom.addEventListener("input", onAvatarZoomChange);

      modal.addEventListener("click", (e) => {

    function makeAvatarCropDataUrl() {
      const img = document.getElementById("avatarCropImage");
      const stageSize = getAvatarCropStageSize();
      const outputSize = 512;

      const canvas = document.createElement("canvas");
      canvas.width = outputSize;
      canvas.height = outputSize;

      const ctx = canvas.getContext("2d");
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = "high";
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, outputSize, outputSize);

      const ratio = outputSize / stageSize;

      const drawWidth = avatarCropState.naturalWidth * avatarCropState.scale * ratio;
      const drawHeight = avatarCropState.naturalHeight * avatarCropState.scale * ratio;
      const drawX = avatarCropState.x * ratio;
      const drawY = avatarCropState.y * ratio;

      ctx.drawImage(img, drawX, drawY, drawWidth, drawHeight);

      return canvas.toDataURL("image/jpeg", 0.92);
    }

        .then(r => r.json())
        .catch(() => ({ success: false, reviews: [] }));

      const reviews = data.success ? data.reviews : [];
      const count = reviews.length;

      ratingLink.onclick = () => {
        location.href = `/reviews.html?id=${userId}`;
      };

      if (count === 0) {
        ratingLink.innerHTML = `<span class="rating-count">${pageT("noReviews")}</span>`;
        return;
      }

      if (count < 10) {
        ratingLink.innerHTML = `<span class="rating-count">${formatReviewsCount(count)}</span>`;
        return;
      }

      const avg = reviews.reduce((sum, item) => sum + (Number(item.rating) || 0), 0) / count;

      ratingLink.innerHTML =
        `${renderStars(avg)}<span class="rating-count">${formatReviewsCount(count)}</span>`;
    }

    async function renderExternalOffers(offers = []) {
      const wrap = document.getElementById("externalOffers");
      const titleEl = document.getElementById("externalOffersTitle");
      const list = document.getElementById("offersList");

      list.innerHTML = "";
      wrap.style.display = "none";

      if (!offers.length) {
        return;
      }

      titleEl.textContent = `${pageT("offers")} (${offers.length})`;
      wrap.style.display = "block";

      for (const offer of offers) {
        const card = tpOfferCard.createOfferCard(offer, {
          showHeart: true,
          heartActive: JSON.parse(localStorage.getItem("tp_favorites") || "[]").includes(offer.id),
          onHeartClick: (currentOffer, cardEl, heartEl) => {
            let favs = JSON.parse(localStorage.getItem("tp_favorites") || "[]");

            if (favs.includes(currentOffer.id)) {
              favs = favs.filter(id => id !== currentOffer.id);
              heartEl.classList.remove("active");
            } else {
              favs.push(currentOffer.id);
              heartEl.classList.add("active");
            }

            localStorage.setItem("tp_favorites", JSON.stringify(favs));
          }
        });

        list.appendChild(card);
      }

      tpOfferCard.updatePrices(list);
    }

    async function loadOwnProfile() {
      const token = getToken();

      if (!token) {
        goLogin();
        return null;
      }

      const me = await api("/auth/me");

      if (!me.success) {
        goLogin();
        return null;
      }

      return me.user;
    }

    async function loadExternalProfile(externalId) {
      const data = await fetch(`/api/users/by-id/${externalId}`)
        .then(r => r.json())
        .catch(() => ({}));

      if (!data.success) {
        alert(pageT("alerts.userNotFound"));
        return null;
      }

      await renderExternalOffers(data.offers || []);
      return data.user;
    }

    async function init() {
      updateHtmlLang();
      setAvatarEditorTexts();

      const params = new URLSearchParams(location.search);
      const externalId = params.get("id");

      state.isExternal = Boolean(externalId);
      state.currentUser = null;

      closeProfileMenu();
      resetMenuScreens();
      resetExternalOffers();
      updateEditButtonVisibility();
      bindNotifyControls();

      const profileTitle = document.getElementById("profileTitle");
      const nav = document.querySelector(".nav");

      const user = externalId
        ? await loadExternalProfile(externalId)
        : await loadOwnProfile();

      if (!user) return;

      state.currentUser = user;

      profileTitle.textContent = state.isExternal
        ? pageT("externalTitle")
        : pageT("myTitle");

      setDocumentTitle();

      if (nav) {
        nav.style.display = state.isExternal ? "none" : "";
      }

      renderUserHeader(user);
      syncMenuUser();
      updateNickHint();
      await renderReviews(user.userId);

      if (!state.isExternal) {
        await loadNotifyToMenu();
      }
    }

    async function updatePrices() {
      const els = document.querySelectorAll(".offer-price");

      for (const el of els) {
        const base = Number(el.dataset.price);
        if (!base) continue;
        el.textContent = await tpMoney.formatPrice(base);
      }
    }

    function openProfileMenu() {
      if (state.isExternal) return;

      document.getElementById("profileMenu").classList.add("active");
      document.body.style.overflow = "hidden";
    }

function closeProfileMenu() {
  document.getElementById("profileMenu").classList.remove("active");
  document.body.style.overflow = "";
  resetMenuScreens();
}

    document.addEventListener("click", (e) => {
      const menu = document.getElementById("profileMenu");
      if (e.target === menu) {
        closeProfileMenu();
      }
    });

    async function logout() {
      try {
        await api("/auth/logout", { method: "POST" });
      } catch (e) {}

      localStorage.removeItem(TOKEN_KEY);
      location.href = "/auth.html?mode=login";
    }

    async function editAvatar() {
      if (state.isExternal || !state.currentUser) return;

      const input = document.createElement("input");
      input.type = "file";
      input.accept = "image/*";

      input.onchange = () => {
        const file = input.files?.[0];
        if (!file) return;

        if (!String(file.type || "").startsWith("image/")) {
          alert(pageT("alerts.onlyImages"));
          return;
        }

        loadAvatarFileToCrop(file);
      };

      input.click();
    }

    function openNickScreen() {
      if (state.isExternal) return;

      document.getElementById("menuMain").style.display = "none";
      document.getElementById("menuNick").style.display = "block";
      document.getElementById("menuNotify").style.display = "none";

      const input = document.getElementById("nickInput");
      if (input) {
        input.value = state.currentUser?.username || "";
        input.focus();
        input.setSelectionRange(input.value.length, input.value.length);
      }

      updateNickHint();
    }

function openNotifyScreen() {
  if (state.isExternal) return;

  document.getElementById("menuMain").style.display = "none";
  document.getElementById("menuNick").style.display = "none";
  document.getElementById("menuNotify").style.display = "block";

  syncNotifyControls();
}

    async function saveNickFromMenu() {
      if (state.isExternal || !state.currentUser) return;

      const input = document.getElementById("nickInput");
      const newName = String(input?.value || "").trim();
      const currentName = String(state.currentUser.username || "").trim();

      if (!newName) {
        alert(pageT("alerts.enterNickname"));
        return;
      }

      if (newName.length < 3) {
        alert(pageT("alerts.nickTooShort"));
        return;
      }

      if (newName.length > 20) {
        alert(pageT("alerts.nickTooLong"));
        return;
      }

      if (newName === currentName) {
        closeProfileMenu();
        return;
      }

      const res = await api("/profile", {
        method: "PUT",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          username: newName
        })
      });

      if (!res.success) {
        if (res.code === "USERNAME_CHANGE_TOO_EARLY" && res.nextUsernameChangeAt) {
          state.currentUser.nextUsernameChangeAt = Number(res.nextUsernameChangeAt);
          updateNickHint();
          alert(pageT("alerts.nickWaitUntil", {
            date: formatDate(res.nextUsernameChangeAt)
          }));
          return;
        }

        alert(res.message || pageT("alerts.nickSaveError"));
        return;
      }

      state.currentUser = { ...state.currentUser, ...res.user };
      delete state.currentUser.nextUsernameChangeAt;

      renderUserHeader(state.currentUser);
      syncMenuUser();
      updateNickHint();
      closeProfileMenu();
    }

async function loadNotifyToMenu() {
  if (state.isExternal || !getToken()) return;

  try {
    const res = await api("/api/settings/notifications");

    if (!res.success) return;

    applyNotifyResponse(res);
  } catch (e) {}
}

async function saveNotifyFromMenu() {
  if (state.isExternal || !getToken()) return;

  const siteValue = !!document.getElementById("notifySite")?.checked;
  const emailValue = !!document.getElementById("notifyEmail")?.checked;
  const telegramValue = !!document.getElementById("notifyTelegram")?.checked;

  const res = await api("/api/settings/notifications", {
    method: "PUT",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      site: siteValue,
      email: emailValue,
      telegram: state.telegramLinked ? telegramValue : false
    })
  });

  if (!res.success) {
    if (res.code === "TELEGRAM_NOT_LINKED") {
      await startTelegramLinkFlow();
      return;
    }

    alert(res.message || pageT("alerts.notifySaveError"));
    return;
  }

  applyNotifyResponse(res);
  backToMain();
}

    window.addEventListener("tp:currency-change", updatePrices);

document.addEventListener("DOMContentLoaded", async () => {
  try {
    bindAvatarCropEvents();
    await window.tpI18n.load(window.tpI18n.currentLang);
    await init();
  } finally {
    markPageReady();
  }
});

window.addEventListener("tp:lang-change", async () => {
  await init();
});
  </script>
