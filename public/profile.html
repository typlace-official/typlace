<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Профиль — TyPlace</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- HEADER CSS -->
<link rel="stylesheet" href="/header.css">
<link rel="stylesheet" href="/footer.css">
<link rel="stylesheet" href="/game.css">

  <style>
    :root{
      --bg:#f6f6f6;
      --card:#fff;
      --text:#111;
      --muted:#6b7280;
      --line:#e5e7eb;
      --blue:#1E50D4;
      --radius:12px;
    }

    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .container{
      max-width:960px;
      margin:28px auto;
      background:var(--card);
      border:1px solid #ddd;
      border-radius:var(--radius);
      padding:20px;
    }

    h1{margin:0 0 18px;font-size:28px;}

    .profile-top{
      display:flex;
      gap:16px;
      align-items:center;
      flex-wrap:wrap;
    }

    .avatar{
      width:96px;
      height:96px;
      border-radius:50%;
      object-fit:cover;
      background:#ddd;
      border:1px solid #ccc;
    }

    .info{
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    .username{
      font-size:20px;
      font-weight:900;
    }

    .rating-line{
      display:inline-flex;
      align-items:center;
      gap:8px;
      font-weight:800;
      cursor:pointer;
      user-select:none;
    }

    .rating-line:hover{
      text-decoration:underline;
    }

    .rating-count{
      font-size:14px;
      color:var(--muted);
      font-weight:700;
    }

    .since{
      font-size:13px;
      color:var(--muted);
    }

    .nav{
      margin-top:24px;
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:12px;
    }

    @media(max-width:720px){
      .nav{grid-template-columns:repeat(2,1fr);}
    }

    @media(max-width:420px){
      .nav{grid-template-columns:1fr;}
    }

.nav-item{
  border:1px solid var(--line);
  border-radius:12px;
  padding:14px;
  text-decoration:none;
  color:var(--text);

  display:flex;
  align-items:center;
  justify-content:center;   /* ← центрируем */
  text-align:center;

  font-weight:900;
  background:#fff;
}

    .nav-item:hover{
      background:#fafafa;
    }

    .logout{
      margin-top:18px;
      display:inline-flex;
      align-items:center;
      gap:8px;
      font-weight:800;
      color:#6b7280;
      text-decoration:none;
    }

    .logout:hover{
      color:#8a1f1f;
    }

    /* ===== RATING STARS ===== */
    .stars{
      display:inline-flex;
      gap:2px;
      font-size:16px;
    }
    .star{ color:#9ca3af; }
    .star.filled{ color:currentColor; }
    .stars.r5{ color:#facc15; }
    .stars.r4{ color:#fbbf24; }
    .stars.r3{ color:#f59e0b; }
    .stars.r2{ color:#ef4444; }
    .stars.r1{ color:#991b1b; }
.user-id{
  font-size:13px;
  font-weight:700;
  color:var(--muted);
  cursor:pointer;
  user-select:none;
  position:relative;
  display:inline-block;
  transition:color .2s ease;
}

.user-id:hover{
  color:var(--blue);
}

.user-id.copied{
  color:#16a34a; /* зелёный при копировании */
}
.profile-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:18px;
}

.profile-menu-btn{
  background:none;
  border:none;
  cursor:pointer;
  color:#6b7280;
  padding:6px;
  border-radius:8px;
}

.profile-menu-btn:hover{
  background:#f3f4f6;
}

.profile-menu-item{
  padding:14px 16px;
  font-weight:600;
  cursor:pointer;
}

.profile-menu-item:hover{
  background:#f3f4f6;
}

.logout-item{
  color:#b91c1c;
}
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.4);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:2000;
}

.modal.active{
  display:flex;
}

.modal-inner{
  background:#fff;
  border-radius:16px;
  width:320px;
  padding:20px;
  box-shadow:0 15px 40px rgba(0,0,0,.15);
}

.modal-title{
  font-size:16px;
  font-weight:800;
  margin-bottom:16px;
}

.modal-item{
  padding:12px 0;
  font-weight:600;
  cursor:pointer;
  border-bottom:1px solid #f1f5f9;
}

.modal-item:last-child{
  border-bottom:none;
}

.modal-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 0;
}
/* ===== PROFILE MENU UI ===== */
.menu-top{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:10px;
  padding:14px 14px 6px;
}

.menu-avatar-wrap{
  width:74px;
  height:74px;
  border-radius:50%;
  overflow:hidden;
  cursor:pointer;
  background:#e5e7eb;
  flex-shrink:0;
}

.menu-avatar{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

.menu-change-photo{
  text-align:center;
  padding:8px 14px 12px;
  font-weight:700;
  color:var(--blue);
  cursor:pointer;
}

.menu-item{
  padding:14px 16px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  cursor:pointer;
  font-weight:700;
  border-top:1px solid #f1f5f9;
}

.menu-item:hover{ background:#f3f4f6; }

.menu-arrow{ color:#9ca3af; font-size:18px; }

.menu-screen-head{
  position:relative;
  height:56px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-bottom:1px solid #eee;
}
.menu-screen-head .menu-title{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  font-size:17px;
  font-weight:700;
}

.menu-back:hover{ background:#f3f4f6; }

.menu-title{
  font-weight:900;
}

.menu-screen-body{
  padding:14px 16px 16px;
}

.menu-row{
  display:flex;
  justify-content:space-between;
  gap:10px;
  padding:12px 0;
  border-bottom:1px solid #f1f5f9;
}

.menu-row-label{ color:#6b7280; font-weight:700; }
.menu-row-value{ font-weight:800; }

.menu-btn{
  margin-top:14px;
  width:100%;
  padding:12px 12px;
  border-radius:12px;
  border:1px solid var(--line);
  background:#fff;
  font-weight:800;
  cursor:pointer;
}

.menu-btn:hover{ background:#f3f4f6; }

.menu-hint{
  margin-top:10px;
  font-size:12px;
  color:#6b7280;
  font-weight:600;
}

.menu-toggle{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  padding:14px 0;
  border-bottom:1px solid #f1f5f9;
  font-weight:700;
}
/* ================= PROFILE MODAL FIX ================= */

.profile-menu{
  position:fixed;
  inset:0;
  z-index:5000;

  display:flex;
  justify-content:center;
  align-items:center;

  background:rgba(0,0,0,.45);

  opacity:0;
  pointer-events:none;
  transition:opacity .2s ease;
}

.profile-menu.active{
  opacity:1;
  pointer-events:auto;
}

.profile-menu-inner{
  background:#fff;
  width:100%;
  max-width:420px;
  max-height:90vh;
  overflow-y:auto;

  border-radius:18px;
  box-shadow:0 30px 80px rgba(0,0,0,.25);

  transform:scale(.95);
  transition:transform .2s ease;
}

.profile-menu.active .profile-menu-inner{
  transform:scale(1);
}

/* ===== MOBILE FULLSCREEN ===== */

@media(max-width:640px){

  .profile-menu{
    background:#fff;
    align-items:stretch;
  }

  .profile-menu-inner{
    width:100%;
    height:100%;
    max-width:none;
    max-height:none;
    border-radius:0;
    box-shadow:none;
    transform:none;
  }

}
@media(max-width:640px){

  .menu-top{
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:14px;
    padding-top:40px;
    position:relative;
  }

  .menu-close{
    position:absolute;
    top:14px;
    right:14px;
  }

  .menu-avatar-wrap{
    width:96px;
    height:96px;
  }

  .menu-change-photo{
    padding-top:6px;
    padding-bottom:20px;
  }

}
.mobile-avatar-block{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:28px 16px 10px;
}
/* ===== MOBILE PROFILE FIX ===== */

@media(max-width:640px){

  .profile-menu{
    background:#fff;
    align-items:stretch;
  }

  .profile-menu-inner{
    width:100%;
    height:100%;
    border-radius:0;
    box-shadow:none;
  }

  /* HEADER */
  .mobile-head{
    position:relative;
    height:56px;
    display:flex;
    align-items:center;
    justify-content:center;
    border-bottom:1px solid #eee;
  }

  .mobile-head .menu-title{
    font-size:17px;

  .big-avatar{

  }

}

.menu-input{

/* ===== ICON BUTTONS (BACK + CLOSE) ===== */

.menu-back,
.menu-close{

}

.menu-back{ left:12px; }
.menu-close{ right:12px; }

.menu-back:active,
.menu-close:active{
  background:#f3f4f6;
}
  </style>
</head>

  <!-- PAGE SCRIPT -->
  <script>
    const TOKEN_KEY = "tp_token";
    const DEFAULT_AVATAR =
      "data:image/svg+xml;utf8," +
      encodeURIComponent(
        '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">' +
          '<rect width="64" height="64" rx="32" fill="#d9d9d9"/>' +
          '<circle cx="32" cy="26" r="12" fill="#bdbdbd"/>' +
          '<path d="M12 56c4-12 14-18 20-18s16 6 20 18" fill="#bdbdbd"/>' +
        "</svg>"
      );

    function getToken(){
      return localStorage.getItem(TOKEN_KEY);
    }

    function goLogin(){
      location.href = "/auth.html?mode=login";
    }
function formatReviewsCount(n){
  const abs = Math.abs(Number(n) || 0);
  const lastTwo = abs % 100;
  const last = abs % 10;

  if (lastTwo >= 11 && lastTwo <= 14) return n + " отзывов";
  if (last === 1) return n + " отзыв";
  if (last >= 2 && last <= 4) return n + " отзыва";
  return n + " отзывов";
}

    function renderStars(avg){
      const rounded = Math.round(avg);
      let cls = "r1";
      if(avg >= 4.5) cls = "r5";
      else if(avg >= 3.5) cls = "r4";
      else if(avg >= 2.5) cls = "r3";
      else if(avg >= 1.5) cls = "r2";

      let html = `<span class="stars ${cls}">`;
      for(let i=1;i<=5;i++){
        html += `<span class="star ${i<=rounded?"filled":""}">★</span>`;
      }
      html += `</span>`;
      return html;
    }

    async function api(path){
      const res = await fetch(path, {
        headers:{ Authorization:"Bearer " + getToken() }
      });
      return res.json().catch(()=>({}));
    }

async function init(){

  const params = new URLSearchParams(location.search);
  const externalId = params.get("id");
  const profileTitle = document.getElementById("profileTitle");

  let user;
  let isExternal = false;

  // 👉 ЕСЛИ открываем чужой профиль
  if (externalId) {

    const res = await fetch(`/api/users/by-id/${externalId}`);
    const data = await res.json();

    if (!data.success) {
      alert("Пользователь не найден");
      return;
    }

    user = data.user;
    currentUser = user;
profileTitle.textContent = tpI18n.t("page.externalTitle");
document.title = "Профиль пользователя — TyPlace";
    // ===== ПОКАЗАТЬ ПРЕДЛОЖЕНИЯ =====
if (data.offers && data.offers.length) {
const titleEl = document.getElementById("externalOffersTitle");
titleEl.textContent =
  tpI18n.t("page.offers") + " (" + data.offers.length + ")";
  const wrap = document.getElementById("externalOffers");

  wrap.style.display = "block";

const list = document.getElementById("offersList");

for (const offer of data.offers) {
  const card = tpOfferCard.createOfferCard(offer, {
  showHeart: true,
  heartActive: JSON.parse(localStorage.getItem("tp_favorites") || "[]").includes(offer.id),
  onHeartClick: (o, cardEl, heartEl) => {
    let favs = JSON.parse(localStorage.getItem("tp_favorites") || "[]");
    if (favs.includes(o.id)) {
      favs = favs.filter(x => x !== o.id);
      heartEl.classList.remove("active");
    } else {
      favs.push(o.id);
      heartEl.classList.add("active");
    }
    localStorage.setItem("tp_favorites", JSON.stringify(favs));
  }
});

  list.appendChild(card);
}

tpOfferCard.updatePrices(list);

}

isExternal = true;

const nav = document.querySelector(".nav");
if (nav) nav.style.display = "none";


  } else {
    // 👉 если свой профиль
    const token = getToken();
    if(!token) return goLogin();

    const me = await api("/auth/me");
    if(!me.success) return goLogin();

    user = me.user;
    currentUser = user;
profileTitle.textContent = tpI18n.t("page.myTitle");
document.title = "Мой профиль — TyPlace";
  }

  // ===== USERNAME =====
document.getElementById("username").textContent = user.username;

document.getElementById("avatar").src =
  user.avatarUrl || user.avatarDataUrl || DEFAULT_AVATAR;

syncMenuUser();
loadNotifyToMenu();
  // ===== USER ID =====
  if(user.userId){
    const idEl = document.getElementById("userId");
    idEl.textContent = "ID " + user.userId;

    // копирование ТОЛЬКО для своего профиля
idEl.onclick = async () => {
  try{
    await navigator.clipboard.writeText(user.userId);
    idEl.classList.add("copied");
    setTimeout(()=>{
      idEl.classList.remove("copied");
    }, 1200);
  }catch(e){}
};

  }

  // ===== SINCE =====
  if(user.createdAt){
    const date = new Date(user.createdAt);
const localeMap = {
  ru: "ru-RU",
  uk: "uk-UA",
  en: "en-US"
};

const formatted = date.toLocaleDateString(
  localeMap[tpI18n.currentLang] || "ru-RU",
  {
    day: "numeric",
    month: "long",
    year: "numeric"
  }
);
document.getElementById("since").textContent =
  tpI18n.t("page.since") + " " + formatted;
  }

// ===== ОТЗЫВЫ =====
const ratingLink = document.getElementById("ratingLink");

if (user.userId) {

  const res = await fetch(`/api/users/${user.userId}/reviews-by-id`);
  const data = await res.json();

  const reviews = data.success ? data.reviews : [];
  const count = reviews.length;

  ratingLink.onclick = ()=>{
    location.href = `/reviews.html?id=${user.userId}`;
  };

if(count === 0){
ratingLink.innerHTML =
  `<span class="rating-count">${tpI18n.t("page.noReviews")}</span>`;
}
else if(count < 10){
  ratingLink.innerHTML =
    `<span class="rating-count">${formatReviewsCount(count)}</span>`;
}
else{
  const avg =
    reviews.reduce((s,r)=>s+(Number(r.rating)||0),0)/count;

  ratingLink.innerHTML =
    `${renderStars(avg)}
     <span class="rating-count">${formatReviewsCount(count)}</span>`;
}

}

}
async function updatePrices(){
  const els = document.querySelectorAll(".offer-price");
  for(const el of els){
    const base = Number(el.dataset.price);
    if(!base) continue;
    el.textContent = await tpMoney.formatPrice(base);
  }
}

window.addEventListener("tp:currency-change", updatePrices);

document.addEventListener("DOMContentLoaded", async () => {
  await window.tpI18n.load(window.tpI18n.currentLang);
  init();
});

window.addEventListener("tp:lang-change", async () => {
  await window.tpI18n.load(window.tpI18n.currentLang);
  init();
});
function openProfileMenu(){
  document.getElementById("profileMenu").classList.add("active");
  document.body.style.overflow = "hidden";
}

function closeProfileMenu(){
  document.getElementById("profileMenu").classList.remove("active");
  document.body.style.overflow = "";
}

document.addEventListener("click",(e)=>{
  const menu = document.getElementById("profileMenu");
  if(e.target === menu){
    closeProfileMenu();
  }
});

function logout(){
  localStorage.removeItem(TOKEN_KEY);
  location.href="/auth.html?mode=login";
}

async function editName(){
  const current = document.getElementById("username").textContent;
  const newName = prompt("Введите новый ник (3–20 символов):", current);
  if(!newName) return;

  if(newName.length < 3 || newName.length > 20){
    alert("Ник должен быть от 3 до 20 символов");
    return;
  }

  const res = await fetch("/profile",{
    method:"PUT",
    headers:{
      "Content-Type":"application/json",
      Authorization:"Bearer " + getToken()
    },
    body:JSON.stringify({ username:newName })
  }).then(r=>r.json());

if(res.success){
  document.getElementById("username").textContent = res.user.username;
  syncMenuUser();
  backToMain();
  closeProfileMenu();
}
}

function editAvatar(){
  const input = document.createElement("input");
  input.type = "file";
  input.accept = "image/*";

  input.onchange = async () => {
    const file = input.files[0];
    if(!file) return;

    const reader = new FileReader();
    reader.onload = async () => {

      const res = await fetch("/profile",{
        method:"PUT",
        headers:{
          "Content-Type":"application/json",
          Authorization:"Bearer " + getToken()
        },
        body:JSON.stringify({
          avatarDataUrl: reader.result
        })
      }).then(r=>r.json());

if(res.success){
  document.getElementById("avatar").src = res.user.avatarDataUrl;
  syncMenuUser();
  backToMain();
  closeProfileMenu();
}
    };

    reader.readAsDataURL(file);
  };

  input.click();
}
function openNickScreen(){
  document.getElementById("menuMain").style.display = "none";
  document.getElementById("menuNick").style.display = "block";
  document.getElementById("menuNotify").style.display = "none";

  if(currentUser){
    const input = document.getElementById("nickInput");
    if(input){
      input.value = currentUser.username || "";
    }
  }
}
function openNotifyScreen(){
  document.getElementById("menuMain").style.display = "none";
  document.getElementById("menuNick").style.display = "none";
  document.getElementById("menuNotify").style.display = "block";
}

function backToMain(){
  document.getElementById("menuMain").style.display = "block";
  document.getElementById("menuNick").style.display = "none";
  document.getElementById("menuNotify").style.display = "none";
}

// подтягиваем данные в меню (аватар + ник)
function syncMenuUser(){
  const u = document.getElementById("username")?.textContent || "User";
  const ava = document.getElementById("avatar")?.src || "/img/avatar-default.svg";

  const menuUsername = document.getElementById("menuUsername");
  const nickCurrent = document.getElementById("nickCurrent");
  const menuAvatar = document.getElementById("menuAvatar");

  if(menuUsername) menuUsername.textContent = u;
  if(nickCurrent) nickCurrent.textContent = u;
  if(menuAvatar) menuAvatar.src = ava;
}

// уведомления: загрузка в меню
async function loadNotifyToMenu(){
  try{
    const res = await fetch("/api/settings/notifications", {
      headers:{ Authorization:"Bearer " + getToken() }
    }).then(r=>r.json());

    if(!res.success) return;

    document.getElementById("notifyEmail").checked = !!res.notify.email;
    document.getElementById("notifyTelegram").checked = !!res.notify.telegram;
  }catch(e){}
}

async function saveNotifyFromMenu(){
  await fetch("/api/settings/notifications",{
    method:"PUT",
    headers:{
      "Content-Type":"application/json",
      Authorization:"Bearer " + getToken()
    },
    body:JSON.stringify({
      email: document.getElementById("notifyEmail").checked,
      telegram: document.getElementById("notifyTelegram").checked
    })
  }).catch(()=>{});

  backToMain();
}
</script>
