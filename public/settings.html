<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Настройки — TyPlace</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="/header.css">

  <style>
    :root{
      --bg:#f6f7f9;
      --card:#ffffff;
      --text:#111;
      --muted:#6b7280;
      --line:#e5e7eb;
      --blue:#2563eb;
      --radius:16px;
    }

    body{
      margin:0;
      background:var(--bg);
      font-family:Inter, Arial, sans-serif;
      color:var(--text);
    }

    .wrap{
      max-width:560px;
      margin:32px auto;
      padding:0 14px;
    }

    .card{
      background:var(--card);
      border-radius:var(--radius);
      border:1px solid var(--line);
      padding:20px;
    }

    h1{
      margin:0 0 18px;
      font-size:22px;
      font-weight:800;
    }

    /* ===== PROFILE TOP ===== */
    .profile{
      display:flex;
      gap:16px;
      align-items:center;
      margin-bottom:18px;
    }

    .avatar{
      width:72px;
      height:72px;
      border-radius:50%;
      background:#e5e7eb;
      object-fit:cover;
    }

    .p-info{
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    .p-name{
      font-size:18px;
      font-weight:800;
      display:flex;
      align-items:center;
      gap:10px;
    }

    .edit-btn{
      font-size:12px;
      padding:4px 8px;
      border-radius:8px;
      border:1px solid var(--line);
      background:#fff;
      cursor:pointer;
      font-weight:700;
    }

    .edit-btn:hover{
      background:#f3f4f6;
    }

    .p-email{
      font-size:13px;
      color:var(--muted);
      font-weight:600;
    }

    /* ===== SECTION ===== */
    .section{
      margin-top:20px;
    }

    .section-title{
      font-size:14px;
      font-weight:800;
      color:#374151;
      margin-bottom:8px;
    }

    /* ===== ROW ===== */
    .row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:14px 0;
      border-bottom:1px solid #f1f5f9;
    }

    .row:last-child{
      border-bottom:none;
    }

    .row-left{
      display:flex;
      flex-direction:column;
      gap:2px;
    }

    .row-title{
      font-size:14px;
      font-weight:700;
    }

    .row-desc{
      font-size:12px;
      color:var(--muted);
      font-weight:600;
    }

    /* ===== SWITCH ===== */
    .switch{
      position:relative;
      width:46px;
      height:26px;
      flex-shrink:0;
    }

    .switch input{
      opacity:0;
      width:0;
      height:0;
    }

    .slider{
      position:absolute;
      inset:0;
      background:#d1d5db;
      border-radius:999px;
      transition:.2s;
    }

    .slider::before{
      content:"";
      position:absolute;
      width:20px;
      height:20px;
      border-radius:50%;
      background:#fff;
      top:3px;
      left:3px;
      transition:.2s;
    }

    .switch input:checked + .slider{
      background:var(--blue);
    }

    .switch input:checked + .slider::before{
      transform:translateX(20px);
    }

    /* ===== LOGOUT ===== */
    .logout{
      margin-top:22px;
      padding-top:14px;
      border-top:1px solid var(--line);
      color:#b91c1c;
      font-weight:800;
      cursor:pointer;
      font-size:14px;
    }

    .logout:hover{
      text-decoration:underline;
    }
  </style>
</head>

<body>
  <div id="header-container"></div>

  <div class="wrap">
    <div class="card">

      <h1>Настройки</h1>

      <!-- PROFILE -->
      <div class="profile">
        <img id="avatar" class="avatar">
        <div class="p-info">
          <div class="p-name">
            <span id="username">User</span>
            <button class="edit-btn" onclick="editName()">✎ Ник</button>
          </div>
          <div class="p-email" id="email">email@example.com</div>
          <button class="edit-btn" onclick="editAvatar()">Изменить фото</button>
        </div>
      </div>

      <!-- NOTIFICATIONS -->
      <div class="section">
        <div class="section-title">Уведомления</div>

        <div class="row">
          <div class="row-left">
            <div class="row-title">🔔 На сайте</div>
            <div class="row-desc">Звук и pop-up уведомления</div>
          </div>
          <label class="switch">
            <input type="checkbox" id="nSite">
            <span class="slider"></span>
          </label>
        </div>

        <div class="row">
          <div class="row-left">
            <div class="row-title">✉️ Email</div>
            <div class="row-desc">Уведомления на почту</div>
          </div>
          <label class="switch">
            <input type="checkbox" id="nEmail">
            <span class="slider"></span>
          </label>
        </div>

        <div class="row">
          <div class="row-left">
            <div class="row-title">📲 Telegram</div>
            <div class="row-desc">Через Telegram-бота</div>
          </div>
          <label class="switch">
            <input type="checkbox" id="nTelegram">
            <span class="slider"></span>
          </label>
        </div>
      </div>

      <!-- LOGOUT -->
      <div class="logout" onclick="logout()">Выйти из аккаунта</div>

    </div>
  </div>

  <audio id="notifySound" src="/sounds/notify.mp3"></audio>

<script src="/socket.io/socket.io.js"></script>
<script src="/games.list.js"></script>
<script src="/header.js"></script>

  <script>
  const TOKEN_KEY = "tp_token";

  function token(){
    return localStorage.getItem(TOKEN_KEY);
  }

  async function api(path, opts = {}){
    return fetch(path, {
      ...opts,
      headers:{
        "Content-Type":"application/json",
        Authorization:"Bearer " + token(),
        ...(opts.headers || {})
      }
    }).then(r=>r.json());
  }

  async function loadProfile(){
    const me = await api("/auth/me");
    if(!me.success){
      location.href="/auth.html?mode=login";
      return;
    }

    username.textContent = me.user.username;
    email.textContent = me.user.email;
    avatar.src =
      me.user.avatarUrl ||
      me.user.avatarDataUrl ||
      "/img/avatar-default.svg";
  }

  async function loadNotify(){
    const res = await api("/api/settings/notifications");
    if(!res.success) return;

    nSite.checked = !!res.notify.site;
    nEmail.checked = !!res.notify.email;
    nTelegram.checked = !!res.notify.telegram;
  }

  async function saveNotify(){
    await api("/api/settings/notifications",{
      method:"PUT",
      body:JSON.stringify({
        site:nSite.checked,
        email:nEmail.checked,
        telegram:nTelegram.checked
      })
    });
  }

  nSite.onchange = saveNotify;
  nEmail.onchange = saveNotify;
  nTelegram.onchange = saveNotify;

  /* =======================
     ✅ СМЕНА НИКА
  ======================= */
  async function editName(){
    const current = username.textContent;
    const newName = prompt("Введите новый ник (3–20 символов):", current);
    if(!newName) return;

    if(newName.length < 3 || newName.length > 20){
      alert("Ник должен быть от 3 до 20 символов");
      return;
    }

    const res = await api("/profile",{
      method:"PUT",
      body:JSON.stringify({ username:newName })
    });

    if(res.success){
      username.textContent = res.user.username;
    }else{
      alert(res.message || "Ошибка смены ника");
    }
  }

  /* =======================
     ✅ ЗАГРУЗКА АВАТАРА
  ======================= */
  function editAvatar(){
    const input = document.createElement("input");
    input.type = "file";
    input.accept = "image/*";

    input.onchange = async () => {
      const file = input.files[0];
      if(!file) return;

      if(file.size > 2 * 1024 * 1024){
        alert("Максимальный размер аватара — 2MB");
        return;
      }

      const reader = new FileReader();
      reader.onload = async () => {
        const res = await api("/profile",{
          method:"PUT",
          body:JSON.stringify({
            avatarDataUrl: reader.result
          })
        });

        if(res.success){
  avatar.src = res.user.avatarDataUrl;

  // 🔥 ДОБАВИТЬ ЭТО:
  localStorage.setItem("avatarDataUrl", res.user.avatarDataUrl);

  // уведомляем хедер
  window.dispatchEvent(new Event("storage"));
}
else{
          alert("Ошибка загрузки аватара");
        }
      };
      reader.readAsDataURL(file);
    };

    input.click();
  }

  function logout(){
    localStorage.removeItem(TOKEN_KEY);
    location.href="/auth.html?mode=login";
  }

  loadProfile();
  loadNotify();
</script>
</body>
</html>
