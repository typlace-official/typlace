<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 100 100"
  width="100"
  height="100"
>
  <!-- Blue rounded square -->
  <rect
    x="0"
    y="0"
    width="100"
    height="100"
    rx="18"
    fill="#2563eb"
  />

  <!-- Rotated Roblox square -->
  <rect
    x="30"
    y="30"
    width="40"
    height="40"
    fill="#ffffff"
    transform="rotate(15 50 50)"
  />

  <!-- Hole inside -->
  <rect
    x="44"
    y="44"
    width="12"
    height="12"
    fill="#2563eb"
    transform="rotate(15 50 50)"
  />
</svg>