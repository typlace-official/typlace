<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<script>
  document.titleKey = "page.title";
</script>

<title>TyPlace</title>

<link rel="stylesheet" href="/header.css">
<link rel="stylesheet" href="/footer.css">

<style>
body{
  margin:0;
  background:#f6f7f9;
  font-family:Inter, Arial, sans-serif;
  color:#111827;
}

html, body{
  overflow-x: hidden;
}
.page{
  max-width:900px;
  margin:40px auto;
  padding:0 16px;
}

.card{
  background:#fff;
  padding:40px;
  border-radius:18px;
  border:1px solid #e5e7eb;
  box-shadow:0 12px 32px rgba(0,0,0,.06);
}

h1{
  font-size:26px;
  margin:0 0 12px;
}

h2{
  font-size:18px;
  margin:32px 0 12px;
}

p{
  font-size:14px;
  line-height:1.7;
  color:#374151;
  margin-bottom:12px;
}

ul{
  margin:12px 0 16px 18px;
}

li{
  font-size:14px;
  line-height:1.6;
  margin-bottom:6px;
}

@media(max-width:600px){
  .card{
    padding:22px;
  }
  h1{
    font-size:22px;
  }
}
</style>
</head>

<body>

<div id="header-container"></div>

<main class="page-content">
  <div class="page">
    <div class="card">

    <h1 data-i18n="page.heading"></h1>

    <h2 data-i18n="page.section1.title"></h2>
    <p data-i18n="page.section1.p1"></p>
    <p data-i18n="page.section1.p2"></p>

    <h2 data-i18n="page.section2.title"></h2>
    <p data-i18n="page.section2.required"></p>
    <p data-i18n="page.section2.functional"></p>
    <p data-i18n="page.section2.analytics"></p>
    <p data-i18n="page.section2.technical"></p>

    <h2 data-i18n="page.section3.title"></h2>
    <ul>
      <li data-i18n="page.section3.li1"></li>
      <li data-i18n="page.section3.li2"></li>
      <li data-i18n="page.section3.li3"></li>
      <li data-i18n="page.section3.li4"></li>
      <li data-i18n="page.section3.li5"></li>
    </ul>

    <h2 data-i18n="page.section4.title"></h2>
    <p data-i18n="page.section4.p1"></p>
    <p data-i18n="page.section4.p2"></p>

    <h2 data-i18n="page.section5.title"></h2>
    <p data-i18n="page.section5.p1"></p>
    <p data-i18n="page.section5.p2"></p>

    <h2 data-i18n="page.section6.title"></h2>
    <p data-i18n="page.section6.p1"></p>

    </div>
  </div>
</main>

<div id="footer-container"></div>

<script src="/i18n.js"></script>
<script src="/header.js"></script>
<script src="/footer.js"></script>

</body>
</html>
