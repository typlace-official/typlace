<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title data-i18n="page.title"></title>

  <link rel="stylesheet" href="/header.css">
  <link rel="stylesheet" href="/footer.css">

  <style>
    body{
      margin:0;
      background:#f6f7f9;
      font-family:Inter, Arial, sans-serif;
      color:#111827;
    }

    html, body{
      overflow-x:hidden;
    }

    .page{
      max-width:900px;
      margin:40px auto;
      padding:0 16px;
    }

    .card{
      background:#fff;
      padding:40px;
      border-radius:18px;
      border:1px solid #e5e7eb;
      box-shadow:0 12px 32px rgba(0,0,0,.06);
    }

    h1{
      font-size:26px;
      margin:0 0 10px 0;
      letter-spacing:-.2px;
    }

    h2{
      font-size:19px;
      margin:34px 0 12px;
      font-weight:800;
      letter-spacing:-.15px;
    }

    p, li{
      font-size:14px;
      line-height:1.7;
      color:#374151;
      margin-bottom:12px;
    }

    ul{
      margin:10px 0 16px 18px;
    }

    .meta{
      font-size:13px;
      color:#6b7280;
      margin-bottom:20px;
      line-height:1.6;
    }

    .doc-link{
      color:#2563eb;
      text-decoration:none;
      font-weight:400;
    }

    .doc-link:hover{
      text-decoration:underline;
    }

    hr{
      border:none;
      height:1px;
      background:#e5e7eb;
      margin:28px 0;
    }

    @media(max-width:900px){
      .card{
        padding:22px;
        border-radius:16px;
      }

      h1{
        font-size:22px;
      }

      h2{
        font-size:17px;
      }
    }
  </style>
</head>

<body>

<div id="header-container"></div>

<main class="page-content">
  <div class="page">
    <article class="card">

      <h1 data-i18n="page.title"></h1>

      <div class="meta">
        <span data-i18n="page.meta.line1"></span><br>
        <span data-i18n="page.meta.line2"></span>
      </div>

      <p data-i18n="page.intro"></p>

      <h2 data-i18n="page.section1.title"></h2>
      <p data-i18n="page.section1.p1"></p>
      <p data-i18n="page.section1.p2"></p>

      <h2 data-i18n="page.section2.title"></h2>
      <p data-i18n="page.section2.p1"></p>
      <ul>
        <li data-i18n="page.section2.l1"></li>
        <li data-i18n="page.section2.l2"></li>
        <li data-i18n="page.section2.l3"></li>
        <li data-i18n="page.section2.l4"></li>
      </ul>

      <h2 data-i18n="page.section3.title"></h2>
      <ul>
        <li data-i18n="page.section3.l1"></li>
        <li data-i18n="page.section3.l2"></li>
        <li data-i18n="page.section3.l3"></li>
        <li data-i18n="page.section3.l4"></li>
        <li data-i18n="page.section3.l5"></li>
      </ul>

      <h2 data-i18n="page.section4.title"></h2>
      <p data-i18n="page.section4.p1"></p>
      <p data-i18n="page.section4.p2"></p>

      <h2 data-i18n="page.section5.title"></h2>
      <p data-i18n="page.section5.p1"></p>
      <p data-i18n="page.section5.p2"></p>

      <h2 data-i18n="page.section6.title"></h2>
      <p data-i18n="page.section6.p1"></p>

      <h2 data-i18n="page.section7.title"></h2>
      <p data-i18n="page.section7.p1"></p>
      <p>
        <span data-i18n="page.section7.p2"></span>
        <a href="/privacy.html" class="doc-link" data-i18n="page.section7.link"></a>.
      </p>

      <hr>

      <p class="meta">
        <span data-i18n="page.footer.text1"></span>
        <a href="/contacts.html" class="doc-link" data-i18n="page.footer.link1"></a>
        <span data-i18n="page.footer.or"></span>
        <a href="/help.html" class="doc-link" data-i18n="page.footer.link2"></a>.
      </p>

    </article>
  </div>
</main>

<div id="footer-container"></div>

<script src="/i18n.js"></script>
<script src="/header.js"></script>
<script src="/footer.js"></script>

</body>
</html>
