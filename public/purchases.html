<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Покупки — TyPlace</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/header.css">
<link rel="stylesheet" href="/card.css">
<link rel="stylesheet" href="/footer.css">


  <style>
    body{
      margin:0;
      font-family: Inter, Arial, sans-serif;
      background:#f6f7f9;
    }

    .page{
      max-width:1200px;
      margin:24px auto;
      padding:0 16px;
    }

    .sales-grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
      gap:16px;
    }


    .empty{
      padding:24px;
      color:#777;
    }
/* ===== FILTER (копия из game.css) ===== */

.filters{
  margin-left:auto;
  max-width:220px;
}

.select{
  height: 40px;
  border-radius: 12px;
  border: 1px solid var(--line);
  background:#fff;
  padding: 0 12px;
  font-size: 14px;
  outline:none;
}

.select:focus{
  border-color:#cbd5e1;
} 
/* ===== NEW ORDER CARD ===== */

.order-badge{
  position:absolute;
  top:10px;
  left:10px;
  padding:4px 10px;
  border-radius:999px;
  font-size:12px;
  font-weight:700;
  color:#fff;
  z-index:5;
}

.order-badge.pending{ background:#f59e0b; }
.order-badge.completed{ background:#16a34a; }
.order-badge.refunded{ background:#dc2626; }

.offer-title{
  font-size:14px;
  font-weight:700;
  line-height:1.35;

  display:-webkit-box;
  -webkit-line-clamp:4;
  -webkit-box-orient:vertical;
  overflow:hidden;

  min-height:76px;

  word-break: break-word;
  overflow-wrap: anywhere;
}

.order-meta{
  font-size:13px;
  color:#6b7280;
  font-weight:600;
}

.order-number{
  font-size:12px;
  color:#9ca3af;
}
.order-date{
  font-size:12px;
  color:#9ca3af;
}
.topbar{
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:14px;
}
/* ===== 📱 MOBILE 2 CARDS ===== */
@media (max-width:640px){

.page{
  margin:16px auto;
  padding:0 12px;
}

.sales-grid{
  grid-template-columns:repeat(2, 1fr); /* 🔥 2 карточки */
  gap:12px;
}

.offer-title{
  font-size:13px;
  -webkit-line-clamp:3;
  min-height:auto;
}

.offer-price{
  font-size:15px;
}

.order-meta,
.order-number,
.order-date{
  font-size:11px;
}

}

  </style>
</head>

<body>

<div id="header-container"></div>

<main class="page-content">

<div class="page">

<div class="topbar">
  <h2 style="margin:0;">Покупки</h2>

  <div class="filters">
    <select class="select" id="statusFilter">
      <option value="all">Статус</option>
      <option value="pending">В процессе</option>
      <option value="completed">Завершено</option>
      <option value="refunded">Возврат</option>
    </select>
  </div>
</div>

  <div id="list" class="sales-grid"></div>
</div>
</main>

<div id="footer-container"></div>

<script src="/socket.io/socket.io.js"></script>
<script src="/games.list.js"></script>
<script src="/i18n.js"></script>
<script src="/header.js"></script>
<script src="/tp-money.js"></script>
<script src="/offer-title.js"></script>
<script src="/footer.js"></script>

<script>
const token = localStorage.getItem("tp_token");
if(!token){
  location.href = "/auth.html?mode=login";
}

const list = document.getElementById("list");
const statusFilter = document.getElementById("statusFilter");
let allPurchases = [];

fetch("/api/my-purchases", {
  headers:{ Authorization:"Bearer " + token }
})
.then(r => r.json())
.then(d => {
  if(!d.success){
    list.innerHTML = "<div class='empty'>Ошибка загрузки</div>";
    return;
  }

  allPurchases = d.purchases || [];

  renderList();
});
function renderList(){
  list.innerHTML = "";

  const selectedStatus = statusFilter.value;

  let filtered = allPurchases;

  if(selectedStatus !== "all"){
    filtered = allPurchases.filter(p => p.status === selectedStatus);
  }

  if(!filtered.length){
    list.innerHTML = `
  <div class="empty" style="grid-column:1/-1;">
    Нет покупок
  </div>
`;

    return;
  }

  filtered.forEach(renderPurchase);
  updatePrices();
}
function formatMode(mode){
  if(!mode) return "";

  return mode
    .replace(/_/g," ")
    .replace(/\b\w/g,l=>l.toUpperCase());
}
function renderPurchase(p){
  const offer = p.offer || {};

  let statusText = "";
  let statusClass = "";

  if(p.status === "pending"){
    statusText = "В процессе";
    statusClass = "pending";
  } else if(p.status === "completed"){
    statusText = "Завершено";
    statusClass = "completed";
  } else if(p.status === "refunded"){
    statusText = "Возврат";
    statusClass = "refunded";
  }

  const image = offer.imageUrl || "/img/offer-default.png";

const title = buildOfferTitle(offer);

const gameObj = (window.GAMES_LIST || []).find(g => g.id === offer.game);
const gameTitle = gameObj ? gameObj.name : offer.game;

const gameLine = [
  gameTitle,
  formatMode(offer.mode)
].filter(Boolean).join(", ");

  const orderNumber = p.orderNumber || p.id;

  const created = new Date(p.createdAt || Date.now());
  const dateText = created.toLocaleDateString("ru-RU", {
    day:"numeric",
    month:"short",
    year:"numeric"
  });

  const card = document.createElement("div");
  card.className = "offer-card";

  card.innerHTML = `
    <div class="order-badge ${statusClass}">
      ${statusText}
    </div>

    <div class="offer-image">
      <img src="${image}" onerror="this.src='/img/offer-default.png'">
    </div>

    <div class="offer-body">
      <div class="offer-title">${title}</div>

      <div class="order-meta">
        ${gameLine}
      </div>

<div class="order-number">
  Заказ ${orderNumber}
</div>
<div class="order-date">
  ${dateText}
</div>

<div class="offer-price" data-price="${p.price}">
  —
</div>
    </div>
  `;

  card.onclick = () => {
    location.href = "/order.html?id=" + p.id;
  };

  list.appendChild(card);
}

statusFilter.addEventListener("change", renderList);
async function updatePrices(){
  const els = document.querySelectorAll(".offer-price");

  for(const el of els){
    const base = Number(el.dataset.price);
    if (isNaN(base)) continue;

    el.textContent = await tpMoney.formatPrice(base);
  }
}

window.addEventListener("tp:currency-change", updatePrices);

</script>

</body>
</html>
