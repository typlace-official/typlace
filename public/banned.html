<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <title data-i18n="page.title"></title>

  <script>
    (() => {
      const savedLang = localStorage.getItem("tp_lang");
      const lang = ["ru", "uk", "en"].includes(savedLang) ? savedLang : "ru";
      document.documentElement.lang = lang;
      document.documentElement.classList.add("i18n-loading");
      window.__tpBanLang = lang;
    })();
  </script>

  <style>
    :root{
      --tp-bg:#f6f7f9;
      --tp-card:#ffffff;
      --tp-border:#e5e7eb;
      --tp-text:#111827;
      --tp-muted:#6b7280;
      --tp-primary:#111111;
      --tp-primary-hover:#1f2937;
      --tp-secondary-bg:#f3f4f6;
      --tp-secondary-text:#111827;
      --tp-shadow:0 18px 50px rgba(15,23,42,.08);
      --tp-danger-soft:#fff1f2;
      --tp-danger-border:#fecdd3;
      --tp-danger:#e11d48;
      --tp-radius:24px;
    }

    *{
      box-sizing:border-box;
    }

    html,
    body{
      margin:0;
      min-height:100%;
    }

    html.i18n-loading body{
      opacity:0;
    }

    body{
      font-family:Arial, sans-serif;
      background:
        radial-gradient(circle at top, rgba(30,80,212,.06), transparent 32%),
        var(--tp-bg);
      color:var(--tp-text);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px 16px;
      transition:opacity .18s ease;
    }

    .page{
      width:100%;
      max-width:560px;
    }

    .card{
      background:var(--tp-card);
      border:1px solid var(--tp-border);
      border-radius:var(--tp-radius);
      box-shadow:var(--tp-shadow);
      padding:32px;
      text-align:center;
    }

    .eyebrow{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:30px;
      padding:6px 12px;
      border-radius:999px;
      background:#f3f6ff;
      color:#1E50D4;
      font-size:13px;
      font-weight:700;
      margin-bottom:18px;
    }

    .icon-wrap{
      width:84px;
      height:84px;
      margin:0 auto 20px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      background:var(--tp-danger-soft);
      border:1px solid var(--tp-danger-border);
    }

    .icon-wrap svg{
      width:40px;
      height:40px;
      stroke:var(--tp-danger);
      fill:none;
      stroke-width:1.9;
      stroke-linecap:round;
      stroke-linejoin:round;
    }

    .title{
      margin:0 0 12px;
      font-size:30px;
      line-height:1.15;
      font-weight:800;
      letter-spacing:-0.02em;
    }

    .text{
      margin:0;
      color:var(--tp-muted);
      font-size:16px;
      line-height:1.6;
    }

    .note{
      margin:18px 0 0;
      padding:14px 16px;
      border-radius:16px;
      background:#fafafa;
      border:1px solid var(--tp-border);
      color:var(--tp-muted);
      font-size:14px;
      line-height:1.55;
    }

    .actions{
      display:flex;
      gap:12px;
      justify-content:center;
      flex-wrap:wrap;
      margin-top:24px;
    }

    .btn{
      min-width:180px;
      min-height:46px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:12px 18px;
      border-radius:12px;
      text-decoration:none;
      font-size:14px;
      font-weight:700;
      transition:
        transform .15s ease,
        background .15s ease,
        color .15s ease,
        border-color .15s ease;
    }

    .btn:hover{
      transform:translateY(-1px);
    }

    .btn-primary{
      background:var(--tp-primary);
      color:#fff;
      border:1px solid var(--tp-primary);
    }

    .btn-primary:hover{
      background:var(--tp-primary-hover);
      border-color:var(--tp-primary-hover);
    }

    .btn-secondary{
      background:var(--tp-secondary-bg);
      color:var(--tp-secondary-text);
      border:1px solid var(--tp-border);
    }

    @media (max-width: 640px){
      body{
        padding:14px;
        align-items:stretch;
      }

      .page{
        display:flex;
      }

      .card{
        width:100%;
        margin:auto 0;
        padding:24px 18px;
        border-radius:20px;
      }

      .title{
        font-size:24px;
      }

      .text{
        font-size:15px;
      }

      .note{
        font-size:13px;
        padding:12px 14px;
      }

      .actions{
        flex-direction:column;
      }

      .btn{
        width:100%;
        min-width:0;
      }

      .icon-wrap{
        width:74px;
        height:74px;
        margin-bottom:18px;
      }

      .icon-wrap svg{
        width:34px;
        height:34px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="card">
      <div class="eyebrow" data-i18n="page.brand"></div>

      <div class="icon-wrap" aria-hidden="true">
        <svg viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="9"></circle>
          <path d="M8.5 8.5l7 7"></path>
          <path d="M15.5 8.5l-7 7"></path>
        </svg>
      </div>

      <h1 class="title" data-i18n="page.heading"></h1>

      <p class="text" data-i18n="page.text"></p>

      <div class="note" data-i18n="page.note"></div>

      <div class="actions">
        <a class="btn btn-primary" href="/help.html" data-i18n="page.supportButton"></a>
        <a class="btn btn-secondary" href="/" data-i18n="page.homeButton"></a>
      </div>
    </section>
  </main>

  <script>
    (() => {
      const SUPPORTED_LANGS = ["ru", "uk", "en"];
      const DEFAULT_LANG = "ru";

      function normalizeLang(lang) {
        const safeLang = String(lang || "").trim().toLowerCase();
        return SUPPORTED_LANGS.includes(safeLang) ? safeLang : DEFAULT_LANG;
      }

      function getByPath(obj, key) {
        return String(key || "")
          .split(".")
          .reduce((acc, part) => acc?.[part], obj);
      }

      async function initBannedPageI18n() {
        const lang = normalizeLang(window.__tpBanLang || localStorage.getItem("tp_lang"));

        try {
          const res = await fetch(`/locales/${lang}/banned.json`, { cache: "no-cache" });
          if (!res.ok) {
            throw new Error(`HTTP ${res.status}`);
          }

          const translations = await res.json();

          document.querySelectorAll("[data-i18n]").forEach(el => {
            const key = el.dataset.i18n;
            const value = getByPath(translations, key);

            if (value != null) {
              el.textContent = String(value);
            }
          });

          const titleEl = document.querySelector("title[data-i18n]");
          if (titleEl) {
            const titleValue = getByPath(translations, titleEl.dataset.i18n);
            if (titleValue != null) {
              document.title = String(titleValue);
            }
          }

          document.documentElement.lang = lang;
        } catch (err) {
          console.error("banned page i18n init failed:", err);
        } finally {
          document.documentElement.classList.remove("i18n-loading");
        }
      }

      initBannedPageI18n();
    })();
  </script>
</body>
</html>
