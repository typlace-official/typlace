<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title data-i18n="page.title"></title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="/header.css">
  <link rel="stylesheet" href="/footer.css">

  <style>
    :root{
      --tp-header-space:110px;
      --tp-page-bg:#f6f7f9;
      --tp-text:#111827;
      --tp-muted:#8b95a7;
      --tp-border:#e5e7eb;
      --tp-panel:#ffffff;
    }

    html,
    body{
      margin:0;
      padding:0;
      min-height:100%;
      background:var(--tp-page-bg);
      overflow-x:hidden;
    }

    body{
      min-height:100svh;
      font-family:Inter, Arial, sans-serif;
      color:var(--tp-text);
    }

    .page-content{
      min-height:100svh;
      padding-top:var(--tp-header-space);
      box-sizing:border-box;
      display:flex;
    }

    .page{
      width:100%;
      max-width:1100px;
      margin:0 auto;
      padding:0 14px;
      box-sizing:border-box;
      display:flex;
    }

    .help-shell{
      width:100%;
      min-height:calc(100svh - var(--tp-header-space));
      box-sizing:border-box;
      padding:12px 0 24px;
      display:flex;
      flex-direction:column;
      align-items:center;
    }

    .help-head{
      width:100%;
      max-width:640px;
      text-align:center;
      margin:0 0 28px;
    }

    .title{
      margin:0 0 10px;
      font-size:32px;
      line-height:1.05;
      font-weight:900;
      letter-spacing:-0.02em;
    }

    .subtitle{
      margin:0;
      font-size:15px;
      line-height:1.55;
      color:var(--tp-muted);
      font-weight:500;
    }

    .support-menu{
      width:100%;
      display:grid;
      grid-template-columns:repeat(3, minmax(0, 1fr));
      gap:16px;
    }

    .menu-btn{
      appearance:none;
      width:100%;
      min-height:148px;
      background:var(--tp-panel);
      border:1px solid var(--tp-border);
      border-radius:18px;
      padding:22px 20px;
      cursor:pointer;
      text-align:left;
      color:var(--tp-text);
      transition:none;
      display:flex;
      flex-direction:column;
      justify-content:flex-start;
      gap:10px;
      box-sizing:border-box;
      box-shadow:0 4px 14px rgba(17,24,39,.03);
    }

    .menu-btn:hover{
      background:var(--tp-panel);
      border-color:var(--tp-border);
      box-shadow:0 4px 14px rgba(17,24,39,.03);
      transform:none;
    }

    .menu-btn-title{
      display:block;
      font-size:18px;
      line-height:1.25;
      font-weight:900;
      color:var(--tp-text);
    }

    .menu-btn-text{
      display:block;
      font-size:14px;
      line-height:1.5;
      color:var(--tp-muted);
      font-weight:500;
    }

    @media (max-width:900px){
      .support-menu{
        grid-template-columns:1fr;
      }

      .menu-btn{
        min-height:124px;
      }
    }

    @media (max-width:768px){
      :root{
        --tp-header-space:100px;
      }

      .page{
        padding:0 12px;
      }

      .help-shell{
        padding:0 0 24px;
      }

      .help-head{
        margin-bottom:20px;
      }

      .title{
        font-size:28px;
      }

      .subtitle{
        font-size:14px;
      }

      .support-menu{
        gap:12px;
      }

      .menu-btn{
        min-height:116px;
        border-radius:16px;
        padding:18px 16px;
      }

      .menu-btn-title{
        font-size:16px;
      }

      .menu-btn-text{
        font-size:13px;
      }
    }
  </style>
</head>

<body>
  <div id="header-container"></div>

  <main class="page-content">
    <div class="page">
      <div class="help-shell">

        <div class="help-head">
          <h1 class="title" data-i18n="page.title"></h1>
          <p class="subtitle" data-i18n="page.subtitle"></p>
        </div>

        <div class="support-menu">
          <button class="menu-btn" onclick="location.href='/support-create.html'">
            <span class="menu-btn-title" data-i18n="page.create"></span>
            <span class="menu-btn-text" data-i18n="page.create_note"></span>
          </button>

          <button class="menu-btn" onclick="location.href='/support-history.html'">
            <span class="menu-btn-title" data-i18n="page.history"></span>
            <span class="menu-btn-text" data-i18n="page.history_note"></span>
          </button>

          <button class="menu-btn" onclick="location.href='/rules.html'">
            <span class="menu-btn-title" data-i18n="page.rules"></span>
            <span class="menu-btn-text" data-i18n="page.rules_note"></span>
          </button>
        </div>

      </div>
    </div>
  </main>

  <div id="footer-container"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/games.list.js"></script>
  <script src="/i18n.js"></script>
  <script src="/header.js"></script>
  <script src="/footer.js"></script>

  <script>
    const token = localStorage.getItem("tp_token");
    if(!token){
      location.href = "/auth.html?mode=login";
    }

    document.addEventListener("DOMContentLoaded", async () => {
      if (window.tpI18n?.load) {
        await window.tpI18n.load(window.tpI18n.currentLang);
      }
    });

    window.addEventListener("tp:lang-change", () => {
      if (window.tpI18n?.apply) {
        window.tpI18n.apply(document);
      }
    });
  </script>
</body>
</html>
