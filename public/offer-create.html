<!DOCTYPE html>

<style>
html,
body{
  margin:0;
  overflow-x:hidden;
}

body{
  font-family: Inter, Arial, sans-serif;
  background:#f6f7f9;
}

.page{
  display:flex;
  justify-content:center;
  padding:24px 14px 60px;

.container{

}

/* ===== TOP ROW ===== */
.top-row{

  align-items:center;
  gap:12px;

}

/* BACK PILL */
.back-pill{

/* BREADCRUMB */
.breadcrumb{

.crumb-icon{

.crumb-game{

}

.crumb-mode{

/* FORM */
.form-group{ margin-bottom:16px; }

label{

.image-placeholder{

}

  right:10px;

  border-radius:50%;

<script type="module">
const langSelect = document.getElementById("langSelect");
const pageT = (key, params = {}) => {
  const fullKey = `page.${key}`;
  const tr = window.tpI18n?.t ? window.tpI18n.t(fullKey, params) : "";
  return tr && tr !== fullKey ? tr : key;
};

function getInterfaceLang(){
  const lang = (localStorage.getItem("tp_lang") || "ru").trim().toLowerCase();
  return ["ru", "uk", "en"].includes(lang) ? lang : "ru";
}

function getRequiredOfferLangs(){
  const interfaceLang = getInterfaceLang();

  const rules =
    GAME.offerLanguages?.requiredByInterface || {
      ru: ["ru", "uk"],
      uk: ["uk", "ru"],
      en: ["en"]
    };

  return rules[interfaceLang] || rules.ru || ["ru", "uk"];
}

function switchOfferEditorLang(lang){
  const safeLang = ["ru", "uk", "en"].includes(lang) ? lang : "ru";
  langSelect.value = safeLang;
  applyLangBlocks(safeLang);
  updateOfferFieldLabels(safeLang);
}

function fillOfferLangSelect(selectedLang = getInterfaceLang()) {
  langSelect.innerHTML = `
    <option value="ru">${window.tpI18n.t("common.lang_ru")}</option>
    <option value="uk">${window.tpI18n.t("common.lang_uk")}</option>
    <option value="en">${window.tpI18n.t("common.lang_en")}</option>
  `;

  langSelect.value = ["ru", "uk", "en"].includes(selectedLang)
    ? selectedLang
    : "ru";
}

// показать нужные блоки текста
function applyLangBlocks(lang){
  document.querySelectorAll(".lang-block").forEach(el => el.style.display = "none");
  document.querySelectorAll(".lang-" + lang).forEach(el => el.style.display = "");
}

function updateOfferFieldLabels(lang = langSelect.value || getInterfaceLang()){
  const safeLang = ["ru", "uk", "en"].includes(lang) ? lang : "ru";

  const titleText = pageT(`fieldLabels.${safeLang}.title`);
  const descText = pageT(`fieldLabels.${safeLang}.description`);

  document.querySelectorAll(".offer-title-label").forEach(el => {
    el.textContent = titleText;
  });

  document.querySelectorAll(".offer-desc-label").forEach(el => {
    el.textContent = descText;
  });
}

function getLangName(lang){
  return pageT(`languageTargets.${lang}`);
}

function getTitleErrorText(lang){
  return pageT("errors.fillTitleForLanguage", {
    language: getLangName(lang)
  });
}

function getDescErrorText(lang){
  return pageT("errors.fillDescriptionForLanguage", {
    language: getLangName(lang)
  });
}

function updateLangRulesHint(){
  const box = document.getElementById("langRulesHint");
  if (!box) return;

  const interfaceLang = getInterfaceLang();
  box.innerHTML = pageT(`langRules.${interfaceLang}`);
}

langSelect.addEventListener("change", () => {
  const lang = langSelect.value;
  applyLangBlocks(lang);
  updateOfferFieldLabels(lang);
});

document.getElementById("backBtn").onclick = () => {
  history.back();
};

const params = new URLSearchParams(location.search);
const gameId = params.get("game");
const mode = params.get("mode");
const editId = params.get("edit");
const isEditMode = !!editId;

async function waitForGameConfig(gameId, requestedMode, timeoutMs = 7000){
  const startedAt = Date.now();

  while (true) {
    const game = window.GAMES?.[gameId];
    const resolvedMode = requestedMode || game?.defaultMode;

    const isReady =
      game &&
      game.title &&
      game.icon &&
      game.modes &&
      typeof game.modes === "object" &&
      Object.keys(game.modes).length > 0 &&
      resolvedMode &&
      game.modes[resolvedMode];

    if (isReady) {
      return game;
    }

    if (Date.now() - startedAt >= timeoutMs) {
      throw new Error(`Game config not ready: ${gameId}/${requestedMode || ""}`);
    }

    await new Promise(resolve => setTimeout(resolve, 25));
  }
}

let GAME;
let activeMode;
let modeCfg;

try {
  if (window.tpI18n?.load) {
    await window.tpI18n.load(getInterfaceLang());
  }

  if (!gameId) {
    document.body.innerHTML = `<h2 style="padding:24px">${pageT("errors.gameNotFound")}</h2>`;
    markPageReady();
    throw new Error("Game id not found");
  }

  GAME = await waitForGameConfig(gameId, mode);
  activeMode = mode || GAME.defaultMode;
  modeCfg = GAME.modes?.[activeMode] || {};

  if (!modeCfg || !Object.keys(modeCfg).length) {
    document.body.innerHTML = `<h2 style="padding:24px">${pageT("errors.gameNotFound")}</h2>`;
    markPageReady();
    throw new Error(`Mode not found: ${activeMode}`);
  }
} catch (err) {
  console.error("offer-create init error:", err);
  document.body.innerHTML = `<h2 style="padding:24px">${pageT("errors.generic")}</h2>`;
  markPageReady();
  throw err;

const t = (key, fallback = "") => {
  if (!window.tpI18n?.t) return fallback || key || "";
  const tr = window.tpI18n.t(key);
  return tr && tr !== key ? tr : (fallback || key || "");
};

// ===== CATEGORIES =====
if (Array.isArray(modeCfg.categories) && modeCfg.categories.length) {
  categoryGroup.style.display = "";

    `<option value="">${t("common.choose_category", "Выберите категорию")}</option>`;

  modeCfg.categories.forEach(cat => {
    const keyTr = `${gameId}.categories.${cat}`;
    const tr = window.tpI18n?.t ? window.tpI18n.t(keyTr) : keyTr;
    const label = (tr === keyTr) ? cat : tr;

      `<option value="${cat}">${label}</option>`;

} else {

}

const fieldsConfig = modeCfg.createFields || modeCfg.filters;
if (!fieldsConfig) return;

Object.entries(fieldsConfig).forEach(([key, field]) => {

  // ❌ create-странице не нужен range
  if (field.type === "range") return;

  const wrap = document.createElement("div");
  wrap.className = "form-group";
  wrap.dataset.key = key;

  const label = document.createElement("label");
  label.textContent = field.labelKey ? t(field.labelKey, field.label) : (field.label || "");
  wrap.appendChild(label);

  // ✅ NUMBER (одно количество)
  if (field.type === "number") {

    const input = document.createElement("input");
    input.type = "number";
    input.min = 1;

    if (field.showIf || field.showIfValue) {
      wrap.style.display = "none";
    }

    wrap.appendChild(input);
    extraFieldsWrap.appendChild(wrap);
    return;
  }

  // ===== SELECT =====
  if (field.type === "select") {

    const select = document.createElement("select");
    const first = field.labelKey ? t(field.labelKey, field.label) : (field.label || "");
    select.innerHTML = `<option value="">${first}</option>`;

    field.options.forEach(opt => {
      if (typeof opt === "object") {
        const text = opt.labelKey ? t(opt.labelKey, opt.label) : (opt.label ?? opt.value);
        select.innerHTML += `<option value="${opt.value}">${text}</option>`;
      } else {
        select.innerHTML += `<option value="${opt}">${opt}</option>`;
      }
    });

  if (field.showIf || field.showIfValue) {
  wrap.style.display = "none";
}

    wrap.appendChild(select);
    extraFieldsWrap.appendChild(wrap);
    return;
  }

});
}

function matchesShowIf(showIf, values) {
  return Object.entries(showIf).every(([dep, cond]) =>
    Array.isArray(cond)
      ? cond.includes(values[dep])
      : values[dep] === cond
  );
}

function matchesShowIfValue(showIfValue, values) {
  return Object.entries(showIfValue).some(([dep, cond]) =>
    Array.isArray(cond)
      ? cond.includes(values[dep])
      : values[dep] === cond
  );
}

function updateVisibilityByConfig() {
  const values = {};

  extraFieldsWrap.querySelectorAll("[data-key]").forEach(wrap => {
    const key = wrap.dataset.key;
    const input = wrap.querySelector("select, input, textarea");
    if (input) values[key] = input.value;
  });

  const fieldsConfig =
    GAME.modes[activeMode]?.createFields ||
    GAME.modes[activeMode]?.filters ||
    {};

  extraFieldsWrap.querySelectorAll("[data-key]").forEach(wrap => {
    const key = wrap.dataset.key;
    const field = fieldsConfig[key];
    if (!field) return;

    const checks = [];

    if (field.showIf) {
      checks.push(matchesShowIf(field.showIf, values));
    }

    if (field.showIfValue) {
      checks.push(matchesShowIfValue(field.showIfValue, values));
    }

    const visible = checks.length ? checks.some(Boolean) : true;

    wrap.style.display = visible ? "" : "none";

    if (!visible) {
      wrap.querySelectorAll("input, select, textarea").forEach(i => {
        i.value = "";
      });
    }
  });
}

const STORAGE_KEY = `tp_create_images_${gameId}_${activeMode}`;

function saveImagesToStorage() {
  const readers = selectedFiles.map(file => {
    return new Promise(resolve => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.readAsDataURL(file);
    });
  });

  Promise.all(readers).then(base64Images => {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(base64Images));
  });
}

function loadImagesFromStorage() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (!saved) return;

  const base64Images = JSON.parse(saved);

  base64Images.forEach(base64 => {
    const blob = dataURLtoBlob(base64);
    const file = new File([blob], "image.png", { type: blob.type });
    selectedFiles.push(file);
  });
}

function dataURLtoBlob(dataurl) {
  const arr = dataurl.split(",");
  const mime = arr[0].match(/:(.*?);/)[1];
  const bstr = atob(arr[1]);
  let n = bstr.length;
  const u8arr = new Uint8Array(n);

  while (n--) {
    u8arr[n] = bstr.charCodeAt(n);
  }

  return new Blob([u8arr], { type: mime });
}

function hideToast(){
  if (!tpToast) return;

  tpToast.className = "tp-toast";
  tpToast.textContent = "";
}

function showToast(message, type = "success", duration = 2200){
  if (!tpToast) return;

  const safeMessage = String(message || "").trim();

  if (!safeMessage) {
    hideToast();
    return;
  }

  tpToast.textContent = safeMessage;

  requestAnimationFrame(() => {
    tpToast.classList.add("show");
  });

  clearTimeout(tpToastTimer);

function initTitleCounter(inputId, counterId){
  const input = document.getElementById(inputId);
  const counter = document.getElementById(counterId);

  input.addEventListener("input", ()=>{
    const len = input.value.length;
    counter.textContent = len + " / 70";

    if(len >= 70){
      counter.classList.add("limit");
    } else {
      counter.classList.remove("limit");
    }
  });
}

    updateLangRulesHint();

      applyLangBlocks(langSelect.value || lang);
      updateOfferFieldLabels(langSelect.value || lang);

      if (window.tpI18n?.apply) {

      }

      document.getElementById("crumbMode").textContent =
        (modeData?.labelKey && window.tpI18n?.t)
          ? window.tpI18n.t(modeData.labelKey)

    });
  } finally {

function setupKeyboardFooterHide(){
  const KEYBOARD_THRESHOLD = 160;

  function isKeyboardOpen(){
    if (!window.visualViewport) return false;

    const viewportHeight = window.visualViewport.height;
    const diff = window.innerHeight - viewportHeight;

    return diff > KEYBOARD_THRESHOLD;
  }

  function updateKeyboardState(){
    document.body.classList.toggle("keyboard-open", isKeyboardOpen());
  }

  if (window.visualViewport) {
    window.visualViewport.addEventListener("resize", updateKeyboardState);
    window.visualViewport.addEventListener("scroll", updateKeyboardState);
  }

  window.addEventListener("focusin", updateKeyboardState);
  window.addEventListener("focusout", () => {
    setTimeout(updateKeyboardState, 80);
  });

  window.addEventListener("orientationchange", () => {
    setTimeout(updateKeyboardState, 120);
  });

  updateKeyboardState();
}
function sanitizePriceValue(value){
  let v = String(value || "")
    .replace(/,/g, ".")
    .replace(/[^\d.]/g, "");

  const firstDotIndex = v.indexOf(".");

  if (firstDotIndex !== -1) {
    v =
      v.slice(0, firstDotIndex + 1) +
      v.slice(firstDotIndex + 1).replace(/\./g, "");
  }

  const parts = v.split(".");
  let intPart = parts[0] || "";
  const hasDot = v.includes(".");
  let decPart = parts[1] || "";

  intPart = intPart.replace(/^0+(?=\d)/, "");

  if (hasDot) {
    return `${intPart || "0"}.${decPart.slice(0, 2)}`;
  }

  return intPart;
}
