<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family: Inter, Arial, sans-serif;
  background:#f6f7f9;
}

.page{
  display:flex;
  justify-content:center;
  padding:24px 14px 60px;
}

.container{
  width:100%;
  max-width:950px;
}

/* ===== TOP ROW ===== */
.top-row{
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:14px;
}

/* BACK PILL */
.back-pill{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:8px 14px;
  border-radius:999px;
  border:1px solid #e5e7eb;
  background:#fff;
  font-size:14px;
  font-weight:600;
  cursor:pointer;
}
.back-pill:hover{
  background:#f3f4f6;
}

/* BREADCRUMB */
.breadcrumb{
  display:flex;
  align-items:center;
  gap:10px;
}

.crumb-icon{
  width:40px;
  height:40px;
  border-radius:8px;
  object-fit:cover;
}


.crumb-game{
  font-size:20px;
  font-weight:600;
}

.crumb-mode{
  font-size:18px;
  font-weight:600;
  opacity:.7;
}

/* FORM */
.form-group{ margin-bottom:16px; }

label{
  display:block;
  font-size:13px;
  font-weight:600;
  margin-bottom:6px;
}

/* IMAGE */
.image-preview{
  width:100%;
  aspect-ratio:16/9;
  border-radius:14px;
  background:#f3f4f6;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  position:relative;
  overflow:hidden;
}

.image-preview img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.image-placeholder{
  text-align:center;
  color:#9ca3af;
}

.image-placeholder .plus{
  font-size:40px;
}

.remove-image{
  position:absolute;
  top:10px;
  right:10px;
  background:rgba(0,0,0,.6);
  color:#fff;
  border:none;
  border-radius:50%;
  width:28px;
  height:28px;
  cursor:pointer;
}

/* INPUTS */
input, select{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid #e5e7eb;
  font-size:14px;
  box-sizing:border-box;
}

input::-webkit-outer-spin-button,
input::-webkit-inner-spin-button{
  -webkit-appearance:none;
  margin:0;
}

.row{
  display:flex;
  gap:12px;
}

.row .form-group.price-group{
  max-width:180px;
}

.btn{
  margin-top:20px;
  width:100%;
  height:46px;
  border-radius:14px;
  border:none;
  background:linear-gradient(135deg,#2563eb,#3b82f6);
  color:#fff;
  font-size:15px;
  font-weight:700;
  cursor:pointer;
}


.field-full{
  width:100%;
  flex: 1;
}
textarea{
  width: 100%;              /* ✅ фикс по горизонтали */
  max-width: 100%;
  resize: none;             /* ⛔ нельзя тянуть мышкой */
  box-sizing: border-box;   /* ⛔ текст не вылезает */
  font-family: Inter, Arial, sans-serif;
  font-size: 14px;
  line-height: 1.5;
}

.char-counter{
  font-size:12px;
  color:#6b7280;
  margin-top:4px;
  text-align:right;
}

.char-counter.limit{
  color:#ef4444;
}
@media (max-width: 768px){

  .container{
    padding:18px;
    border-radius:14px;
  }

  .row{
    flex-direction:column;
  }

  #categoryGroup{
    max-width:100% !important;
  }

}
.btn-danger{
  background:#ef4444;
}

.btn-danger:hover{
  box-shadow:0 8px 20px rgba(239,68,68,.25);
}
select:focus,
input:focus,
textarea:focus{
  outline:none;
  box-shadow:none;
  border-color:#e5e7eb;
}
.card{
  background:#fff;
  border-radius:16px;
  padding:24px;
  border:1px solid #e5e7eb;
  margin-bottom:18px;
}
.tp-gallery{
  width:100%;
  aspect-ratio:4/3;      /* 👈 4:3 как ты хотел */
  background:#fff;
  border-radius:16px;
  overflow:hidden;
  position:relative;
  margin-bottom:20px;
  box-shadow:0 8px 24px rgba(0,0,0,.06);
}
@media (max-width: 768px){

  .tp-gallery{
    border-radius:14px;
  }

.tp-gallery__slide img{
  aspect-ratio:4/3;
  object-fit:cover;
}

}
@media (max-width: 768px){

  .crumb-game{
    font-size:18px;
  }

  .crumb-mode{
    font-size:16px;
  }

  label{
    font-size:12px;
  }

  input, select, textarea{
    font-size:14px;
  }

  .card{
    padding:18px;
    border-radius:14px;
  }

}


.tp-gallery{
  box-shadow:0 8px 24px rgba(0,0,0,.06);
}
.tp-gallery__counter{
  position:absolute;
  bottom:12px;
  right:12px;
  background:rgba(0,0,0,.6);
  color:#fff;
  font-size:13px;
  padding:4px 8px;
  border-radius:20px;
}
.tp-gallery__remove{
  position:absolute;
  top:14px;
  left:14px;
  width:40px;
  height:40px;
  border-radius:50%;
  border:none;
  background:rgba(0,0,0,.6);
  display:flex;
  align-items:center;
  justify-content:center;
}
@media (max-width:768px){

  .page{
    padding:0;
  }

  .container{
    max-width:100%;
  }

  .tp-gallery{
    width:100vw;
    margin-left:calc(50% - 50vw);
    border-radius:0;
    aspect-ratio:4/3;
  }

}
@media (max-width: 768px){
  .tp-gallery__arrow{
    display:none !important;
  }
}
@media (max-width:768px){

  .page{
    padding:16px 12px 100px; /* меньше боковых отступов */
  }

  .container{
    max-width:100%;
  }

  .card{
    background:#fff;
    border:none;           /* ❗ убираем рамку */
    border-radius:0;       /* ❗ убираем скругление */
    padding:18px 0;        /* ❗ убираем боковые отступы */
  }

}
@media (max-width:768px){

  /* Убираем ощущение "внутренней коробки" */
  .card{
    background:transparent;
    padding:0;
  }

  /* Общий контейнер */
  .page{
    padding:16px 12px 120px;
  }

  /* Форм-группы компактнее */
  .form-group{
    margin-bottom:14px;
  }

  /* Лейблы аккуратнее */
  label{
    font-size:13px;
    font-weight:600;

  }

  /* Инпуты меньше и аккуратнее */
  input,
  select,
  textarea{
    padding:10px 14px;
    border-radius:14px;

  }

  textarea{
    height:140px !important;
  }

  /* Категория на всю ширину */
  #categoryGroup{
    max-width:100% !important;
  }

  /* Кнопка аккуратнее */
  .btn{
    height:52px;
    border-radius:16px;
    font-size:16px;
  }

}
/* ===== PRICE FIX ===== */

.price-group input{
  height:42px;
  font-size:16px;
  font-weight:600;
  border-radius:12px;
}

@media (max-width:768px){

  .price-group input{
    height:44px;

}
@media (max-width:768px){
  .price-group{

}
@media (max-width:768px){

  .row .price-group{

}
.field-error{
  border-color:#ef4444 !important;
}

.error-text{
  font-size:13px;
  color:#ef4444;
  margin-top:6px;
}
</style>

<script type="module">
const langSelect = document.getElementById("langSelect");

const savedLang = localStorage.getItem("offer_lang") || "ru";
function fillOfferLangSelect(){

  const current = localStorage.getItem("offer_lang") || "ru";

  langSelect.innerHTML = `
    <option value="ru">${window.tpI18n.t("common.lang_ru")}</option>
    <option value="uk">${window.tpI18n.t("common.lang_uk")}</option>
    <option value="en">${window.tpI18n.t("common.lang_en")}</option>
  `;

  langSelect.value = current;
}

// показать нужные блоки текста
function applyLangBlocks(lang){
  document.querySelectorAll(".lang-block").forEach(el => el.style.display = "none");
  document.querySelectorAll(".lang-" + lang).forEach(el => el.style.display = "");
}
function updateOfferFieldLabels(lang){
  let titleText = "Title";
  let descText  = "Description";

  if (lang === "ru") { titleText = "Название"; descText = "Описание"; }
  if (lang === "uk") { titleText = "Назва";    descText = "Опис"; }

  // ставим текст во ВСЕ лейблы (во всех языковых блоках)
  document.querySelectorAll(".offer-title-label").forEach(el => el.textContent = titleText);
  document.querySelectorAll(".offer-desc-label").forEach(el => el.textContent = descText);
}

langSelect.addEventListener("change", () => {
  const lang = langSelect.value;
  localStorage.setItem("offer_lang", lang);

  applyLangBlocks(lang);
  updateOfferFieldLabels(lang);
});

document.getElementById("backBtn").onclick = () => {
  history.back();
};

const params = new URLSearchParams(location.search);
const gameId = params.get("game");
const mode = params.get("mode");
const editId = params.get("edit");
const isEditMode = !!editId;
await new Promise(resolve => {
  const check = () => {
    if (window.GAMES) resolve();
    else setTimeout(check, 10);
  };
  check();
});
if(!gameId || !window.GAMES[gameId]){
  document.body.innerHTML = "<h2 style='padding:24px'>Игра не найдена</h2>";
  throw new Error("Game not found");
}

const GAME = window.GAMES[gameId];
const activeMode = mode || GAME.defaultMode;
let priceEUR = null;
const extraFieldsWrap = document.getElementById("extraFields");
const categoryGroup = document.getElementById("categoryGroup");
const categoryInput = document.getElementById("categoryInput");

function renderExtraFields(gameId, mode) {
  extraFieldsWrap.innerHTML = "";
  categoryGroup.style.display = "none";
  

  const game = window.GAMES?.[gameId];
  const modeCfg = game?.modes?.[mode];
  if (!modeCfg) return;
const t = (key, fallback="") => (window.tpI18n?.t ? window.tpI18n.t(key) : (fallback || key || ""));

// ===== CATEGORIES =====
if (Array.isArray(modeCfg.categories) && modeCfg.categories.length) {
  categoryGroup.style.display = "";

  // placeholder (один раз!)
  categoryInput.innerHTML =
    `<option value="">${t("common.choose_category", "Выберите категорию")}</option>`;

  // категории
  modeCfg.categories.forEach(cat => {
    const keyTr = `${gameId}.categories.${cat}`;
    const tr = window.tpI18n?.t ? window.tpI18n.t(keyTr) : keyTr;
    const label = (tr === keyTr) ? cat : tr;

    categoryInput.innerHTML +=
      `<option value="${cat}">${label}</option>`;
  });

} else {
  categoryGroup.style.display = "none";
}

  const filters = modeCfg.filters;
  if (!filters) return;

Object.entries(filters).forEach(([key, field]) => {

  // ❌ create-странице не нужен range
  if (field.type === "range") return;

  const wrap = document.createElement("div");
  wrap.className = "form-group";
  wrap.dataset.key = key;

  const label = document.createElement("label");
  label.textContent = field.labelKey ? t(field.labelKey, field.label) : (field.label || "");
  wrap.appendChild(label);

  // ✅ NUMBER (одно количество)
  if (field.type === "number") {

    const input = document.createElement("input");
    input.type = "number";
    input.min = 1;

    if (field.showIf || field.showIfValue) {
      wrap.style.display = "none";
    }

    wrap.appendChild(input);
    extraFieldsWrap.appendChild(wrap);
    return;
  }

  // ===== SELECT =====
  if (field.type === "select") {

    const select = document.createElement("select");
    const first = field.labelKey ? t(field.labelKey, field.label) : (field.label || "");
    select.innerHTML = `<option value="">${first}</option>`;

    field.options.forEach(opt => {
      if (typeof opt === "object") {
        const text = opt.labelKey ? t(opt.labelKey, opt.label) : (opt.label ?? opt.value);
        select.innerHTML += `<option value="${opt.value}">${text}</option>`;
      } else {
        select.innerHTML += `<option value="${opt}">${opt}</option>`;
      }
    });

    if (field.showIf) wrap.style.display = "none";

    wrap.appendChild(select);
    extraFieldsWrap.appendChild(wrap);
    return;
  }

});
}
function updateVisibilityByConfig() {
  const values = {};

  extraFieldsWrap.querySelectorAll("[data-key]").forEach(wrap => {
    const key = wrap.dataset.key;
    const input = wrap.querySelector("select, input");
    if (input) values[key] = input.value;
  });

  extraFieldsWrap.querySelectorAll("[data-key]").forEach(wrap => {
    const key = wrap.dataset.key;
    const field = GAME.modes[activeMode]?.filters?.[key];
    if (!field) return;

    let visible = true;

    if (field.showIf) {
      visible = Object.entries(field.showIf).every(([dep, cond]) =>
        Array.isArray(cond)
          ? cond.includes(values[dep])
          : values[dep] === cond
      );
    }
if (field.showIfValue) {
  const matches = Object.entries(field.showIfValue).some(([dep, cond]) =>
    Array.isArray(cond)
      ? cond.includes(values[dep])
      : values[dep] === cond
  );

  if (matches) visible = true;
}
    wrap.style.display = visible ? "" : "none";

    if (!visible) {
      wrap.querySelectorAll("input, select").forEach(i => i.value = "");
    }
  });
}
/* ===== PRICE PREVIEW (LIKE FUNPAY) ===== */

const MARKETPLACE_FEE_PERCENT = 10; // ⚠️ ДОЛЖНО СОВПАДАТЬ С СЕРВЕРОМ

const priceInput = document.getElementById("priceInput");
const pricePreview = document.getElementById("pricePreview");

function round2(n){
  return Math.round(n * 100) / 100;
}

function calcGrossFromNet(net){
  return round2(net * (1 + MARKETPLACE_FEE_PERCENT / 100));
}
async function updatePricePreview(){
  const raw = priceInput.value.replace(",", ".").trim();
  const value = Number(raw);

  if (!value || value <= 0){
    pricePreview.style.display = "none";
    priceEUR = null;
    return;
  }

  const cur = localStorage.getItem("tp_currency") || "UAH";
  const ratesData = await tpMoney.getRates();
  const rates = ratesData.rates;

  // 🔹 перевод в EUR (ЦЕНА ПРОДАВЦА)
  let eur =
    cur === "EUR" ? value :
    cur === "USD" ? value / rates.USD :
    value / rates.UAH;

  eur = Math.round(eur * 100) / 100;
  priceEUR = eur; // ✅ ВАЖНО

  const grossEUR = Math.round(eur * 1.1 * 100) / 100;

  const eurVal = grossEUR;
  const usdVal = Math.round(grossEUR * rates.USD * 100) / 100;
  const uahVal = Math.round(grossEUR * rates.UAH);

  const symbols = { EUR:"€", USD:"$", UAH:"₴" };

  pricePreview.innerHTML = `
    <div>${window.tpI18n.t("common.buyer_pays")}</div>
    <div><b>≈ ${
      cur==="EUR"?eurVal:cur==="USD"?usdVal:uahVal
    } ${symbols[cur]}</b></div>
    ${cur!=="EUR"?`<div>≈ ${eurVal} €</div>`:""}
    ${cur!=="USD"?`<div>≈ ${usdVal} $</div>`:""}
    ${cur!=="UAH"?`<div>≈ ${uahVal.toLocaleString("ru-RU")} грн</div>`:""}
  `;

  pricePreview.style.display = "block";
}

priceInput.addEventListener("input", updatePricePreview);

// breadcrumb
document.getElementById("crumbIcon").src = GAME.icon;
document.getElementById("crumbIcon").alt = GAME.title;
document.getElementById("crumbGame").textContent = GAME.title;


const titleDescBlock = document.getElementById("titleDescBlock");
const langSelectGroup = document.getElementById("langSelectGroup");



// ВЕЗДЕ, КРОМЕ ROBUX (работаем по ID)
if (activeMode !== "robux") {
  titleDescBlock.style.display = "";
  langSelectGroup.style.display = "";
} else {
  titleDescBlock.style.display = "none";
  langSelectGroup.style.display = "none";
}

// ===== SMART CREATE GALLERY =====

const imageInput = document.getElementById("imageInput");
const createGallery = document.getElementById("createGallery");

let selectedFiles = [];
let currentIndex = 0;
// ===== LOCAL SAVE =====
const STORAGE_KEY = `tp_create_images_${gameId}_${activeMode}`;

function saveImagesToStorage() {
  const readers = selectedFiles.map(file => {
    return new Promise(resolve => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.readAsDataURL(file);
    });
  });

  Promise.all(readers).then(base64Images => {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(base64Images));
  });
}

function loadImagesFromStorage() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (!saved) return;

  const base64Images = JSON.parse(saved);

  base64Images.forEach(base64 => {
    const blob = dataURLtoBlob(base64);
    const file = new File([blob], "image.png", { type: blob.type });
    selectedFiles.push(file);
  });
}

function dataURLtoBlob(dataurl) {
  const arr = dataurl.split(",");
  const mime = arr[0].match(/:(.*?);/)[1];
  const bstr = atob(arr[1]);
  let n = bstr.length;
  const u8arr = new Uint8Array(n);

  while (n--) {
    u8arr[n] = bstr.charCodeAt(n);
  }

  return new Blob([u8arr], { type: mime });
}

function rebuildInput(){
  const dt = new DataTransfer();
  selectedFiles.forEach(file => dt.items.add(file));
  imageInput.files = dt.files;
}

function openPicker(){
  imageInput.click();
}

imageInput.addEventListener("change", () => {
  const files = Array.from(imageInput.files);

  files.forEach(file => {
    if (selectedFiles.length < 5) {
      selectedFiles.push(file);
    }
  });

  rebuildInput();
  currentIndex = selectedFiles.length - 1;
  renderGallery();
  saveImagesToStorage();
});

function removeCurrent(){
  if (currentIndex >= selectedFiles.length) return;

  selectedFiles.splice(currentIndex, 1);

  if (currentIndex > selectedFiles.length - 1) {
    currentIndex = selectedFiles.length - 1;
  }

  if (currentIndex < 0) currentIndex = 0;

  rebuildInput();
  saveImagesToStorage(); // ✅ сохраняем новое состояние
  renderGallery();
}

function renderGallery(){

  createGallery.innerHTML = "";

  const realCount = selectedFiles.length;
  const hasPlus = realCount < 5;
  const totalSlides = realCount + (hasPlus ? 1 : 0);
  

  // ===== 0 ФОТО =====
  if (realCount === 0) {
const plus = document.createElement("div");
plus.className = "tp-gallery__plus";
plus.innerHTML = `
  <div class="tp-gallery__plus-icon">+</div>
  <div data-i18n="common.add_photo"></div>
`;

if (window.tpI18n?.apply) {
  window.tpI18n.apply(plus);
}
    plus.onclick = openPicker;
    createGallery.appendChild(plus);
    return;
  }

// ===== СТРЕЛКИ =====
const prevBtn = document.createElement("button");
prevBtn.type = "button"; // ✅ ВАЖНО
prevBtn.className = "tp-gallery__arrow tp-gallery__arrow--left";
prevBtn.innerHTML = "‹";

const nextBtn = document.createElement("button");
nextBtn.type = "button"; // ✅ ВАЖНО
nextBtn.className = "tp-gallery__arrow tp-gallery__arrow--right";
nextBtn.innerHTML = "›";

  createGallery.appendChild(prevBtn);
  createGallery.appendChild(nextBtn);
// 📱 На телефоне убираем стрелки
if (window.innerWidth <= 768) {
  prevBtn.style.display = "none";
  nextBtn.style.display = "none";
}
  // ===== TRACK =====
const track = document.createElement("div");
track.className = "tp-gallery__track";
track.style.display = "flex";
track.style.height = "100%";
createGallery.appendChild(track);
// ===== COUNTER =====
const counter = document.createElement("div");
counter.className = "tp-gallery__counter";
createGallery.appendChild(counter);
// ===== TOUCH SWIPE =====
let startX = 0;
let currentTranslate = 0;

track.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
});

track.addEventListener("touchend", e => {
  const endX = e.changedTouches[0].clientX;
  const diff = endX - startX;

  if (diff < -50 && currentIndex < totalSlides - 1) {
    currentIndex++;
  }

  if (diff > 50 && currentIndex > 0) {
    currentIndex--;
  }

  updatePosition();
});
  // ===== СЛАЙДЫ =====
  selectedFiles.forEach((file, i)=>{
    const slide = document.createElement("div");
    slide.className = "tp-gallery__slide";

    const img = document.createElement("img");
    img.src = URL.createObjectURL(file);

const removeBtn = document.createElement("button");
removeBtn.type = "button"; // ✅ ВАЖНО
removeBtn.className = "tp-gallery__remove";
removeBtn.innerHTML = `
<svg width="20" height="20" viewBox="0 0 24 24" fill="none">
<path d="M3 6h18" stroke="white" stroke-width="2"/>
<path d="M8 6V4h8v2" stroke="white" stroke-width="2"/>
<path d="M6 6l1 14h10l1-14" stroke="white" stroke-width="2"/>
</svg>
`;
removeBtn.onclick = (e)=>{
  e.preventDefault();      // ✅ чтобы не было submit
  e.stopPropagation();
  removeCurrent();
};

    slide.appendChild(img);
    slide.appendChild(removeBtn);
    track.appendChild(slide);
  });

  if (hasPlus) {
    const plusSlide = document.createElement("div");
    plusSlide.className = "tp-gallery__slide";

    const plus = document.createElement("div");
    plus.className = "tp-gallery__plus";
    plus.innerHTML = `
      <div class="tp-gallery__plus-icon">+</div>
      <div>Добавить фото</div>
    `;
    plus.onclick = openPicker;

    plusSlide.appendChild(plus);
    track.appendChild(plusSlide);
  }

  // ===== ЛОГИКА СТРЕЛОК =====
  prevBtn.style.display = currentIndex > 0 ? "flex" : "none";
  nextBtn.style.display = currentIndex < totalSlides - 1 ? "flex" : "none";

prevBtn.onclick = (e)=>{
  e.preventDefault();
  if(currentIndex > 0){
    currentIndex--;
    updatePosition();
  }
};

nextBtn.onclick = (e)=>{
  e.preventDefault();
  if(currentIndex < totalSlides - 1){
    currentIndex++;
    updatePosition();
  }
};

function updatePosition(skipAnimation = false){
  const width = createGallery.offsetWidth;

  if (skipAnimation) {
    track.style.transition = "none";
  } else {
    track.style.transition = "transform 0.35s ease";
  }

  track.style.transform = `translateX(-${currentIndex * width}px)`;

  if (skipAnimation) {
    requestAnimationFrame(() => {
      track.style.transition = "transform 0.35s ease";
    });
  }

  prevBtn.style.display = currentIndex > 0 ? "flex" : "none";
  nextBtn.style.display = currentIndex < totalSlides - 1 ? "flex" : "none";
if (realCount > 0) {
  counter.style.display = "block";

  // максимум 5
  let displayIndex = currentIndex + 1;

  if (displayIndex > 5) {
    displayIndex = 5;
  }

  counter.textContent = `${displayIndex} / 5`;
} else {
  counter.style.display = "none";
}
}

updatePosition(true);

}

loadImagesFromStorage();
rebuildInput();
renderGallery();

// SUBMIT
document.getElementById("offerForm").onsubmit = async e => {
  e.preventDefault();

  const token = localStorage.getItem("tp_token");
  if(!token){
    location.href = "/auth.html?mode=login";
    return;
  }
clearAllErrors();

let hasError = false;
// получаем значения
const titleRu = document.getElementById("titleRu").value.trim();
const descRu  = document.getElementById("descRu").value.trim();
const titleUk = document.getElementById("titleUk").value.trim();
const descUk  = document.getElementById("descUk").value.trim();
const titleEn = document.getElementById("titleEn").value.trim();
const descEn  = document.getElementById("descEn").value.trim();

const currentLang = langSelect.value || "ru";

let requiredTitle = "";
let requiredDesc = "";

if (currentLang === "ru") {
  requiredTitle = titleRu;
  requiredDesc  = descRu;
}
if (currentLang === "uk") {
  requiredTitle = titleUk;
  requiredDesc  = descUk;
}
if (currentLang === "en") {
  requiredTitle = titleEn;
  requiredDesc  = descEn;
}

// категория
if(categoryInput && !categoryInput.value){
  showError(categoryInput, "Укажите категорию");
  hasError = true;
}

// цена
if(!priceEUR || priceEUR <= 0){
  showError(priceInput, "Укажите цену");
  hasError = true;
}

// название
if(!requiredTitle){
  const titleInput =
    document.querySelector(".lang-" + currentLang + " input");
  showError(titleInput, "Заполните название");
  hasError = true;
}

// описание
if(!requiredDesc){
  const descInput =
    document.querySelector(".lang-" + currentLang + " textarea");
  showError(descInput, "Заполните описание");
  hasError = true;
}

if(hasError) return;

const extra = {};

document.querySelectorAll("#extraFields [data-key]").forEach(wrap => {
  const key = wrap.dataset.key;
  const inputs = wrap.querySelectorAll("input, select");

  if (inputs.length === 1) {
    const v = inputs[0].value;
    if (v !== "") extra[key] = v;
  }

  if (inputs.length === 2) {
    const from = inputs[0].value;
    const to = inputs[1].value;

    if (from !== "") extra[key + "_from"] = from;
    if (to !== "") extra[key + "_to"] = to;
  }
});
const formData = new FormData();

formData.append("game", gameId);
formData.append("mode", mode || GAME.defaultMode);
formData.append("category", categoryInput?.value || "");
formData.append("price", priceEUR);

formData.append("title_ru", titleRu);
formData.append("desc_ru", descRu);
formData.append("title_uk", titleUk);
formData.append("desc_uk", descUk);
formData.append("title_en", titleEn);
formData.append("desc_en", descEn);

Array.from(imageInput.files).slice(0,5).forEach(file=>{
  formData.append("images", file);
});
// ✅ ДОБАВИТЬ ЭТО
Object.entries(extra).forEach(([key, value]) => {
  formData.append(key, value);
});

const url = isEditMode
  ? "/api/offers/" + editId
  : "/api/offers";

const method = isEditMode
  ? "PUT"
  : "POST";

const res = await fetch(url, {
  method,
  headers: {
    "Authorization": "Bearer " + token
  },
  body: formData
});

const data = await res.json();

if(data.success){

  localStorage.removeItem(STORAGE_KEY);
  selectedFiles = [];
  currentIndex = 0;

  rebuildInput();
  renderGallery();

  alert(isEditMode ? "Изменения сохранены!" : "Объявление создано!");
  location.href =
  `/game.html?game=${gameId}&mode=${encodeURIComponent(mode || GAME.defaultMode)}`;
}
else{
    alert(data.message || "Ошибка");
  }
};
function updateCurrencySymbol(){
  const cur = localStorage.getItem("tp_currency") || "UAH";
  const symbols = { EUR:"€", USD:"$", UAH:"₴" };
  document.getElementById("priceCurrency").textContent = symbols[cur];
}
function showError(input, message){

  input.classList.add("field-error");

  const parent = input.closest(".form-group");
  let error = parent.querySelector(".error-text");

  if(!error){
    error = document.createElement("div");
    error.className = "error-text";
    parent.appendChild(error);
  }

  error.textContent = message;
}

function clearAllErrors(){
  document.querySelectorAll(".field-error")
    .forEach(el => el.classList.remove("field-error"));

  document.querySelectorAll(".error-text")
    .forEach(el => el.remove());
}
updateCurrencySymbol();
window.addEventListener("tp:currency-change", ()=>{
  updateCurrencySymbol();
  updatePricePreview(); // priceEUR обновится внутри
});
// ===== EDIT MODE INIT =====
if (isEditMode) {
document.title = window.tpI18n.t("common.edit_offer") + " — TyPlace";
document.getElementById("submitBtn").textContent =
  window.tpI18n.t("common.save_changes");

  const deleteBtn = document.getElementById("deleteBtn");
  deleteBtn.style.display = "block";

  deleteBtn.onclick = async () => {
    if (!confirm("Вы уверены, что хотите удалить объявление?")) return;

    const token = localStorage.getItem("tp_token");

    const res = await fetch("/api/offers/" + editId, {
      method: "DELETE",
      headers: {
        Authorization: "Bearer " + token
      }
    });

    const data = await res.json();

    if (data.success) {
      alert(window.tpI18n.t("common.offer_deleted"));
      location.href = "/my-offers.html";
    } else {
      alert(data.message || "Ошибка удаления");
    }
  };

  loadOfferForEdit(editId);
}

async function loadOfferForEdit(id){
  const token = localStorage.getItem("tp_token");

  const res = await fetch("/api/offers/" + id, {
    headers:{
      Authorization: "Bearer " + token
    }
  });

  const data = await res.json();
  if(!data.success){
    alert(window.tpI18n.t("common.offer_not_found"));
    return;
  }

  const o = data.offer;

  // 💰 цена
  priceEUR = o.priceNet || o.price;
  document.getElementById("priceInput").value = priceEUR;
  updatePricePreview();

// 🧩 категория
if (o.category) {
  setTimeout(() => {
    categoryInput.value = o.category;
  }, 0);
}

  // 📝 тексты
  document.getElementById("titleRu").value = o.title?.ru || "";
  document.getElementById("descRu").value  = o.description?.ru || "";
  document.getElementById("titleUk").value = o.title?.uk || "";
  document.getElementById("descUk").value  = o.description?.uk || "";
  document.getElementById("titleEn").value = o.title?.en || "";
  document.getElementById("descEn").value  = o.description?.en || "";

  // 🔧 extra поля
  if (o.extra) {
    Object.entries(o.extra).forEach(([key, value]) => {
      const wrap = document.querySelector(
        `#extraFields [data-key="${key}"]`
      );
      if (!wrap) return;
      const input = wrap.querySelector("input, select");
      if (input) input.value = value;
    });
    updateVisibilityByConfig();
  }
// ===== ЗАГРУЗКА КАРТИНОК ПРИ РЕДАКТИРОВАНИИ =====
if (Array.isArray(o.images) && o.images.length) {

  selectedFiles = [];
  currentIndex = 0;

  for (const url of o.images) {
    const res = await fetch(url);
    const blob = await res.blob();

    const file = new File(
      [blob],
      "image.jpg",
      { type: blob.type }
    );

    selectedFiles.push(file);
  }

  rebuildInput();
  renderGallery();
}
}
function initTitleCounter(inputId, counterId){
  const input = document.getElementById(inputId);
  const counter = document.getElementById(counterId);

  input.addEventListener("input", ()=>{
    const len = input.value.length;
    counter.textContent = len + " / 70";

    if(len >= 70){
      counter.classList.add("limit");
    } else {
      counter.classList.remove("limit");
    }
  });
}

initTitleCounter("titleRu", "counterRu");
initTitleCounter("titleUk", "counterUk");
initTitleCounter("titleEn", "counterEn");
function initDescCounter(textareaId, counterId){
  const textarea = document.getElementById(textareaId);
  const counter = document.getElementById(counterId);

  textarea.addEventListener("input", ()=>{
    const len = textarea.value.length;
    counter.textContent = len + " / 1000";

    if(len >= 1000){
      counter.classList.add("limit");
    } else {
      counter.classList.remove("limit");
    }
  });
}

initDescCounter("descRu", "counterDescRu");
initDescCounter("descUk", "counterDescUk");
initDescCounter("descEn", "counterDescEn");
window.addEventListener("DOMContentLoaded", async () => {

  const lang = localStorage.getItem("tp_lang") || "ru";
if (window.tpI18n?.load) {
  await window.tpI18n.load(lang);
}

fillOfferLangSelect();
const currentOfferLang = langSelect.value || savedLang || "ru";
applyLangBlocks(currentOfferLang);
updateOfferFieldLabels(currentOfferLang);

if (window.tpI18n?.apply) window.tpI18n.apply(document);
  if (!window.GAMES || !window.GAMES[gameId]) {
    console.error("GAMES not ready");
    return;
  }
const modeData = GAME.modes?.[activeMode];
document.getElementById("crumbMode").textContent =
  (modeData?.labelKey && window.tpI18n?.t)
    ? window.tpI18n.t(modeData.labelKey)
    : activeMode;
renderExtraFields(gameId, activeMode);
updateVisibilityByConfig();
if (window.tpI18n?.apply) {
  window.tpI18n.apply(document);
}
if (window.tpI18n?.apply) window.tpI18n.apply(document);
// 👇 ВОТ ЭТУ СТРОКУ ДОБАВЬ
extraFieldsWrap.addEventListener("change", updateVisibilityByConfig);
window.addEventListener("tp:lang-change", async (e) => {

  const lang = e.detail?.lang || localStorage.getItem("tp_lang") || "ru";

  if (window.tpI18n?.load) {
    await window.tpI18n.load(lang);
  }

fillOfferLangSelect(); // ← ВОТ ЭТА СТРОКА ОБЯЗАТЕЛЬНА
applyLangBlocks(langSelect.value || savedLang || "ru");
updateOfferFieldLabels(langSelect.value || "ru");

  if (window.tpI18n?.apply) {
    window.tpI18n.apply(document);
  }

  const modeData = GAME.modes?.[activeMode];

  document.getElementById("crumbMode").textContent =
    (modeData?.labelKey && window.tpI18n?.t)
      ? window.tpI18n.t(modeData.labelKey)
      : activeMode;

});
});
</script>
