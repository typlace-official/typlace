<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>
  document.titleKey = "page.title";
</script>
<title data-i18n="page.title"></title>
<link rel="stylesheet" href="/support-panel.css">
</head>
<body>

<div class="support-layout">
  <aside class="support-sidebar">
    <div class="support-brand">
      <div class="support-brand-title">TyPlace</div>
      <div class="support-brand-subtitle" data-i18n="page.brand.subtitle"></div>
    </div>

    <nav class="support-nav">
      <a class="support-nav-link active" href="/support-admin.html" data-i18n="page.nav.tickets"></a>
      <a class="support-nav-link" href="/support-resolution.html" data-i18n="page.nav.resolution"></a>
      <a class="support-nav-link" href="/support-official.html" data-i18n="page.nav.official"></a>
    </nav>

    <div class="support-sidebar-bottom">
      <a class="support-side-btn" id="adminBackBtn" href="/admin" data-i18n="page.sidebar.adminBack"></a>
      <button class="support-side-btn danger" id="logoutBtn" type="button" data-i18n="page.sidebar.logout"></button>
    </div>
  </aside>

  <main class="support-content">
    <div class="support-content-top">
      <div class="support-page-head">
        <h1 data-i18n="page.heading"></h1>
        <p data-i18n="page.subheading"></p>
      </div>

      <div class="role-pill" id="rolePill"></div>
    </div>

    <div class="stats">
      <div class="stat-box">
        <div class="stat-label" data-i18n="page.stats.waiting"></div>
        <div class="stat-value" id="statWaiting">0</div>
      </div>

      <div class="stat-box">
        <div class="stat-label" data-i18n="page.stats.in_progress"></div>
        <div class="stat-value" id="statInProgress">0</div>
      </div>

      <div class="stat-box">
        <div class="stat-label" data-i18n="page.stats.resolved"></div>
        <div class="stat-value" id="statResolved">0</div>
      </div>

      <div class="stat-box">
        <div class="stat-label" data-i18n="page.stats.total"></div>
        <div class="stat-value" id="statTotal">0</div>
      </div>
    </div>

    <div class="filters">
      <select class="select" id="statusFilter">
        <option value="" data-i18n="page.filters.allStatuses"></option>
        <option value="waiting" data-i18n="page.filters.waiting"></option>
        <option value="in_progress" data-i18n="page.filters.in_progress"></option>
        <option value="resolved" data-i18n="page.filters.resolved"></option>
      </select>

      <select class="select" id="assignedFilter">
        <option value="" data-i18n="page.filters.allTickets"></option>
        <option value="me" data-i18n="page.filters.onlyMine"></option>
      </select>
    </div>

    <div class="card" id="ticketList">
      <div class="empty" data-i18n="page.empty.loading"></div>
    </div>
  </main>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/i18n.js"></script>
<script>
const token = localStorage.getItem("tp_token");

if(!token){
  location.href = "/auth.html?mode=login";
  throw new Error("No token");
}

const socket = io();
let userRole = "";

const SUPPORT_PANEL_ROLES = new Set(["support", "admin", "super_admin"]);
const ADMIN_PANEL_ROLES = new Set(["super_admin"]);

function esc(s){
  return String(s || "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function tr(key, params = {}, fallback = ""){
  if(typeof key !== "string" || !key.trim()){
    return fallback;
  }

  if(window.tpI18n && typeof window.tpI18n.t === "function"){
    const translated = window.tpI18n.t(key, params);
    if(translated && translated !== key){
      return translated;
    }
  }

  return fallback || key;
}

function resolveMaybeI18n(value, fallback = ""){
  if(typeof value !== "string" || !value.trim()){
    return fallback;
  }

  if(
    value.startsWith("page.") ||
    value.startsWith("common.") ||
    value.startsWith("support.")
  ){
    return tr(value, {}, fallback || value);
  }

  return value;
}

function logout(){
  localStorage.removeItem("tp_token");
  localStorage.removeItem("tp_user_email");
  localStorage.removeItem("tp_user_id");
  location.href = "/auth.html?mode=login";
}

function handleAuthMeStatus(status){
  if(status === 401){
    logout();
    return true;
  }

  if(status === 403){
    localStorage.removeItem("tp_token");
    localStorage.removeItem("tp_user_email");
    localStorage.removeItem("tp_user_id");
    location.href = "/banned.html";
    return true;
  }

  return false;
}

function handlePanelStatus(status){
  if(status === 401){
    logout();
    return true;
  }

  if(status === 403){
    location.href = "/";
    return true;
  }

  return false;
}

function getRoleLabel(role){
  const keyMap = {
    support: "common.badges.support",
    admin: "common.badges.admin",
    super_admin: "common.badges.super_admin"
  };

  return tr(keyMap[role] || "", {}, role || "—");
}

function applyStaticTexts(){
  if(window.tpI18n && typeof window.tpI18n.apply === "function"){
    window.tpI18n.apply();
  }

  const rolePill = document.getElementById("rolePill");
  if(rolePill){
    rolePill.textContent = `${tr("page.rolePrefix", {}, "Роль")}: ${getRoleLabel(userRole)}`;
  }
}

function formatWait(ts){
  const diff = Date.now() - Number(ts || 0);
  const minutes = Math.floor(diff / 60000);

  if(minutes < 60){
    return tr("page.wait.minutes", { count: minutes }, `${minutes} мин.`);
  }

  const hours = Math.floor(minutes / 60);
  const restMinutes = minutes % 60;

  return tr(
    "page.wait.hoursMinutes",
    { hours, minutes: restMinutes },
    `${hours} ч. ${restMinutes} мин.`
  );
}

function getStatusText(status){
  if(status === "waiting") return tr("page.status.waiting", {}, "Ожидает ответа");
  if(status === "in_progress") return tr("page.status.in_progress", {}, "В процессе");
  if(status === "resolved") return tr("page.status.resolved", {}, "Решено");
  return status;
}

function badge(status){
  return '<span class="badge ' + esc(status) + '">' + esc(getStatusText(status)) + '</span>';
}

async function loadMe(){
  const r = await fetch("/auth/me", {
    headers:{ Authorization:"Bearer " + token }
  });

  if(handleAuthMeStatus(r.status)){
    return false;
  }

  const d = await r.json().catch(() => ({}));

  if(!d.success){
    logout();
    return false;
  }

  userRole = d.user.role || "";

  if(!SUPPORT_PANEL_ROLES.has(userRole)){
    location.href = "/";
    return false;
  }

  const adminBackBtn = document.getElementById("adminBackBtn");
  if(adminBackBtn && !ADMIN_PANEL_ROLES.has(userRole)){
    adminBackBtn.classList.add("hidden");
  }

  applyStaticTexts();
  socket.emit("auth", { token });

  return true;
}

async function loadStats(){
  const r = await fetch("/api/support/stats", {
    headers:{ Authorization:"Bearer " + token }
  });

  if(handlePanelStatus(r.status)){
    return;
  }

  const d = await r.json().catch(() => ({}));
  if(!d.success) return;

  document.getElementById("statWaiting").textContent = d.stats.waiting ?? 0;
  document.getElementById("statInProgress").textContent = d.stats.in_progress ?? 0;
  document.getElementById("statResolved").textContent = d.stats.resolved ?? 0;
  document.getElementById("statTotal").textContent = d.stats.total ?? 0;
}

async function loadTickets(){
  const status = document.getElementById("statusFilter").value;
  const assigned = document.getElementById("assignedFilter").value;

  let url = "/api/support/tickets?";
  if(status) url += "status=" + encodeURIComponent(status) + "&";
  if(assigned) url += "assigned=" + encodeURIComponent(assigned) + "&";

  const r = await fetch(url, {
    headers:{ Authorization:"Bearer " + token }
  });

  if(handlePanelStatus(r.status)){
    return;
  }

  const d = await r.json().catch(() => ({}));
  const list = document.getElementById("ticketList");

  if(!d.success){
    list.innerHTML = `<div class="empty">${tr("page.empty.loadFailed", {}, "Ошибка загрузки тикетов")}</div>`;
    return;
  }

  const tickets = Array.isArray(d.tickets) ? d.tickets : [];

  tickets.sort((a,b) => {
    if(a.category === "order" && b.category !== "order") return -1;
    if(b.category === "order" && a.category !== "order") return 1;

    if(a.status === "waiting" && b.status !== "waiting") return -1;
    if(b.status === "waiting" && a.status !== "waiting") return 1;

    return (b.updatedAt || b.createdAt || 0) - (a.updatedAt || a.createdAt || 0);
  });

  if(!tickets.length){
    list.innerHTML = `<div class="empty">${tr("page.empty.noTickets", {}, "Тикетов нет")}</div>`;
    return;
  }

  list.innerHTML = "";

  tickets.forEach(t => {
    const div = document.createElement("div");
    div.className = "ticket";

    const waitBase = Number(t.updatedAt || t.createdAt || 0);
    const isLate = t.status === "waiting" && (Date.now() - waitBase > 10 * 60 * 1000);

    const waitLine = t.status === "waiting"
      ? '<div class="wait-time ' + (isLate ? 'late' : '') + '">' +
          esc(tr("page.wait.label", {}, "Ждёт")) + ': ' + esc(formatWait(waitBase)) +
        '</div>'
      : '';

    const categoryLabel = resolveMaybeI18n(
      t.categoryLabel || t.category,
      tr("common.uncategorized", {}, "Без категории")
    );

    const subjectText = resolveMaybeI18n(
      t.subject,
      tr("common.untitled", {}, "Без названия")
    );

    const priorityChip = t.priority === "high"
      ? '<div class="meta-chip priority-high">' + esc(tr("page.priority.highLabel", {}, "Высокий приоритет")) + '</div>'
      : '';

    const orderChip = t.orderId
      ? `<div class="meta-chip">${esc(tr("page.meta.order", {}, "Заказ"))}: ${esc(t.orderId)}</div>`
      : '';

    const reportChip = t.userId
      ? `<div class="meta-chip">${esc(tr("page.meta.userId", {}, "ID пользователя"))}: ${esc(t.userId)}</div>`
      : '';

    const offerChip = t.offerId
      ? `<div class="meta-chip">${esc(tr("page.meta.offerId", {}, "ID объявления"))}: ${esc(t.offerId)}</div>`
      : '';

    const unreadChip = t.unread > 0
      ? `<div class="meta-chip unread">${esc(tr("page.meta.newCount", { count: t.unread }, `Новых: ${t.unread}`))}</div>`
      : '';

    const creatorName = t.creator?.username || tr("page.meta.createdByFallback", {}, "Пользователь");
    const creatorId = t.creator?.userId
      ? ` (${esc(tr("page.meta.userIdShort", { id: t.creator.userId }, `ID ${t.creator.userId}`))})`
      : "";

    const creatorLine = `${tr("page.meta.createdBy", {}, "Создал")}: ${creatorName}${creatorId}`;

    const lastMessageLine =
      t.lastMessageFrom === "user"
        ? tr("page.meta.lastReplyUser", {}, "Последний ответ: пользователь")
        : t.lastMessageFrom === "support"
          ? tr("page.meta.lastReplySupport", {}, "Последний ответ: поддержка")
          : tr("page.meta.noMessages", {}, "Сообщений пока нет");

    const assignedText = t.assignedTo
      ? `${tr("page.meta.assignedTo", {}, "Ответственный")}: ${esc(t.assignedUsername || t.assignedTo)}${t.assignedUserId ? ` (${esc(tr("page.meta.userIdShort", { id: t.assignedUserId }, `ID ${t.assignedUserId}`))})` : ""}`
      : `${tr("page.meta.assignedTo", {}, "Ответственный")}: ${tr("page.meta.unassigned", {}, "не назначен")}`;

    div.innerHTML = `
      <div class="ticket-main">
        <div class="ticket-top">
          <div class="ticket-id">${esc(t.shortId || t.id || "")}</div>
          ${badge(t.status)}
        </div>

        <div class="ticket-subject">${esc(subjectText)}</div>

        <div class="ticket-meta">
          <div class="meta-chip">${esc(categoryLabel)}</div>
          ${priorityChip}
          ${orderChip}
          ${reportChip}
          ${offerChip}
          ${unreadChip}
        </div>

        ${waitLine}
        <div class="assigned-line">${creatorLine}</div>
        <div class="assigned-line">${esc(lastMessageLine)}</div>
        <div class="assigned-line">${assignedText}</div>
      </div>

      <div class="ticket-actions">
        ${!t.assignedTo && t.status !== "resolved"
          ? `<button class="btn btn-primary" onclick="assignTicket('${esc(t.id)}')">${esc(tr("page.actions.assign", {}, "Взять"))}</button>`
          : ''}

        <button class="btn" onclick="openTicket('${esc(t.id)}')">${esc(tr("page.actions.open", {}, "Открыть"))}</button>
      </div>
    `;

    list.appendChild(div);
  });
}

async function assignTicket(id){
  const r = await fetch("/api/support/tickets/" + encodeURIComponent(id) + "/assign", {
    method:"POST",
    headers:{ Authorization:"Bearer " + token }
  });

  if(handlePanelStatus(r.status)){
    return;
  }

  const d = await r.json().catch(() => ({}));

  if(!d.success){
    alert(d.message || tr("page.errors.assignFailed", {}, "Не удалось взять тикет"));
    return;
  }

  await loadTickets();
  await loadStats();
}

function openTicket(id){
  location.href = "/support-ticket.html?id=" + encodeURIComponent(id);
}

document.getElementById("statusFilter").onchange = loadTickets;
document.getElementById("assignedFilter").onchange = loadTickets;
document.getElementById("logoutBtn").onclick = logout;

window.addEventListener("tp:lang-change", async () => {
  applyStaticTexts();
  await loadTickets();
  await loadStats();
});

Promise.resolve(window.tpI18nReady)
  .catch(() => {})
  .finally(() => {
    applyStaticTexts();

    loadMe().then((ok) => {
      if(!ok) return;
      loadTickets();
      loadStats();
    });
  });

socket.on("new-support-ticket", () => {
  loadTickets();
  loadStats();
});

socket.on("support-ticket-updated", () => {
  loadTickets();
  loadStats();
});
</script>
</body>
</html>
