<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Поддержка — Тикеты — TyPlace</title>
<link rel="stylesheet" href="/support-panel.css">
</head>
<body>

<div class="support-layout">
  <aside class="support-sidebar">
    <div class="support-brand">
      <div class="support-brand-title">TyPlace</div>
      <div class="support-brand-subtitle">Support Panel</div>
    </div>

    <nav class="support-nav">
      <a class="support-nav-link active" href="/support-admin.html">Тикеты</a>
      <a class="support-nav-link" href="/support-resolution.html">Арбитраж</a>
      <a class="support-nav-link" href="/support-official.html">Официальные сообщения</a>
    </nav>

    <div class="support-sidebar-bottom">
      <a class="support-side-btn" id="adminBackBtn" href="/admin">В админку</a>
      <button class="support-side-btn danger" id="logoutBtn" type="button">Выйти</button>
    </div>
  </aside>

  <main class="support-content">
    <div class="support-content-top">
      <div class="support-page-head">
        <h1>Тикеты поддержки</h1>
        <p>Очередь обращений пользователей и модераторов.</p>
      </div>

      <div class="role-pill" id="rolePill">Роль: ...</div>
    </div>

    <div class="stats">
      <div class="stat-box">
        <div class="stat-label">Ожидают</div>
        <div class="stat-value" id="statWaiting">0</div>
      </div>

      <div class="stat-box">
        <div class="stat-label">В процессе</div>
        <div class="stat-value" id="statInProgress">0</div>
      </div>

      <div class="stat-box">
        <div class="stat-label">Решены</div>
        <div class="stat-value" id="statResolved">0</div>
      </div>

      <div class="stat-box">
        <div class="stat-label">Всего</div>
        <div class="stat-value" id="statTotal">0</div>
      </div>
    </div>

    <div class="filters">
      <select class="select" id="statusFilter">
        <option value="">Все статусы</option>
        <option value="waiting">Ожидают ответа</option>
        <option value="in_progress">В процессе</option>
        <option value="resolved">Решены</option>
      </select>

      <select class="select" id="assignedFilter">
        <option value="">Все тикеты</option>
        <option value="me">Только мои</option>
      </select>
    </div>

    <div class="card" id="ticketList">
      <div class="empty">Загрузка...</div>
    </div>
  </main>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const token = localStorage.getItem("tp_token");

if(!token){
  location.href = "/auth.html?mode=login";
  throw new Error("No token");
}

const socket = io();
let userRole = "";

const SUPPORT_PANEL_ROLES = new Set(["support", "admin", "super_admin"]);
const ADMIN_PANEL_ROLES = new Set(["super_admin"]);

function esc(s){
  return String(s || "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function getRoleLabel(role){
  const map = {
    support: "Support",
    admin: "Admin",
    super_admin: "Super Admin"
  };
  return map[role] || role || "—";
}

function logout(){
  localStorage.removeItem("tp_token");
  location.href = "/auth.html?mode=login";
}

function formatWait(ts){
  const diff = Date.now() - Number(ts || 0);
  const minutes = Math.floor(diff / 60000);

  if(minutes < 60) return minutes + " мин.";

  const hours = Math.floor(minutes / 60);
  const restMinutes = minutes % 60;

  return hours + " ч. " + restMinutes + " мин.";
}

function badge(status){
  const map = {
    waiting: "Ожидает ответа",
    in_progress: "В процессе",
    resolved: "Решено"
  };

  return '<span class="badge ' + status + '">' + (map[status] || status) + '</span>';
}

async function loadMe(){
  const r = await fetch("/auth/me", {
    headers:{ Authorization:"Bearer " + token }
  });

  if(r.status === 401){
    logout();
    return false;
  }

  if(r.status === 403){
    localStorage.removeItem("tp_token");
    location.href = "/banned.html";
    return false;
  }

  const d = await r.json().catch(() => ({}));

  if(!d.success){
    logout();
    return false;
  }

  userRole = d.user.role || "";
  document.getElementById("rolePill").textContent = "Роль: " + getRoleLabel(userRole);

  if(!SUPPORT_PANEL_ROLES.has(userRole)){
    location.href = "/";
    return false;
  }

  const adminBackBtn = document.getElementById("adminBackBtn");
  if(adminBackBtn && !ADMIN_PANEL_ROLES.has(userRole)){
    adminBackBtn.classList.add("hidden");
  }

  socket.emit("auth", { token });
  return true;
}

async function loadStats(){
  const r = await fetch("/api/support/stats", {
    headers:{ Authorization:"Bearer " + token }
  });

  if(r.status === 401){
    logout();
    return;
  }

  if(r.status === 403){
    localStorage.removeItem("tp_token");
    location.href = "/banned.html";
    return;
  }

  const d = await r.json().catch(() => ({}));
  if(!d.success) return;

  document.getElementById("statWaiting").textContent = d.stats.waiting ?? 0;
  document.getElementById("statInProgress").textContent = d.stats.in_progress ?? 0;
  document.getElementById("statResolved").textContent = d.stats.resolved ?? 0;
  document.getElementById("statTotal").textContent = d.stats.total ?? 0;
}

async function loadTickets(){
  const status = document.getElementById("statusFilter").value;
  const assigned = document.getElementById("assignedFilter").value;

  let url = "/api/support/tickets?";
  if(status) url += "status=" + encodeURIComponent(status) + "&";
  if(assigned) url += "assigned=" + encodeURIComponent(assigned) + "&";

  const r = await fetch(url, {
    headers:{ Authorization:"Bearer " + token }
  });

  if(r.status === 401){
    logout();
    return;
  }

  if(r.status === 403){
    localStorage.removeItem("tp_token");
    location.href = "/banned.html";
    return;
  }

  const d = await r.json().catch(() => ({}));
  const list = document.getElementById("ticketList");

  if(!d.success){
    list.innerHTML = '<div class="empty">Ошибка загрузки тикетов</div>';
    return;
  }

  const tickets = Array.isArray(d.tickets) ? d.tickets : [];

  tickets.sort((a,b) => {
    if(a.category === "order" && b.category !== "order") return -1;
    if(b.category === "order" && a.category !== "order") return 1;

    if(a.status === "waiting" && b.status !== "waiting") return -1;
    if(b.status === "waiting" && a.status !== "waiting") return 1;

    return (b.updatedAt || b.createdAt || 0) - (a.updatedAt || a.createdAt || 0);
  });

  if(!tickets.length){
    list.innerHTML = '<div class="empty">Тикетов нет</div>';
    return;
  }

  list.innerHTML = "";

  tickets.forEach(t => {
    const div = document.createElement("div");
    div.className = "ticket";

    const waitBase = Number(t.updatedAt || t.createdAt || 0);
    const isLate = t.status === "waiting" && (Date.now() - waitBase > 10 * 60 * 1000);

    const waitLine = t.status === "waiting"
      ? '<div class="wait-time ' + (isLate ? 'late' : '') + '">Ждёт: ' + formatWait(waitBase) + '</div>'
      : '';

    const categoryLabel = esc(t.categoryLabel || t.category || "Без категории");
    const subjectText = esc(t.subject || "");
    const shortIdText = esc(t.shortId || t.id || "");

    const priorityChip = t.priority === "high"
      ? '<div class="meta-chip priority-high">Высокий приоритет</div>'
      : '';

    const orderChip = t.orderId
      ? `<div class="meta-chip">Заказ: ${esc(t.orderId)}</div>`
      : '';

    const reportChip = t.userId
      ? `<div class="meta-chip">ID пользователя: ${esc(t.userId)}</div>`
      : '';

    const offerChip = t.offerId
      ? `<div class="meta-chip">ID объявления: ${esc(t.offerId)}</div>`
      : '';

    const unreadChip = t.unread > 0
      ? `<div class="meta-chip unread">Новых: ${t.unread}</div>`
      : '';

    const creatorLine = t.creator
      ? `Создал: ${esc(t.creator.username)}${t.creator.userId ? ` (ID ${esc(t.creator.userId)})` : ""}`
      : "Создал: Пользователь";

    const lastMessageLine =
      t.lastMessageFrom === "user"
        ? "Последний ответ: пользователь"
        : t.lastMessageFrom === "support"
          ? "Последний ответ: поддержка"
          : "Сообщений пока нет";

    const assignedText = t.assignedTo
      ? `Ответственный: ${esc(t.assignedUsername || t.assignedTo)}${t.assignedUserId ? ` (ID ${esc(t.assignedUserId)})` : ""}`
      : "Ответственный: не назначен";

    div.innerHTML = `
      <div class="ticket-main">
        <div class="ticket-top">
          <div class="ticket-id">${shortIdText}</div>
          ${badge(t.status)}
        </div>

        <div class="ticket-subject">${subjectText}</div>

        <div class="ticket-meta">
          <div class="meta-chip">${categoryLabel}</div>
          ${priorityChip}
          ${orderChip}
          ${reportChip}
          ${offerChip}
          ${unreadChip}
        </div>

        ${waitLine}
        <div class="assigned-line">${creatorLine}</div>
        <div class="assigned-line">${lastMessageLine}</div>
        <div class="assigned-line">${assignedText}</div>
      </div>

      <div class="ticket-actions">
        ${!t.assignedTo && t.status !== "resolved"
          ? `<button class="btn btn-primary" onclick="assignTicket('${t.id}')">Взять</button>`
          : ''}

        <button class="btn" onclick="openTicket('${t.id}')">Открыть</button>
      </div>
    `;

    list.appendChild(div);
  });
}

async function assignTicket(id){
  const r = await fetch("/api/support/tickets/" + encodeURIComponent(id) + "/assign", {
    method:"POST",
    headers:{ Authorization:"Bearer " + token }
  });

  if(r.status === 401){
    logout();
    return;
  }

  const d = await r.json().catch(() => ({}));

  if(!d.success){
    alert(d.message || "Не удалось взять тикет");
    return;
  }

  await loadTickets();
  await loadStats();
}

function openTicket(id){
  location.href = "/support-ticket.html?id=" + encodeURIComponent(id);
}

document.getElementById("statusFilter").onchange = loadTickets;
document.getElementById("assignedFilter").onchange = loadTickets;
document.getElementById("logoutBtn").onclick = logout;

loadMe().then((ok) => {
  if(!ok) return;
  loadTickets();
  loadStats();
});

socket.on("new-support-ticket", () => {
  loadTickets();
  loadStats();
});

socket.on("support-ticket-updated", () => {
  loadTickets();
  loadStats();
});
</script>
</body>
</html>
