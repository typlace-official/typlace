<!DOCTYPE html>
<html lang="ru">
<head>
  <script>
    document.titleKey = "page.title";
  </script>

  <title>TyPlace</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="/header.css">
  <link rel="stylesheet" href="/footer.css">

  <style>
    body{
      margin:0;
      font-family:Inter, Arial, sans-serif;
      background:#f6f7f9;
      color:#111827;
    }

    .page{
      max-width:900px;
      margin:40px auto;
      padding:0 16px;
    }

    .section{
      background:#fff;
      border-radius:16px;
      padding:24px;
      border:1px solid #e5e7eb;
      box-shadow:0 12px 32px rgba(0,0,0,.06);
    }

    h1{
      font-size:28px;
      margin:0 0 12px;
      letter-spacing:-.2px;
    }

    h2{
      margin:30px 0 14px;
      font-size:19px;
      letter-spacing:-.15px;
    }

    p{
      line-height:1.7;
      color:#334155;
      font-size:14px;
      margin:0 0 12px;
    }

    .intro{
      color:#475569;
      font-size:14px;
      line-height:1.7;
      margin-bottom:18px;
    }

    .rule-block{
      margin-top:18px;
      padding:18px;
      border:1px solid #e5e7eb;
      border-radius:14px;
      background:#f8fafc;
    }

    .rule-title{
      font-weight:800;
      font-size:15px;
      margin-bottom:12px;
      color:#111827;
    }

    .rule-subtitle{
      font-weight:700;
      font-size:13px;
      color:#475569;
      margin-top:10px;
      margin-bottom:6px;
      text-transform:uppercase;
      letter-spacing:.02em;
    }

    .rule-subtitle.measure{
      color:#b91c1c;
    }

    .footer-note{
      margin-top:28px;
      font-size:13px;
      color:#64748b;
      line-height:1.7;
      border-top:1px solid #e5e7eb;
      padding-top:18px;
    }

    .doc-link{
      color:#2563eb;
      text-decoration:none;
      font-weight:400;
    }

    .doc-link:hover{
      text-decoration:underline;
    }

    @media(max-width:900px){
      .section{
        padding:22px;
      }

      h1{
        font-size:22px;
      }

      h2{
        font-size:17px;
      }
    }
  </style>
</head>

<div id="header-container"></div>

<main class="page-content">
  <div class="page">
    <div class="section">

      <h1 data-i18n="page.title"></h1>

</main>

<div id="footer-container"></div>

<script src="/socket.io/socket.io.js"></script>
