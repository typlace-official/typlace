<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>
  document.titleKey = "page.title";
</script>
<title data-i18n="page.title"></title>
<link rel="stylesheet" href="/support-panel.css">
</head>
<body>

<div class="support-layout">
  <aside class="support-sidebar">
    <div class="support-brand">
      <div class="support-brand-title">TyPlace</div>
      <div class="support-brand-subtitle" data-i18n="page.brand.subtitle"></div>
    </div>

    <nav class="support-nav">
      <a class="support-nav-link" href="/support-admin.html" data-i18n="page.nav.tickets"></a>
      <a class="support-nav-link" href="/support-resolution.html" data-i18n="page.nav.resolution"></a>
      <a class="support-nav-link active" href="/support-official.html" data-i18n="page.nav.official"></a>
    </nav>

    <div class="support-sidebar-bottom">
      <a class="support-side-btn" id="adminBackBtn" href="/admin" data-i18n="page.sidebar.adminBack"></a>
      <button class="support-side-btn danger" id="logoutBtn" type="button" data-i18n="page.sidebar.logout"></button>
    </div>
  </aside>

  <main class="support-content">
    <div class="support-content-top">
      <div class="support-page-head">
        <h1 data-i18n="page.heading"></h1>
        <p data-i18n="page.subheading"></p>
      </div>

      <div class="role-pill" id="rolePill"></div>
    </div>

    <div class="tool-stack">
      <div class="card card-pad">
        <div class="card-title" data-i18n="page.search.title"></div>
        <div class="card-subtitle" data-i18n="page.search.subtitle"></div>

        <div class="search-row">
          <input
            type="text"
            id="officialSearchInput"
            class="search-input"
            data-i18n-placeholder="page.search.placeholder"
          >
          <button class="btn btn-primary" id="officialSearchBtn" type="button" data-i18n="page.search.button"></button>
        </div>

        <div class="user-results" id="officialSearchResults">
          <div class="empty" data-i18n="page.empty.enterQuery"></div>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/i18n.js"></script>
<script>
const token = localStorage.getItem("tp_token");

if(!token){
  location.href = "/auth.html?mode=login";
  throw new Error("No token");
}

const socket = io();
let userRole = "";

const OFFICIAL_PAGE_ROLES = new Set(["support", "admin", "super_admin"]);
const ADMIN_PANEL_ROLES = new Set(["super_admin"]);

function esc(s){
  return String(s || "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function tr(key, params = {}, fallback = ""){
  if(typeof key !== "string" || !key.trim()){
    return fallback;
  }

  if(window.tpI18n && typeof window.tpI18n.t === "function"){
    const translated = window.tpI18n.t(key, params);
    if(translated && translated !== key){
      return translated;
    }
  }

  return fallback || key;
}

function getRoleLabel(role){
  const keyMap = {
    support: "common.badges.support",
    admin: "common.badges.admin",
    super_admin: "common.badges.super_admin"
  };

  return tr(keyMap[role] || "", {}, role || "—");
}

function logout(){
  localStorage.removeItem("tp_token");
  localStorage.removeItem("tp_user_email");
  localStorage.removeItem("tp_user_id");
  location.href = "/auth.html?mode=login";
}

function handleMeStatus(status){
  if(status === 401){
    logout();
    return true;
  }

  if(status === 403){
    localStorage.removeItem("tp_token");
    localStorage.removeItem("tp_user_email");
    localStorage.removeItem("tp_user_id");
    location.href = "/banned.html";
    return true;
  }

  return false;
}

function handlePanelStatus(status){
  if(status === 401){
    logout();
    return true;
  }

  if(status === 403){
    location.href = "/";
    return true;
  }

  return false;
}

function applyStaticTexts(){
  if(window.tpI18n && typeof window.tpI18n.apply === "function"){
    window.tpI18n.apply();
  }

  const rolePill = document.getElementById("rolePill");
  if(rolePill){
    rolePill.textContent = `${tr("page.rolePrefix", {}, "Роль")}: ${getRoleLabel(userRole)}`;
  }
}

async function loadMe(){
  const r = await fetch("/auth/me", {
    headers:{ Authorization:"Bearer " + token }
  });

  if(handleMeStatus(r.status)){
    return false;
  }

  const d = await r.json().catch(() => ({}));

  if(!d.success){
    logout();
    return false;
  }

  userRole = d.user.role || "";

  if(!OFFICIAL_PAGE_ROLES.has(userRole)){
    location.href = "/";
    return false;
  }

  const adminBackBtn = document.getElementById("adminBackBtn");
  if(adminBackBtn && !ADMIN_PANEL_ROLES.has(userRole)){
    adminBackBtn.classList.add("hidden");
  }

  applyStaticTexts();
  socket.emit("auth", { token });

  return true;
}

function renderOfficialUsers(users, query){
  const list = document.getElementById("officialSearchResults");

  if(!query){
    list.innerHTML = '<div class="empty">' + esc(tr("page.empty.enterQuery", {}, "Введите email, ник или ID пользователя")) + '</div>';
    return;
  }

  if(!Array.isArray(users) || !users.length){
    list.innerHTML = '<div class="empty">' + esc(tr("page.empty.notFound", {}, "Пользователи не найдены")) + '</div>';
    return;
  }

  list.innerHTML = "";

  users.forEach(user => {
    const row = document.createElement("div");
    row.className = "user-row";

    const main = document.createElement("div");
    main.className = "user-main";

    const name = document.createElement("div");
    name.className = "user-name";
    name.textContent = user.username || tr("page.meta.userFallback", {}, "Пользователь");

    const meta = document.createElement("div");
    meta.className = "user-meta";

    const emailChip = document.createElement("div");
    emailChip.className = "meta-chip";
    emailChip.textContent = user.email || "—";
    meta.appendChild(emailChip);

    if(user.userId){
      const idChip = document.createElement("div");
      idChip.className = "meta-chip";
      idChip.textContent = `${tr("page.meta.userId", {}, "ID")}: ${user.userId}`;
      meta.appendChild(idChip);
    }

    if(user.role){
      const roleChip = document.createElement("div");
      roleChip.className = "meta-chip";
      roleChip.textContent = `${tr("page.meta.role", {}, "Роль")}: ${getRoleLabel(user.role)}`;
      meta.appendChild(roleChip);
    }

    if(user.banned){
      const bannedChip = document.createElement("div");
      bannedChip.className = "meta-chip";
      bannedChip.textContent = tr("page.meta.banned", {}, "Заблокирован");
      meta.appendChild(bannedChip);
    }

    main.appendChild(name);
    main.appendChild(meta);

    const actions = document.createElement("div");
    actions.className = "user-actions";

    const btn = document.createElement("button");
    btn.className = "btn btn-primary";
    btn.type = "button";
    btn.textContent = tr("page.actions.openChat", {}, "Открыть чат");
    btn.onclick = () => openOfficialChat(user.email);

    actions.appendChild(btn);

    row.appendChild(main);
    row.appendChild(actions);

    list.appendChild(row);
  });
}

async function searchOfficialUsers(){
  const input = document.getElementById("officialSearchInput");
  const query = String(input.value || "").trim();
  const list = document.getElementById("officialSearchResults");

  if(!query){
    renderOfficialUsers([], "");
    return;
  }

  list.innerHTML = '<div class="empty">' + esc(tr("page.empty.searching", {}, "Поиск...")) + '</div>';

  const r = await fetch("/api/support/users/search?q=" + encodeURIComponent(query), {
    headers:{ Authorization:"Bearer " + token }
  });

  if(handlePanelStatus(r.status)){
    return;
  }

  const d = await r.json().catch(() => ({}));

  if(!d.success){
    list.innerHTML = '<div class="empty">' + esc(tr("page.errors.searchFailed", {}, "Ошибка поиска пользователей")) + '</div>';
    return;
  }

  renderOfficialUsers(d.users || [], query);
}

async function openOfficialChat(userEmail){
  const r = await fetch("/api/official/chat/by-user", {
    method:"POST",
    headers:{
      Authorization:"Bearer " + token,
      "Content-Type":"application/json"
    },
    body: JSON.stringify({ userEmail })
  });

  if(handlePanelStatus(r.status)){
    return;
  }

  const d = await r.json().catch(() => ({}));

  if(!d.success || !d.chat || !d.chat.id){
    alert(d.message || tr("page.errors.openChatFailed", {}, "Не удалось открыть официальный чат"));
    return;
  }

  location.href = "/chats.html?scope=official&chat=" + encodeURIComponent(d.chat.id);
}

document.getElementById("officialSearchBtn").onclick = searchOfficialUsers;
document.getElementById("logoutBtn").onclick = logout;

document.getElementById("officialSearchInput").addEventListener("keydown", (e) => {
  if(e.key === "Enter"){
    e.preventDefault();
    searchOfficialUsers();
  }
});

window.addEventListener("tp:lang-change", () => {
  applyStaticTexts();
});

Promise.resolve(window.tpI18nReady)
  .catch(() => {})
  .finally(() => {
    applyStaticTexts();

    loadMe().then((ok) => {
      if(!ok) return;
    });
  });
</script>
</body>
</html>
