<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Поддержка — Официальные сообщения — TyPlace</title>
<link rel="stylesheet" href="/support-panel.css">
</head>
<body>

<div class="support-layout">
  <aside class="support-sidebar">
    <div class="support-brand">
      <div class="support-brand-title">TyPlace</div>
      <div class="support-brand-subtitle">Support Panel</div>
    </div>

    <nav class="support-nav">
      <a class="support-nav-link" href="/support-admin.html">Тикеты</a>
      <a class="support-nav-link" href="/support-resolution.html">Арбитраж</a>
      <a class="support-nav-link active" href="/support-official.html">Официальные сообщения</a>
    </nav>

    <div class="support-sidebar-bottom">
      <a class="support-side-btn" id="adminBackBtn" href="/admin">В админку</a>
      <button class="support-side-btn danger" id="logoutBtn" type="button">Выйти</button>
    </div>
  </aside>

  <main class="support-content">
    <div class="support-content-top">
      <div class="support-page-head">
        <h1>Официальные сообщения</h1>
        <p>Поиск пользователя и переход в официальный чат от имени TyPlace.</p>
      </div>

      <div class="role-pill" id="rolePill">Роль: ...</div>
    </div>

    <div class="tool-stack">
      <div class="card card-pad">
        <div class="card-title">Поиск пользователя</div>
        <div class="card-subtitle">Введите email, ник или userId, чтобы открыть официальный чат.</div>

        <div class="search-row">
          <input
            type="text"
            id="officialSearchInput"
            class="search-input"
            placeholder="Email, ник или ID пользователя"
          >
          <button class="btn btn-primary" id="officialSearchBtn" type="button">Найти</button>
        </div>

        <div class="user-results" id="officialSearchResults">
          <div class="empty">Введите email, ник или ID пользователя</div>
        </div>
      </div>

    </div>
  </main>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const token = localStorage.getItem("tp_token");

if(!token){
  location.href = "/auth.html?mode=login";
  throw new Error("No token");
}

const socket = io();
let userRole = "";

const OFFICIAL_PAGE_ROLES = new Set(["support", "admin", "super_admin"]);
const ADMIN_PANEL_ROLES = new Set(["super_admin"]);

function esc(s){
  return String(s || "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function getRoleLabel(role){
  const map = {
    support: "Support",
    admin: "Admin",
    super_admin: "Super Admin"
  };
  return map[role] || role || "—";
}

function logout(){
  localStorage.removeItem("tp_token");
  location.href = "/auth.html?mode=login";
}

async function loadMe(){
  const r = await fetch("/auth/me", {
    headers:{ Authorization:"Bearer " + token }
  });

  if(r.status === 401){
    logout();
    return false;
  }

  if(r.status === 403){
    localStorage.removeItem("tp_token");
    location.href = "/banned.html";
    return false;
  }

  const d = await r.json().catch(() => ({}));

  if(!d.success){
    logout();
    return false;
  }

  userRole = d.user.role || "";
  document.getElementById("rolePill").textContent = "Роль: " + getRoleLabel(userRole);

  if(!OFFICIAL_PAGE_ROLES.has(userRole)){
    location.href = "/";
    return false;
  }

  const adminBackBtn = document.getElementById("adminBackBtn");
  if(adminBackBtn && !ADMIN_PANEL_ROLES.has(userRole)){
    adminBackBtn.classList.add("hidden");
  }

  socket.emit("auth", { token });
  return true;
}

function renderOfficialUsers(users, query){
  const list = document.getElementById("officialSearchResults");

  if(!query){
    list.innerHTML = '<div class="empty">Введите email, ник или ID пользователя</div>';
    return;
  }

  if(!Array.isArray(users) || !users.length){
    list.innerHTML = '<div class="empty">Пользователи не найдены</div>';
    return;
  }

  list.innerHTML = "";

  users.forEach(user => {
    const row = document.createElement("div");
    row.className = "user-row";

    const main = document.createElement("div");
    main.className = "user-main";

    const name = document.createElement("div");
    name.className = "user-name";
    name.textContent = user.username || "Пользователь";

    const meta = document.createElement("div");
    meta.className = "user-meta";

    const emailChip = document.createElement("div");
    emailChip.className = "meta-chip";
    emailChip.textContent = user.email || "—";
    meta.appendChild(emailChip);

    if(user.userId){
      const idChip = document.createElement("div");
      idChip.className = "meta-chip";
      idChip.textContent = "ID: " + user.userId;
      meta.appendChild(idChip);
    }

    if(user.role){
      const roleChip = document.createElement("div");
      roleChip.className = "meta-chip";
      roleChip.textContent = "Роль: " + user.role;
      meta.appendChild(roleChip);
    }

    if(user.banned){
      const bannedChip = document.createElement("div");
      bannedChip.className = "meta-chip";
      bannedChip.textContent = "Заблокирован";
      meta.appendChild(bannedChip);
    }

    main.appendChild(name);
    main.appendChild(meta);

    const actions = document.createElement("div");
    actions.className = "user-actions";

    const btn = document.createElement("button");
    btn.className = "btn btn-primary";
    btn.type = "button";
    btn.textContent = "Открыть чат";
    btn.onclick = () => openOfficialChat(user.email);

    actions.appendChild(btn);

    row.appendChild(main);
    row.appendChild(actions);

    list.appendChild(row);
  });
}

async function searchOfficialUsers(){
  const input = document.getElementById("officialSearchInput");
  const query = String(input.value || "").trim();
  const list = document.getElementById("officialSearchResults");

  if(!query){
    renderOfficialUsers([], "");
    return;
  }

  list.innerHTML = '<div class="empty">Поиск...</div>';

  const r = await fetch("/api/support/users/search?q=" + encodeURIComponent(query), {
    headers:{ Authorization:"Bearer " + token }
  });

  if(r.status === 401){
    logout();
    return;
  }

  if(r.status === 403){
    localStorage.removeItem("tp_token");
    location.href = "/banned.html";
    return;
  }

  const d = await r.json().catch(() => ({}));

  if(!d.success){
    list.innerHTML = '<div class="empty">Ошибка поиска пользователей</div>';
    return;
  }

  renderOfficialUsers(d.users || [], query);
}

async function openOfficialChat(userEmail){
  const r = await fetch("/api/official/chat/by-user", {
    method:"POST",
    headers:{
      Authorization:"Bearer " + token,
      "Content-Type":"application/json"
    },
    body: JSON.stringify({ userEmail })
  });

  if(r.status === 401){
    logout();
    return;
  }

  if(r.status === 403){
    localStorage.removeItem("tp_token");
    location.href = "/banned.html";
    return;
  }

  const d = await r.json().catch(() => ({}));

  if(!d.success || !d.chat || !d.chat.id){
    alert(d.message || "Не удалось открыть официальный чат");
    return;
  }

  location.href = "/chats.html?scope=official&id=" + encodeURIComponent(d.chat.id);
}

document.getElementById("officialSearchBtn").onclick = searchOfficialUsers;

document.getElementById("logoutBtn").onclick = logout;

document.getElementById("officialSearchInput").addEventListener("keydown", (e) => {
  if(e.key === "Enter"){
    e.preventDefault();
    searchOfficialUsers();
  }
});

loadMe();

</script>
</body>
</html>
