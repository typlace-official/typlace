<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>История обращений — TyPlace</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="/header.css">
  <link rel="stylesheet" href="/footer.css">

  <style>
    body{
      margin:0;
      font-family:Inter, Arial, sans-serif;
      background:#f6f7f9;
      color:#111827;
    }

.page{
  max-width:1000px;
  margin:24px auto;
  padding:0 12px;
}


h1{
  font-size:24px;
  margin:20px 0 24px 0;
}
    .layout{
      display:grid;
      grid-template-columns:320px 1fr;
      gap:16px;
    }

    @media(max-width:900px){
      .layout{ grid-template-columns:1fr; }
    }

    .card{
      background:#fff;
      border:1px solid #e5e7eb;
      border-radius:16px;
      overflow:hidden;
    }

    .ticket{
      padding:14px;
      border-top:1px solid #f3f4f6;
      cursor:pointer;
    }

    .ticket:hover{
      background:#f9fafb;
    }

    .ticket.active{
      background:#eef2ff;
    }

    .ticket-title{
      font-weight:800;
      font-size:14px;
      margin-bottom:6px;
    }

    .ticket-meta{
      font-size:12px;
      color:#6b7280;
      font-weight:700;
    }

    .messages{
      padding:16px;
      display:flex;
      flex-direction:column;
      gap:12px;
      max-height:500px;
      overflow:auto;
    }

    .msg{
      max-width:70%;
      padding:10px 14px;
      border-radius:14px;
      font-weight:700;
      font-size:14px;
      white-space:pre-wrap;
    }

    .me{
      align-self:flex-end;
      background:#1E50D4;
      color:#fff;
    }

    .support{
      background:#f3f4f6;
    }

    .reply{
      padding:16px;
      border-top:1px solid #e5e7eb;
      display:flex;
      gap:10px;
    }

    .textarea{
      flex:1;
      border:1px solid #e5e7eb;
      border-radius:12px;
      padding:10px;
      font-weight:700;
      resize:vertical;
    }

    .btn{
      border:none;
      border-radius:12px;
      padding:12px 18px;
      font-weight:900;
      cursor:pointer;
    }

    .btn-primary{
      background:#1E50D4;
      color:#fff;
    }

    .btn-danger{
      background:#fee2e2;
      color:#b91c1c;
    }

.empty{
  padding:40px 20px;
  text-align:center;
  color:#9ca3af;   /* светло-серый */
  font-weight:500; /* тоньше */
  font-size:15px;
}

.support-nav{
  max-width:1100px;
  margin:20px auto 0 auto;
  padding:0 16px;

  display:flex;
  align-items:center;
  gap:6px;              /* вместо margin */
  
  font-size:13px;
  font-weight:600;
  color:#6b7280;
}

.support-nav a,
.support-nav .current{
  text-decoration:none;
  color:#6b7280;
}

.support-nav a:hover{
  color:#111827;
}

.support-nav .current{
  color:#111827;
}
.filters{
  display:flex;
  gap:8px;
  margin-bottom:20px;
  flex-wrap:wrap;
}

.filter-pill{
  display:inline-flex;
  align-items:center;
  justify-content:center;

  padding:8px 14px;
  border:1px solid #e5e7eb;
  border-radius:999px;

  background:#fff;
  font-size:14px;
  font-weight:600;
  cursor:pointer;
  transition:0.15s;
}

.filter-pill:hover{
  background:#f3f4f6;
}

.filter-pill.active{
  background:#111827;
  color:#fff;
  border-color:#111827;
}

.tickets{
  display:grid;
  grid-template-columns:repeat(3, 1fr);
  gap:16px;
}

@media(max-width:1100px){
  .tickets{
    grid-template-columns:repeat(2, 1fr);
  }
}

@media(max-width:700px){
  .tickets{
    grid-template-columns:1fr;
  }
}

.ticket-card{
  background:#fff;
  border:1px solid #e5e7eb;
  border-radius:12px;
  padding:16px;
  cursor:pointer;
  transition:all 0.2s ease;

  display:flex;
  flex-direction:column;
  justify-content:space-between;

  min-height:160px;
}


.ticket-id{
  font-weight:700;
  font-size:14px;
}

.ticket-category{
  font-size:12px;
  color:#6b7280;
  font-weight:600;
}

.ticket-subject{
  font-size:15px;
  font-weight:700;

  overflow:hidden;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
}

.ticket-bottom{
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:4px;
  font-size:12px;
  color:#6b7280;
}

.ticket-order{
  font-weight:600;
}



.ticket-top{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:8px;
  margin-bottom:8px;
}

.ticket-title{
  font-weight:700;
  font-size:15px;
}

.ticket-date{
  font-size:12px;
  color:#6b7280;
}

.ticket-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.ticket-status{
  display:inline-flex;
  align-items:center;

  padding:8px 14px;
  border-radius:8px;     /* не 999px */

  font-size:13px;
  font-weight:600;
  letter-spacing:0.2px;

  color:#fff;
}

.ticket-sidebar{
  width:340px;
}

.sidebar-card{
  background:#fff;
  border-radius:16px;
  border:1px solid #e5e7eb;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:12px;
  font-size:14px;
}

.close-ticket-btn{
  margin-top:10px;
  border:none;
  border-radius:12px;
  padding:10px;
  font-weight:700;
  cursor:pointer;
  background:#f3f4f6;
}

.ticket-status.waiting{
  background:#16a34a; /* зелёный */
  color:#fff;
}

.ticket-status.in_progress{
  background:#f59e0b; /* оранжевый */
  color:#fff;
}

.ticket-status.resolved{
  background:#6b7280; /* серый */
  color:#fff;
}

@media (max-width:640px){

h1{
  font-size:20px;
  margin:16px 0 20px 0;
}

.page{
  margin:16px auto;
}

.tickets{
  grid-template-columns:1fr;
  gap:12px;
}

.ticket-card{
  padding:14px;
  min-height:auto;
}

.ticket-top{
  align-items:flex-start;
  gap:6px;
}

.ticket-id{
  font-size:13px;
}

.ticket-status{
  font-size:11px;
  padding:5px 8px;
}

.ticket-subject{
  font-size:14px;
}

.ticket-bottom{
  font-size:11px;
}

}
  </style>
</head>

<body>

<div id="header-container"></div>
<main class="page-content">
<div class="support-nav">
  <a href="/help.html">Главная</a>
  <span>/</span>
  <span class="current">История обращений</span>
</div>

<div class="page">
  <h1>История обращений</h1>

<div style="margin-bottom:20px;">
<select id="statusFilter" style="
  height:38px;
  border-radius:10px;
  border:1px solid #e5e7eb;
  background:#fff;
  padding:0 10px;
  font-size:14px;
  font-weight:600;
  cursor:pointer;
  outline:none;
  max-width:180px;
">
    <option value="all">Статус</option>
    <option value="waiting">Ожидает ответа</option>
    <option value="in_progress">В процессе</option>
    <option value="resolved">Решено</option>
  </select>
</div>

<div class="tickets" id="ticketList"></div>

</div>
</main>
<div id="footer-container"></div>

<script src="/socket.io/socket.io.js"></script>
<script src="/games.list.js"></script>
<script src="/i18n.js"></script>
<script src="/header.js"></script>
<script src="/footer.js"></script>


<script>
const token = localStorage.getItem("tp_token");
if(!token){
  location.href = "/auth.html?mode=login";
}

const ticketListEl = document.getElementById("ticketList");

let tickets = [];
let currentFilter = "all";

function getStatusText(status){
  if(status === "waiting") return "Ожидает ответа";
  if(status === "in_progress") return "В процессе";
  if(status === "resolved") return "Решено";
  return status;
}
function formatDate(ts){
  const d = new Date(ts);
  return d.toLocaleDateString("ru-RU") + " " +
         d.toLocaleTimeString("ru-RU",{hour:"2-digit",minute:"2-digit"});
}

async function loadTickets(){

const r = await fetch("/api/support/my",{
    headers:{ Authorization:"Bearer " + token }
  });

  const d = await r.json();

  if(!d.success){
    ticketListEl.innerHTML = "<div class='empty'>Ошибка</div>";
    return;
  }

  tickets = d.tickets || [];

  renderTickets();
}

function renderTickets(){

  tickets.sort((a,b)=>{
    if(a.status === "resolved" && b.status !== "resolved") return 1;
    if(a.status !== "resolved" && b.status === "resolved") return -1;
    return b.createdAt - a.createdAt;
  });

  let filtered = tickets;

  if(currentFilter !== "all"){
    filtered = tickets.filter(t => t.status === currentFilter);
  }

  if(!filtered.length){
    ticketListEl.innerHTML = "<div class='empty'>Обращений нет</div>";
    return;
  }

  ticketListEl.innerHTML = "";

  filtered.forEach(t => {

    const card = document.createElement("div");
    card.className = "ticket-card";

card.innerHTML = `
  <div class="ticket-top">
    <div class="ticket-id">
      Обращение ${t.shortId || t.id}
    </div>

    <div class="ticket-status ${t.status}">
      ${getStatusText(t.status)}
    </div>
  </div>

  <div class="ticket-category">
    ${t.categoryLabel || t.category || "Без категории"}
  </div>

  <div class="ticket-subject">
    ${t.subject}
  </div>

  <div class="ticket-bottom">
    <div>
      ${formatDate(t.createdAt)}
    </div>

    ${
      t.orderId
        ? `<div class="ticket-order">Заказ: ${t.orderId}</div>`
        : ""
    }
  </div>
`;

    card.onclick = () => {
      location.href = "/support-ticket.html?id=" + t.id;
    };

    ticketListEl.appendChild(card);
  });
}

/* FILTER LOGIC */
const statusFilter = document.getElementById("statusFilter");

statusFilter.addEventListener("change", () => {
  currentFilter = statusFilter.value;
  renderTickets();
});

loadTickets();

const socket = io();

socket.on("connect", () => {
  socket.emit("auth", { token });
});

socket.on("new-support-message", () => {
  loadTickets();
});

socket.on("support-ticket-updated", () => {
  loadTickets();
});

</script>

</body>
</html>
