<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <script>
    document.titleKey = "page.title";
  </script>
  <title data-i18n="page.title"></title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="/header.css">
  <link rel="stylesheet" href="/footer.css">

  <style>
    :root{
      --tp-header-space: 110px;
      --tp-page-bg: #f6f7f9;
      --tp-card-bg: #ffffff;
      --tp-text: #111827;
      --tp-muted: #6b7280;
      --tp-muted-soft: #9ca3af;
      --tp-border: #e5e7eb;
      --tp-primary: #1E50D4;
      --tp-primary-soft: #eef2ff;
      --tp-empty-shadow: rgba(79,125,243,.16);
    }

    html,
    body{
      margin:0;
      padding:0;
      min-height:100%;
      background:var(--tp-page-bg);
    }

    body{
      min-height:100svh;
      font-family:Inter, Arial, sans-serif;
      color:var(--tp-text);
    }

    .page-content{
      min-height:100svh;
      padding-top:var(--tp-header-space);
      box-sizing:border-box;
    }

    .page{
      width:100%;
    }

    .container{
      width:100%;
      max-width:1100px;
      min-height:calc(100svh - var(--tp-header-space));
      margin:0 auto;
      padding:10px 16px 40px;
      box-sizing:border-box;
      display:flex;
      flex-direction:column;
    }

    .support-nav{
      display:flex;
      align-items:center;
      flex-wrap:wrap;
      gap:6px;
      margin:0 0 10px;
      font-size:13px;
      font-weight:600;
      color:var(--tp-muted);
    }

    .support-nav a,
    .support-nav .current{
      text-decoration:none;
      color:var(--tp-muted);
    }

    .support-nav a:hover{
      color:var(--tp-text);
    }

    .support-nav .current{
      color:var(--tp-text);
    }

    .page-title{
      font-size:24px;
      line-height:1.2;
      margin:0 0 20px;
    }

    .toolbar{
      display:flex;
      align-items:center;
      justify-content:flex-start;
      margin:0 0 20px;
    }

    .status-select{
      height:42px;
      min-width:190px;
      border-radius:12px;
      border:1px solid var(--tp-border);
      background:#fff;
      padding:0 12px;
      font-size:14px;
      font-weight:600;
      cursor:pointer;
      outline:none;
      color:var(--tp-text);
      box-sizing:border-box;
    }

    .status-select:focus{
      border-color:#cbd5e1;
      box-shadow:0 0 0 3px rgba(30,80,212,.08);
    }

    .tickets{
      display:grid;
      grid-template-columns:repeat(3, 1fr);
      gap:16px;
    }

    .ticket-card{
      background:#fff;
      border:1px solid var(--tp-border);
      border-radius:16px;
      padding:16px;
      cursor:pointer;
      transition:transform .15s ease, box-shadow .15s ease, border-color .15s ease, background .15s ease;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      gap:14px;
      min-height:168px;
      box-sizing:border-box;
    }

    .ticket-card:hover{
      transform:translateY(-1px);
      box-shadow:0 10px 30px rgba(17,24,39,.06);
      border-color:#dbe3f3;
      background:#fcfcfd;
    }

    .ticket-top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:10px;
    }

    .ticket-id{
      font-weight:800;
      font-size:14px;
      line-height:1.35;
    }

    .ticket-status{
      display:inline-flex;
      align-items:center;
      padding:8px 12px;
      border-radius:10px;
      font-size:12px;
      font-weight:700;
      letter-spacing:.2px;
      color:#fff;
      white-space:nowrap;
      flex:0 0 auto;
    }

    .ticket-status.waiting{
      background:#16a34a;
    }

    .ticket-status.in_progress{
      background:#f59e0b;
    }

    .ticket-status.resolved{
      background:#6b7280;
    }

    .ticket-category{
      font-size:12px;
      color:var(--tp-muted);
      font-weight:700;
      line-height:1.4;
    }

    .ticket-subject{
      font-size:15px;
      font-weight:800;
      line-height:1.4;
      overflow:hidden;
      display:-webkit-box;
      -webkit-line-clamp:2;
      -webkit-box-orient:vertical;
    }

    .ticket-bottom{
      display:flex;
      justify-content:space-between;
      align-items:flex-end;
      flex-wrap:wrap;
      gap:6px 10px;
      font-size:12px;
      color:var(--tp-muted);
      line-height:1.4;
    }

    .ticket-order{
      font-weight:700;
    }

    .empty-state{
      display:none;
      flex:1;
      width:min(100%, 520px);
      margin:0 auto;
      padding:24px 12px 0;
      box-sizing:border-box;
      align-items:center;
      justify-content:center;
      text-align:center;
    }

    .empty-state.show{
      display:flex;
    }

    .empty-inner{
      width:100%;
      max-width:360px;
    }

    .empty-illustration{
      width:min(230px, 68vw);
      margin:0 auto 20px;
      filter:drop-shadow(0 20px 40px var(--tp-empty-shadow));
    }

    .empty-illustration svg{
      display:block;
      width:100%;
      height:auto;
    }

    .empty-title{
      margin:0 0 10px;
      font-size:28px;
      line-height:1.15;
      font-weight:800;
      color:var(--tp-text);
    }

    .empty-text{
      margin:0;
      color:#8b95a7;
      font-size:16px;
      line-height:1.5;
      font-weight:400;
    }

    @media (max-width:1100px){
      .tickets{
        grid-template-columns:repeat(2, 1fr);
      }
    }

    @media (max-width:700px){
      .tickets{
        grid-template-columns:1fr;
        gap:12px;
      }
    }

    @media (max-width:640px){
      :root{
        --tp-header-space: 126px;
      }

      .container{
        padding:8px 14px calc(130px + env(safe-area-inset-bottom, 0px));
      }

      .page-title{
        font-size:22px;
        margin:0 0 18px;
      }

      .toolbar{
        margin:0 0 18px;
      }

      .status-select{
        width:100%;
        min-width:0;
      }

      .ticket-card{
        padding:14px;
        min-height:auto;
        gap:12px;
      }

      .ticket-top{
        gap:8px;
      }

      .ticket-id{
        font-size:13px;
      }

      .ticket-status{
        font-size:11px;
        padding:6px 9px;
      }

      .ticket-subject{
        font-size:14px;
      }

      .ticket-bottom{
        font-size:11px;
      }

      .empty-state{
        padding:8px 0 0;
      }

      .empty-title{
        font-size:24px;
      }

      .empty-text{
        font-size:15px;
      }
    }
  </style>
</head>

<body>

<div id="header-container"></div>

<main class="page-content">
  <div class="page">
    <div class="container">

      <div class="support-nav">
        <a href="/help.html" data-i18n="page.nav.home"></a>
        <span>/</span>
        <span class="current" data-i18n="page.nav.current"></span>
      </div>

      <h1 class="page-title" data-i18n="page.heading"></h1>

      <div class="toolbar">
        <select id="statusFilter" class="status-select">
          <option value="all" data-i18n="page.filters.all"></option>
          <option value="waiting" data-i18n="page.filters.waiting"></option>
          <option value="in_progress" data-i18n="page.filters.in_progress"></option>
          <option value="resolved" data-i18n="page.filters.resolved"></option>
        </select>
      </div>

      <div class="tickets" id="ticketList"></div>

      <div id="emptyState" class="empty-state">
        <div class="empty-inner">
          <div class="empty-illustration" aria-hidden="true">
            <svg viewBox="0 0 260 220" xmlns="http://www.w3.org/2000/svg" fill="none">
              <defs>
                <linearGradient id="historyBubbleFill" x1="48" y1="44" x2="208" y2="184" gradientUnits="userSpaceOnUse">
                  <stop offset="0" stop-color="#ffffff" stop-opacity=".92"/>
                  <stop offset=".48" stop-color="#eef3ff" stop-opacity=".82"/>
                  <stop offset="1" stop-color="#dce8ff" stop-opacity=".68"/>
                </linearGradient>

                <linearGradient id="historyBubbleStroke" x1="56" y1="50" x2="204" y2="182" gradientUnits="userSpaceOnUse">
                  <stop offset="0" stop-color="#5f89f8" stop-opacity=".62"/>
                  <stop offset="1" stop-color="#7ea2ff" stop-opacity=".24"/>
                </linearGradient>

                <radialGradient id="historyGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
                  gradientTransform="translate(130 110) rotate(90) scale(84 98)">
                  <stop offset="0" stop-color="#7ea2ff" stop-opacity=".28"/>
                  <stop offset=".62" stop-color="#7ea2ff" stop-opacity=".08"/>
                  <stop offset="1" stop-color="#7ea2ff" stop-opacity="0"/>
                </radialGradient>

                <filter id="historyBlur" x="-50%" y="-50%" width="200%" height="200%">
                  <feGaussianBlur stdDeviation="16"/>
                </filter>

                <filter id="historyShadow" x="-30%" y="-30%" width="160%" height="180%">
                  <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#6f95ff" flood-opacity=".14"/>
                </filter>
              </defs>

              <ellipse cx="130" cy="186" rx="62" ry="14" fill="#dfe7fb" opacity=".72"/>
              <circle cx="130" cy="112" r="72" fill="url(#historyGlow)" filter="url(#historyBlur)"/>

              <g filter="url(#historyShadow)">
                <rect x="73" y="44" width="114" height="122" rx="26"
                  fill="url(#historyBubbleFill)"
                  stroke="url(#historyBubbleStroke)"
                  stroke-width="3"/>
                <path d="M102 83h56" stroke="#4f7df3" stroke-width="6" stroke-linecap="round"/>
                <path d="M102 106h42" stroke="#7d97de" stroke-width="6" stroke-linecap="round" opacity=".9"/>
                <path d="M102 129h50" stroke="#b6c6f4" stroke-width="6" stroke-linecap="round"/>
                <circle cx="172" cy="127" r="16" fill="#f7faff" stroke="#dbe7ff" stroke-width="2"/>
                <path d="M165 127l4.5 4.5 9-10" stroke="#4f7df3" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
              </g>

              <g opacity=".86">
                <path d="M199 60v8" stroke="#6f95ff" stroke-width="3.5" stroke-linecap="round"/>
                <path d="M195 64h8" stroke="#6f95ff" stroke-width="3.5" stroke-linecap="round"/>
              </g>

              <g opacity=".7">
                <path d="M58 146v6" stroke="#7f9fff" stroke-width="3" stroke-linecap="round"/>
                <path d="M55 149h6" stroke="#7f9fff" stroke-width="3" stroke-linecap="round"/>
              </g>
            </svg>
          </div>

          <h2 id="emptyTitle" class="empty-title"></h2>
          <p id="emptyText" class="empty-text"></p>
        </div>
      </div>

    </div>
  </div>
</main>

<div id="footer-container"></div>

<script src="/socket.io/socket.io.js"></script>
<script src="/games.list.js"></script>
<script src="/i18n.js"></script>
<script src="/header.js"></script>
<script src="/footer.js"></script>

<script>
const token = localStorage.getItem("tp_token");
if(!token){
  location.href = "/auth.html?mode=login";
}

const ticketListEl = document.getElementById("ticketList");
const statusFilter = document.getElementById("statusFilter");
const emptyStateEl = document.getElementById("emptyState");
const emptyTitleEl = document.getElementById("emptyTitle");
const emptyTextEl = document.getElementById("emptyText");

let tickets = [];
let currentFilter = "all";

function getCurrentLang(){
  return window.tpI18n?.currentLang || localStorage.getItem("tp_lang") || "ru";
}

function getLocaleByLang(lang){
  if(lang === "uk") return "uk-UA";
  if(lang === "en") return "en-US";
  return "ru-RU";
}

function t(key, fallback = ""){
  if(typeof key !== "string" || !key.trim()){
    return fallback;
  }

  if(window.tpI18n && typeof window.tpI18n.t === "function"){
    const translated = window.tpI18n.t(key);
    if(translated && translated !== key){
      return translated;
    }
  }

  return fallback || key;
}

function resolveMaybeI18n(value, fallback = ""){
  if(typeof value !== "string" || !value.trim()){
    return fallback;
  }

  if(
    value.startsWith("page.") ||
    value.startsWith("common.") ||
    value.startsWith("support.")
  ){
    return t(value, fallback || value);
  }

  return value;
}

function getStatusText(status){
  if(status === "waiting") return t("page.filters.waiting", "Ожидает ответа");
  if(status === "in_progress") return t("page.filters.in_progress", "В процессе");
  if(status === "resolved") return t("page.filters.resolved", "Решено");
  return status;
}

function formatDate(ts){
  const d = new Date(ts);
  const locale = getLocaleByLang(getCurrentLang());

  return d.toLocaleDateString(locale) + " " +
         d.toLocaleTimeString(locale, { hour:"2-digit", minute:"2-digit" });
}

function updateEmptyState(visible){
  if(emptyStateEl){
    emptyStateEl.classList.toggle("show", visible);
  }

  if(ticketListEl){
    ticketListEl.style.display = visible ? "none" : "grid";
  }

  if(emptyTitleEl){
    emptyTitleEl.textContent = t("page.emptyTitle", "Пока здесь пусто");
  }

  if(emptyTextEl){
    emptyTextEl.textContent = t(
      "page.emptyText",
      currentFilter === "all"
        ? "У вас ещё нет обращений в истории."
        : "По выбранному статусу обращений пока нет."
    );
  }
}

async function loadTickets(){
  const r = await fetch("/api/support/my", {
    headers:{ Authorization:"Bearer " + token }
  });

  const d = await r.json();

  if(!d.success){
    updateEmptyState(true);

    if(emptyTitleEl){
      emptyTitleEl.textContent = t("page.errors.loadFailedTitle", "Не удалось загрузить историю");
    }

    if(emptyTextEl){
      emptyTextEl.textContent = t("page.errors.loadFailed", "Попробуйте обновить страницу позже.");
    }

    return;
  }

  tickets = d.tickets || [];
  renderTickets();
}

function renderTickets(){
  tickets.sort((a,b)=>{
    if(a.status === "resolved" && b.status !== "resolved") return 1;
    if(a.status !== "resolved" && b.status === "resolved") return -1;
    return (b.createdAt || 0) - (a.createdAt || 0);
  });

  let filtered = tickets;

  if(currentFilter !== "all"){
    filtered = tickets.filter(tk => tk.status === currentFilter);
  }

  if(!filtered.length){
    ticketListEl.innerHTML = "";
    updateEmptyState(true);
    return;
  }

  updateEmptyState(false);
  ticketListEl.innerHTML = "";

  filtered.forEach(ticket => {
    const card = document.createElement("div");
    card.className = "ticket-card";

    const categoryText = resolveMaybeI18n(
      ticket.categoryLabel || ticket.category,
      t("common.uncategorized", "Без категории")
    );

    const subjectText = resolveMaybeI18n(
      ticket.subject,
      t("common.untitled", "Без названия")
    );

    const orderHtml = ticket.orderId
      ? `<div class="ticket-order">${t("page.orderLabel", "Заказ")}: ${ticket.orderId}</div>`
      : "";

    card.innerHTML = `
      <div class="ticket-top">
        <div class="ticket-id">
          ${t("page.ticketLabel", "Обращение")} ${ticket.shortId || ticket.id}
        </div>

        <div class="ticket-status ${ticket.status}">
          ${getStatusText(ticket.status)}
        </div>
      </div>

      <div class="ticket-category">
        ${categoryText}
      </div>

      <div class="ticket-subject">
        ${subjectText}
      </div>

      <div class="ticket-bottom">
        <div>${formatDate(ticket.createdAt)}</div>
        ${orderHtml}
      </div>
    `;

    card.onclick = () => {
      location.href = "/support-ticket.html?id=" + ticket.id;
    };

    ticketListEl.appendChild(card);
  });
}

statusFilter.addEventListener("change", () => {
  currentFilter = statusFilter.value;
  renderTickets();
});

async function initPage(){
  if(window.tpI18n && typeof window.tpI18n.load === "function"){
    await window.tpI18n.load(getCurrentLang());
    window.tpI18n.apply();
  }

  await loadTickets();
}

window.addEventListener("tp:lang-change", async () => {
  if(window.tpI18n && typeof window.tpI18n.load === "function"){
    await window.tpI18n.load(getCurrentLang());
    window.tpI18n.apply();
  }

  renderTickets();
});

initPage();

const socket = io();

socket.on("connect", () => {
  socket.emit("auth", { token });
});

socket.on("new-support-message", () => {
  loadTickets();
});

socket.on("support-ticket-updated", () => {
  loadTickets();
});
</script>

</body>
</html>
