<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title data-i18n="page.title"></title>

<link rel="stylesheet" href="/header.css">
<link rel="stylesheet" href="/footer.css">
<link rel="stylesheet" href="/badges.css">
<link rel="stylesheet" href="/tp-ui.css">
<style>
:root{
  --tp-page-bg:#f6f6f6;
  --tp-panel-bg:#ffffff;
  --tp-border:#e5e7eb;
  --tp-border-soft:#eeeeee;
  --tp-text:#111111;
  --tp-muted:#777777;
  --tp-primary:#1e8bd4;

  --tp-system-bg:#ecfdf3;
  --tp-system-border:#bbf7d0;
  --tp-system-text:#14532d;
  --tp-system-badge-bg:#dcfce7;
  --tp-system-badge-text:#166534;

  --tp-resolution-bg:#f5f3ff;
  --tp-resolution-line:#ddd6fe;
  --tp-resolution-text:#5b21b6;
  --tp-resolution-name:#4c1d95;
}

*{
  box-sizing:border-box;
}

html,
body{
  height:100%;
  margin:0;
}

body{
  font-family:Arial, sans-serif;
  background:var(--tp-page-bg);
  color:var(--tp-text);
  display:flex;
  flex-direction:column;
  min-height:100dvh;
  overflow:hidden;
}

/* футер на странице чатов не нужен */
#footer-container{
  display:none !important;
}

#header-container{
  flex:0 0 auto;
}

.page-content{
  flex:1 1 auto;
  min-height:0;
  display:flex;
  overflow:hidden;
}

.wrap{
  width:100%;
  max-width:1000px;
  margin:24px auto;
  padding:0 16px;
  flex:1 1 auto;
  min-height:0;
  display:flex;
  overflow:hidden;
}

.chat-shell{
  width:100%;
  flex:1 1 auto;
  min-height:0;
  display:flex;
  gap:14px;
  overflow:hidden;
}

.panel{
  background:var(--tp-panel-bg);
  border:1px solid var(--tp-border);
  border-radius:16px;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  min-height:0;
}

/* ===== LEFT ===== */

.left{
  width:290px;
  min-width:290px;
  flex:0 0 290px;
  min-height:0;
}

.left-top{
  flex:0 0 auto;
  padding:16px 14px;
  border-bottom:1px solid var(--tp-border-soft);
  display:flex;
  gap:8px;
  align-items:center;
}

.left-title{
  font-size:22px;
  font-weight:900;
}

.chat-list{
  flex:1 1 auto;
  min-height:0;
  overflow-y:auto;
  overflow-x:hidden;
  padding:8px;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}

.chat-list::-webkit-scrollbar{
  display:none;
}

.chat-item{
  display:flex;
  gap:10px;
  padding:10px;
  border-radius:14px;
  cursor:pointer;
  align-items:center;
  transition:background .15s ease;
}

.chat-item:hover{
  background:#f4f6ff;
}

.chat-item.active{
  background:#eef2ff;
}

.chat-ava{
  width:40px;
  height:40px;
  border-radius:50%;
  background:#e9e9e9;
  border:1px solid var(--tp-border);
  overflow:hidden;
  flex:0 0 auto;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#777;
  font-weight:700;
  position:relative;
}

.chat-ava img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

.status-dot{
  position:absolute;
  right:0;
  bottom:0;
  transform:translate(35%, 35%);
  width:11px;
  height:11px;
  border-radius:50%;
  border:2px solid #fff;
}

.status-dot.online{
  background:#2ecc71;
}

.status-dot.offline{
  background:#bdbdbd;
}

.chat-meta{
  flex:1;
  min-width:0;
}

.chat-name-line{
  font-weight:700;
  font-size:14px;
  min-width:0;
  overflow:hidden;
}

.chat-name-line .tp-name-with-badge{
  display:inline-flex;
  align-items:center;
  gap:6px;
  max-width:100%;
  min-width:0;
  vertical-align:middle;
}

.chat-name-line .tp-name-text{
  display:block;
  min-width:0;
  max-width:100%;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

.chat-name-line .tp-badge{
  flex:0 0 auto;
}

.chat-status-line{
  margin-top:3px;
  font-size:12px;
  color:#666;
  display:flex;
  align-items:center;
  gap:6px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.left-empty{
  color:#999;
  text-align:center;
  padding:18px 10px;
  font-size:14px;
}

/* ===== RIGHT ===== */

.right{
  flex:1 1 auto;
  min-width:0;
  min-height:0;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

.right-top{
  flex:0 0 auto;
  padding:12px 14px;
  border-bottom:1px solid var(--tp-border-soft);
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  background:#fff;
}

.right-title{
  display:flex;
  align-items:center;
  gap:10px;
  flex:1 1 auto;
  min-width:0;
}

.right-user-meta{
  flex:1 1 auto;
  min-width:0;
}

.right-title .name{
  display:flex;
  align-items:center;
  min-width:0;
  max-width:100%;
  font-weight:800;
  overflow:hidden;
}

.right-title .sub{
  color:var(--tp-muted);
  font-size:12px;
  margin-top:2px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.right-title .name .tp-name-with-badge{
  display:inline-flex;
  align-items:center;
  gap:8px;
  max-width:100%;
  min-width:0;
  vertical-align:middle;
}

.right-title .name .tp-name-text{
  display:block;
  min-width:0;
  max-width:100%;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

.right-title .name .tp-badge{
  flex:0 0 auto;
}

.chat-actions{
  display:flex;
  align-items:center;
  gap:8px;
  flex:0 0 auto;
}

#chatMenuWrapper{
  flex:0 0 auto;
}

.chat-menu-box{
  position:relative;
}

.chat-notify-btn,
.menu-gear{
  width:36px;
  height:36px;
  border-radius:10px;
  border:none;
  background:transparent;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  -webkit-tap-highlight-color:transparent;
  outline:none;
  box-shadow:none;
}

.chat-notify-btn{
  color:#f4b400;
}

.menu-gear{
  color:#4b5563;
}

.chat-notify-btn:hover,
.chat-notify-btn:focus,
.chat-notify-btn:focus-visible,
.chat-notify-btn:active,
.menu-gear:hover,
.menu-gear:focus,
.menu-gear:focus-visible,
.menu-gear:active{
  background:transparent;
  outline:none;
  box-shadow:none;
}

.chat-notify-btn svg{
  display:block;
  width:24px;
  height:24px;
}

.menu-gear svg{
  display:block;
  width:20px;
  height:20px;
}

.notify-slash{
  position:absolute;
  width:16px;
  height:2px;
  border-radius:999px;
  background:currentColor;
  transform:rotate(-45deg) scaleX(0);
  transition:transform .18s ease;
  pointer-events:none;
}

.chat-notify-btn.is-muted{
  color:#dc2626;
}

.chat-notify-btn.is-muted .notify-slash{
  transform:rotate(-45deg) scaleX(1);
}

.chat-notify-btn.tp-bell-pop{
  animation:tpBellPop .22s ease;
}

@keyframes tpBellPop{
  0%{ transform:scale(1); }
  50%{ transform:scale(.86); }
  100%{ transform:scale(1); }
}

.chat-menu{
  position:absolute;
  right:0;
  top:52px;
  background:#fff;
  border:1px solid var(--tp-border);
  border-radius:14px;
  box-shadow:0 20px 40px rgba(0,0,0,.08);
  min-width:190px;
  padding:8px 0;
  z-index:50;
  opacity:0;
  transform:translateY(-10px);
  pointer-events:none;
  transition:all .25s ease;
}

.chat-menu.open{
  opacity:1;
  transform:translateY(0);
  pointer-events:auto;
}

.menu-item{
  padding:10px 16px;
  font-size:14px;
  cursor:pointer;
  transition:background .2s ease;
}

.menu-item:hover{
  background:#f3f4f6;
}

.menu-item.danger{
  color:#dc2626;
}

.menu-item.danger:hover{
  background:#fee2e2;
}

#offerMiniBlock{
  flex:0 0 auto;
  padding:14px 18px;
  background:#f6f7f9;
  border-bottom:1px solid var(--tp-border);
}

.mini-offer-content{
  flex:1;
  min-width:0;
  padding-right:70px;
  display:flex;
  flex-direction:column;
  gap:6px;
}

.mini-offer-title{
  font-weight:700;
  font-size:14px;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;
  line-height:1.3;
}

.mini-offer-price{
  font-size:15px;
  font-weight:800;
  color:#504e4e;
  letter-spacing:.3px;
}

.messages{
  flex:1 1 auto;
  min-height:0;
  overflow-y:auto;
  overflow-x:hidden;
  padding:20px 24px;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
  background:#fff;
}

.messages::-webkit-scrollbar{
  display:none;
}

.empty-right{
  color:#999;
  text-align:center;
  margin-top:60px;
  font-size:16px;
  font-weight:700;
}

.notice{
  flex:0 0 auto;
  padding:10px 12px;
  background:#fff6d6;
  border-top:1px solid #ffe7a3;
  color:#6b5200;
  font-size:13px;
}

.composer{
  flex:0 0 auto;
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px 12px;
  border-top:1px solid var(--tp-border-soft);
  background:#fff;
}

.composer .mini-btn{
  width:42px;
  height:42px;
  flex:0 0 42px;
  border-radius:12px;
  border:1px solid #ddd;
  background:#fff;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:24px;
  line-height:1;
}

.composer .mini-btn:hover{
  background:#f5f5f5;
}

.composer input[type="text"]{
  flex:1 1 auto;
  min-width:0;
  height:42px;
  border:1px solid #ddd;
  border-radius:12px;
  padding:0 14px;
  font-size:16px;
  background:#fafafa;
  outline:none;
}

.send-btn{
  width:42px;
  height:42px;
  flex:0 0 42px;
  border:none;
  border-radius:12px;
  background:var(--tp-primary);
  color:#fff;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:0;
}

.send-btn:hover{
  opacity:.92;
}

.send-btn svg{
  display:block;
}

.composer-disabled{
  opacity:.6;
  pointer-events:none;
}

.debug{
  display:none;
}

.back-btn{
  display:none;
  width:42px;
  height:42px;
  flex:0 0 42px;
  border-radius:12px;
  border:1px solid var(--tp-border);
  background:#fff;
  cursor:pointer;
  font-size:22px;
  font-weight:900;
}

/* ===== DATE DIVIDER ===== */

.date-divider{
  display:flex;
  align-items:center;
  justify-content:center;
  margin:18px 0;
  font-size:12px;
  color:#888;
  font-weight:600;
}

.date-divider::before,
.date-divider::after{
  content:"";
  flex:1;
  height:1px;
  background:#e5e7eb;
  margin:0 12px;
}

/* ===== MESSAGES ===== */

.msg{
  display:flex;
  margin-bottom:12px;
  align-items:flex-end;
}

.msg.me{
  justify-content:flex-end;
}

.msg.other{
  justify-content:flex-start;
}

.msg-body{
  position:relative;
  display:inline-block;
  word-break:break-word;
  overflow-wrap:anywhere;
}

.msg-body--text{
  max-width:min(72%, 360px);
  padding:10px 12px 18px;
  border-radius:18px;
}

.msg.me .msg-body--text{
  background:#2563eb;
  color:#fff;
  border-bottom-right-radius:6px;
}

.msg.other .msg-body--text{
  background:#f3f4f6;
  color:#111;
  border-bottom-left-radius:6px;
}

.msg-text{
  font-size:14px;
  line-height:1.4;
  white-space:pre-wrap;
  padding-right:48px;
}

.msg-body--media{
  padding:0;
  background:transparent !important;
  border-radius:18px;
  overflow:hidden;
  max-width:min(320px, 72vw);
}

.msg-media{
  margin:0;
  display:block;
  position:relative;
}

.msg-media img{
  display:block;
  width:100%;
  max-width:100%;
  height:auto;
  max-height:420px;
  border-radius:18px;
  border:1px solid rgba(0,0,0,.08);
}

.msg-time{
  font-size:11px;
  line-height:1;
}

.msg-body--text .msg-time{
  position:absolute;
  right:12px;
  bottom:7px;
  opacity:.7;
}

.msg.me .msg-body--text .msg-time{
  color:rgba(255,255,255,.9);
}

.msg.other .msg-body--text .msg-time{
  color:#6b7280;
}

.msg-body--media .msg-time{
  position:absolute;
  right:8px;
  bottom:8px;
  margin:0;
  padding:3px 6px;
  border-radius:10px;
  background:rgba(0,0,0,.45);
  color:#fff;
  opacity:1;
}

/* ===== SYSTEM ===== */

.msg-system{
  justify-content:center;
  margin:14px 0;
}

.msg-body--system{
  position:relative;
  max-width:min(88%, 560px);
  background:var(--tp-system-bg);
  border:1px solid var(--tp-system-border);
  color:var(--tp-system-text);
  border-radius:16px;
  padding:12px 14px 22px;
  text-align:left;
}

.msg-system-badge{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:22px;
  padding:0 10px;
  border-radius:999px;
  background:var(--tp-system-badge-bg);
  color:var(--tp-system-badge-text);
  font-size:11px;
  font-weight:800;
  letter-spacing:.04em;
  text-transform:uppercase;
  margin-bottom:8px;
}

.msg-system-text{
  font-size:14px;
  line-height:1.45;
}

.msg-time--system{
  position:absolute;
  right:12px;
  bottom:8px;
  color:var(--tp-system-badge-text);
  opacity:.75;
}

.tp-system-link{
  color:var(--tp-system-badge-text);
  font-weight:700;
  text-decoration:underline;
}

.tp-system-link:hover{
  opacity:.85;
}

/* ===== RESOLUTION ===== */

.msg-resolution{
  justify-content:flex-start;
  margin:14px 0;
}

.msg-body--resolution{
  position:relative;
  max-width:min(78%, 420px);
  background:var(--tp-resolution-bg);
  border:1px solid var(--tp-resolution-line);
  color:var(--tp-resolution-text);
  border-radius:16px;
  border-bottom-left-radius:6px;
  padding:12px 14px 22px;
  text-align:left;
}

.msg-resolution-badge{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:22px;
  padding:0 10px;
  border-radius:999px;
  background:#ede9fe;
  color:var(--tp-resolution-name);
  font-size:11px;
  font-weight:800;
  letter-spacing:.04em;
  text-transform:uppercase;
  margin-bottom:8px;
}

.msg-body--resolution .msg-text{
  font-size:14px;
  line-height:1.45;
  white-space:pre-wrap;
  padding-right:48px;
}

.msg-body--resolution .msg-time{
  position:absolute;
  right:12px;
  bottom:8px;
  color:var(--tp-resolution-text);
  opacity:.75;
}

.msg-body--resolution .msg-media{
  margin-top:8px;
}

.msg-body--resolution .msg-media img{
  display:block;
  width:100%;
  max-width:100%;
  height:auto;
  max-height:420px;
  border-radius:14px;
  border:1px solid rgba(0,0,0,.08);
}

/* ===== TABLET ===== */

@media (max-width:900px){
  .wrap{
    margin:0;
    padding:0;
    max-width:none;
  }

  .panel{
    border-radius:0;
    border:none;
  }
}

/* ===== MOBILE ===== */

@media (max-width:640px){
  body{
    background:#fff;
  }

  .wrap{
    margin:0;
    padding:0;
    max-width:none;
  }

  .chat-shell{
    position:relative;
    gap:0;
  }

  .left{
    width:100%;
    min-width:0;
    flex:1 1 auto;
    height:100%;
  }

  .left-top{
    padding:16px 14px;
  }

  .chat-list{
    padding:8px 8px 12px;
  }

  .right{
    position:fixed;
    inset:0;
    z-index:1000;
    width:100%;
    height:100dvh;
    max-height:100dvh;
    background:#fff;
    border:none;
    border-radius:0;
    transform:translateX(100%);
    transition:transform .25s ease;
    pointer-events:none;
  }

  body.tp-chat-open .right{
    transform:translateX(0);
    pointer-events:auto;
  }

  body.tp-chat-open #header-container{
    display:none !important;
  }

  .back-btn{
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .right-top{
    padding:14px 12px;
    gap:8px;
  }

  .right-title{
    flex:1 1 auto;
    min-width:0;
  }

  .right-user-meta{
    min-width:0;
  }

  .right-title .name .tp-name-with-badge{
    gap:6px;
    max-width:100%;
  }

  .right-title .name .tp-name-text{
    max-width:100%;
  }

  .right-title .name .tp-badge{
    height:18px;
    padding:0 6px;
    font-size:10px;
  }

  #offerMiniBlock{
    padding:12px;
  }

  .messages{
    padding:14px 12px;
  }

  .msg-body--text{
    max-width:82%;
  }

  .msg-body--media{
    max-width:min(78vw, 320px);
  }

  .msg-text{
    padding-right:44px;
  }

  .composer{
    gap:8px;
    padding:10px 12px;
    padding-bottom:calc(10px + env(safe-area-inset-bottom));
  }

  .composer .mini-btn{
    width:40px;
    height:40px;
    flex:0 0 40px;
    border-radius:12px;
    font-size:22px;
  }

  .composer input[type="text"]{
    height:40px;
    border-radius:12px;
    padding:0 14px;
    font-size:16px;
  }

  .send-btn{
    width:40px;
    height:40px;
    flex:0 0 40px;
    border-radius:12px;
  }

  .chat-notify-btn{
    width:40px;
    height:40px;
  }

  .menu-gear{
    width:40px;
    height:40px;
  }

  .chat-notify-btn svg{
    width:24px;
    height:24px;
  }

  .menu-gear svg{
    width:22px;
    height:22px;
  }

  .msg-body--system{
    max-width:94%;
  }

  .msg-media img{
    max-height:340px;
  }
}

body.tp-restoring-chat .right{
  transition:none !important;
}
.chat-profile-link{
  cursor:pointer;
  transition:opacity .15s ease;
}

.chat-profile-link:hover{
  opacity:.88;
}

.chat-profile-link.is-disabled{
  cursor:default;
}

.chat-profile-link.is-disabled:hover{
  opacity:1;
}
</style>
</head>

<body>

  <!-- ✅ ваш общий хедер вставится сюда -->
  <div id="header-container"></div>

  <main class="page-content">
  <div class="wrap">

    <div class="chat-shell">
      <!-- LEFT -->
      <div class="panel left">
        <div class="left-top">
         <div class="left-title" id="chatsTitle" data-i18n="page.title"></div>
        </div>
        <div class="chat-list" id="chatList"></div>
      </div>

      <!-- RIGHT -->
      <div class="panel right" id="rightPanel">
        <div class="right-top" id="rightTop">
          <button class="back-btn" id="backBtn" aria-label="Назад">←</button>
<div class="right-title chat-profile-link is-disabled" id="activeUserLink">
  <div class="chat-ava" id="activeAva">?</div>

  <div class="right-user-meta">
    <div class="name" id="activeName">—</div>
    <div class="sub" id="activeSub">—</div>
  </div>
</div>

<div class="chat-actions" id="chatActions" style="display:none;">

  <button
    class="chat-notify-btn"
    id="chatNotifyBtn"
    type="button"
    aria-label="Выключить уведомления"
    title="Выключить уведомления"
  >
    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
      <path d="M15 17H9"></path>

<script>
(async function(){
const token = localStorage.getItem("tp_token");

await window.tpI18n.load(window.tpI18n.currentLang);

if(!token){
  location.href = "/auth.html?mode=login";
  return;
}

const urlParams = new URLSearchParams(window.location.search);
const directChatIdFromUrl = String(urlParams.get("id") || "").trim();

let currentUser = {
  email: "",
  role: "user"
};

async function loadMe(){
  const res = await fetch("/auth/me",{
    headers:{
      "Authorization":"Bearer " + token
    }
  });

  const data = await res.json().catch(() => ({}));

  if(!data.success){
    location.href = "/auth.html?mode=login";
    return false;
  }

  currentUser.email = data.user.email || "";
  currentUser.role = data.user.role || "user";

  localStorage.setItem("tp_user_email", currentUser.email);
  localStorage.setItem("tp_user_role", currentUser.role);
  localStorage.setItem(
    "tp_avatar",
    data.user.avatarUrl || data.user.avatarDataUrl || ""
  );

  return true;
}

const meLoaded = await loadMe();
if(!meLoaded) return;

function getLastSeenText(lastSeen){
  if(!lastSeen) return "Не в сети";

  const diff = Date.now() - lastSeen;
  const minutes = Math.floor(diff / 60000);

  if(minutes < 1) return "Только что";
  if(minutes < 60) return `Был(а) ${minutes} мин назад`;

  const hours = Math.floor(minutes / 60);
  if(hours < 24) return `Был(а) ${hours} ч назад`;

  const days = Math.floor(hours / 24);
  return `Был(а) ${days} д назад`;
}
const DEFAULT_AVATAR = "/img/avatar-default.svg";
const PUBLIC_PROFILE_BASE = "/profile.html?id=";

function isSystemProfileUser(user){
  const safeEmail = String(user?.email || "").trim().toLowerCase();

  return (
    safeEmail === "__official__@typlace.local" ||
    safeEmail === "__resolution__@typlace.local"
  );
}

function getPublicProfileUrl(user){
  if (!user?.userId) return "";
  if (isSystemProfileUser(user)) return "";

  return PUBLIC_PROFILE_BASE + encodeURIComponent(user.userId);
}

function updateActiveProfileLink(user, chat){
  const el = document.getElementById("activeUserLink");
  if (!el) return;

  const url = chat?.official ? "" : getPublicProfileUrl(user);

  el.classList.toggle("is-disabled", !url);

  el.onclick = null;

  if (url) {
    el.onclick = () => {
      location.href = url;
    };
  }
}
function escapeHtml(value){
  return String(value || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}
function isProtectedChatUser(role, email){
  const safeRole = String(role || "").trim().toLowerCase();
  const safeEmail = String(email || "").trim().toLowerCase();

  if (safeEmail === "__official__@typlace.local") return true;

  return [
    "moderator",
    "support",
    "resolution",
    "admin",
    "super_admin",
    "official"
  ].includes(safeRole);
}

function canOpenUserProfileFromChat(user){
  if (!user) return false;

  const safeEmail = String(user.email || "").trim().toLowerCase();
  const safeRole = String(user.role || "").trim().toLowerCase();
  const safeUserId = String(user.userId || "").trim();

  if (!safeUserId) return false;
  if (safeEmail === "__official__@typlace.local") return false;
  if (safeEmail === "__resolution__@typlace.local") return false;

  if ([
    "official",
    "resolution_entity"
  ].includes(safeRole)) {
    return false;
  }

  return true;
}

function openUserProfileFromChat(user){
  if (!canOpenUserProfileFromChat(user)) return;

  location.href = `/profile.html?id=${encodeURIComponent(user.userId)}`;
}

let chats = [];
let activeChatId = null;
const CHAT_ID_KEY = "tp_active_chat";
const CHAT_VIEW_KEY = "tp_chat_view"; // "list" | "chat"
async function fetchChatById(chatId){
  const res = await fetch(`/api/chats/${encodeURIComponent(chatId)}`,{
    headers:{
      "Authorization":"Bearer " + token
    }
  });

  const data = await res.json().catch(() => ({}));

  if(!data.success || !data.chat){
    return null;
  }

  return data.chat;
}

async function ensureChatInState(chatId){
  let chat = chats.find(c => c.id === chatId);
  if(chat) return chat;

  const loadedChat = await fetchChatById(chatId);
  if(!loadedChat) return null;

  chat = {
    ...loadedChat,
    lastMessage: null,
    blockedByMe: false
  };

  chats.unshift(chat);
  return chat;
}
const MUTED_CHATS_KEY = "tp_muted_chats";

function getMutedChats(){
  try{
    const raw = JSON.parse(localStorage.getItem(MUTED_CHATS_KEY) || "[]");
    return Array.isArray(raw) ? raw : [];
  }catch{
    return [];
  }
}

function setMutedChats(list){
  localStorage.setItem(MUTED_CHATS_KEY, JSON.stringify(list));
}

function isChatMuted(chatId){
  if(!chatId) return false;
  return getMutedChats().includes(chatId);
}

function toggleMutedChat(chatId){
  if(!chatId) return false;

  const muted = getMutedChats();

  if(muted.includes(chatId)){
    setMutedChats(muted.filter(id => id !== chatId));
    return false;
  }

  muted.push(chatId);
  setMutedChats(muted);
  return true;
}

function updateChatNotifyButton(){
  const btn = document.getElementById("chatNotifyBtn");
  if(!btn) return;

  const muted = isChatMuted(activeChatId);

  btn.classList.toggle("is-muted", muted);
  btn.title = muted ? "Включить уведомления" : "Выключить уведомления";
  btn.setAttribute("aria-label", muted ? "Включить уведомления" : "Выключить уведомления");
}

const filePicker = document.getElementById("filePicker");
const attachBtn = document.getElementById("attachBtn");

attachBtn.onclick = () => {
  if (!activeChatId) return;
  filePicker.click();
};

filePicker.addEventListener("change", async (e) => {
  const file = e.target.files[0];
  if (!file || !activeChatId) return;

  const chat = chats.find(c => c.id === activeChatId);
  if (chat?.official) {
    filePicker.value = "";
    return;
  }

  const formData = new FormData();
  formData.append("file", file);

  const res = await fetch(`/api/chats/${activeChatId}/files`, {
    method: "POST",
    headers: {
      "Authorization": "Bearer " + token
    },
    body: formData
  });

  const data = await res.json();

if (!data.success) {
  await tpAlert(data.message || "Не удалось отправить файл", {
    type: "error",
    title: "Ошибка"
  });
  filePicker.value = "";
  return;
}

  if (data.success && data.message) {
    addMessageToUI(data.message);
    updateChatPreviewLocally(data.message);
  }

  filePicker.value = "";
});

window.tpActiveChatId = null;

window.closeMiniOffer = function(offerId){
  document.getElementById("offerMiniBlock").style.display = "none";
  localStorage.setItem("tp_hide_offer_block_" + offerId, "1");
}

/* ===== LOAD CHATS ===== */
async function loadChats(){
  const res = await fetch("/api/chats",{
    headers:{
      "Authorization":"Bearer " + token
    }
  });
  const data = await res.json();
  if(!data.success) return;

  chats = data.chats;
  renderChatList();
}
function updateChatPreviewLocally(message){
  if(!message?.chatId) return;

  const chat = chats.find(c => c.id === message.chatId);
  if(!chat) return;

  chat.lastMessage = message;

  chats.sort((a, b) => {
    const aTime = a.lastMessage?.createdAt || a.createdAt || 0;
    const bTime = b.lastMessage?.createdAt || b.createdAt || 0;
    return bTime - aTime;
  });

  renderChatList();
}
async function refreshChatsKeepActive(){
  const prevActive = activeChatId;
  await loadChats();
  // если активный чат исчез (например удалили) — закрываем правую панель
  if (prevActive && !chats.some(c => c.id === prevActive)) {
    activeChatId = null;
    window.tpActiveChatId = null;
    localStorage.removeItem(CHAT_ID_KEY);
localStorage.setItem(CHAT_VIEW_KEY, "list");
    document.getElementById("rightPanel").style.display = "none";
    document.getElementById("chatActions").style.display = "none";
  } else {
    // просто перерисуем список с active подсветкой
    renderChatList();
  }
}

function renderChatList(){
  const list = document.getElementById("chatList");
  list.innerHTML = "";

  if(chats.length === 0){
    list.innerHTML = `<div class="left-empty" data-i18n="page.chatsEmpty"></div>`;
    window.tpI18n.apply(list);
    return;
  }

  chats.forEach(c => {
    const user = c.otherUser;
    const canOpenProfile = canOpenUserProfileFromChat(user);
    const username = user?.username || "Пользователь";
    const userRole = user?.role || "user";

    const avatar =
      user?.avatarUrl ||
      user?.avatarDataUrl ||
      DEFAULT_AVATAR;

    let lastText = "Нет сообщений";

    if (c.lastMessage) {
      if (window.tpChatSystem?.isSystemMessage?.(c.lastMessage)) {
        lastText = window.tpI18n?.t("common.system_messages.label") || "SYSTEM";
      } else if (c.lastMessage.text) {
        lastText =
          c.lastMessage.text.length > 40
            ? c.lastMessage.text.slice(0, 40) + "..."
            : c.lastMessage.text;
      } else if (c.lastMessage.media?.length) {
        lastText = "📷 Фото";
      }
    }

    const time = c.lastMessage?.createdAt
      ? new Date(c.lastMessage.createdAt).toLocaleTimeString("ru-RU", {
          hour: "2-digit",
          minute: "2-digit"
        })
      : "";

    const div = document.createElement("div");
    div.className = "chat-item" + (c.id === activeChatId ? " active" : "");
    div.onclick = () => openChat(c.id);

    const safeLastText = escapeHtml(lastText);

    div.innerHTML = `
      <div class="chat-ava" data-open-profile="${canOpenProfile ? "1" : "0"}">
        <img src="${avatar}">
        <span class="status-dot ${user?.online ? "online" : "offline"}"></span>
      </div>

      <div class="chat-meta">
        <div style="display:flex;justify-content:space-between;gap:8px;">
          <div class="chat-name-line" data-open-profile="${canOpenProfile ? "1" : "0"}">
            ${window.tpBadges.renderNameWithBadge(username, userRole)}
          </div>
          <div style="font-size:12px;color:#888;flex:0 0 auto;">${time}</div>
        </div>

        <div class="chat-status-line" data-open-profile="${canOpenProfile ? "1" : "0"}">
          ${safeLastText}
        </div>
      </div>
    `;

    if (canOpenProfile) {
      div.querySelectorAll('[data-open-profile="1"]').forEach(el => {
        el.style.cursor = "pointer";

        el.addEventListener("click", (e) => {
          e.stopPropagation();
          openUserProfileFromChat(user);
        });
      });
    }

    list.appendChild(div);
  });
}

/* ===== OPEN CHAT ===== */
async function openChat(id){
  const chat = await ensureChatInState(id);

if(!chat){
  await tpAlert("Чат не найден или нет доступа", {
    type: "error",
    title: "Ошибка"
  });
  return;
}

  document.getElementById("rightPanel").style.display = "flex";

  if (window.innerWidth <= 640) {
    document.body.classList.add("tp-chat-open");
  }

  localStorage.setItem(CHAT_ID_KEY, id);
  localStorage.setItem(CHAT_VIEW_KEY, "chat");

  activeChatId = id;
  window.tpActiveChatId = id;
  updateChatNotifyButton();

  renderChatList();

  const user = chat.otherUser;
  const isOfficialChat = Boolean(chat.official);
  const isProtectedChat = isProtectedChatUser(user?.role, user?.email);

  const chatActions = document.getElementById("chatActions");
  const chatNotifyBtnEl = document.getElementById("chatNotifyBtn");
  const chatMenuWrapper = document.getElementById("chatMenuWrapper");
  const btnReport = document.getElementById("btnReport");
  const btnBlock = document.getElementById("btnBlock");
  const btnDelete = document.getElementById("btnDelete");
  const composer = document.getElementById("composer");
  const blockedNotice = document.getElementById("blockedNotice");
  const msgInput = document.getElementById("msgInput");

if (isOfficialChat) {
  chatActions.style.display = "none";
  chatNotifyBtnEl.style.display = "none";
  chatMenuWrapper.style.display = "none";
  btnReport.style.display = "none";
  btnBlock.style.display = "none";
  btnDelete.style.display = "none";
  blockedNotice.style.display = "none";
  attachBtn.style.display = "none";
  composer.style.display = "none";

  if (msgInput) {
    msgInput.value = "";
    msgInput.placeholder = "Официальный чат доступен только для чтения";
  }
} else {
    chatActions.style.display = "flex";
    chatNotifyBtnEl.style.display = "flex";
    chatMenuWrapper.style.display = "block";
    btnDelete.style.display = "block";
    attachBtn.style.display = "flex";

    btnReport.style.display = isProtectedChat ? "none" : "block";
    btnBlock.style.display = isProtectedChat ? "none" : "block";

    if (!isProtectedChat) {
      btnBlock.textContent = chat?.blockedByMe ? "Разблокировать" : "Заблокировать";

      if (chat.blockedByMe) {
        composer.style.display = "none";
        blockedNotice.style.display = "block";
      } else {
        composer.style.display = "flex";
        blockedNotice.style.display = "none";
      }
    } else {
      composer.style.display = "flex";
      blockedNotice.style.display = "none";
    }

    if (msgInput) {
      msgInput.placeholder =
        window.tpI18n?.t("page.writeMessage") || "Напишите сообщение";
    }
  }

if(user){
  const ava = document.getElementById("activeAva");
  const avatar =
    user?.avatarUrl ||
    user?.avatarDataUrl ||
    DEFAULT_AVATAR;

  ava.innerHTML = `<img src="${avatar}" style="width:100%;height:100%;object-fit:cover;">`;

  window.tpBadges.applyNameWithBadge(
    document.getElementById("activeName"),
    user.username || "Пользователь",
    user.role || "user"
  );

  if (isOfficialChat && user?.email === "__official__@typlace.local") {
    document.getElementById("activeSub").textContent = "Официальный аккаунт";
  } else if (isOfficialChat) {
    document.getElementById("activeSub").textContent = "";
  } else {
    document.getElementById("activeSub").textContent =
      user.online ? "В сети" : getLastSeenText(user.lastSeen);
  }

  updateActiveProfileLink(user, chat);
} else {
  updateActiveProfileLink(null, null);
}

  await fetch(`/api/chats/${id}/read`, {
    method: "POST",
    headers: {
      "Authorization": "Bearer " + token
    }
  });

  updateUnreadBadge();

  if(chat?.offerId){
    const isHidden = localStorage.getItem("tp_hide_offer_block_" + chat.offerId);

    if(isHidden){
      document.getElementById("offerMiniBlock").style.display = "none";
    } else {
      const offerRes = await fetch(`/api/offers/${chat.offerId}`);
      const offerData = await offerRes.json();

      const block = document.getElementById("offerMiniBlock");

      if(offerData.success && offerData.offer){
        const offer = offerData.offer;

        block.style.display = "block";

        block.innerHTML = `
          <div style="position:relative; display:flex; align-items:center; gap:12px;">
            <div onclick="closeMiniOffer('${chat.offerId}')"
                 style="
                    position:absolute;
                    right:12px;
                    top:50%;
                    transform:translateY(-50%);
                    font-size:24px;
                    cursor:pointer;
                    color:#999;
                    font-weight:800;
                    width:32px;
                    height:32px;
                    display:flex;
                    align-items:center;
                    justify-content:center;
                    border-radius:50%;
                 ">
              ✕
            </div>

            <div onclick="location.href='/offer.html?id=${offer.id}'"
                 style="display:flex;align-items:center;gap:12px;cursor:pointer;width:100%;">

              <img src="${offer.imageUrl || '/img/offer-default.png'}"
                   style="width:60px;height:60px;object-fit:cover;border-radius:10px;border:1px solid #ddd;">

              <div class="mini-offer-content">
                <div class="mini-offer-title">
                  ${buildOfferTitle(offer)}
                </div>

                <div class="mini-offer-price" data-price="${offer.price}"></div>
              </div>
            </div>
          </div>
        `;

        await updateMiniOfferPrices();
        setTimeout(updateMiniOfferPrices, 50);
      } else {
        block.style.display = "none";
        block.innerHTML = "";
      }
    }
  } else {
    document.getElementById("offerMiniBlock").style.display = "none";
  }

  loadMessages();
}

function formatDateDivider(date){

  const today = new Date();
  const d = new Date(date);

  const isToday =
    d.toDateString() === today.toDateString();

  const yesterday = new Date();
  yesterday.setDate(today.getDate() - 1);

  const isYesterday =
    d.toDateString() === yesterday.toDateString();

  if(isToday) return "Сегодня";
  if(isYesterday) return "Вчера";

  const options = { day:'numeric', month:'long' };

  if(d.getFullYear() !== today.getFullYear()){
    options.year = 'numeric';
  }

  return d.toLocaleDateString("ru-RU", options);
}

function formatMessageTime(createdAt){
  return new Date(createdAt).toLocaleTimeString("ru-RU", {
    hour: "2-digit",
    minute: "2-digit",
    hour12: false
  });
}

function renderMessageBody(m){
  const text = String(m.text || "").trim();
  const media = Array.isArray(m.media) ? m.media : [];

  const hasText = Boolean(text);
  const hasMedia = media.length > 0;

  const safeText = window.tpBadges?.escapeHtml
    ? window.tpBadges.escapeHtml(text)
    : escapeHtml(text);

  if (hasMedia && !hasText) {
    return `
      <div class="msg-body msg-body--media">
        <div class="msg-media">
          ${media.map(url => `<img src="${url}" alt="">`).join("")}
        </div>
        <span class="msg-time">${formatMessageTime(m.createdAt)}</span>
      </div>
    `;
  }

  return `
    <div class="msg-body msg-body--text">
      ${hasText ? `<div class="msg-text">${safeText}</div>` : ""}
      ${hasMedia ? `
        <div class="msg-media" style="margin-top:8px;">
          ${media.map(url => `<img src="${url}" alt="">`).join("")}
        </div>
      ` : ""}
      <span class="msg-time">${formatMessageTime(m.createdAt)}</span>
    </div>
  `;
}

function isResolutionMessage(m){
  return (
    m?.messageType === "resolution" ||
    (m?.kind === "staff" && m?.staffRole === "resolution")
  );
}

function getResolutionName(m){
  return (
    m?.fromUsername ||
    m?.username ||
    m?.authorName ||
    "Сотрудник"
  );
}

function getResolutionLabel(){
  return window.tpBadges?.getTranslatedLabel
    ? window.tpBadges.getTranslatedLabel("resolution")
    : "Арбитраж";
}

function renderResolutionMessageItem(m){
  const text = String(m.text || "").trim();
  const media = Array.isArray(m.media) ? m.media : [];

  const safeText = window.tpBadges?.escapeHtml
    ? window.tpBadges.escapeHtml(text)
    : escapeHtml(text);

  const safeLabel = escapeHtml(getResolutionLabel());

  return `
    <div class="msg msg-resolution" data-msg-id="${m.id}">
      <div class="msg-body msg-body--resolution">
        <div class="msg-resolution-badge">${safeLabel}</div>

        ${text ? `<div class="msg-text">${safeText}</div>` : ""}

        ${media.length ? `
          <div class="msg-media">
            ${media.map(url => `<img src="${url}" alt="">`).join("")}
          </div>
        ` : ""}

        <span class="msg-time">${formatMessageTime(m.createdAt)}</span>
      </div>
    </div>
  `;
}

function renderMessageItem(m, myEmail){
  if (window.tpChatSystem?.isSystemMessage?.(m)) {
    return window.tpChatSystem.renderSystemMessage(m);
  }

  if (isResolutionMessage(m)) {
    return renderResolutionMessageItem(m);
  }

  const isMe = m.fromEmail === myEmail;

  return `
    <div class="msg ${isMe ? "me" : "other"}" data-msg-id="${m.id}">
      ${renderMessageBody(m)}
    </div>
  `;
}

/* ===== LOAD MESSAGES ===== */
async function loadMessages(){
  if(!activeChatId) return;

  const res = await fetch(`/api/chats/${activeChatId}/messages`,{
    headers:{
      "Authorization":"Bearer " + token
    }
  });

  const data = await res.json();
  if(!data.success) return;

  const box = document.getElementById("messages");
  box.innerHTML = "";

if(data.messages.length === 0){
box.innerHTML = `<div class="empty-right" data-i18n="page.noMessages"></div>`;
window.tpI18n.apply(box);
return;
}

  const myEmail = localStorage.getItem("tp_user_email");

  let lastDate = null;

  data.messages.forEach(m => {
    const messageDate = new Date(m.createdAt);
    const currentDateString = messageDate.toDateString();

    if (lastDate !== currentDateString) {
      const divider = document.createElement("div");
      divider.className = "date-divider";
      divider.dataset.date = currentDateString;
      divider.textContent = formatDateDivider(messageDate);

      box.appendChild(divider);
      lastDate = currentDateString;
    }

    box.insertAdjacentHTML("beforeend", renderMessageItem(m, myEmail));
  });

  box.scrollTop = box.scrollHeight;
}

function addMessageToUI(m){

  if(document.querySelector('[data-msg-id="'+m.id+'"]')) return;

  const box = document.getElementById("messages");
  const myEmail = localStorage.getItem("tp_user_email");

  const empty = box.querySelector(".empty-right");
  if (empty) {
    box.innerHTML = "";
  }

  const messageDate = new Date(m.createdAt);
  const messageDateString = messageDate.toDateString();

  // 🔥 Ищем последний date-divider
  const dividers = box.querySelectorAll(".date-divider");
const lastDivider = dividers.length
  ? dividers[dividers.length - 1]
  : null;

  let lastDividerDate = null;

  if(lastDivider){
    lastDividerDate = lastDivider.dataset.date;
  }

  // 🔥 Если divider нет или дата изменилась
  if(lastDividerDate !== messageDateString){

    const divider = document.createElement("div");
    divider.className = "date-divider";
    divider.dataset.date = messageDateString; // сохраняем дату
    divider.textContent = formatDateDivider(messageDate);

    box.appendChild(divider);
  }

  box.insertAdjacentHTML("beforeend", renderMessageItem(m, myEmail));
  box.scrollTop = box.scrollHeight;
}

/* ===== SEND MESSAGE ===== */
document.getElementById("sendBtn").onclick = async ()=>{
  const input = document.getElementById("msgInput");
  const text = input.value.trim();

  if(!text || !activeChatId) return;

  const chat = chats.find(c => c.id === activeChatId);
  const isOfficialChat = Boolean(chat?.official);

  if (isOfficialChat) {
    return;
  }

  const res = await fetch(`/api/chats/${activeChatId}/messages`,{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer " + token
    },
    body: JSON.stringify({ text })
  });

  const data = await res.json();

if(!data.success){
  await tpAlert(data.message || "Не удалось отправить сообщение", {
    type: "error",
    title: "Ошибка"
  });
  return;
}

  addMessageToUI(data.message);
  updateChatPreviewLocally(data.message);
  input.value = "";
};

document.getElementById("msgInput").addEventListener("keydown", e => {
  if(e.key === "Enter"){
    document.getElementById("sendBtn").click();
  }
});

async function updateUnreadBadge(){
  const res = await fetch("/api/chats/unread-count",{
    headers:{
      "Authorization":"Bearer " + token
    }
  });

  const data = await res.json();
  if(!data.success) return;

  const badge = document.getElementById("tpChatsBadge");
  if(!badge) return;

  if(data.count > 0){
    badge.textContent = data.count > 99 ? "99+" : data.count;
    badge.style.display = "flex";
  } else {
    badge.style.display = "none";
  }
}

updateUnreadBadge();
await loadChats();

const savedChatId = localStorage.getItem(CHAT_ID_KEY);
const savedView = localStorage.getItem(CHAT_VIEW_KEY) || "list";
const startupChatId = directChatIdFromUrl || savedChatId;

if (startupChatId && (directChatIdFromUrl || savedView === "chat")) {
  document.body.classList.add("tp-restoring-chat");
  await openChat(startupChatId);

  if (directChatIdFromUrl) {
    window.history.replaceState({}, "", "/chat.html");
  }

  requestAnimationFrame(() => {
    document.body.classList.remove("tp-restoring-chat");
  });
} else {
  document.body.classList.remove("tp-chat-open");
}

const menuBtn = document.getElementById("chatMenuBtn");
const menu = document.getElementById("chatMenu");

const chatNotifyBtn = document.getElementById("chatNotifyBtn");

chatNotifyBtn?.addEventListener("click", () => {
  if(!activeChatId) return;

  toggleMutedChat(activeChatId);
  updateChatNotifyButton();

  chatNotifyBtn.classList.remove("tp-bell-pop");
  void chatNotifyBtn.offsetWidth;
  chatNotifyBtn.classList.add("tp-bell-pop");

  tpToast(
    isChatMuted(activeChatId) ? "Уведомления выключены" : "Уведомления включены",
    "info",
    { duration: 1800 }
  );
});

menuBtn.onclick = () => {
  menu.classList.toggle("open");
  menuBtn.classList.toggle("active");
};

document.addEventListener("click", (e) => {
  if (!menu.contains(e.target) && !menuBtn.contains(e.target)) {
    menu.classList.remove("open");
    menuBtn.classList.remove("active");
  }
});

document.getElementById("btnDelete").onclick = async () => {
  const confirmed = await tpConfirm("Удалить чат?", {
  title: "Подтверждение",
  confirmText: "Удалить",
  cancelText: "Отмена",
  dangerConfirm: true
});

if(!confirmed) return;

  const res = await fetch(`/api/chats/${activeChatId}`,{
    method:"DELETE",
    headers:{ "Authorization":"Bearer " + token }
  });

  const data = await res.json().catch(() => ({}));

if(!data.success){
  await tpAlert(data.message || "Не удалось удалить чат", {
    type: "error",
    title: "Ошибка"
  });
  return;
}

  activeChatId = null;
  localStorage.removeItem(CHAT_ID_KEY);
  localStorage.setItem(CHAT_VIEW_KEY, "list");

  document.getElementById("rightPanel").style.display = "none";
  document.body.classList.remove("tp-chat-open");
  document.getElementById("chatActions").style.display = "none";

  await loadChats();
};

document.getElementById("btnBlock").onclick = async () => {
  const chat = chats.find(c => c.id === activeChatId);
  const user = chat?.otherUser;

if (isProtectedChatUser(user?.role, user?.email)) {
  return;
}
  const res = await fetch("/api/users/block",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer " + token
    },
    body: JSON.stringify({ chatId: activeChatId })
  });

  const data = await res.json();

if(!data.success) return;

chat.blockedByMe = Boolean(data.blocked);

if(data.blocked){
  document.getElementById("btnBlock").textContent = "Разблокировать";
  document.getElementById("composer").style.display = "none";
  document.getElementById("blockedNotice").style.display = "block";
} else {
  document.getElementById("btnBlock").textContent = "Заблокировать";
  document.getElementById("composer").style.display = "flex";
  document.getElementById("blockedNotice").style.display = "none";
}

renderChatList();
tpToast(
  data.blocked ? "Пользователь заблокирован" : "Пользователь разблокирован",
  "success"
);

};

document.getElementById("btnReport").onclick = () => {
  if (!activeChatId) return;

  location.href =
    `/support-create.html?category=report&chatId=${encodeURIComponent(activeChatId)}`;
};

async function updateMiniOfferPrices(){
  if(!window.tpMoney) return;

  const els = document.querySelectorAll(".mini-offer-price");

  for(const el of els){
    const eur = Number(el.dataset.price);
    if(!eur) continue;

    el.textContent = await window.tpMoney.formatPrice(eur);
  }
}

window.addEventListener("tp:currency-change", updateMiniOfferPrices);
// 🔥 Получаем сообщения от header.js
window.addEventListener("tp:new-message", async (e) => {
  const message = e.detail;
  if (!message) return;

  const myEmail = localStorage.getItem("tp_user_email");

  const exists = chats.some(c => c.id === message.chatId);

  if (!exists) {
    await loadChats();
  } else {
    updateChatPreviewLocally(message);
  }

  updateUnreadBadge();

  if (!activeChatId || message.chatId !== activeChatId) {
    return;
  }

  if (message.fromEmail === myEmail) return;

  addMessageToUI(message);

  fetch(`/api/chats/${activeChatId}/read`, {
    method: "POST",
    headers: {
      "Authorization": "Bearer " + token
    }
  }).catch(()=>{});
});

const backBtn = document.getElementById("backBtn");

backBtn?.addEventListener("click", () => {
  document.body.classList.remove("tp-chat-open");
  localStorage.setItem(CHAT_VIEW_KEY, "list");
});

})();
