<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Чаты — TyPlace</title>

<link rel="stylesheet" href="header.css">
<link rel="stylesheet" href="/footer.css">

<style>
  body{margin:0;font-family:Arial;background:#f6f6f6;}

  /* ====== CHAT LAYOUT ====== */
  .wrap{
    max-width:1200px;
    margin:18px auto;
    padding:0 18px;
  }
  .chat-shell{
    display:flex;
    gap:14px;
    height: calc(100vh - 86px); /* под ваш хедер */
    min-height:520px;
  }
  .panel{
    background:#fff;
    border:1px solid #ddd;
    border-radius:12px;
    overflow:hidden;
  }

  /* left list */
  .left{
    width:340px;
    display:flex;
    flex-direction:column;
  }
  .left-top{
    padding:12px 12px 10px;
    border-bottom:1px solid #eee;
    display:flex;
    gap:8px;
    align-items:center;
  }
  .left-title{font-weight:700;}

  .chat-list{
    padding:6px;
    overflow:auto;
    flex:1;
  }
  .chat-item{
    display:flex;
    gap:10px;
    padding:10px;
    border-radius:12px;
    cursor:pointer;
    align-items:center;
  }
  .chat-item:hover{background:#f4f6ff;}
  .chat-item.active{background:#eef2ff;}

  .chat-ava{
    width:38px;height:38px;border-radius:50%;
    background:#e9e9e9;border:1px solid #ddd;
    overflow:hidden;flex:0 0 auto;
    display:flex;align-items:center;justify-content:center;
    color:#777;font-weight:700;
    position:relative;
  }
  .chat-ava img{width:100%;height:100%;object-fit:cover;}

.status-dot{
  position:absolute;
  right:0;
  bottom:0;
  transform: translate(35%, 35%);
  width:11px;
  height:11px;
  border-radius:50%;
  border:2px solid #fff;
}

  .status-dot.online{ background:#2ecc71; }
  .status-dot.offline{ background:#bdbdbd; }

  .chat-meta{flex:1;min-width:0;}
  .chat-name-line{
    font-weight:700;
    font-size:14px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .chat-status-line{
    margin-top:3px;
    font-size:12px;
    color:#666;
    display:flex;
    align-items:center;
    gap:6px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }

  .left-empty{
    color:#999;
    text-align:center;
    padding:18px 10px;
    font-size:14px;
  }

  /* right messages */
  .right{
    flex:1;
    display:flex;
    flex-direction:column;
  }
  .right-top{
    padding:12px 14px;
    border-bottom:1px solid #eee;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  .right-title{
    display:flex;gap:10px;align-items:center;min-width:0;
  }
  .right-title .name{
    font-weight:800;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .right-title .sub{
    color:#777;font-size:12px;margin-top:2px;
  }
  .top-actions{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    justify-content:flex-end;
  }
  .btn{
    padding:8px 10px;
    border:1px solid #d8d8d8;
    border-radius:10px;
    background:#fff;
    cursor:pointer;
    font-size:13px;
  }
  .btn:hover{background:#f5f5f5;}
  .btn-danger{border-color:#f0c7c7;}
  .btn-danger:hover{background:#fff0f0;}

  .messages{
    padding:14px;
    overflow:auto;
    flex:1;
    background:#fff;
  }

  /* messages in column */
  .msg{
    display:flex;
    gap:10px;
    padding:8px 2px;
    align-items:flex-start;
  }
  .msg + .msg{border-top:1px solid #f2f2f2;}
  .msg-ava{
    width:30px;height:30px;border-radius:50%;
    background:#ededed;border:1px solid #ddd;
    overflow:hidden;flex:0 0 auto;
    display:flex;align-items:center;justify-content:center;
    color:#777;font-weight:700;font-size:12px;
  }
  .msg-ava img{width:100%;height:100%;object-fit:cover;}
  .msg-body{flex:1;min-width:0;}
  .msg-head{
    display:flex;
    gap:10px;
    align-items:baseline;
    flex-wrap:wrap;
  }
  .msg-name{font-weight:800;font-size:13px;}
  .msg-time{color:#888;font-size:12px;}
  .msg-text{
    margin-top:4px;
    color:#222;
    font-size:14px;
    white-space:pre-wrap;
    word-break:break-word;
  }
  .msg-media{
    margin-top:8px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
  }
  .msg-media img{
    max-width:220px;
    border-radius:10px;
    border:1px solid #ddd;
  }
  .msg-media video{
    max-width:260px;
    border-radius:10px;
    border:1px solid #ddd;
  }

  .empty-right{
    color:#999;
    text-align:center;
    margin-top:60px;
    font-size:16px;
    font-weight:700;
  }

  .composer{
    padding:10px 12px;
    border-top:1px solid #eee;
    display:flex;
    align-items:center;
    gap:10px;
    background:#fff;
  }
  .composer .mini-btn{
    width:36px;height:36px;
    border-radius:10px;
    border:1px solid #ddd;
    background:#fff;
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    font-size:16px;
  }
  .composer .mini-btn:hover{background:#f5f5f5;}
  .composer input[type="text"]{
    flex:1;
    border:1px solid #ddd;
    border-radius:12px;
    padding:10px 12px;
    font-size:14px;
    background:#fafafa;
    outline:none;
  }
  .send-btn{
    padding:10px 14px;
    border:none;
    border-radius:12px;
    background:#1E50D4;
    color:#fff;
    cursor:pointer;
    font-weight:700;
  }
  .send-btn:hover{opacity:.9;}
  .composer-disabled{
    opacity:.6;
    pointer-events:none;
  }

  .notice{
    padding:10px 12px;
    background:#fff6d6;
    border-top:1px solid #ffe7a3;
    color:#6b5200;
    font-size:13px;
  }

  .debug{ text-align:center; color:#999; margin:14px 0 0; font-size:13px; }
</style>
</head>

<body>

  <!-- ✅ ваш общий хедер вставится сюда -->
  <div id="header-container"></div>

  <main class="page-content">
  <div class="wrap">

    <div class="chat-shell">
      <!-- LEFT -->
      <div class="panel left">
        <div class="left-top">
          <div class="left-title" id="chatsTitle">Чаты</div>
        </div>
        <div class="chat-list" id="chatList"></div>
      </div>

      <!-- RIGHT -->
      <div class="panel right" id="rightPanel" style="display:none;">
        <div class="right-top" id="rightTop">
          <div class="right-title">
            <div class="chat-ava" id="activeAva">?</div>
            <div style="min-width:0;">
              <div class="name" id="activeName">—</div>
              <div class="sub" id="activeSub">—</div>
            </div>
          </div>

          <div class="top-actions" id="topActions" style="display:none;">
            <button class="btn" id="btnBlock">Блокировать</button>
            <button class="btn" id="btnReport">Пожаловаться</button>
            <button class="btn btn-danger" id="btnDelete">Удалить чат</button>
          </div>
        </div>

        <div class="messages" id="messages">
          <div class="empty-right" id="emptyPick">Выберите чат</div>
        </div>

        <div class="notice" id="blockedNotice" style="display:none;">
          Этот пользователь заблокирован — отправка сообщений отключена.
        </div>

        <div class="composer" id="composer">
          <input type="file" id="filePicker" accept="image/*,video/*" multiple style="display:none;" />
          <button class="mini-btn" id="attachBtn" title="Прикрепить">＋</button>
          <input type="text" id="msgInput" placeholder="Написать сообщение..." />
          <button class="send-btn" id="sendBtn">Отправить</button>
        </div>
      </div>
    </div>

    <div class="debug" id="debug"></div>
  </div>
</main>

<div id="footer-container"></div>

<script src="/socket.io/socket.io.js"></script>
<script src="/games.list.js"></script>
<script src="/header.js"></script>
<script src="/footer.js"></script>

<script>
const token = localStorage.getItem("tp_token");
if(!token){
  location.href = "/auth.html?mode=login";
}
function getLastSeenText(lastSeen){
  if(!lastSeen) return "Не в сети";

  const diff = Date.now() - lastSeen;
  const minutes = Math.floor(diff / 60000);

  if(minutes < 1) return "Только что";
  if(minutes < 60) return `Был(а) ${minutes} мин назад`;

  const hours = Math.floor(minutes / 60);
  if(hours < 24) return `Был(а) ${hours} ч назад`;

  const days = Math.floor(hours / 24);
  return `Был(а) ${days} д назад`;
}

let chats = [];
let activeChatId = null;
window.tpActiveChatId = null;


/* ===== LOAD CHATS ===== */
async function loadChats(){
  const res = await fetch("/api/chats",{
    headers:{
      "Authorization":"Bearer " + token
    }
  });
  const data = await res.json();
  if(!data.success) return;

  chats = data.chats;
  renderChatList();
}

function renderChatList(){
  const list = document.getElementById("chatList");
  list.innerHTML = "";

  if(chats.length === 0){
    list.innerHTML = `<div class="left-empty">Чатов нет</div>`;
    return;
  }

  chats.forEach(c=>{
    const user = c.otherUser;

    const username = user?.username || "Пользователь";

    const avatar =
      user?.avatarUrl ||
      user?.avatarDataUrl ||
      null;

    const online = user?.online;

    const div = document.createElement("div");
    div.className = "chat-item" + (c.id===activeChatId?" active":"");
    div.onclick = ()=>openChat(c.id);

    div.innerHTML = `
      <div class="chat-ava">
        ${
          avatar
            ? `<img src="${avatar}">`
            : username.charAt(0).toUpperCase()
        }
        <div class="status-dot ${online ? "online" : "offline"}"></div>
      </div>

      <div class="chat-meta">
        <div class="chat-name-line">${username}</div>
        <div class="chat-status-line">
  ${online ? "В сети" : getLastSeenText(user?.lastSeen)}
</div>
      </div>
    `;

    list.appendChild(div);
  });
}

/* ===== OPEN CHAT ===== */
async function openChat(id){
  document.getElementById("rightPanel").style.display = "flex";
  activeChatId = id;
    window.tpActiveChatId = id;
  renderChatList();
const chat = chats.find(c => c.id === id);
const user = chat?.otherUser;

if(user){
  // Аватар
  const ava = document.getElementById("activeAva");
  if(user.avatarUrl || user.avatarDataUrl){
    ava.innerHTML = `<img src="${user.avatarUrl || user.avatarDataUrl}" style="width:100%;height:100%;object-fit:cover;">`;
  } else {
    ava.textContent = user.username?.[0]?.toUpperCase() || "?";
  }

  // Ник
  document.getElementById("activeName").textContent =
    user.username || "Пользователь";

  // Онлайн / был(а)
  document.getElementById("activeSub").textContent =
    user.online
      ? "В сети"
      : getLastSeenText(user.lastSeen);
}
  // 🔥 1. Помечаем сообщения как прочитанные
  await fetch(`/api/chats/${id}/read`, {
    method: "POST",
    headers: {
      "Authorization": "Bearer " + token
    }
  });

  // 🔥 2. Обновляем бейдж в хедере
  updateUnreadBadge();

  loadMessages();
}

/* ===== LOAD MESSAGES ===== */
async function loadMessages(){
  if(!activeChatId) return;

  const res = await fetch(`/api/chats/${activeChatId}/messages`,{
    headers:{
      "Authorization":"Bearer " + token
    }
  });

  const data = await res.json();
  if(!data.success) return;

  const box = document.getElementById("messages");
  box.innerHTML = "";

  if(data.messages.length === 0){
    box.innerHTML = `<div class="empty-right">Сообщений нет</div>`;
    return;
  }

  const myEmail = localStorage.getItem("tp_user_email");

  const chat = chats.find(c => c.id === activeChatId);
  const otherUser = chat?.otherUser;

  data.messages.forEach(m=>{
    const isMe = m.fromEmail === myEmail;

    let username;
    let avatar;

    if (isMe) {
      username = "Вы";
      avatar = localStorage.getItem("tp_avatar");
    } else {
      username = otherUser?.username || m.fromEmail;
      avatar =
        otherUser?.avatarUrl ||
        otherUser?.avatarDataUrl ||
        null;
    }

    const div = document.createElement("div");
    div.className = "msg";

    div.innerHTML = `
      <div class="msg-ava">
        ${
          avatar
            ? `<img src="${avatar}">`
            : username.charAt(0).toUpperCase()
        }
      </div>

      <div class="msg-body">
        <div class="msg-head">
          <span class="msg-name">${username}</span>
          <span class="msg-time">${new Date(m.createdAt).toLocaleTimeString()}</span>
        </div>
        <div class="msg-text">${m.text}</div>
      </div>
    `;

    box.appendChild(div);
  });

  box.scrollTop = box.scrollHeight;
}

function addMessageToUI(m){
  const box = document.getElementById("messages");

  const myEmail = localStorage.getItem("tp_user_email");

  const chat = chats.find(c => c.id === activeChatId);
  const otherUser = chat?.otherUser;

  const isMe = m.fromEmail === myEmail;

  let username;
  let avatar;

  if (isMe) {
    username = "Вы";
    avatar = localStorage.getItem("tp_avatar");
  } else {
    username = otherUser?.username || m.fromEmail;
    avatar =
      otherUser?.avatarUrl ||
      otherUser?.avatarDataUrl ||
      null;
  }

  const div = document.createElement("div");
  div.className = "msg";

  div.innerHTML = `
    <div class="msg-ava">
      ${
        avatar
          ? `<img src="${avatar}">`
          : username.charAt(0).toUpperCase()
      }
    </div>

    <div class="msg-body">
      <div class="msg-head">
        <span class="msg-name">${username}</span>
        <span class="msg-time">${new Date(m.createdAt).toLocaleTimeString()}</span>
      </div>
      <div class="msg-text">${m.text || ""}</div>
    </div>
  `;

  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

/* ===== SEND MESSAGE ===== */
document.getElementById("sendBtn").onclick = async ()=>{
  const input = document.getElementById("msgInput");
  const text = input.value.trim();
  if(!text || !activeChatId) return;

  const res = await fetch(`/api/chats/${activeChatId}/messages`,{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer " + token
    },
    body: JSON.stringify({ text })
  });

  const data = await res.json();
  if(!data.success) return;

  addMessageToUI(data.message); // 🔥 добавляем сразу
  input.value = "";
};

async function updateUnreadBadge(){
  const res = await fetch("/api/chats/unread-count",{
    headers:{
      "Authorization":"Bearer " + token
    }
  });

  const data = await res.json();
  if(!data.success) return;

  const badge = document.getElementById("tpChatsBadge");
  if(!badge) return;

  if(data.count > 0){
    badge.textContent = data.count > 99 ? "99+" : data.count;
    badge.style.display = "flex";
  } else {
    badge.style.display = "none";
  }
}
updateUnreadBadge();
loadChats();
window.addEventListener("tp:new-message", (e) => {
  const message = e.detail;

  if (message.chatId === activeChatId) {
    addMessageToUI(message);
  }
});

</script>

</body>
</html>
