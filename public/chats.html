<link rel="stylesheet" href="/header.css">

<style>
html, body{
  height:100%;
}

body{
  margin:0;
  font-family:Arial;
  background:#f6f6f6;

  display:flex;
  flex-direction:column;
}

.wrap{
  max-width:1000px;
  margin:24px auto;
  padding:0 16px;

  flex:1;
  display:flex;
}
.panel{
  background:#fff;
  border:1px solid #ddd;
  border-radius:12px;
  overflow:hidden;

  display:flex;
  flex-direction:column;

  min-height:0; /* 🔥 */
}

.chat-shell{
    display:flex;
    gap:14px;
    flex:1;
    min-height:0; /* 🔥 ДОБАВЬ */
}

  /* left list */
  .left{
    width:280px;
    display:flex;
    flex-direction:column;
  }
  .left-top{
    padding:12px 12px 10px;
    border-bottom:1px solid #eee;
    display:flex;
    gap:8px;
    align-items:center;
  }
  .left-top{
  padding:16px 14px;
}

.left-title{
  font-size:22px;
  font-weight:900;
}


  .chat-list{
    padding:6px;
    overflow:auto;
    flex:1;
  }
  .chat-item{
    display:flex;
    gap:10px;
    padding:10px;
    border-radius:12px;
    cursor:pointer;
    align-items:center;
  }
  .chat-item:hover{background:#f4f6ff;}
  .chat-item.active{background:#eef2ff;}

  .chat-ava{
    width:38px;height:38px;border-radius:50%;
    background:#e9e9e9;border:1px solid #ddd;
    overflow:hidden;flex:0 0 auto;
    display:flex;align-items:center;justify-content:center;
    color:#777;font-weight:700;
    position:relative;
  }
  .chat-ava img{width:100%;height:100%;object-fit:cover;}

.status-dot{
  position:absolute;
  right:0;
  bottom:0;
  transform: translate(35%, 35%);
  width:11px;
  height:11px;
  border-radius:50%;
  border:2px solid #fff;
}

  .status-dot.online{ background:#2ecc71; }
  .status-dot.offline{ background:#bdbdbd; }

  .chat-meta{flex:1;min-width:0;}
  .chat-name-line{
    font-weight:700;
    font-size:14px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .chat-status-line{
    margin-top:3px;
    font-size:12px;
    color:#666;
    display:flex;
    align-items:center;
    gap:6px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }

  .left-empty{
    color:#999;
    text-align:center;
    padding:18px 10px;
    font-size:14px;
  }

  /* right messages */
.right{
  flex:1;
  display:flex;
  flex-direction:column;
}


  .right-top{
    padding:12px 14px;
    border-bottom:1px solid #eee;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  .right-title{
    display:flex;gap:10px;align-items:center;min-width:0;
  }
  .right-title .name{
    font-weight:800;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .right-title .sub{
    color:#777;font-size:12px;margin-top:2px;
  }
  .top-actions{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    justify-content:flex-end;
  }
  .btn{
    padding:8px 10px;
    border:1px solid #d8d8d8;
    border-radius:10px;
    background:#fff;
    cursor:pointer;
    font-size:13px;
  }
  .btn:hover{background:#f5f5f5;}
  .btn-danger{border-color:#f0c7c7;}
  .btn-danger:hover{background:#fff0f0;}

.messages{
  flex:1;
  overflow-y:auto;
  overflow-x:hidden;
  scrollbar-width:none;

  padding:20px 24px;

  min-height:0; /* 🔥 */
}

.messages::-webkit-scrollbar{
  display:none;
}


  .msg-ava{
    width:30px;height:30px;border-radius:50%;
    background:#ededed;border:1px solid #ddd;
    overflow:hidden;flex:0 0 auto;
    display:flex;align-items:center;justify-content:center;
    color:#777;font-weight:700;font-size:12px;
  }
  .msg-ava img{width:100%;height:100%;object-fit:cover;}

  .msg-media{
    margin-top:8px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
  }
  .msg-media img{
    max-width:220px;
    border-radius:10px;
    border:1px solid #ddd;
  }
  .msg-media video{
    max-width:260px;
    border-radius:10px;
    border:1px solid #ddd;
  }

  .empty-right{
    color:#999;
    text-align:center;
    margin-top:60px;
    font-size:16px;
    font-weight:700;
  }

  .composer{
    padding:10px 12px;
    border-top:1px solid #eee;
    display:flex;
    align-items:center;
    gap:10px;
    background:#fff;
  }
  .composer .mini-btn{
    width:36px;height:36px;
    border-radius:10px;
    border:1px solid #ddd;
    background:#fff;
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    font-size:16px;
  }
  .composer .mini-btn:hover{background:#f5f5f5;}
  .composer input[type="text"]{
    flex:1;
    border:1px solid #ddd;
    border-radius:12px;
    padding:10px 12px;
    font-size:16px;
    background:#fafafa;
    outline:none;
  }
  .send-btn{
    padding:10px 14px;
    border:none;
    border-radius:12px;
    background:#1E50D4;
    color:#fff;
    cursor:pointer;
    font-weight:700;
  }
  .send-btn:hover{opacity:.9;}
  .composer-disabled{
    opacity:.6;
    pointer-events:none;
  }

  .notice{
    padding:10px 12px;
    background:#fff6d6;
    border-top:1px solid #ffe7a3;
    color:#6b5200;
    font-size:13px;
  }

  .debug{ text-align:center; color:#999; margin:14px 0 0; font-size:13px; }
@media (max-width: 900px){

.chat-shell{
    display:flex;
    gap:16px;
}


  .left{
    width:100%;
    height:260px;
  }

}
.msg{
  display:flex;
  margin-bottom:14px;
  align-items:flex-end;
}

.msg.me{
  flex-direction:row-reverse;
}

.msg-body{
  max-width:55%;

  border-radius:18px;
  font-size:14px;
  line-height:1.4;

  word-break: break-word;      /* 👈 ВАЖНО */

}


.msg.me .msg-body{

.msg.other .msg-body{

.msg-time{

}
.mini-offer-content{

}

.mini-offer-title{

}

.mini-offer-price{

.page-content{

}

}

.date-divider::before,
.date-divider::after{
  content:"";
  flex:1;
  height:1px;
  background:#e5e7eb;
  margin:0 12px;
}
.menu-gear{
  width:36px;
  height:36px;
  border-radius:10px;
  border:none;              /* ← убрали рамку */
  background:transparent;   /* ← прозрачный фон */
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:all .25s ease;
}



.menu-gear.active{
  transform:rotate(180deg);
}

.chat-menu{
  position:absolute;
  right:0;
  top:52px;
  background:#fff;
  border:1px solid #e5e7eb;
  border-radius:14px;
  box-shadow:0 20px 40px rgba(0,0,0,.08);
  min-width:190px;
  padding:8px 0;
  z-index:50;

  opacity:0;
  transform:translateY(-10px);
  pointer-events:none;
  transition:all .25s ease;
}

.chat-menu.open{
  opacity:1;
  transform:translateY(0);
  pointer-events:auto;
}

.menu-item{
  padding:10px 16px;
  font-size:14px;
  cursor:pointer;
  transition:background .2s ease;
}

.menu-item:hover{
  background:#f3f4f6;
}

.menu-item.danger{
  color:#dc2626;
}

.menu-item.danger:hover{
  background:#fee2e2;
}
#offerMiniBlock{
  padding:14px 18px;
  background:#f6f7f9;
  border-bottom:1px solid #e5e7eb;
}
.back-btn{
  display:none;
  width:36px;
  height:36px;
  border-radius:10px;
  border:1px solid #e5e7eb;
  background:#fff;
  cursor:pointer;
  font-size:18px;
  font-weight:900;
}

body {
  display:flex;
  flex-direction:column;
}

  flex:1;
  display:flex;

#footer-container {

}

@media (max-width:640px){
html, body{

}
.page-content{

  display:flex;

  .wrap{

.chat-shell{

}

  .panel{
    border-radius:0;

  .left{

  .right{

}
</style>

<script>
(async function(){

const token = localStorage.getItem("tp_token");
if(!token){
  location.href = "/auth.html?mode=login";
}
async function ensureUserEmail(){
  const res = await fetch("/auth/me",{
    headers:{
      "Authorization":"Bearer " + token
    }
  });

  const data = await res.json();
  if(data.success){
    localStorage.setItem("tp_user_email", data.user.email);
    localStorage.setItem("tp_avatar", data.user.avatarUrl || data.user.avatarDataUrl || "");
  }
}

await ensureUserEmail();

function getLastSeenText(lastSeen){
  if(!lastSeen) return "Не в сети";

  const diff = Date.now() - lastSeen;
  const minutes = Math.floor(diff / 60000);

  if(minutes < 1) return "Только что";
  if(minutes < 60) return `Был(а) ${minutes} мин назад`;

  const hours = Math.floor(minutes / 60);
  if(hours < 24) return `Был(а) ${hours} ч назад`;

  const days = Math.floor(hours / 24);
  return `Был(а) ${days} д назад`;
}
const DEFAULT_AVATAR = "/img/avatar-default.svg";

let chats = [];
let activeChatId = null;
window.tpActiveChatId = null;

window.closeMiniOffer = function(offerId){
  document.getElementById("offerMiniBlock").style.display = "none";
  localStorage.setItem("tp_hide_offer_block_" + offerId, "1");
}

/* ===== LOAD CHATS ===== */
async function loadChats(){
  const res = await fetch("/api/chats",{
    headers:{
      "Authorization":"Bearer " + token
    }
  });
  const data = await res.json();
  if(!data.success) return;

  chats = data.chats;
  renderChatList();
}
async function refreshChatsKeepActive(){
  const prevActive = activeChatId;
  await loadChats();
  // если активный чат исчез (например удалили) — закрываем правую панель
  if (prevActive && !chats.some(c => c.id === prevActive)) {
    activeChatId = null;
    window.tpActiveChatId = null;
    localStorage.removeItem("tp_active_chat");
    document.getElementById("rightPanel").style.display = "none";
    document.getElementById("chatMenuWrapper").style.display = "none";
  } else {
    // просто перерисуем список с active подсветкой
    renderChatList();
  }
}

function renderChatList(){
  const list = document.getElementById("chatList");
  list.innerHTML = "";

  if(chats.length === 0){
    list.innerHTML = `<div class="left-empty">Чатов нет</div>`;
    return;
  }

  chats.forEach(c=>{

    const user = c.otherUser;
    const username = user?.username || "Пользователь";

    const avatar =
      user?.avatarUrl ||
      user?.avatarDataUrl ||
      DEFAULT_AVATAR;

    // ✅ ТОЛЬКО последнее сообщение
    const lastText = c.lastMessage?.text
      ? (c.lastMessage.text.length > 40
          ? c.lastMessage.text.slice(0,40) + "..."
          : c.lastMessage.text)
      : "Нет сообщений";

    const time = c.lastMessage?.createdAt
      ? new Date(c.lastMessage.createdAt)
          .toLocaleTimeString("ru-RU",{hour:"2-digit",minute:"2-digit"})
      : "";

    const div = document.createElement("div");
    div.className = "chat-item";
    div.onclick = ()=>openChat(c.id);

    div.innerHTML = `
      <div class="chat-ava">
        <img src="${avatar}">
      </div>

      <div class="chat-meta">
        <div style="display:flex;justify-content:space-between;">
          <div class="chat-name-line">${username}</div>
          <div style="font-size:12px;color:#888;">${time}</div>
        </div>

        <div class="chat-status-line">
          ${lastText}
        </div>
      </div>
    `;

    list.appendChild(div);
  });
}

/* ===== OPEN CHAT ===== */
async function openChat(id){
if (window.innerWidth <= 640) {
  document.body.classList.add("tp-chat-open");
}
  localStorage.setItem("tp_active_chat", id); // 👈 ДОБАВЬ

  document.getElementById("chatMenuWrapper").style.display = "block";
  activeChatId = id;
  window.tpActiveChatId = id;

  renderChatList();
const chat = chats.find(c => c.id === id);
// текст кнопки блока
document.getElementById("btnBlock").textContent =
  chat?.blockedByMe ? "Разблокировать" : "Заблокировать";

if(chat.blockedByMe){
  document.getElementById("composer").style.display = "none";
  document.getElementById("blockedNotice").style.display = "block";
} else {
  document.getElementById("composer").style.display = "flex";
  document.getElementById("blockedNotice").style.display = "none";
}

const user = chat?.otherUser;

if(user){
  // Аватар
  const ava = document.getElementById("activeAva");
const avatar =
  user?.avatarUrl ||
  user?.avatarDataUrl ||
  DEFAULT_AVATAR;

ava.innerHTML = `<img src="${avatar}" style="width:100%;height:100%;object-fit:cover;">`;
  // Ник
  document.getElementById("activeName").textContent =
    user.username || "Пользователь";

  // Онлайн / был(а)
  document.getElementById("activeSub").textContent =
    user.online
      ? "В сети"
      : getLastSeenText(user.lastSeen);
}
  // 🔥 1. Помечаем сообщения как прочитанные
  await fetch(`/api/chats/${id}/read`, {
    method: "POST",
    headers: {
      "Authorization": "Bearer " + token
    }
  });

  // 🔥 2. Обновляем бейдж в хедере
  updateUnreadBadge();
// ===== ПОКАЗЫВАЕМ МИНИ-ОФФЕР ЕСЛИ ЕСТЬ =====
if(chat?.offerId){

  const isHidden = localStorage.getItem("tp_hide_offer_block_" + chat.offerId);

  if(isHidden){
    document.getElementById("offerMiniBlock").style.display = "none";
  } else {

    const offerRes = await fetch(`/api/offers/${chat.offerId}`);
    const offerData = await offerRes.json();

    if(offerData.success){

      const offer = offerData.offer;
      const block = document.getElementById("offerMiniBlock");

      block.style.display = "block";

block.innerHTML = `
  <div style="position:relative;
              display:flex;
              align-items:center;
              gap:12px;">

          <div onclick="closeMiniOffer('${chat.offerId}')"
               style="
                  position:absolute;
                  right:12px;
                  top:50%;
                  transform:translateY(-50%);
                  font-size:24px;
                  cursor:pointer;
                  color:#999;
                  font-weight:800;
                  width:32px;
                  height:32px;
                  display:flex;
                  align-items:center;
                  justify-content:center;
                  border-radius:50%;
               ">
            ✕
          </div>

function formatDateDivider(date){

  const today = new Date();
  const d = new Date(date);

  const isToday =
    d.toDateString() === today.toDateString();

  const yesterday = new Date();
  yesterday.setDate(today.getDate() - 1);

  const isYesterday =
    d.toDateString() === yesterday.toDateString();

  if(isToday) return "Сегодня";
  if(isYesterday) return "Вчера";

  const options = { day:'numeric', month:'long' };

  if(d.getFullYear() !== today.getFullYear()){
    options.year = 'numeric';
  }

  return d.toLocaleDateString("ru-RU", options);
}

/* ===== LOAD MESSAGES ===== */
async function loadMessages(){
  if(!activeChatId) return;

  const res = await fetch(`/api/chats/${activeChatId}/messages`,{
    headers:{
      "Authorization":"Bearer " + token
    }
  });

  const data = await res.json();
  if(!data.success) return;

  const box = document.getElementById("messages");
  box.innerHTML = "";

  if(data.messages.length === 0){
    box.innerHTML = `<div class="empty-right">Сообщений нет</div>`;
    return;
  }

  const myEmail = localStorage.getItem("tp_user_email");

  let lastDate = null;

  data.messages.forEach(m=>{

    const messageDate = new Date(m.createdAt);
    const currentDateString = messageDate.toDateString();

    // 🔥 если день изменился — вставляем divider
    if(lastDate !== currentDateString){

      const divider = document.createElement("div");
divider.className = "date-divider";
divider.dataset.date = currentDateString;
divider.textContent = formatDateDivider(messageDate);

      box.appendChild(divider);

      lastDate = currentDateString;
    }

    const isMe = m.fromEmail === myEmail;

    const div = document.createElement("div");
    div.className = "msg " + (isMe ? "me" : "other");
    div.dataset.msgId = m.id;

    div.innerHTML = `
      <div class="msg-body">
        <div class="msg-text">${m.text}</div>
        <span class="msg-time">
          ${messageDate.toLocaleTimeString("ru-RU", {
            hour:'2-digit',
            minute:'2-digit',
            hour12:false
          })}
        </span>
      </div>
    `;

    box.appendChild(div);
  });

  box.scrollTop = box.scrollHeight;
}

function addMessageToUI(m){

  if(document.querySelector('[data-msg-id="'+m.id+'"]')) return;

  const box = document.getElementById("messages");
  const myEmail = localStorage.getItem("tp_user_email");
  const isMe = m.fromEmail === myEmail;

  const messageDate = new Date(m.createdAt);
  const messageDateString = messageDate.toDateString();

  // 🔥 Ищем последний date-divider
  const dividers = box.querySelectorAll(".date-divider");
const lastDivider = dividers.length
  ? dividers[dividers.length - 1]
  : null;

  let lastDividerDate = null;

  if(lastDivider){
    lastDividerDate = lastDivider.dataset.date;
  }

  // 🔥 Если divider нет или дата изменилась
  if(lastDividerDate !== messageDateString){

    const divider = document.createElement("div");
    divider.className = "date-divider";
    divider.dataset.date = messageDateString; // сохраняем дату
    divider.textContent = formatDateDivider(messageDate);

    box.appendChild(divider);
  }

  const div = document.createElement("div");
  div.className = "msg " + (isMe ? "me" : "other");
  div.dataset.msgId = m.id;

  div.innerHTML = `
    <div class="msg-body">
      <div class="msg-text">${m.text}</div>
      <span class="msg-time">
        ${messageDate.toLocaleTimeString("ru-RU", {
          hour:'2-digit',
          minute:'2-digit',
          hour12:false
        })}
      </span>
    </div>
  `;

  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

document.getElementById("sendBtn").onclick = async ()=>{

  const res = await fetch(`/api/chats/${activeChatId}/messages`,{
    method:"POST",

      "Content-Type":"application/json",
      "Authorization":"Bearer " + token
    },
    body: JSON.stringify({ text })

  const data = await res.json();
  if(!data.success) return;

  // ✅ СРАЗУ ДОБАВЛЯЕМ В UI
  addMessageToUI(data.message);

  input.value = "";
};

async function updateMiniOfferPrices(){
  if(!window.tpMoney) return;

  const els = document.querySelectorAll(".mini-offer-price");

  for(const el of els){
    const eur = Number(el.dataset.price);
    if(!eur) continue;

    el.textContent = await window.tpMoney.formatPrice(eur);
  }
}

// 🔥 Получаем сообщения от header.js
window.addEventListener("tp:new-message", async (e) => {

  const message = e.detail;
  if (!message) return;

  const myEmail = localStorage.getItem("tp_user_email");

  // 🔥 если чата нет в списке — обновляем список
  const exists = chats.some(c => c.id === message.chatId);
  if (!exists) {
    await loadChats();
  }

  // если это не активный чат
  if (!activeChatId || message.chatId !== activeChatId) {
    renderChatList();
    return;
  }

  // если сообщение моё — ничего
  if (message.fromEmail === myEmail) return;

  addMessageToUI(message);

  fetch(`/api/chats/${activeChatId}/read`, {
    method: "POST",
    headers: {
      "Authorization": "Bearer " + token
    }
  }).catch(()=>{});

});
