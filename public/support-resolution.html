<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>
  document.titleKey = "page.title";
</script>
<title data-i18n="page.title"></title>
<link rel="stylesheet" href="/support-panel.css">
</head>
<body>

<div class="support-layout">
  <aside class="support-sidebar">
    <div class="support-brand">
      <div class="support-brand-title">TyPlace</div>
      <div class="support-brand-subtitle" data-i18n="page.brand.subtitle"></div>
    </div>

    <nav class="support-nav">
      <a class="support-nav-link" href="/support-admin.html" data-i18n="page.nav.tickets"></a>
      <a class="support-nav-link active" href="/support-resolution.html" data-i18n="page.nav.resolution"></a>
      <a class="support-nav-link" href="/support-official.html" data-i18n="page.nav.official"></a>
    </nav>

    <div class="support-sidebar-bottom">
      <a class="support-side-btn" id="adminBackBtn" href="/admin" data-i18n="page.sidebar.adminBack"></a>
      <button class="support-side-btn danger" id="logoutBtn" type="button" data-i18n="page.sidebar.logout"></button>
    </div>
  </aside>

  <main class="support-content">
    <div class="support-content-top">
      <div class="support-page-head">
        <h1 data-i18n="page.heading"></h1>
        <p data-i18n="page.subheading"></p>
      </div>

      <div class="role-pill" id="rolePill"></div>
    </div>

    <div class="stats">
      <div class="stat-box">
        <div class="stat-label" data-i18n="page.stats.total"></div>
        <div class="stat-value" id="statTotal">0</div>
      </div>

      <div class="stat-box">
        <div class="stat-label" data-i18n="page.stats.waiting"></div>
        <div class="stat-value" id="statWaiting">0</div>
      </div>

      <div class="stat-box">
        <div class="stat-label" data-i18n="page.stats.in_progress"></div>
        <div class="stat-value" id="statInProgress">0</div>
      </div>

      <div class="stat-box">
        <div class="stat-label" data-i18n="page.stats.resolved"></div>
        <div class="stat-value" id="statResolved">0</div>
      </div>
    </div>

    <div class="filters">
      <select class="select" id="statusFilter">
        <option value="" data-i18n="page.filters.allStatuses"></option>
        <option value="waiting" data-i18n="page.filters.waiting"></option>
        <option value="in_progress" data-i18n="page.filters.in_progress"></option>
        <option value="resolved" data-i18n="page.filters.resolved"></option>
      </select>

      <select class="select" id="assignedFilter">
        <option value="" data-i18n="page.filters.allDisputes"></option>
        <option value="me" data-i18n="page.filters.onlyMine"></option>
      </select>
    </div>

    <div class="tool-stack">
      <div class="card card-pad hidden" id="assignCard">
        <div class="card-title" id="assignCardTitle"></div>
        <div class="card-subtitle" id="assignCardSubtitle"></div>

        <div class="search-row">
          <input
            type="text"
            id="resolutionSearchInput"
            class="search-input"
            data-i18n-placeholder="page.assign.searchPlaceholder"
          >
          <button class="btn btn-primary" id="resolutionSearchBtn" type="button" data-i18n="page.assign.searchBtn"></button>
          <button class="btn" id="assignCloseBtn" type="button" data-i18n="page.assign.closeBtn"></button>
        </div>

        <div class="user-results" id="resolutionSearchResults">
          <div class="empty" data-i18n="page.assign.enterQuery"></div>
        </div>
      </div>

      <div class="card" id="ticketList">
        <div class="empty" data-i18n="page.empty.loading"></div>
      </div>
    </div>
  </main>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/i18n.js"></script>
<script>
const token = localStorage.getItem("tp_token");

if(!token){
  location.href = "/auth.html?mode=login";
  throw new Error("No token");
}

const socket = io();
let userRole = "";
let disputesCache = [];
let resolutionAssignState = {
  ticketId: null,
  shortId: "",
  orderId: ""
};

const RESOLUTION_PAGE_ROLES = new Set(["support", "admin", "super_admin", "resolution"]);
const ADMIN_PANEL_ROLES = new Set(["super_admin"]);

function esc(s){
  return String(s || "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function tr(key, params = {}, fallback = ""){
  if(typeof key !== "string" || !key.trim()){
    return fallback;
  }

  if(window.tpI18n && typeof window.tpI18n.t === "function"){
    const translated = window.tpI18n.t(key, params);
    if(translated && translated !== key){
      return translated;
    }
  }

  return fallback || key;
}

function resolveMaybeI18n(value, fallback = ""){
  if(typeof value !== "string" || !value.trim()){
    return fallback;
  }

  if(
    value.startsWith("page.") ||
    value.startsWith("common.") ||
    value.startsWith("support.")
  ){
    return tr(value, {}, fallback || value);
  }

  return value;
}

function logout(){
  localStorage.removeItem("tp_token");
  localStorage.removeItem("tp_user_email");
  localStorage.removeItem("tp_user_id");
  location.href = "/auth.html?mode=login";
}

function handleMeStatus(status){
  if(status === 401){
    logout();
    return true;
  }

  if(status === 403){
    localStorage.removeItem("tp_token");
    localStorage.removeItem("tp_user_email");
    localStorage.removeItem("tp_user_id");
    location.href = "/banned.html";
    return true;
  }

  return false;
}

function handlePanelStatus(status){
  if(status === 401){
    logout();
    return true;
  }

  if(status === 403){
    location.href = "/";
    return true;
  }

  return false;
}

function getRoleLabel(role){
  const keyMap = {
    support: "common.badges.support",
    admin: "common.badges.admin",
    super_admin: "common.badges.super_admin",
    resolution: "common.badges.resolution"
  };

  return tr(keyMap[role] || "", {}, role || "—");
}

function canManageResolutionAssignments(){
  return ["support", "admin", "super_admin"].includes(userRole);
}

function isResolutionTicket(ticket){
  return ticket?.kind === "order_dispute" || ticket?.category === "order";
}

function formatWait(ts){
  const diff = Date.now() - Number(ts || 0);
  const minutes = Math.floor(diff / 60000);

  if(minutes < 60){
    return tr("page.wait.minutes", { count: minutes }, `${minutes} мин.`);
  }

  const hours = Math.floor(minutes / 60);
  const restMinutes = minutes % 60;

  return tr(
    "page.wait.hoursMinutes",
    { hours, minutes: restMinutes },
    `${hours} ч. ${restMinutes} мин.`
  );
}

function getStatusText(status){
  if(status === "waiting") return tr("page.status.waiting", {}, "Ожидает ответа");
  if(status === "in_progress") return tr("page.status.in_progress", {}, "В процессе");
  if(status === "resolved") return tr("page.status.resolved", {}, "Решено");
  return status;
}

function badge(status){
  return '<span class="badge ' + esc(status) + '">' + esc(getStatusText(status)) + '</span>';
}

function getResolutionAssignedText(ticket){
  const value =
    ticket.resolutionUsername ||
    ticket.resolutionAssignedUsername ||
    ticket.resolutionAssignedTo ||
    ticket.resolutionEmail ||
    ticket.resolutionAssignedEmail ||
    "";

  if(!value){
    return tr("page.meta.resolutionUnassigned", {}, "Арбитраж: не назначен");
  }

  return tr("page.meta.resolutionAssigned", { value }, `Арбитраж: ${value}`);
}

function applyStaticTexts(){
  if(window.tpI18n && typeof window.tpI18n.apply === "function"){
    window.tpI18n.apply();
  }

  const rolePill = document.getElementById("rolePill");
  if(rolePill){
    rolePill.textContent = `${tr("page.rolePrefix", {}, "Роль")}: ${getRoleLabel(userRole)}`;
  }

  updateAssignCardTexts();
}

function updateAssignCardTexts(){
  const titleEl = document.getElementById("assignCardTitle");
  const subtitleEl = document.getElementById("assignCardSubtitle");

  if(!titleEl || !subtitleEl) return;

  if(resolutionAssignState.ticketId){
    titleEl.textContent = tr(
      "page.assign.titleWithId",
      { id: resolutionAssignState.shortId || tr("page.assign.disputeFallback", {}, "спор") },
      `Назначение арбитража — ${resolutionAssignState.shortId || "спор"}`
    );

    subtitleEl.textContent = resolutionAssignState.orderId
      ? tr(
          "page.assign.orderSubtitle",
          { orderId: resolutionAssignState.orderId },
          `Заказ: ${resolutionAssignState.orderId}`
        )
      : tr("page.assign.subtitle", {}, "Выберите сотрудника resolution");
  } else {
    titleEl.textContent = tr("page.assign.title", {}, "Назначение арбитража");
    subtitleEl.textContent = tr("page.assign.subtitle", {}, "Выберите сотрудника resolution");
  }
}

function openAssignCard(ticketId, shortId, orderId){
  if(!canManageResolutionAssignments()) return;

  resolutionAssignState.ticketId = ticketId;
  resolutionAssignState.shortId = shortId || ticketId || "";
  resolutionAssignState.orderId = orderId || "";

  document.getElementById("assignCard").classList.remove("hidden");
  updateAssignCardTexts();

  document.getElementById("resolutionSearchInput").value = "";
  document.getElementById("resolutionSearchResults").innerHTML =
    '<div class="empty">' + esc(tr("page.assign.enterQuery", {}, "Введите email, ник или ID сотрудника resolution")) + '</div>';
}

function closeAssignCard(){
  resolutionAssignState.ticketId = null;
  resolutionAssignState.shortId = "";
  resolutionAssignState.orderId = "";
  document.getElementById("assignCard").classList.add("hidden");
  updateAssignCardTexts();
}

function renderResolutionUsers(users, query){
  const list = document.getElementById("resolutionSearchResults");

  if(!query){
    list.innerHTML = '<div class="empty">' + esc(tr("page.assign.enterQuery", {}, "Введите email, ник или ID сотрудника resolution")) + '</div>';
    return;
  }

  const filtered = (Array.isArray(users) ? users : []).filter(user =>
    user.role === "resolution" || user.role === "super_admin"
  );

  if(!filtered.length){
    list.innerHTML = '<div class="empty">' + esc(tr("page.assign.notFound", {}, "Арбитраж не найден")) + '</div>';
    return;
  }

  list.innerHTML = "";

  filtered.forEach(user => {
    const row = document.createElement("div");
    row.className = "user-row";

    const safeRole = getRoleLabel(user.role || "");
    const safeName = user.username || tr("page.assign.staffFallback", {}, "Сотрудник");

    row.innerHTML = `
      <div class="user-main">
        <div class="user-name">${esc(safeName)}</div>

        <div class="user-meta">
          <div class="meta-chip">${esc(user.email || "—")}</div>
          ${user.userId ? `<div class="meta-chip">${esc(tr("page.meta.userId", {}, "ID пользователя"))}: ${esc(user.userId)}</div>` : ""}
          ${user.role ? `<div class="meta-chip">${esc(tr("page.meta.role", {}, "Роль"))}: ${esc(safeRole)}</div>` : ""}
        </div>
      </div>

      <div class="user-actions">
        <button class="btn btn-primary assign-resolution-btn" type="button">
          ${esc(tr("page.assign.assignBtn", {}, "Назначить"))}
        </button>
      </div>
    `;

    row.querySelector(".assign-resolution-btn").addEventListener("click", () => {
      assignResolution(user.email || "");
    });

    list.appendChild(row);
  });
}

async function searchResolutionUsers(){
  const input = document.getElementById("resolutionSearchInput");
  const query = String(input.value || "").trim();
  const list = document.getElementById("resolutionSearchResults");

  if(!query){
    renderResolutionUsers([], "");
    return;
  }

  list.innerHTML = '<div class="empty">' + esc(tr("page.assign.searching", {}, "Поиск...")) + '</div>';

  const r = await fetch("/api/support/users/search?q=" + encodeURIComponent(query), {
    headers:{ Authorization:"Bearer " + token }
  });

  if(handlePanelStatus(r.status)){
    return;
  }

  const d = await r.json().catch(() => ({}));

  if(!d.success){
    list.innerHTML = '<div class="empty">' + esc(tr("page.errors.searchFailed", {}, "Ошибка поиска сотрудников")) + '</div>';
    return;
  }

  renderResolutionUsers(d.users || [], query);
}

async function assignResolution(email){
  if(!resolutionAssignState.ticketId) return;

  const r = await fetch(
    "/api/support/tickets/" + encodeURIComponent(resolutionAssignState.ticketId) + "/assign-resolution",
    {
      method:"POST",
      headers:{
        Authorization:"Bearer " + token,
        "Content-Type":"application/json"
      },
      body: JSON.stringify({ resolutionEmail: email })
    }
  );

  if(handlePanelStatus(r.status)){
    return;
  }

  const d = await r.json().catch(() => ({}));

  if(!d.success){
    alert(d.message || tr("page.errors.assignFailed", {}, "Не удалось назначить арбитраж"));
    return;
  }

  closeAssignCard();
  await loadDisputes();
  alert(tr("page.assign.success", {}, "Арбитраж назначен"));
}

async function loadMe(){
  const r = await fetch("/auth/me", {
    headers:{ Authorization:"Bearer " + token }
  });

  if(handleMeStatus(r.status)){
    return false;
  }

  const d = await r.json().catch(() => ({}));

  if(!d.success){
    logout();
    return false;
  }

  userRole = d.user.role || "";

  if(!RESOLUTION_PAGE_ROLES.has(userRole)){
    location.href = "/";
    return false;
  }

  const adminBackBtn = document.getElementById("adminBackBtn");
  if(adminBackBtn && !ADMIN_PANEL_ROLES.has(userRole)){
    adminBackBtn.classList.add("hidden");
  }

  if(!canManageResolutionAssignments()){
    document.getElementById("assignCard").classList.add("hidden");
  }

  applyStaticTexts();
  socket.emit("auth", { token });

  return true;
}

function renderStats(items){
  const total = items.length;
  const waiting = items.filter(t => t.status === "waiting").length;
  const inProgress = items.filter(t => t.status === "in_progress").length;
  const resolved = items.filter(t => t.status === "resolved").length;

  document.getElementById("statTotal").textContent = total;
  document.getElementById("statWaiting").textContent = waiting;
  document.getElementById("statInProgress").textContent = inProgress;
  document.getElementById("statResolved").textContent = resolved;
}

async function loadDisputes(){
  const status = document.getElementById("statusFilter").value;
  const assigned = document.getElementById("assignedFilter").value;

  let url = "/api/support/tickets?";
  if(status) url += "status=" + encodeURIComponent(status) + "&";
  if(assigned) url += "assigned=" + encodeURIComponent(assigned) + "&";

  const r = await fetch(url, {
    headers:{ Authorization:"Bearer " + token }
  });

  if(handlePanelStatus(r.status)){
    return;
  }

  const d = await r.json().catch(() => ({}));
  const list = document.getElementById("ticketList");

  if(!d.success){
    list.innerHTML = '<div class="empty">' + esc(tr("page.empty.loadFailed", {}, "Ошибка загрузки споров")) + '</div>';
    return;
  }

  const tickets = Array.isArray(d.tickets) ? d.tickets : [];
  const disputes = tickets.filter(isResolutionTicket);

  disputes.sort((a,b) => {
    if(a.status === "waiting" && b.status !== "waiting") return -1;
    if(b.status === "waiting" && a.status !== "waiting") return 1;
    return (b.updatedAt || b.createdAt || 0) - (a.updatedAt || a.createdAt || 0);
  });

  disputesCache = disputes;
  renderStats(disputes);

  if(!disputes.length){
    list.innerHTML = '<div class="empty">' + esc(tr("page.empty.noDisputes", {}, "Споров нет")) + '</div>';
    return;
  }

  list.innerHTML = "";

  disputes.forEach(t => {
    const div = document.createElement("div");
    div.className = "ticket";

    const waitBase = Number(t.updatedAt || t.createdAt || 0);
    const isLate = t.status === "waiting" && (Date.now() - waitBase > 10 * 60 * 1000);

    const waitLine = t.status === "waiting"
      ? '<div class="wait-time ' + (isLate ? 'late' : '') + '">' +
          esc(tr("page.wait.label", {}, "Ждёт")) + ': ' + esc(formatWait(waitBase)) +
        '</div>'
      : '';

    const shortIdText = esc(t.shortId || t.id || "");
    const subjectText = resolveMaybeI18n(
      t.subject,
      tr("page.meta.disputeFallback", {}, "Спор по заказу")
    );

    const orderChip = t.orderId
      ? `<div class="meta-chip">${esc(tr("page.meta.order", {}, "Заказ"))}: ${esc(t.orderId)}</div>`
      : '';

    const unreadChip = t.unread > 0
      ? `<div class="meta-chip unread">${esc(tr("page.meta.newCount", { count: t.unread }, `Новых: ${t.unread}`))}</div>`
      : '';

    const creatorLine = t.creator
      ? `${tr("page.meta.createdBy", {}, "Создал")}: ${esc(t.creator.username)}${t.creator.userId ? ` (${esc(tr("page.meta.userIdShort", { id: t.creator.userId }, `ID ${t.creator.userId}`))})` : ""}`
      : `${tr("page.meta.createdBy", {}, "Создал")}: ${tr("page.meta.createdByFallback", {}, "Пользователь")}`;

    div.innerHTML = `
      <div class="ticket-main">
        <div class="ticket-top">
          <div class="ticket-id">${shortIdText}</div>
          ${badge(t.status)}
        </div>

        <div class="ticket-subject">${esc(subjectText)}</div>

        <div class="ticket-meta">
          <div class="meta-chip">${esc(tr("page.meta.dispute", {}, "Спор"))}</div>
          ${orderChip}
          ${unreadChip}
        </div>

        ${waitLine}
        <div class="assigned-line">${creatorLine}</div>
        <div class="assigned-line">${esc(getResolutionAssignedText(t))}</div>
      </div>

      <div class="ticket-actions"></div>
    `;

    const actions = div.querySelector(".ticket-actions");

    if(canManageResolutionAssignments() && t.status !== "resolved"){
      const assignBtn = document.createElement("button");
      assignBtn.className = "btn";
      assignBtn.type = "button";
      assignBtn.textContent = tr("page.actions.assignResolution", {}, "Назначить арбитража");
      assignBtn.addEventListener("click", () => {
        openAssignCard(t.id, t.shortId || t.id || "", t.orderId || "");
      });
      actions.appendChild(assignBtn);
    }

    const openBtn = document.createElement("button");
    openBtn.className = "btn btn-primary";
    openBtn.type = "button";
    openBtn.textContent = tr("page.actions.openTicket", {}, "Открыть тикет");
    openBtn.addEventListener("click", () => {
      openTicket(t.id);
    });
    actions.appendChild(openBtn);

    list.appendChild(div);
  });
}

function openTicket(id){
  location.href = "/support-ticket.html?id=" + encodeURIComponent(id);
}

document.getElementById("statusFilter").onchange = loadDisputes;
document.getElementById("assignedFilter").onchange = loadDisputes;
document.getElementById("resolutionSearchBtn").onclick = searchResolutionUsers;
document.getElementById("assignCloseBtn").onclick = closeAssignCard;
document.getElementById("logoutBtn").onclick = logout;

document.getElementById("resolutionSearchInput").addEventListener("keydown", (e) => {
  if(e.key === "Enter"){
    e.preventDefault();
    searchResolutionUsers();
  }
});

window.addEventListener("tp:lang-change", async () => {
  applyStaticTexts();
  await loadDisputes();
});

Promise.resolve(window.tpI18nReady)
  .catch(() => {})
  .finally(() => {
    applyStaticTexts();

    loadMe().then((ok) => {
      if(!ok) return;
      loadDisputes();
    });
  });

socket.on("new-support-ticket", () => {
  loadDisputes();
});

socket.on("support-ticket-updated", () => {
  loadDisputes();
});
</script>
</body>
</html>
