<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TyPlace — Предложение</title>

  <link rel="stylesheet" href="/offer-card.css">

<style>
html,
body{
  height:100%;
}

body{
  margin:0;
  display:flex;
  flex-direction:column;
  font-family:Inter, Arial, sans-serif;
  background:#f6f7f9;
  color:#111;
}

.page-content{
  flex:1;
}

.page{
  max-width:1200px;
  margin:24px auto;
  padding:0 16px;
}

.offer-page-card{
  max-width:800px;
  margin:0 auto;
  background:#fff;
  border-radius:16px;
  box-shadow:0 8px 30px rgba(0,0,0,.08);
  padding:20px;
}

/* ===== GALLERY ===== */
.tp-gallery{
  position:relative;
}

.offer-amount-badge{
  position:absolute;
  top:10px;
  right:10px;
  z-index:2;
  background:rgba(0,0,0,.75);
  color:#fff;
  padding:4px 10px;
  border-radius:999px;
  font-size:13px;
  font-weight:800;
}

.gallery-back-btn{
  position:absolute;
  top:12px;
  left:12px;
  z-index:20;
  width:40px;
  height:40px;
  border:none;
  border-radius:50%;
  background:rgba(0,0,0,.55);
  backdrop-filter:blur(8px);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

.gallery-back-btn svg{
  width:20px;
  height:20px;
  stroke:#fff;
  stroke-width:2.6;
  fill:none;
}

/* ===== TITLE / ID / FAVORITE ===== */
.title{
  font-size:22px;
  font-weight:600;
  line-height:1.35;
  color:#111827;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;
  word-break:break-word;
  overflow-wrap:anywhere;
}

.offer-public-id{
  margin-top:6px;
  display:inline-block;
  font-size:13px;
  font-weight:700;
  color:#6b7280;
  cursor:pointer;
  user-select:none;
  transition:color .2s ease;
}

.offer-public-id:hover{
  color:#1E50D4;
}

.offer-public-id.copied{
  color:#16a34a;
}

.offer-page-heart{
  width:44px;
  height:44px;
  flex-shrink:0;
  border-radius:50%;
  background:#fff;
  border:1px solid #e5e7eb;
  display:flex;
  align-items:center;
  justify-content:center;
}

.offer-page-heart svg{
  width:22px;
  height:22px;
  fill:none;
  stroke:#6b7280;
  stroke-width:2;
}

.offer-page-heart.active svg{
  fill:#ef4444;
  stroke:#ef4444;
}

.offer-page-price{
  font-size:28px;
  font-weight:900;
  margin:8px 0 12px;
}

/* ===== ACTION BUTTONS ===== */
#actionButtons{
  display:flex;
  gap:10px;
  margin-top:28px;
}

.buybtn{
  flex:1;
  height:48px;
  border-radius:12px;
  font-size:15px;
  font-weight:600;
  cursor:pointer;
  transition:none;
}

.buy-primary{
  background:#2F5BEA;
  color:#fff;
  border:none;
}

.buy-secondary{
  background:#fff;
  color:#2F5BEA;
  border:1.5px solid #2F5BEA;
}

/* ===== SHARE / REPORT ===== */
.offer-tools{
  display:flex;
  gap:10px;
  margin-top:12px;
  margin-bottom:18px;
}

.offer-tool-btn{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  height:46px;
  border-radius:14px;
  border:1px solid #e5e7eb;
  background:#fff;
  color:#4b5563;
  font-size:14px;
  font-weight:600;
  cursor:pointer;
  transition:background .15s ease, border-color .15s ease, color .15s ease;
}

.offer-tool-btn:hover{
  background:#f9fafb;
  border-color:#d1d5db;
}

.offer-tool-btn svg{
  width:18px;
  height:18px;
  stroke:currentColor;
  fill:none;
  stroke-width:2;
  flex-shrink:0;
}

.offer-tool-btn.is-success{
  color:#16a34a;
  border-color:#bbf7d0;
  background:#f0fdf4;
}

/* ===== SELLER ===== */
.section{
  margin-top:16px;
}

.section-title{
  font-size:14px;
  font-weight:800;
  margin-bottom:6px;
  color:#111;
}

.sellerTop{
  display:flex;
  gap:12px;
  align-items:center;
  margin-bottom:6px;
}

.offer-page-avatar{
  width:56px;
  height:56px;
  position:relative;
  flex-shrink:0;
  overflow:visible;
}

.offer-page-avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
  border-radius:50%;
  display:block;
}

.seller-status-dot{
  position:absolute;
  right:-3px;
  bottom:-3px;
  z-index:2;
  width:18px;
  height:18px;
  border-radius:50%;
  background:#9ca3af;
  border:2px solid #fff;
  box-sizing:border-box;
}

.seller-status-dot.online{
  background:#22c55e;
}

.seller-status-dot.offline{
  background:#9ca3af;
}

.offer-page-card .seller-info{
  display:flex;
  flex-direction:column;
  gap:3px;
}

.offer-page-card .seller-name{
  font-size:16px;
  font-weight:700;
  color:#111827;
}

.offer-page-card .seller-rating,
.offer-page-card .seller-on-site{
  font-size:13px;
  font-weight:500;
  color:#6b7280;
  line-height:1.35;
  min-height:auto;
  display:block;
}

.offer-page-card .seller-last-seen{
  display:none !important;
}

.seller-name:hover,
.seller-rating:hover{
  opacity:.8;
}

/* ===== DESCRIPTION ===== */
.desc{
  font-size:15px;
  line-height:1.6;
  color:#374151;
  margin-bottom:16px;
  display:-webkit-box;
  -webkit-line-clamp:6;
  -webkit-box-orient:vertical;
  overflow:hidden;
  word-break:break-word;
  overflow-wrap:anywhere;
}

/* ===== MOBILE ===== */
@media (max-width:768px){
  .tp-header,
  .tp-header-mobile{
    display:none !important;
  }

  .page{
    margin:0;
    padding:0;
  }

  .page-content{
    margin-top:0;
    padding-top:0;
  }

  .offer-page-card{
    background:transparent;
    border-radius:0;
    box-shadow:none;
    padding:0 16px 120px;
  }

  .tp-gallery{
    width:100vw;
    height:45vh;
    margin-left:calc(50% - 50vw);
    margin-top:0;
    border-radius:0;
    overflow:hidden;
  }

  .tp-gallery__track img{
    width:100%;
    height:100%;
    object-fit:cover;
  }

  .tp-gallery__arrow{
    display:none !important;
  }

  .title{
    font-size:20px;
  }

  .offer-page-price{
    font-size:26px;
    margin-top:12px;
  }

  .offer-page-avatar{
    width:48px;
    height:48px;
  }

  .seller-status-dot{
    width:16px;
    height:16px;
    right:-2px;
    bottom:-2px;
  }

  .offer-tools{
    gap:10px;
    margin-top:12px;
    margin-bottom:16px;
  }

  .offer-tool-btn{
    height:44px;
    font-size:13px;
    border-radius:12px;
  }
}

@media (max-width:640px){
  body{
    padding-top:0 !important;
  }
}
</style>
</head>

<script>
function getCurrentPageLang(){
  const lang = (localStorage.getItem("tp_lang") || "ru").trim().toLowerCase();
  return ["ru", "uk", "en"].includes(lang) ? lang : "ru";
}

function getTextByLang(obj){
  const lang = getCurrentPageLang();
  return obj?.[lang] || obj?.ru || obj?.uk || obj?.en || "";
}

function getOfferUiText(){
  const lang = getCurrentPageLang();

  if (lang === "uk") {
    return {
      share: "Поділитися",
      shareDone: "Посилання скопійовано",
      shareFail: "Не вдалося поділитися",
      report: "Поскаржитися",
      reportLogin: "Спочатку увійдіть в акаунт"
    };
  }

  if (lang === "en") {
    return {
      share: "Share",
      shareDone: "Link copied",
      shareFail: "Unable to share",
      report: "Report",
      reportLogin: "Please log in first"
    };
  }

  return {
    share: "Поделиться",
    shareDone: "Ссылка скопирована",
    shareFail: "Не удалось поделиться",
    report: "Пожаловаться",
    reportLogin: "Сначала войдите в аккаунт"
  };
}
</script>

<script>
const params = new URLSearchParams(location.search);
const offerId = params.get("id");

const titleEl = document.getElementById("title");
const descEl = document.getElementById("desc");
const priceEl = document.getElementById("price");
const sellerStatusDotEl = document.getElementById("sellerStatusDot");
const sellerNameEl = document.getElementById("sellerName");
const sellerAvatarEl = document.getElementById("sellerAvatar");
const sellerRatingEl = document.getElementById("sellerRating");
const sellerOnSiteEl = document.getElementById("sellerOnSite");
const shareOfferBtn = document.getElementById("shareOfferBtn");
const shareOfferBtnText = document.getElementById("shareOfferBtnText");
const reportOfferBtn = document.getElementById("reportOfferBtn");
const reportOfferBtnText = document.getElementById("reportOfferBtnText");

const SUPPORT_CREATE_URL = "/support-create.html";

let currentOffer = null;

if (!offerId) {
  history.back();
  throw new Error("Offer ID not found");
}

function formatReviewsCount(n){
  const abs = Math.abs(Number(n) || 0);
  const lastTwo = abs % 100;
  const last = abs % 10;

  if (lastTwo >= 11 && lastTwo <= 14) return n + " отзывов";
  if (last === 1) return n + " отзыв";
  if (last >= 2 && last <= 4) return n + " отзыва";
  return n + " отзывов";
}

function renderStars(avg){
  const rounded = Math.round(avg || 0);

  let html = `<span style="color:#facc15;">`;
  for(let i = 1; i <= 5; i++){
    html += i <= rounded ? "★" : "☆";
  }
  html += `</span>`;

  return html;
}
function renderUnavailable(message){
  const actions = document.getElementById("actionButtons");

  actions.innerHTML = `
    <div style="
      width:100%;
      padding:14px;
      border-radius:12px;
      background:#f3f4f6;
      color:#6b7280;
      font-weight:700;
      text-align:center;
    ">
      ${message}
    </div>
  `;
}

// ===== LOAD OFFER =====
async function loadOffer(){
const token = localStorage.getItem("tp_token");

const res = await fetch(`/api/offers/${offerId}`, {
  headers: token
    ? { Authorization: "Bearer " + token }
    : {}
});

const data = await res.json();

if (!data.success) {
  alert("Оффер не найден");
  return;
}

if (data.deleted || !data.offer) {
  renderUnavailable("Предложение удалено");
  return;
}

const o = data.offer;
currentOffer = o;
setupOfferToolTexts();

let unavailableMessage = null;

if (data.deleted === true) {
  unavailableMessage = "Предложение удалено";
} else if (o.status !== "active") {
  unavailableMessage = "Товар продан";
} else if (data.blockedBySeller === true) {
  unavailableMessage = "Временно недоступно";
}

if (unavailableMessage) {
  renderUnavailable(unavailableMessage);
}

if(token){

  const meRes = await fetch("/auth/me",{
    headers:{ Authorization:"Bearer " + token }
  });

  const meData = await meRes.json();

  const isOwner = meData.success && meData.user.userId === o.seller.userId;
if (reportOfferBtn) {
  reportOfferBtn.style.display = isOwner ? "none" : "";
}
const actions = document.getElementById("actionButtons");

if(isOwner){

  if(o.status === "active"){

    const params = new URLSearchParams({
      game: o.game,
      mode: o.mode,
      edit: o.id
    });

    actions.innerHTML = `
      <button class="buybtn"
              style="background:#fff;color:#1E50D4;border:2px solid #1E50D4;"
              onclick="location.href='/offer-create.html?${params.toString()}'">
        Редактировать
      </button>
    `;

  } else {
    renderUnavailable("Товар продан");
  }

} else {

  // 👇 ДЛЯ ОБЫЧНОГО ПОЛЬЗОВАТЕЛЯ
  if(o.status !== "active"){
    renderUnavailable("Товар продан");
  }

}
}
// === КНОПКА КУПИТЬ ===
const buyBtn = document.getElementById("buyBtn");

if (buyBtn) {
  buyBtn.onclick = async () => {

    const token = localStorage.getItem("tp_token");

    if (!token) {
      location.href = "/auth.html?mode=login";
      return;
    }

    buyBtn.disabled = true;
    buyBtn.textContent = "Создание заказа...";

    const res = await fetch("/api/orders/create", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token
      },
      body: JSON.stringify({ offerId })
    });

    const data = await res.json();

    if (!data.success) {
      alert(data.message || "Ошибка создания заказа");
      buyBtn.disabled = false;
      buyBtn.textContent = "Купить";
      return;
    }

    location.href = "/order.html?id=" + data.order.id;
  };
}

  setupFavorite(o.id);
  const amountBadge = document.getElementById("amountBadge");

const qty = o.stock ?? o.amount;

if (qty && Number(qty) > 1 && o.mode !== "robux") {
  amountBadge.textContent = `×${qty}`;
  amountBadge.style.display = "block";
} else {
  amountBadge.style.display = "none";
}

titleEl.textContent = buildOfferTitle(o);
  const offerPublicId = document.getElementById("offerPublicId");

if (o.offerId) {
  offerPublicId.textContent = "OID: " + o.offerId;

  offerPublicId.onclick = async () => {
    try {
      await navigator.clipboard.writeText(o.offerId);
      offerPublicId.classList.add("copied");

      setTimeout(() => {
        offerPublicId.classList.remove("copied");
      }, 1200);
    } catch(e){}
  };
} else {
  offerPublicId.textContent = "";
}
  setupTitleExpand();
priceEl.dataset.price = o.price;
await updatePrice();

// seller
sellerNameEl.textContent = o.seller.username;

// 👉 Переход в профиль по ID
if (o.seller.userId) {

sellerNameEl.style.cursor = "pointer";
sellerAvatarEl.style.cursor = "pointer";

async function goToSellerProfile() {

  const token = localStorage.getItem("tp_token");

  if (!token) {
    location.href = `/profile.html?id=${o.seller.userId}`;
    return;
  }

  const meRes = await fetch("/auth/me", {
    headers: { Authorization: "Bearer " + token }
  });

  const meData = await meRes.json();

  if (meData.success && meData.user.userId === o.seller.userId) {
    location.href = "/profile.html";
  } else {
    location.href = `/profile.html?id=${o.seller.userId}`;
  }
}

sellerNameEl.onclick = goToSellerProfile;
sellerAvatarEl.onclick = goToSellerProfile;

}
// ===== seller rating (оставляем твою систему, но нормальный вид) =====
const count = Number(o.seller.reviewsCount || 0);

if (count === 0) {
sellerRatingEl.textContent = "Нет отзывов";
} else {
sellerRatingEl.innerHTML = `
  ${renderStars(o.seller.rating)}
  <span style="margin-left:6px;">${formatReviewsCount(count)}</span>
`;
}

function parseDateToMs(v){
  if(!v) return 0;
  if(typeof v === "number"){
    // если пришло в секундах (10 цифр) — переводим в мс
    return v < 1e12 ? v * 1000 : v;
  }
  const ms = Date.parse(v);
  return Number.isNaN(ms) ? 0 : ms;
}

function formatOnSite(ms){
  const diff = Date.now() - ms;
  if (diff <= 0) return "";

  const minute = 60 * 1000;
  const hour = 60 * minute;
  const day = 24 * hour;
  const week = 7 * day;
  const month = 30 * day;
  const year = 365 * day;

  const minutes = Math.floor(diff / minute);
  const hours = Math.floor(diff / hour);
  const days = Math.floor(diff / day);
  const weeks = Math.floor(diff / week);
  const months = Math.floor(diff / month);
  const years = Math.floor(diff / year);

if (minutes < 1) return "На TyPlace меньше минуты";
if (minutes < 60) return `На TyPlace уже ${minutes} ${getMinutesWord(minutes)}`;
if (hours < 24) return `На TyPlace уже ${hours} ${getHoursWord(hours)}`;
if (days < 7) return `На TyPlace уже ${days} ${getDaysWord(days)}`;
if (weeks < 5) return `На TyPlace уже ${weeks} ${getWeeksWord(weeks)}`;
if (months < 12) return `На TyPlace уже ${months} ${getMonthsWord(months)}`;

return `На TyPlace уже ${years} ${getYearsWord(years)}`;
}

function getMinutesWord(n){
  const d10 = n % 10;
  const d100 = n % 100;
  if (d10 === 1 && d100 !== 11) return "минуту";
  if (d10 >= 2 && d10 <= 4 && !(d100 >= 12 && d100 <= 14)) return "минуты";
  return "минут";
}

function getHoursWord(n){
  const d10 = n % 10;
  const d100 = n % 100;
  if (d10 === 1 && d100 !== 11) return "час";
  if (d10 >= 2 && d10 <= 4 && !(d100 >= 12 && d100 <= 14)) return "часа";
  return "часов";
}

function getDaysWord(n){
  const d10 = n % 10;
  const d100 = n % 100;
  if (d10 === 1 && d100 !== 11) return "день";
  if (d10 >= 2 && d10 <= 4 && !(d100 >= 12 && d100 <= 14)) return "дня";
  return "дней";
}

  if (d10 >= 2 && d10 <= 4 && !(d100 >= 12 && d100 <= 14)) return "недели";
  return "недель";
}

  return "месяцев";
}

function getFavs(){
  try {
    return JSON.parse(localStorage.getItem("tp_favorites") || "[]");
  } catch {
    return [];
  }
}

function setFavs(arr){
  localStorage.setItem("tp_favorites", JSON.stringify(arr));
}

function getCurrentLangForFav(){
  const lang = (localStorage.getItem("tp_lang") || "ru").trim().toLowerCase();
  return ["ru", "uk", "en"].includes(lang) ? lang : "ru";
}

function isFavorite(id){
  const lang = getCurrentLangForFav();

  return getFavs().some(f => {
    if (typeof f === "string") return f === id;
    return f.id === id && f.lang === lang;
  });
}

function toggleFavorite(id){
  const lang = getCurrentLangForFav();
  let favs = getFavs();

  const index = favs.findIndex(f => {
    if (typeof f === "string") return f === id;
    return f.id === id && f.lang === lang;
  });

  if (index >= 0) {
    favs.splice(index, 1);
    setFavs(favs);
    return false;
  }

  favs.push({ id, lang });
  setFavs(favs);
  return true;
}

function waitForGames(){
  return new Promise(resolve => {
    const check = () => {
      if (window.GAMES) resolve();
      else setTimeout(check, 10);
    };
    check();
  });
}

async function initOfferPage(){
  const lang = getCurrentPageLang();

  await waitForGames();

  if (window.tpI18n?.load) {
    await window.tpI18n.load(lang);
  }

  await loadOffer();
}

initOfferPage();

window.addEventListener("tp:lang-change", async (e) => {
  const lang = (e.detail?.lang || getCurrentPageLang()).trim().toLowerCase();

  if (window.tpI18n?.load) {
    await window.tpI18n.load(lang);
  }

  await waitForGames();
  await loadOffer();
});

async function updatePrice(){
  const basePrice = Number(priceEl.dataset.price);

  if (!Number.isFinite(basePrice) || basePrice <= 0) return;

  priceEl.textContent = await tpMoney.formatPrice(basePrice);
}

// ===== UI CLEANUP =====
function cleanupOfferUI(o){
  const descText = getTextByLang(o.description);
  const section = document.getElementById("descSection");

  if (!descText) {
    section.style.display = "none";
  } else {
    descEl.textContent = descText;
    section.style.display = "block";
  }
}

window.addEventListener("tp:currency-change", updatePrice);

function setupTitleExpand(){
  const titleEl = document.getElementById("title");
  const btn = document.getElementById("expandTitleBtn");

  titleEl.style.display = "-webkit-box";
  titleEl.style.webkitLineClamp = "2";
  btn.style.display = "none";

  setTimeout(() => {
    if (titleEl.scrollHeight > titleEl.clientHeight) {
      btn.style.display = "block";
    }
  }, 50);

  btn.onclick = () => {
    titleEl.style.display = "block";
    titleEl.style.webkitLineClamp = "unset";
    btn.style.display = "none";
  };
}

function setupDescExpand(){
  const descEl = document.getElementById("desc");
  const btn = document.getElementById("expandDescBtn");

  descEl.style.display = "-webkit-box";
  descEl.style.webkitLineClamp = "6";
  btn.style.display = "none";

  setTimeout(() => {
    if (descEl.scrollHeight > descEl.clientHeight) {
      btn.style.display = "block";
    }
  }, 50);

  btn.onclick = () => {
    descEl.style.display = "block";
    descEl.style.webkitLineClamp = "unset";
    btn.style.display = "none";
  };
}

function setupOfferToolTexts(){
  const t = getOfferUiText();

  if (shareOfferBtnText) shareOfferBtnText.textContent = t.share;
  if (reportOfferBtnText) reportOfferBtnText.textContent = t.report;
}

function getOfferAbsoluteUrl(){
  return new URL(`/offer.html?id=${offerId}`, window.location.origin).toString();
}

function flashToolButton(btn, text){
  if (!btn) return;

  const span = btn.querySelector("span");
  if (!span) return;

  const oldText = span.textContent;

  btn.classList.add("is-success");
  span.textContent = text;

  setTimeout(() => {
    btn.classList.remove("is-success");
    span.textContent = oldText;
  }, 1400);
}

async function shareOffer(){
  if (!currentOffer) return;

  const t = getOfferUiText();
  const url = getOfferAbsoluteUrl();
  const title = getTextByLang(currentOffer.title) || document.title;

  const shareData = {
    title,
    text: title,
    url
  };

  if (navigator.share) {
    try {
      if (!navigator.canShare || navigator.canShare(shareData)) {
        await navigator.share(shareData);
        return;
      }
    } catch (e) {
      if (e && e.name === "AbortError") return;
    }
  }

  try {
    await navigator.clipboard.writeText(url);
    flashToolButton(shareOfferBtn, t.shareDone);
  } catch (e) {
    alert(t.shareFail);
  }
}

function openOfferReportPage(){
  if (!currentOffer) return;

  const token = localStorage.getItem("tp_token");
  const t = getOfferUiText();

  if (!token) {
    alert(t.reportLogin);
    location.href = "/auth.html?mode=login";
    return;
  }

  const params = new URLSearchParams({
    category: "report_offer",
    offerId: currentOffer.offerId ? `OID:${currentOffer.offerId}` : ""
  });

  location.href = `${SUPPORT_CREATE_URL}?${params.toString()}`;
}

if (shareOfferBtn) {
  shareOfferBtn.addEventListener("click", shareOffer);
}

if (reportOfferBtn) {
  reportOfferBtn.addEventListener("click", openOfferReportPage);
}

function setupFavorite(offerId){
  const btn = document.getElementById("favoriteBtn");
  if (!btn) return;

  if (isFavorite(offerId)) {
    btn.classList.add("active");
  }

  btn.onclick = (e) => {
    e.stopPropagation();

    const active = toggleFavorite(offerId);

    if (active) {
      btn.classList.add("active");
    } else {
      btn.classList.remove("active");
    }
  };
}

<script>
async function openChatWithSeller(offerId){

  const token = localStorage.getItem("tp_token");

  if(!token){
    location.href = "/auth.html?mode=login";
    return;
  }

  const res = await fetch("/api/chats/start",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer " + token
    },
    body: JSON.stringify({ offerId })
  });

  const data = await res.json();

  if(!data.success){
    alert("Не удалось открыть чат");
    return;
  }

// 🔥 если пользователь снова зашёл через кнопку,
// убираем скрытие мини-блока
localStorage.removeItem("tp_hide_offer_block_" + offerId);

// 🔥 сохраняем какой чат открыть
localStorage.setItem("tp_active_chat", data.chat.id);

// 🔥 переходим в чаты
location.href = "/chats.html";

}
