<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title data-i18n="page.title"></title>

  <link rel="stylesheet" href="/header.css">

<style>
html,
body{
  min-height:100%;
}

body{
  margin:0;
  display:flex;
  flex-direction:column;
  font-family:Inter, Arial, sans-serif;
  background:#f6f7f9;
  color:#111827;
}

.page-content{
  flex:1 0 auto;
}

.page{
  max-width:1200px;
  margin:24px auto;
  padding:0 16px;
  box-sizing:border-box;
}

.offer-page-card{
  max-width:800px;
  margin:0 auto;
  background:#fff;
  border-radius:20px;
  box-shadow:0 8px 30px rgba(0,0,0,.08);
  padding:20px 20px 28px;
  box-sizing:border-box;
}

/* ===== GALLERY ===== */
.tp-gallery{
  position:relative;
  border-radius:18px;
  overflow:hidden;
}

.offer-amount-badge{
  position:absolute;
  top:10px;
  right:10px;
  z-index:2;
  background:rgba(0,0,0,.75);
  color:#fff;
  padding:4px 10px;
  border-radius:999px;
  font-size:13px;
  font-weight:800;
}

.gallery-back-btn{
  position:absolute;
  top:12px;
  left:12px;
  z-index:20;
  width:42px;
  height:42px;
  border:none;
  border-radius:50%;
  background:rgba(0,0,0,.55);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

.gallery-back-btn svg{
  width:20px;
  height:20px;
  stroke:#fff;
  stroke-width:2.6;
  stroke-linecap:round;
  stroke-linejoin:round;
  fill:none;
  display:block;
}

/* ===== HEAD ===== */
.offer-head{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:16px;
  margin-top:18px;
}

.offer-head-main{
  flex:1;
  min-width:0;
}

.offer-head-tools{
  display:flex;
  align-items:center;
  gap:10px;
  flex-shrink:0;
  padding-top:2px;
}

.title{
  font-size:22px;
  font-weight:700;
  line-height:1.3;
  color:#111827;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;
  word-break:break-word;
  overflow-wrap:anywhere;
}

.offer-public-id{
  margin-top:8px;
  display:inline-block;
  font-size:13px;
  font-weight:700;
  color:#6b7280;
  cursor:pointer;
  user-select:none;
  transition:color .2s ease;
}

.offer-public-id:hover{
  color:#1E50D4;
}

.offer-public-id.copied{
  color:#16a34a;
}

.offer-icon-btn,
.offer-page-heart{
  width:46px;
  height:46px;
  border-radius:50%;
  border:1px solid #e5e7eb;
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:0;
  cursor:pointer;
  box-sizing:border-box;
  transition:background .15s ease, border-color .15s ease, transform .15s ease;
}

.offer-icon-btn:hover,
.offer-page-heart:hover{
  background:#f9fafb;
  border-color:#d1d5db;
}

.offer-icon-btn:active,
.offer-page-heart:active{
  transform:scale(.97);
}

.offer-icon-btn{
  color:#6b7280;
}

.offer-page-heart{
  color:#6b7280;
}

.offer-icon-btn svg,
.offer-page-heart svg,
.offer-chat-fab svg{
  width:22px;
  height:22px;
  display:block;
  fill:none;
  stroke:currentColor;
  stroke-width:2;
  stroke-linecap:round;
  stroke-linejoin:round;
  vector-effect:non-scaling-stroke;
}

.offer-icon-btn.is-success{
  color:#1d4ed8;
  border-color:#bfdbfe;
  background:#eff6ff;
}

.offer-page-heart.active{
  color:#ef4444;
}

.offer-page-heart.active svg{
  fill:#ef4444;
  stroke:#ef4444;
}

.offer-page-price{
  font-size:28px;
  font-weight:900;
  margin:14px 0 18px;
  color:#111827;
}

/* ===== ACTION BUTTONS ===== */
#actionButtons{
  display:flex;
  gap:10px;
  margin-top:0;
  margin-bottom:22px;
}

.buybtn{
  width:100%;
  max-width:none;
  height:54px;
  border-radius:16px;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
  transition:none;
}

.buy-primary{
  background:#2F5BEA;
  color:#fff;
  border:none;
}

.buy-secondary{
  background:#fff;
  color:#2F5BEA;
  border:1.5px solid #2F5BEA;
}

/* ===== SELLER ===== */
.section{
  margin-top:24px;
}

.section-title{
  font-size:13px;
  font-weight:800;
  letter-spacing:.14em;
  text-transform:uppercase;
  color:#9ca3af;
  margin-bottom:12px;
}

.sellerTop{
  display:flex;
  gap:14px;
  align-items:center;
  margin-bottom:0;
}

.offer-page-avatar{
  width:58px;
  height:58px;
  position:relative;
  flex-shrink:0;
  overflow:visible;
}

.offer-page-avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
  border-radius:50%;
  display:block;
}

.seller-status-dot{
  position:absolute;
  right:-3px;
  bottom:-3px;
  z-index:2;
  width:18px;
  height:18px;
  border-radius:50%;
  background:#9ca3af;
  border:2px solid #fff;
  box-sizing:border-box;
}

.seller-status-dot.online{
  background:#22c55e;
}

.seller-status-dot.offline{
  background:#9ca3af;
}

.offer-page-card .seller-info{
  display:flex;
  flex-direction:column;
  gap:4px;
}

.offer-page-card .seller-name{
  font-size:17px;
  font-weight:700;
  color:#111827;
  line-height:1.2;
}

.offer-page-card .seller-rating,
.offer-page-card .seller-on-site{
  font-size:14px;
  font-weight:500;
  color:#6b7280;
  line-height:1.35;
  min-height:auto;
  display:block;
}

.offer-page-card .seller-rating{
  width:fit-content;
}

.offer-page-card .seller-last-seen{
  display:none !important;
}

.seller-name:hover,
.seller-rating:hover{
  opacity:.8;
}

/* ===== DESCRIPTION ===== */
.desc{
  font-size:16px;
  line-height:1.7;
  color:#111827;
  margin-bottom:0;
  white-space:pre-wrap;
  display:-webkit-box;
  -webkit-line-clamp:6;
  -webkit-box-orient:vertical;
  overflow:hidden;
  word-break:break-word;
  overflow-wrap:anywhere;
}

#expandDescBtn{
  margin-top:10px !important;
}

/* ===== FLOAT CHAT ===== */
.offer-chat-fab[hidden]{
  display:none !important;
}

.offer-chat-fab{
  position:fixed;
  right:18px;
  bottom:calc(104px + env(safe-area-inset-bottom, 0px));
  z-index:120;
  width:62px;
  height:62px;
  border:none;
  border-radius:50%;
  border:3px solid rgba(255,255,255,.92);
  background:#2F5BEA;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  box-sizing:border-box;
  box-shadow:0 18px 36px rgba(47,91,234,.28);
  opacity:0;
  transform:translateY(14px) scale(.92);
  pointer-events:none;
  transition:opacity .28s ease, transform .28s ease, box-shadow .2s ease;
}

.offer-chat-fab.is-visible{
  opacity:1;
  transform:translateY(0) scale(1);
  pointer-events:auto;
}

.offer-chat-fab svg{
  width:25px;
  height:25px;
}

.offer-chat-fab:active{
  transform:translateY(0) scale(.96);
}

/* ===== MOBILE ===== */
@media (max-width:768px){
  .tp-header,
  .tp-header-mobile{
    display:none !important;
  }

  .page{
    margin:0;
    padding:0;
  }

  .page-content{
    margin-top:0;
    padding-top:0;
  }

  .offer-page-card{
    background:transparent;
    border-radius:0;
    box-shadow:none;
    padding:0 16px 132px;
  }

  .tp-gallery{
    width:100vw;
    height:45vh;
    margin-left:calc(50% - 50vw);
    margin-top:0;
    border-radius:0;
    overflow:hidden;
  }

  .tp-gallery__track img{
    width:100%;
    height:100%;
    object-fit:cover;
  }

  .tp-gallery__arrow{
    display:none !important;
  }

  .offer-head{
    margin-top:16px;
    gap:12px;
  }

  .offer-head-tools{
    gap:8px;
  }

  .offer-icon-btn,
  .offer-page-heart{
    width:44px;
    height:44px;
  }

  .title{
    font-size:20px;
  }

  .offer-page-price{
    font-size:26px;
    margin:12px 0 16px;
  }

  #actionButtons{
    margin-bottom:24px;
  }

  .buybtn{
    height:54px;
  }

  .section{
    margin-top:22px;
  }

  .offer-page-avatar{
    width:52px;
    height:52px;
  }

  .seller-status-dot{
    width:16px;
    height:16px;
    right:-2px;
    bottom:-2px;
  }

  .offer-chat-fab{
    right:16px;
    bottom:calc(108px + env(safe-area-inset-bottom, 0px));
    width:60px;
    height:60px;
  }
}

@media (max-width:640px){

    padding-top:0 !important;
  }
}

.offer-chat-fab.is-visible{

<script>
function getCurrentPageLang(){
  const lang = (localStorage.getItem("tp_lang") || "ru").trim().toLowerCase();
  return ["ru", "uk", "en"].includes(lang) ? lang : "ru";
}

function getTextByLang(obj){
  const lang = getCurrentPageLang();
  return obj?.[lang] || obj?.ru || obj?.uk || obj?.en || "";
}

function pageT(key, params = {}){
  const fullKey = `page.${key}`;
  const tr = window.tpI18n?.t ? window.tpI18n.t(fullKey, params) : "";
  return tr && tr !== fullKey ? tr : key;
}

function goToSellerReviews(userId){
  const safeUserId = String(userId || "").trim();
  if (!safeUserId) return;
  location.href = `/reviews.html?id=${encodeURIComponent(safeUserId)}`;
}
</script>

<script>
const params = new URLSearchParams(location.search);
const offerId = params.get("id");

const titleEl = document.getElementById("title");
const descEl = document.getElementById("desc");
const priceEl = document.getElementById("price");
const sellerStatusDotEl = document.getElementById("sellerStatusDot");
const sellerNameEl = document.getElementById("sellerName");
const sellerAvatarEl = document.getElementById("sellerAvatar");
const sellerRatingEl = document.getElementById("sellerRating");
const sellerOnSiteEl = document.getElementById("sellerOnSite");
const shareOfferBtn = document.getElementById("shareOfferBtn");
const reportOfferBtn = document.getElementById("reportOfferBtn");
const chatFab = document.getElementById("chatFab");

const SUPPORT_CREATE_URL = "/support-create.html";

let currentOffer = null;
let chatFabShowTimer = null;
let chatFabHideTimer = null;

if (!offerId) {
  history.back();
  throw new Error("Offer ID not found");
}

function renderStars(avg){
  const rounded = Math.round(avg || 0);
  let html = `<span style="color:#facc15;">`;

  for(let i = 1; i <= 5; i++){
    html += i <= rounded ? "★" : "☆";
  }

  html += `</span>`;
  return html;
}

function setChatFabVisible(visible){
  if (!chatFab) return;

  clearTimeout(chatFabShowTimer);
  clearTimeout(chatFabHideTimer);

  if (visible) {
    chatFab.hidden = false;
    chatFab.classList.remove("is-visible");

    chatFabShowTimer = setTimeout(() => {
      requestAnimationFrame(() => {
        chatFab.classList.add("is-visible");
      });
    }, 260);

    return;
  }

  chatFab.classList.remove("is-visible");

  chatFabHideTimer = setTimeout(() => {
    chatFab.hidden = true;
  }, 340);
}

function renderUnavailable(message){
  const actions = document.getElementById("actionButtons");

  actions.innerHTML = `
    <div style="
      width:100%;
      padding:14px;
      border-radius:12px;
      background:#f3f4f6;
      color:#6b7280;
      font-weight:700;
      text-align:center;
    ">
      ${message}
    </div>
  `;

  setChatFabVisible(false);
}

async function loadOffer(){
  const token = localStorage.getItem("tp_token");

  const res = await fetch(`/api/offers/${offerId}`, {
    headers: token ? { Authorization: "Bearer " + token } : {}
  });

  const data = await res.json();

  if (!data.success) {
    alert(pageT("alerts.offerNotFound"));
    return;
  }

  if (data.deleted || !data.offer) {
    renderUnavailable(pageT("status.deleted"));
    return;
  }

  const o = data.offer;
  currentOffer = o;

  let unavailableMessage = null;
  let isOwner = false;

  if (data.deleted === true) {
    unavailableMessage = pageT("status.deleted");
  } else if (o.status !== "active") {
    unavailableMessage = pageT("status.sold");
  } else if (data.blockedBySeller === true) {
    unavailableMessage = pageT("status.unavailable");
  }

  if (token) {
    const meRes = await fetch("/auth/me", {
      headers:{ Authorization:"Bearer " + token }
    });

    const meData = await meRes.json();
    isOwner = meData.success && meData.user.userId === o.seller.userId;

    if (reportOfferBtn) {
      reportOfferBtn.style.display = isOwner ? "none" : "";
    }

    const actions = document.getElementById("actionButtons");

    if (isOwner) {
      if (o.status === "active") {
        const editParams = new URLSearchParams({
          game: o.game,
          mode: o.mode,
          edit: o.id
        });

        actions.innerHTML = `
          <button class="buybtn"
                  style="background:#fff;color:#1E50D4;border:2px solid #1E50D4;"
                  onclick="location.href='/offer-create.html?${editParams.toString()}'">
            ${pageT("buttons.edit")}
          </button>
        `;
      } else {
        renderUnavailable(pageT("status.sold"));
      }
    } else {
      if (o.status !== "active") {
        renderUnavailable(pageT("status.sold"));
      }
    }
  }

  if (unavailableMessage) {
    renderUnavailable(unavailableMessage);
  }

  setChatFabVisible(!isOwner && o.status === "active" && data.blockedBySeller !== true);

  const buyBtn = document.getElementById("buyBtn");

  if (buyBtn) {
    buyBtn.onclick = async () => {
      const token = localStorage.getItem("tp_token");

      if (!token) {
        location.href = "/auth.html?mode=login";
        return;
      }

      buyBtn.disabled = true;
      buyBtn.textContent = pageT("buttons.creatingOrder");

      const purchaseLang = getCurrentPageLang();

      const res = await fetch("/api/orders/create", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + token,
          "X-TP-Lang": purchaseLang
        },
        body: JSON.stringify({
          offerId,
          lang: purchaseLang
        })
      });

      const data = await res.json();

      if (!data.success) {
        alert(data.message || pageT("alerts.orderCreateError"));
        buyBtn.disabled = false;
        buyBtn.textContent = pageT("buttons.buy");
        return;
      }

      location.href = "/order.html?id=" + data.order.id;
    };
  }

  setupFavorite(o.id);

  const amountBadge = document.getElementById("amountBadge");
  const qty = o.stock ?? o.amount;

  if (qty && Number(qty) > 1 && o.mode !== "robux") {
    amountBadge.textContent = `×${qty}`;
    amountBadge.style.display = "block";
  } else {
    amountBadge.style.display = "none";
  }

  titleEl.textContent = buildOfferTitle(o);

  const offerPublicId = document.getElementById("offerPublicId");

if (o.offerId) {
  offerPublicId.textContent = "OID: " + o.offerId;
  offerPublicId.title = pageT("copyOfferId");
  offerPublicId.classList.remove("copied");

  offerPublicId.onclick = async () => {
    try {
      await navigator.clipboard.writeText(o.offerId);

      offerPublicId.classList.add("copied");

      setTimeout(() => {
        offerPublicId.classList.remove("copied");
      }, 1200);
    } catch(e){}
  };
} else {
  offerPublicId.textContent = "";
  offerPublicId.onclick = null;
}

  setupTitleExpand();
  priceEl.dataset.price = o.price;
  await updatePrice();

  sellerNameEl.textContent = o.seller.username;

  if (o.seller.userId) {
    sellerNameEl.style.cursor = "pointer";
    sellerAvatarEl.style.cursor = "pointer";

    async function goToSellerProfile() {
      const token = localStorage.getItem("tp_token");

      if (!token) {
        location.href = `/profile.html?id=${o.seller.userId}`;
        return;
      }

      const meRes = await fetch("/auth/me", {
        headers: { Authorization: "Bearer " + token }
      });

      const meData = await meRes.json();

      if (meData.success && meData.user.userId === o.seller.userId) {
        location.href = "/profile.html";
      } else {
        location.href = `/profile.html?id=${o.seller.userId}`;
      }
    }

    sellerNameEl.onclick = goToSellerProfile;
    sellerAvatarEl.onclick = goToSellerProfile;
  }

  const count = Number(o.seller.reviewsCount || 0);

  if (count === 0) {
    sellerRatingEl.textContent = pageT("seller.noReviews");
  } else {
    sellerRatingEl.innerHTML = `
      ${renderStars(o.seller.rating)}
      <span style="margin-left:6px;">${formatReviewsCount(count)}</span>
    `;
  }

  if (o.seller.userId) {
    sellerRatingEl.style.cursor = "pointer";
    sellerRatingEl.onclick = () => goToSellerReviews(o.seller.userId);
  } else {
    sellerRatingEl.style.cursor = "";
    sellerRatingEl.onclick = null;
  }

  function parseDateToMs(v){
    if(!v) return 0;

    if(typeof v === "number"){
      return v < 1e12 ? v * 1000 : v;
    }

    const ms = Date.parse(v);
    return Number.isNaN(ms) ? 0 : ms;
  }

  function pluralText(count, one, few, many){
    return window.tpI18n?.plural(count, one, few, many) || many;
  }

  function formatReviewsCount(n){
    return String(Math.abs(Number(n) || 0));
  }

  function getTimeWord(unit, count){
    return pluralText(
      count,
      pageT(`seller.words.${unit}.one`),
      pageT(`seller.words.${unit}.few`),
      pageT(`seller.words.${unit}.many`)
    );
  }

  function formatOnSite(ms){
    const diff = Date.now() - ms;
    if (diff <= 0) return "";

    const minute = 60 * 1000;
    const hour = 60 * minute;
    const day = 24 * hour;
    const week = 7 * day;
    const month = 30 * day;
    const year = 365 * day;

    const minutes = Math.floor(diff / minute);
    const hours = Math.floor(diff / hour);
    const days = Math.floor(diff / day);
    const weeks = Math.floor(diff / week);
    const months = Math.floor(diff / month);
    const years = Math.floor(diff / year);

    if (minutes < 1) {
      return pageT("seller.onSite.lessMinute");
    }

    if (minutes < 60) {
      return pageT("seller.onSite.minutes", {
        count: minutes,
        word: getTimeWord("minute", minutes)
      });
    }

    if (hours < 24) {
      return pageT("seller.onSite.hours", {
        count: hours,
        word: getTimeWord("hour", hours)
      });
    }

    if (days < 7) {
      return pageT("seller.onSite.days", {
        count: days,
        word: getTimeWord("day", days)
      });
    }

    if (weeks < 5) {
      return pageT("seller.onSite.weeks", {
        count: weeks,
        word: getTimeWord("week", weeks)
      });
    }

    if (months < 12) {
      return pageT("seller.onSite.months", {
        count: months,
        word: getTimeWord("month", months)
      });
    }

    return pageT("seller.onSite.years", {
      count: years,
      word: getTimeWord("year", years)
    });
  }

  const regMs =
    parseDateToMs(o.seller.createdAt) ||
    parseDateToMs(o.seller.registeredAt) ||
    parseDateToMs(o.seller.created) ||
    parseDateToMs(o.seller.createdAtMs);

  if (regMs) {
    sellerOnSiteEl.textContent = formatOnSite(regMs);
    sellerOnSiteEl.style.display = "block";
  } else {
    sellerOnSiteEl.textContent = "";
    sellerOnSiteEl.style.display = "none";
  }

  sellerStatusDotEl.classList.remove("online", "offline");

  if (o.seller.online === true) {
    sellerStatusDotEl.classList.add("online");
  } else {
    sellerStatusDotEl.classList.add("offline");
  }

  if (o.seller.avatarUrl) {
    sellerAvatarEl.src = o.seller.avatarUrl;
  } else if (o.seller.avatarDataUrl) {
    sellerAvatarEl.src = o.seller.avatarDataUrl;
  }

  const images = Array.isArray(o.images) && o.images.length
    ? o.images
    : (o.imageUrl ? [o.imageUrl] : []);

  initGallery({
    images,
    trackId: "galTrack",
    prevId: "galPrev",
    nextId: "galNext",
    galleryId: "gallery"
  });

  cleanupOfferUI(o);
  setupDescExpand();
}

function getFavs(){
  try {
    return JSON.parse(localStorage.getItem("tp_favorites") || "[]");
  } catch {
    return [];
  }
}

function setFavs(arr){
  localStorage.setItem("tp_favorites", JSON.stringify(arr));
}

function getCurrentLangForFav(){
  const lang = (localStorage.getItem("tp_lang") || "ru").trim().toLowerCase();
  return ["ru", "uk", "en"].includes(lang) ? lang : "ru";
}

function isFavorite(id){
  const lang = getCurrentLangForFav();

  return getFavs().some(f => {
    if (typeof f === "string") return f === id;
    return f.id === id && f.lang === lang;
  });
}

function toggleFavorite(id){
  const lang = getCurrentLangForFav();
  let favs = getFavs();

  const index = favs.findIndex(f => {
    if (typeof f === "string") return f === id;
    return f.id === id && f.lang === lang;
  });

  if (index >= 0) {
    favs.splice(index, 1);
    setFavs(favs);
    return false;
  }

  favs.push({ id, lang });
  setFavs(favs);
  return true;
}

function waitForGames(){
  return new Promise(resolve => {
    const check = () => {
      if (window.GAMES) resolve();
      else setTimeout(check, 10);
    };
    check();
  });
}

async function initOfferPage(){
  try {
    const lang = getCurrentPageLang();

    await waitForGames();

    if (window.tpI18n?.load) {
      await window.tpI18n.load(lang);
    }

    await loadOffer();
  } finally {
    markPageReady();
  }
}

initOfferPage();

window.addEventListener("tp:lang-change", async (e) => {
  const lang = ["ru", "uk", "en"].includes(String(e.detail?.lang || "").trim().toLowerCase())
    ? String(e.detail.lang).trim().toLowerCase()
    : getCurrentPageLang();

  if (window.tpI18n?.load) {
    await window.tpI18n.load(lang);
  }

  await waitForGames();
  await loadOffer();
});

async function updatePrice(){
  const basePrice = Number(priceEl.dataset.price);
  if (!Number.isFinite(basePrice) || basePrice <= 0) return;
  priceEl.textContent = await tpMoney.formatPrice(basePrice);
}

function cleanupOfferUI(o){
  const descText = getTextByLang(o.description);
  const section = document.getElementById("descSection");

  if (!section) return;

  if (!descText) {
    section.style.display = "none";
  } else {
    descEl.textContent = descText;
    section.style.display = "block";
  }
}

window.addEventListener("tp:currency-change", updatePrice);

function setupTitleExpand(){
  const btn = document.getElementById("expandTitleBtn");

  titleEl.style.display = "-webkit-box";
  titleEl.style.webkitLineClamp = "2";
  btn.style.display = "none";

  setTimeout(() => {
    if (titleEl.scrollHeight > titleEl.clientHeight) {
      btn.style.display = "block";
    }
  }, 50);

  btn.onclick = () => {
    titleEl.style.display = "block";
    titleEl.style.webkitLineClamp = "unset";
    btn.style.display = "none";
  };
}

function setupDescExpand(){
  const btn = document.getElementById("expandDescBtn");

  descEl.style.display = "-webkit-box";
  descEl.style.webkitLineClamp = "6";
  btn.style.display = "none";

  setTimeout(() => {
    if (descEl.scrollHeight > descEl.clientHeight) {
      btn.style.display = "block";
    }
  }, 50);

  btn.onclick = () => {
    descEl.style.display = "block";
    descEl.style.webkitLineClamp = "unset";
    btn.style.display = "none";
  };
}

function getOfferAbsoluteUrl(){
  return new URL(`/offer.html?id=${offerId}`, window.location.origin).toString();
}

function flashToolButton(btn){
  if (!btn) return;

  btn.classList.add("is-success");

  setTimeout(() => {
    btn.classList.remove("is-success");
  }, 1200);
}

async function shareOffer(){
  if (!currentOffer) return;

  const shareFailText = pageT("tools.shareFail");
  const url = getOfferAbsoluteUrl();
  const title = getTextByLang(currentOffer.title) || document.title;

  const shareData = {
    title,
    text: title,
    url
  };

  if (navigator.share) {
    try {
      if (!navigator.canShare || navigator.canShare(shareData)) {
        await navigator.share(shareData);
        return;
      }
    } catch (e) {
      if (e && e.name === "AbortError") return;
    }
  }

  try {
    await navigator.clipboard.writeText(url);
    flashToolButton(shareOfferBtn);
  } catch (e) {
    alert(shareFailText);
  }
}

function openOfferReportPage(){
  if (!currentOffer) return;

  const token = localStorage.getItem("tp_token");

  if (!token) {
    alert(pageT("tools.reportLogin"));
    location.href = "/auth.html?mode=login";
    return;
  }

  const reportParams = new URLSearchParams({
    category: "report_offer",
    offerId: currentOffer.offerId ? `OID:${currentOffer.offerId}` : ""
  });

  location.href = `${SUPPORT_CREATE_URL}?${reportParams.toString()}`;
}

if (shareOfferBtn) {
  shareOfferBtn.addEventListener("click", shareOffer);
}

if (reportOfferBtn) {
  reportOfferBtn.addEventListener("click", openOfferReportPage);
}

function setupFavorite(offerId){
  const btn = document.getElementById("favoriteBtn");
  if (!btn) return;

  if (isFavorite(offerId)) {
    btn.classList.add("active");
  }

  btn.onclick = (e) => {
    e.stopPropagation();

    const active = toggleFavorite(offerId);

    if (active) {
      btn.classList.add("active");
    } else {
      btn.classList.remove("active");
    }
  };
}
</script>

<script>
async function openChatWithSeller(offerId){
  const token = localStorage.getItem("tp_token");

  if(!token){
    location.href = "/auth.html?mode=login";
    return;
  }

  const res = await fetch("/api/chats/start",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer " + token
    },
    body: JSON.stringify({ offerId })
  });

  const data = await res.json();

  if(!data.success){
    alert(pageT("alerts.chatOpenError"));
    return;
  }

  localStorage.removeItem("tp_hide_offer_block_" + offerId);
  localStorage.setItem("tp_active_chat", data.chat.id);

  sessionStorage.setItem("tp_chat_back", JSON.stringify({
    type: "offer",
    offerId,
    chatId: data.chat.id,
    ts: Date.now()
  }));

  location.href = "/chats.html";
}
</script>
