<script>
function getTextByLang(obj){
  const lang = localStorage.getItem("tp_lang") || "ru";
  return obj?.[lang] || obj?.ru || "";
}
</script>

<script>
const params = new URLSearchParams(location.search);
const offerId = params.get("id");
if(!offerId){ location.href="/roblox.html"; }
function formatReviewsCount(n){
  const abs = Math.abs(Number(n) || 0);
  const lastTwo = abs % 100;
  const last = abs % 10;

  if (lastTwo >= 11 && lastTwo <= 14) return n + " отзывов";
  if (last === 1) return n + " отзыв";
  if (last >= 2 && last <= 4) return n + " отзыва";
  return n + " отзывов";
}

function renderStars(avg){
  const rounded = Math.round(avg || 0);

  let html = `<span style="color:#facc15;">`;
  for(let i = 1; i <= 5; i++){
    html += i <= rounded ? "★" : "☆";
  }
  html += `</span>`;

  return html;
}
function renderUnavailable(message){
  const actions = document.getElementById("actionButtons");

  actions.innerHTML = `
    <div style="
      width:100%;
      padding:14px;
      border-radius:12px;
      background:#f3f4f6;
      color:#6b7280;
      font-weight:700;
      text-align:center;
    ">
      ${message}
    </div>
  `;
}

// ===== LOAD OFFER =====
async function loadOffer(){
const token = localStorage.getItem("tp_token");

const res = await fetch(`/api/offers/${offerId}`, {
  headers: token
    ? { Authorization: "Bearer " + token }
    : {}
});

  const data = await res.json();
  if(!data.success){
    alert("Оффер не найден");
    return;
  }

  const o = data.offer;
let unavailableMessage = null;

if (data.deleted === true) {
  unavailableMessage = "Предложение удалено";
}
else if (o.status === "closed") {
  unavailableMessage = "Товар продан";
}
else if (data.blockedBySeller === true) {
  unavailableMessage = "Временно недоступно";
}
// ❗ Сначала проверяем статус для ВСЕХ
if(o.status !== "active"){
  renderUnavailable("Товар продан");
}
if(token){

  const meRes = await fetch("/auth/me",{
    headers:{ Authorization:"Bearer " + token }
  });

  const meData = await meRes.json();

  const isOwner = meData.success && meData.user.userId === o.seller.userId;

const actions = document.getElementById("actionButtons");

if(isOwner){

  if(o.status === "active"){

    const params = new URLSearchParams({
      game: o.game,
      mode: o.mode,
      edit: o.id
    });

    actions.innerHTML = `
      <button class="buybtn"
              style="background:#fff;color:#1E50D4;border:2px solid #1E50D4;"
              onclick="location.href='/offer-create.html?${params.toString()}'">
        Редактировать
      </button>
    `;

  } else {
    renderUnavailable("Товар продан");
  }

} else {

  // 👇 ДЛЯ ОБЫЧНОГО ПОЛЬЗОВАТЕЛЯ
  if(o.status !== "active"){
    renderUnavailable("Товар продан");
  }

}
}
// === КНОПКА КУПИТЬ ===
const buyBtn = document.getElementById("buyBtn");

if (buyBtn) {
  buyBtn.onclick = async () => {

    const token = localStorage.getItem("tp_token");

    if (!token) {
      location.href = "/auth.html?mode=login";
      return;
    }

    buyBtn.disabled = true;
    buyBtn.textContent = "Создание заказа...";

    const res = await fetch("/api/orders/create", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token
      },
      body: JSON.stringify({ offerId })
    });

    const data = await res.json();

    if (!data.success) {
      alert(data.message || "Ошибка создания заказа");
      buyBtn.disabled = false;
      buyBtn.textContent = "Купить";
      return;
    }

    location.href = "/order.html?id=" + data.order.id;
  };
}

  setupFavorite(o.id);
  const amountBadge = document.getElementById("amountBadge");

const qty = o.stock ?? o.amount;

if (qty && Number(qty) > 1 && o.mode !== "Робуксы") {
  amountBadge.textContent = `×${qty}`;
  amountBadge.style.display = "block";
} else {
  amountBadge.style.display = "none";
}

  title.textContent = buildOfferTitle(o);
  setupTitleExpand();
  price.dataset.price = o.price;
await updatePrice();

// seller
sellerName.textContent = o.seller.username;

// 👉 Переход в профиль по ID
if (o.seller.userId) {

  sellerName.style.cursor = "pointer";
  sellerAvatar.style.cursor = "pointer";

async function goToSellerProfile() {

  const token = localStorage.getItem("tp_token");

  if (!token) {
    location.href = `/profile.html?id=${o.seller.userId}`;
    return;
  }

  const meRes = await fetch("/auth/me", {
    headers: { Authorization: "Bearer " + token }
  });

  const meData = await meRes.json();

  if (meData.success && meData.user.userId === o.seller.userId) {
    location.href = "/profile.html";
  } else {
    location.href = `/profile.html?id=${o.seller.userId}`;
  }
}

sellerName.onclick = goToSellerProfile;
sellerAvatar.onclick = goToSellerProfile;

}
// ===== seller rating (оставляем твою систему, но нормальный вид) =====
const count = Number(o.seller.reviewsCount || 0);

if (count === 0) {
  sellerRating.textContent = "Нет отзывов";
} else {
  sellerRating.innerHTML = `
    ${renderStars(o.seller.rating)}
    <span style="margin-left:6px;">${formatReviewsCount(count)}</span>
  `;
}

// ===== "На сайте X" =====
const sellerOnSite = document.getElementById("sellerOnSite");

function parseDateToMs(v){
  if(!v) return 0;
  if(typeof v === "number"){
    // если пришло в секундах (10 цифр) — переводим в мс
    return v < 1e12 ? v * 1000 : v;
  }
  const ms = Date.parse(v);
  return Number.isNaN(ms) ? 0 : ms;
}

function formatOnSite(ms){
  const diff = Date.now() - ms;
  if(diff <= 0) return "";

  const days = Math.floor(diff / 86400000);
  const months = Math.floor(days / 30);
  const years = Math.floor(days / 365);

  if(years >= 1) return `На сайте ${years} ${years===1?"год":(years<5?"года":"лет")}`;
  if(months >= 1) return `На сайте ${months} ${months===1?"месяц":(months<5?"месяца":"месяцев")}`;
  if(days >= 1) return `На сайте ${days} ${days===1?"день":(days<5?"дня":"дней")}`;
  return "На сайте недавно";
}

// пробуем найти дату регистрации в разных возможных полях (на всякий)
const regMs =
  parseDateToMs(o.seller.createdAt) ||
  parseDateToMs(o.seller.registeredAt) ||
  parseDateToMs(o.seller.created) ||
  parseDateToMs(o.seller.createdAtMs);

if (regMs) {
  sellerOnSite.textContent = formatOnSite(regMs);
  sellerOnSite.style.display = "block";
} else {
  sellerOnSite.textContent = "";
  sellerOnSite.style.display = "none";
}
const sellerLastSeen = document.getElementById("sellerLastSeen");

// по умолчанию скрываем
sellerLastSeen.textContent = "";
sellerLastSeen.style.display = "none";
sellerLastSeen.classList.remove("online", "offline");

if (o.seller.online === true) {

  sellerLastSeen.textContent = "В сети";
  sellerLastSeen.classList.add("online");
  sellerLastSeen.style.display = "block";

} else if (o.seller.lastSeen) {

  const diff = Date.now() - o.seller.lastSeen;
  const minutes = Math.floor(diff / 60000);
  const hours = Math.floor(minutes / 60);
  const days = Math.floor(hours / 24);
  const weeks = Math.floor(days / 7);
  const months = Math.floor(days / 30);

  let text = "";

  if (minutes < 1) text = "Был(а) недавно";
  else if (minutes < 60) text = `Был(а) ${minutes} мин назад`;
  else if (hours < 24) text = `Был(а) ${hours} ч назад`;
  else if (days < 7) text = `Был(а) ${days} дн назад`;
  else if (weeks < 4) text = `Был(а) ${weeks} нед назад`;
  else text = `Был(а) ${months} мес назад`;

  sellerLastSeen.textContent = text;
  sellerLastSeen.classList.add("offline");
  sellerLastSeen.style.display = "block";
}
  if (o.seller.avatarUrl) {
    sellerAvatar.src = o.seller.avatarUrl;
  } else if (o.seller.avatarDataUrl) {
    sellerAvatar.src = o.seller.avatarDataUrl;
  }

// ===== GALLERY =====
const images = Array.isArray(o.images) && o.images.length
  ? o.images
  : (o.imageUrl ? [o.imageUrl] : []);

initGallery({
  images,
  trackId: "galTrack",
  prevId: "galPrev",
  nextId: "galNext",
  galleryId: "gallery"
});
cleanupOfferUI(o);
setupDescExpand();


}
function getFavs(){
  try{ return JSON.parse(localStorage.getItem("tp_favorites") || "[]"); }
  catch{ return []; }
}

function setFavs(arr){
  localStorage.setItem("tp_favorites", JSON.stringify(arr));
}

function toggleFavorite(id){
  let favs = getFavs();
  if(favs.includes(id)){
    favs = favs.filter(x => x !== id);
  } else {
    favs.push(id);
  }
  setFavs(favs);
  return favs.includes(id);
}

loadOffer();
async function updatePrice(){
  const eur = Number(price.dataset.price);
  if (!eur) return;

  price.textContent = await tpMoney.formatPrice(eur);
}
// ===== UI CLEANUP =====
function cleanupOfferUI(o){
  const descText = getTextByLang(o.description);
  const section = document.getElementById("descSection");

  if (!descText) {
    section.style.display = "none";
  } else {
    desc.textContent = descText;
    section.style.display = "block";
  }
}

window.addEventListener("tp:currency-change", updatePrice);

function setupTitleExpand(){
  const titleEl = document.getElementById("title");
  const btn = document.getElementById("expandTitleBtn");

  setTimeout(() => {
    if (titleEl.scrollHeight > titleEl.clientHeight) {
      btn.style.display = "block";
    }
  }, 50);

  btn.onclick = () => {
    titleEl.style.display = "block";
    titleEl.style.webkitLineClamp = "unset";
    btn.style.display = "none";
  };
}
function setupDescExpand(){
  const descEl = document.getElementById("desc");
  const btn = document.getElementById("expandDescBtn");

  setTimeout(() => {
    if (descEl.scrollHeight > descEl.clientHeight) {
      btn.style.display = "block";
    }
  }, 50);

  btn.onclick = () => {
    descEl.style.display = "block";
    descEl.style.webkitLineClamp = "unset";
    btn.style.display = "none";
  };
}

function setupFavorite(offerId){
  const btn = document.getElementById("favoriteBtn");
  if(!btn) return;

  const favs = getFavs();

  if(favs.includes(offerId)){
    btn.classList.add("active");
  }

  btn.onclick = (e) => {
    e.stopPropagation();

    const active = toggleFavorite(offerId);

    if(active){
      btn.classList.add("active");
    } else {
      btn.classList.remove("active");
    }
  };
}

</script>
<script>
async function openChatWithSeller(offerId){

  const token = localStorage.getItem("tp_token");

  if(!token){
    location.href = "/auth.html?mode=login";
    return;
  }

  const res = await fetch("/api/chats/start",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer " + token
    },
    body: JSON.stringify({ offerId })
  });

  const data = await res.json();

  if(!data.success){
    alert("Не удалось открыть чат");
    return;
  }

// 🔥 если пользователь снова зашёл через кнопку,
// убираем скрытие мини-блока
localStorage.removeItem("tp_hide_offer_block_" + offerId);

// 🔥 сохраняем какой чат открыть
localStorage.setItem("tp_active_chat", data.chat.id);

// 🔥 переходим в чаты
location.href = "/chats.html";

}
</script>
