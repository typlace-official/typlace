<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Избранные — TyPlace</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="/header.css">
  <link rel="stylesheet" href="/game.css">
  <link rel="stylesheet" href="/footer.css">

</head>

<body>

<div id="header-container"></div>

<main class="page-content">
  <div class="page">

  <div class="container">

<h2 style="margin:10px 0 20px;" data-i18n="common.favorites"></h2>

    <div id="offersList" class="offers-list"></div>

<div id="empty" class="empty" style="display:none;"></div>
  </div>
</div>
</main>

<div id="footer-container"></div>

<script src="/socket.io/socket.io.js"></script>
<script src="/games.list.js"></script>
<script src="/i18n.js"></script>
<script src="/header.js"></script>
<script src="/tp-money.js"></script>
<script src="/offer-title.js"></script>
<script src="/offer-card.js"></script>
<script src="/footer.js"></script>

<script>
/* ================= FAVORITES STORAGE ================= */
function getFavs(){
  try{ return JSON.parse(localStorage.getItem("tp_favorites") || "[]"); }
  catch{ return []; }
}

function toggleFavorite(id){

  const lang = localStorage.getItem("tp_lang") || "ru";

  let favs = getFavs();

const index = favs.findIndex(f => typeof f === "object" && f.id === id && f.lang === lang);

  if(index >= 0){
    favs.splice(index,1);
  }

  localStorage.setItem("tp_favorites", JSON.stringify(favs));
}

/* ================= LOAD OFFER ================= */
async function loadOffer(id){
  const res = await fetch("/api/offers/" + encodeURIComponent(id));
  const data = await res.json();
  return data.success ? data.offer : null;
}

/* ================= STARS + TIME (как в game.html) ================= */
function renderStars(avg){
  const rounded = Math.round(avg || 0);
  let cls = "r1";
  if(avg >= 4.5) cls="r5";
  else if(avg >= 3.5) cls="r4";
  else if(avg >= 2.5) cls="r3";
  else if(avg >= 1.5) cls="r2";

  let html = `<span class="stars ${cls}">`;
  for(let i=1;i<=5;i++){
    html += `<span class="star ${i<=rounded?"filled":""}">★</span>`;
  }
  html += `</span>`;
  return html;
}

function timeOnSite(createdAt){
  if (!createdAt) return "на сайте недавно";
  const diff = Date.now() - new Date(createdAt).getTime();
  const minutes = Math.floor(diff / 60000);
  const hours = Math.floor(diff / 3600000);
  const days = Math.floor(diff / 86400000);
  if (minutes < 60) return `на сайте ${minutes} мин`;
  if (hours < 24) return `на сайте ${hours} ч`;
  return `на сайте ${days} дн`;
}

/* ================= RENDER ================= */
const list = document.getElementById("offersList");
const empty = document.getElementById("empty");
function renderEmptyText(){
  empty.textContent = window.tpI18n?.t("common.no_favorites") || "";
}
function renderOffer(o){

  const card = window.tpOfferCard.createOfferCard(o,{
    showHeart: true,
    heartActive: true,

    onHeartClick: (offer, cardEl) => {

      toggleFavorite(offer.id);
      cardEl.remove();

if(!list.children.length){
  renderEmptyText();
  empty.style.display = "block";
}

    },

    onClick: (offer)=>{
      location.href = "/offer.html?id=" + encodeURIComponent(offer.id);
    }

  });

  list.appendChild(card);

}

/* ================= CURRENCY ================= */
async function updatePrices(){
  window.tpOfferCard.updatePrices(document);
}
window.addEventListener("tp:currency-change", updatePrices);

/* ================= INIT ================= */
async function init(){

list.innerHTML = "";
empty.style.display = "none";

const lang = localStorage.getItem("tp_lang") || "ru";

const favs = getFavs()
  .filter(f => typeof f === "object" && f.lang === lang)
  .map(f => f.id);

if(!favs.length){
  renderEmptyText();
  empty.style.display = "block";
  return;
}

const loadedOffers = await Promise.all(favs.map(loadOffer));

const validOffers = loadedOffers.filter(o => o && !o.deleted);

if (!validOffers.length) {
  renderEmptyText();
  empty.style.display = "block";
  return;
}

validOffers.forEach(o => {
  renderOffer(o);
});

await updatePrices();

if (window.tpI18n?.apply) {
  window.tpI18n.apply(document);
}
}

async function start(){
  if(window.tpI18n?.load){
    const lang = localStorage.getItem("tp_lang") || "ru";
    await window.tpI18n.load(lang);
  }

  init();
}

start();

window.addEventListener("tp:lang-change", async () => {
  list.innerHTML = "";
  empty.style.display = "none";

  requestAnimationFrame(async () => {
    await init();

    if (window.tpI18n?.apply) {
      window.tpI18n.apply(document);
    }
  });
});

</script>

</body>
</html>
