<html lang="ru">
<head>
  <meta charset="UTF-8" />

  <style>
    body { margin:0; font-family: Arial, sans-serif; background:#f6f6f6; color:#111; }
    #header-container { position: sticky; top: 0; z-index: 10; background:#fff; }

    /* page layout like FunPay: header stays, content centered */
    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 16px;
    }

    .auth-wrap {
      display: flex;
      justify-content: center;
      margin-top: 10px;
    }

    .card {
      width: 520px;
      background: #fff;
      border: 1px solid #e8e8e8;
      border-radius: 14px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.06);
      overflow: hidden;
    }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      background: #f4f6fb;
      border-bottom: 1px solid #e8e8e8;
    }
    .tab {
      padding: 14px 12px;
      text-align: center;
      cursor: pointer;
      font-weight: 700;
      color: #5a5a5a;
      user-select: none;
    }
    .tab.active {
      background: #ffffff;
      color: #1E50D4;
      border-bottom: 3px solid #1E50D4;
    }

    .content { padding: 18px 18px 14px; }

    .title { font-size: 18px; font-weight: 800; margin: 2px 0 14px; }

    label { display:block; font-size: 13px; color:#333; margin: 10px 0 6px; }
input {
  width: 100%;
  box-sizing: border-box;
  padding: 12px 12px;
  border: 1px solid #dcdcdc;
  border-radius: 10px;
  outline: none;
  font-size: 16px;
  background: #fff;
}
    input:focus { border-color: #1E50D4; box-shadow: 0 0 0 3px rgba(30,80,212,0.12); }

    .btn {
      width: 100%;
      margin-top: 14px;
      padding: 12px 12px;
      border: none;
      border-radius: 10px;
      background: #1E50D4;
      color: #fff;
      font-weight: 800;
      font-size: 14px;
      cursor: pointer;
    }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .subline {
      margin-top: 10px;
      font-size: 13px;
      color: #555;
      display:flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }
    .link {
      color: #1E50D4;
      cursor: pointer;
      text-decoration: none;
      font-weight: 400;
    }

    /* ===== modal POP (code) ===== */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 16px;
    }
    .modal {
      width: 520px;
      max-width: 95vw;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 20px 70px rgba(0,0,0,0.25);
      overflow: hidden;
    }
    .modal-head {
      padding: 14px 16px;
      border-bottom: 1px solid #eee;
      display:flex;
      align-items:center;
      justify-content: space-between;
      gap: 10px;
    }
    .modal-head b { font-size: 15px; }
    .xbtn {
      border: none;
      background: transparent;
      font-size: 22px;
      cursor: pointer;
      line-height: 1;
      padding: 4px 8px;
      color:#333;
    }
    .modal-body { padding: 16px; }
    .hint { color:#555; font-size: 13px; margin-top: 6px; }

    .code-row {
      margin-top: 14px;
      display: flex;
      gap: 10px;
      justify-content: center;
    }
    .code-cell {
      width: 48px;
      height: 54px;
      text-align: center;
      font-size: 20px;
      font-weight: 800;
      border-radius: 12px;
      border: 1px solid #dcdcdc;
      outline: none;
    }
    .code-cell:focus { border-color: #1E50D4; box-shadow: 0 0 0 3px rgba(30,80,212,0.12); }

    .modal-actions {
      margin-top: 16px;
      display:flex;
      gap: 10px;
    }
    .btn2 {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #dcdcdc;
      background: #fff;
      font-weight: 800;
      cursor: pointer;
    }
    .btnPrimary {
      background: #1E50D4;
      color:#fff;
      border: none;
    }

    .error {
      margin-top: 10px;
      color: #c0392b;
      font-size: 13px;
      font-weight: 700;
      display:none;
    }

    @media (max-width: 600px) {
      .card { width: 100%; }
      .modal { width: 100%; }
      .code-cell { width: 42px; height: 50px; }
    }
    .captcha-wrap{
  margin-top:16px;
  display:flex;
  justify-content:center;
}

.captcha-wrap iframe{
  border-radius:10px;
}
.terms{
  margin-top:14px;
  font-size:13px;
  line-height:1.45;
}

.terms-label{
  display:flex;
  align-items:flex-start;
  gap:10px;
  cursor:pointer;
}

.terms-label input{
  width:16px;
  height:16px;
  margin-top:3px;
  flex-shrink:0;
}

.terms-text{
  color:#374151;
}

.terms-text a{
  color:#1E50D4;
  font-weight:400;
  text-decoration:none;
}

.terms-text a:hover{
  text-decoration:underline;
}
html:not(.i18n-ready) body{
  visibility:hidden;
}

  <script>
  const t = (key, params = {}) => window.tpI18n.t(key, params);  
  function getCurrentLang() {
  return window.tpI18n?.currentLang || localStorage.getItem("tp_lang") || "ru";
}
    // ====== state ======
let mode = "login"; // login | register
let currentEmail = "";
let currentNick = "";
let resendTimer = null;
let resendLeft = 0;

let appConfig = {
  turnstileEnabled: false,
  turnstileSiteKey: ""
};

let loginTurnstileWidgetId = null;
let registerTurnstileWidgetId = null;

    // ====== elements ======
    const tabLogin = document.getElementById("tabLogin");
    const tabRegister = document.getElementById("tabRegister");
    const loginPane = document.getElementById("loginPane");
    const registerPane = document.getElementById("registerPane");

    const loginEmail = document.getElementById("loginEmail");
    const regEmail = document.getElementById("regEmail");
    const regNick = document.getElementById("regNick");
regNick.addEventListener("input", () => {
  regNick.value = regNick.value.replace(/[^A-Za-z0-9_.]/g, "");
});
    const loginSendBtn = document.getElementById("loginSendBtn");
    const regSendBtn = document.getElementById("regSendBtn");

    const goRegisterLink = document.getElementById("goRegisterLink");
    const goLoginLink = document.getElementById("goLoginLink");

    const modalBackdrop = document.getElementById("modalBackdrop");
    const modalCloseBtn = document.getElementById("modalCloseBtn");
    const modalHint = document.getElementById("modalHint");
    const modalError = document.getElementById("modalError");
    const resendBtn = document.getElementById("resendBtn");
    const verifyBtn = document.getElementById("verifyBtn");
    const timerHint = document.getElementById("timerHint");
    const codeInputs = Array.from(document.querySelectorAll(".code-cell"));

    // ====== tab switch ======
    function setMode(newMode) {
  mode = newMode;

  if (mode === "login") {
    tabLogin.classList.add("active");
    tabRegister.classList.remove("active");
    loginPane.style.display = "block";
    registerPane.style.display = "none";
  } else {
    tabRegister.classList.add("active");
    tabLogin.classList.remove("active");
    registerPane.style.display = "block";
    loginPane.style.display = "none";
  }

  const url = new URL(location.href);
  url.searchParams.set("mode", mode);
  history.replaceState({}, "", url.toString());

  // 🔔 ВАЖНО
  window.dispatchEvent(
    new CustomEvent("auth:mode-change", {
      detail: { mode }
    })
  );
}

    tabLogin.addEventListener("click", () => setMode("login"));
    tabRegister.addEventListener("click", () => setMode("register"));
    goRegisterLink.addEventListener("click", (e) => { e.preventDefault(); setMode("register"); });
    goLoginLink.addEventListener("click", (e) => { e.preventDefault(); setMode("login"); });

    // init mode from url
    (function initFromUrl(){
      const url = new URL(location.href);
      const m = url.searchParams.get("mode");
      if (m === "register") setMode("register");
      else setMode("login");
    })();

    // ====== modal helpers ======
    function openModal(email) {
      modalError.style.display = "none";
      modalError.textContent = "";
      codeInputs.forEach(i => i.value = "");
      modalHint.textContent = t("page.modal.email_sent_to", { email });

      modalBackdrop.style.display = "flex";
      setTimeout(() => codeInputs[0].focus(), 50);

      startResendTimer(48); // как на твоем примере
    }

    function closeModal() {
      modalBackdrop.style.display = "none";
      stopResendTimer();
    }

    modalCloseBtn.addEventListener("click", closeModal);
    modalBackdrop.addEventListener("click", (e) => {
      if (e.target === modalBackdrop) closeModal();
    });

    function showModalError(msg) {
      modalError.textContent = msg;
      modalError.style.display = "block";
    }

    function startResendTimer(seconds) {
      resendLeft = seconds;
      resendBtn.disabled = true;
      timerHint.textContent = t("page.modal.resend_in", { seconds: resendLeft });

      stopResendTimer();
      resendTimer = setInterval(() => {
        resendLeft -= 1;
        if (resendLeft <= 0) {
          stopResendTimer();
          resendBtn.disabled = false;
          timerHint.textContent = "";
        } else {
          timerHint.textContent = t("page.modal.resend_in", { seconds: resendLeft });
        }
      }, 1000);
    }

    function stopResendTimer() {
      if (resendTimer) clearInterval(resendTimer);
      resendTimer = null;
    }

    // auto move in code inputs
    codeInputs.forEach((inp, idx) => {
      inp.addEventListener("input", () => {
        inp.value = inp.value.replace(/\D/g, "").slice(0,1);
        if (inp.value && idx < codeInputs.length - 1) codeInputs[idx+1].focus();
      });
      inp.addEventListener("keydown", (e) => {
        if (e.key === "Backspace" && !inp.value && idx > 0) codeInputs[idx-1].focus();
      });
      inp.addEventListener("paste", (e) => {
        e.preventDefault();
        const text = (e.clipboardData.getData("text") || "").replace(/\D/g, "").slice(0,6);
        if (!text) return;
        for (let i=0;i<6;i++){
          codeInputs[i].value = text[i] || "";
        }
        const lastFilled = Math.min(text.length, 6) - 1;
        if (lastFilled >= 0) codeInputs[lastFilled].focus();
      });
    });

    function getCodeValue() {
      return codeInputs.map(i => i.value).join("");
    }

    // ====== API ======
async function requestCode(email, mode, username) {
  const body = {
    email,
    mode,
    lang: getCurrentLang()
  };

  let captchaWidgetId = null;
  let tsToken = null;

  if (mode === "login") {
    captchaWidgetId = loginTurnstileWidgetId;
  } else {
    captchaWidgetId = registerTurnstileWidgetId;
    body.username = username;
  }

  try {
    if (appConfig.turnstileEnabled && window.turnstile && captchaWidgetId !== null) {
      tsToken = window.turnstile.getResponse(captchaWidgetId);
    }
  } catch (e) {
    tsToken = null;
  }

  const isLocalDev =
    location.hostname === "localhost" ||
    location.hostname === "127.0.0.1";

  if (!tsToken && isLocalDev) {
    tsToken = "dev";
  }

  if (appConfig.turnstileEnabled && !tsToken) {
    return {
      success: false,
      message: t("page.errors.complete_captcha")
    };
  }

  body["cf-turnstile-response"] = tsToken || "";

  const r = await fetch("/auth/request-code", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body)
  });

  const data = await r.json();

  if (!data.success && window.turnstile && captchaWidgetId !== null) {
    try {
      window.turnstile.reset(captchaWidgetId);
    } catch (e) {}
  }

  return data;
}

    async function verifyCode(email, mode, code) {
      const r = await fetch("/auth/verify-code", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, mode, code })
      });
      return r.json();
    }

    function maskEmail(email) {
      // чуть маскируем визуально
      const [a,b] = email.split("@");
      if (!b) return email;
      const left = a.length <= 2 ? a[0] + "*" : a.slice(0,2) + "*".repeat(Math.min(6, a.length-2));
      return left + "@" + b;
    }

    async function loadAppConfig() {
  try {
    const res = await fetch("/api/public/app-config", { cache: "no-cache" });
    const data = await res.json();

    if (!data?.success) {
      return {
        turnstileEnabled: false,
        turnstileSiteKey: ""
      };
    }

    return data.config || {
      turnstileEnabled: false,
      turnstileSiteKey: ""
    };
  } catch (e) {
    return {
      turnstileEnabled: false,
      turnstileSiteKey: ""
    };
  }
}

function waitForTurnstile(timeoutMs = 7000) {
  return new Promise((resolve, reject) => {
    const startedAt = Date.now();

    function check() {
      if (window.turnstile) {
        resolve(window.turnstile);
        return;
      }

      if (Date.now() - startedAt >= timeoutMs) {
        reject(new Error("Turnstile not loaded"));
        return;
      }

      setTimeout(check, 50);
    }

    check();
  });
}

async function initTurnstileWidgets() {
  if (!appConfig.turnstileEnabled || !appConfig.turnstileSiteKey) {
    return;
  }

  const turnstile = await waitForTurnstile();

  const loginEl = document.getElementById("captchaLogin");
  const registerEl = document.getElementById("captchaRegister");

  if (loginEl && loginTurnstileWidgetId === null) {
    loginTurnstileWidgetId = turnstile.render(loginEl, {
      sitekey: appConfig.turnstileSiteKey
    });
  }

  if (registerEl && registerTurnstileWidgetId === null) {
    registerTurnstileWidgetId = turnstile.render(registerEl, {
      sitekey: appConfig.turnstileSiteKey
    });
  }
}

    // ====== actions ======
loginSendBtn.addEventListener("click", async () => {
  const email = String(loginEmail.value || "").trim().toLowerCase();

  if (!email) {
    await tpAlert(t("page.errors.enter_email"), {
      type: "error",
      title: t("page.errors.title")
    });
    return;
  }

  loginSendBtn.disabled = true;

  try {
    const d = await requestCode(email, "login");

    if (!d.success) {
      await tpAlert(d.message || t("page.errors.generic"), {
        type: "error",
        title: t("page.errors.title")
      });
      return;
    }

    currentEmail = email;
    currentNick = "";
    openModal(maskEmail(email));
  } catch {
    await tpAlert(t("page.errors.try_again"), {
      type: "error",
      title: t("page.errors.title")
    });
  } finally {
    loginSendBtn.disabled = false;
  }
});

regSendBtn.addEventListener("click", async () => {
  const acceptTerms = document.getElementById("acceptTerms");

  if (!acceptTerms.checked) {
    await tpAlert(t("page.errors.accept_terms"), {
      type: "error",
      title: t("page.errors.title")
    });
    return;
  }

  const email = String(regEmail.value || "").trim().toLowerCase();
  const nick = String(regNick.value || "").trim();

  if (!nick) {
    await tpAlert(t("page.errors.enter_nickname"), {
      type: "error",
      title: t("page.errors.title")
    });
    return;
  }

  if (!email) {
    await tpAlert(t("page.errors.enter_email"), {
      type: "error",
      title: t("page.errors.title")
    });
    return;
  }

  if (!/^[A-Za-z0-9_.]{1,20}$/.test(nick)) {
    await tpAlert(t("page.errors.nickname_invalid"), {
      type: "error",
      title: t("page.errors.title")
    });
    return;
  }

  if (/^[_.]+$/.test(nick)) {
    await tpAlert(t("page.errors.nickname_letters_or_digits"), {
      type: "error",
      title: t("page.errors.title")
    });
    return;
  }

  const reserved = [
    "admin",
    "support",
    "moderator",
    "system",
    "typlace"
  ];

  if (reserved.includes(nick.toLowerCase())) {
    await tpAlert(t("page.errors.nickname_reserved"), {
      type: "error",
      title: t("page.errors.title")
    });
    return;
  }

  regSendBtn.disabled = true;

  try {
    const d = await requestCode(email, "register", nick);

    if (!d.success) {
      await tpAlert(d.message || t("page.errors.generic"), {
        type: "error",
        title: t("page.errors.title")
      });
      return;
    }

    currentEmail = email;
    currentNick = nick;
    openModal(maskEmail(email));
  } catch {
    await tpAlert(t("page.errors.try_again"), {
      type: "error",
      title: t("page.errors.title")
    });
  } finally {
    regSendBtn.disabled = false;
  }
});

    resendBtn.addEventListener("click", async () => {
      if (!currentEmail) return;

      resendBtn.disabled = true;
      try {
        const d = await requestCode(currentEmail, mode, currentNick);
        if (!d.success) {
          resendBtn.disabled = false;
          return showModalError(d.message);
        }
        startResendTimer(48);
      } catch {
        resendBtn.disabled = false;
        showModalError(t("page.errors.send_failed"));
      }
    });

verifyBtn.addEventListener("click", async () => {
  const code = getCodeValue();

  if (!/^\d{6}$/.test(code)) {
    showModalError(t("page.errors.enter_code_6"));
    return;
  }

  verifyBtn.disabled = true;

  try {
    const r = await fetch("/auth/verify-code", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        email: currentEmail,
        mode,
        code,
        lang: getCurrentLang()
      })
    });

    const d = await r.json();

    if (!d.success) {
      showModalError(d.message || t("page.errors.generic"));
      return;
    }

    localStorage.setItem("tp_token", d.token);
    localStorage.setItem("tp_user_email", d.user.email || "");

    const avatar =
      d.user.avatarUrl ||
      d.user.avatarDataUrl ||
      "";

    if (avatar) {
      localStorage.setItem("tp_avatar", avatar);
    } else {
      localStorage.removeItem("tp_avatar");
    }

    localStorage.removeItem("userName");
    localStorage.removeItem("userEmail");
    localStorage.removeItem("avatarUrl");
    localStorage.removeItem("avatarDataUrl");

    window.dispatchEvent(
      new CustomEvent("tp:profile-updated", {
        detail: { user: d.user }
      })
    );

    closeModal();
    location.replace("/");
  } catch (err) {
    console.error(err);
    showModalError(t("page.errors.connection"));
  } finally {
    verifyBtn.disabled = false;
  }
});

    // enter submits code
    document.addEventListener("keydown", (e) => {
      if (modalBackdrop.style.display === "flex" && e.key === "Enter") {
        verifyBtn.click();
      }
    });
document.addEventListener("DOMContentLoaded", async () => {
  try {
    await window.tpI18n.load(getCurrentLang());
    appConfig = await loadAppConfig();
    await initTurnstileWidgets();
  } finally {
    markPageReady();
  }
});
  </script>
