<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Заказ — TyPlace</title>
<link rel="stylesheet" href="/header.css">
<link rel="stylesheet" href="/gallery.css">
<link rel="stylesheet" href="/footer.css">
<link rel="stylesheet" href="/badges.css">
<style>
:root{
  --page-bg:#f6f7f9;
  --card-bg:#ffffff;
  --line:#e5e7eb;
  --line-soft:#eeeeee;
  --text:#111111;
  --muted:#6b7280;
  --primary:#1E50D4;
  --primary-chat:#1e8bd4;
  --system-bg:#ecfdf3;
  --system-line:#bbf7d0;
  --system-text:#14532d;
  --system-badge-bg:#dcfce7;
  --system-badge-text:#166534;
  --resolution-bg:#f5f3ff;
--resolution-line:#ddd6fe;
--resolution-text:#5b21b6;
--resolution-name:#4c1d95;
}

*{
  box-sizing:border-box;
}

html,
body{
  height:100%;
}

body{
  margin:0;
  font-family:Inter, Arial, sans-serif;
  background:var(--page-bg);
  color:var(--text);
  display:flex;
  flex-direction:column;
}

.page-content{
  flex:1 1 auto;
}

.page{
  width:100%;
  max-width:1000px;
  margin:24px auto;
  padding:0 16px;
  display:flex;
  flex-direction:column;
}

/* ===== COMMON ===== */

.card{
  background:var(--card-bg);
  border-radius:16px;
  box-shadow:0 8px 30px rgba(0,0,0,.08);
  padding:18px;
  margin-bottom:16px;
}

.btn{
  padding:10px 16px;
  border-radius:10px;
  border:1px solid var(--line);
  background:#f3f4f6;
  color:var(--text);
  font-weight:600;
  cursor:pointer;
  transition:.15s ease;
}

.btn:hover{
  background:#e5e7eb;
}

.btnBlue{
  background:var(--primary);
  color:#fff;
  border-color:var(--primary);
}

.btnBlue:hover{
  background:#1847c3;
}

.btnGray{
  background:#f3f4f6;
  color:var(--text);
}

.section-title{
  font-size:16px;
  font-weight:800;
  color:var(--text);
}

/* ===== ORDER CARD ===== */

.order-card{
  background:var(--card-bg);
  border-radius:16px;
  box-shadow:0 8px 30px rgba(0,0,0,.08);
  padding:20px;
  margin-bottom:20px;
  position:relative;
}

.order-badge{
  position:absolute;
  top:12px;
  right:12px;
  z-index:20;
  padding:6px 12px;
  border-radius:999px;
  font-size:12px;
  font-weight:800;
  color:#fff;
}

.order-badge.pending{ background:#f59e0b; }
.order-badge.completed{ background:#16a34a; }
.order-badge.refunded{ background:#dc2626; }

.order-top{
  display:flex;
  gap:20px;
  flex-wrap:wrap;
  align-items:flex-start;
}

.tp-gallery{
  position:relative;
}

.order-info{
  flex:1 1 320px;
  min-width:260px;
  padding-right:120px;
}

.order-title{
  font-size:20px;
  font-weight:700;
  line-height:1.35;
  word-break:break-word;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;
}

.order-price{
  font-size:24px;
  font-weight:900;
  margin-top:10px;
  margin-bottom:6px;
}

.order-meta{
  font-size:13px;
  color:var(--muted);
  font-weight:600;
}

.order-number{
  margin-top:8px;
  font-size:13px;
  color:#9ca3af;
  font-weight:500;
}

.order-date{
  font-size:13px;
  color:#9ca3af;
  white-space:pre-line;
}

.actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:14px;
}

.order-params{
  margin-top:20px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  font-size:14px;
}

.order-params div{
  display:flex;
  justify-content:space-between;
  gap:10px;
}

.order-params span:first-child{
  color:var(--muted);
}

.order-desc-section{
  margin-top:20px;
  padding-right:90px;
}

.order-desc{
  margin-top:6px;
  line-height:1.6;
  word-break:break-word;
  display:-webkit-box;
  -webkit-line-clamp:4;
  -webkit-box-orient:vertical;
  overflow:hidden;
}

.expand-btn{
  display:none;
  background:none;
  border:none;
  color:#2563eb;
  font-weight:600;
  margin-top:6px;
  padding:0;
  cursor:pointer;
}

/* ===== CHAT ===== */

.order-chat-card{
  background:var(--card-bg);
  border-radius:16px;
  border:1px solid var(--line);
  display:flex;
  flex-direction:column;
  overflow:hidden;
  min-height:520px;
  height:min(72vh, 760px);
}

.right-top{
  flex:0 0 auto;
  padding:14px 18px;
  border-bottom:1px solid var(--line-soft);
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  background:#fff;
}

.right-title{
  display:flex;
  gap:10px;
  align-items:center;
  min-width:0;
  flex:1 1 auto;
}

.right-user-meta{
  flex:1 1 auto;
  min-width:0;
}

.chat-ava{
  width:40px;
  height:40px;
  border-radius:50%;
  background:#e9e9e9;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
  color:#777;
  flex:0 0 auto;
}

.chat-ava img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

.name{
  display:flex;
  align-items:center;
  min-width:0;
  max-width:100%;
  font-weight:800;
  overflow:hidden;
}

.sub{
  font-size:12px;
  color:#777;
  margin-top:2px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.name .tp-name-with-badge{
  display:inline-flex;
  align-items:center;
  gap:8px;
  max-width:100%;
  min-width:0;
  vertical-align:middle;
}

.name .tp-name-text{
  display:block;
  min-width:0;
  max-width:100%;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

.name .tp-badge{
  flex:0 0 auto;
}

.chat-actions{
  display:flex;
  align-items:center;
  gap:8px;
  flex:0 0 auto;
}

.chat-notify-btn,
.chat-report-btn{
  width:36px;
  height:36px;
  border-radius:10px;
  border:none;
  background:transparent;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  -webkit-tap-highlight-color:transparent;
  outline:none;
  box-shadow:none;
}

.chat-notify-btn{
  color:#f4b400;
}

.chat-report-btn{
  color:#4b5563;
}

.chat-notify-btn svg{
  display:block;
  width:24px;
  height:24px;
}

.chat-report-btn svg{
  display:block;
  width:20px;
  height:20px;
}

.chat-notify-btn:hover,
.chat-notify-btn:focus,
.chat-notify-btn:focus-visible,
.chat-notify-btn:active,
.chat-report-btn:hover,
.chat-report-btn:focus,
.chat-report-btn:focus-visible,
.chat-report-btn:active{
  background:transparent;
  outline:none;
  box-shadow:none;
}

.notify-slash{
  position:absolute;
  width:16px;
  height:2px;
  border-radius:999px;
  background:currentColor;
  transform:rotate(-45deg) scaleX(0);
  transition:transform .18s ease;
  pointer-events:none;
}

.chat-notify-btn.is-muted{
  color:#dc2626;
}

.chat-notify-btn.is-muted .notify-slash{
  transform:rotate(-45deg) scaleX(1);
}

.chat-notify-btn.tp-bell-pop{
  animation:tpBellPop .22s ease;
}

@keyframes tpBellPop{
  0%{ transform:scale(1); }
  50%{ transform:scale(.86); }
  100%{ transform:scale(1); }
}

.messages{
  flex:1 1 auto;
  min-height:0;
  overflow-y:auto;
  overflow-x:hidden;
  scrollbar-width:none;
  padding:20px 24px;
  background:#fff;
}

.messages::-webkit-scrollbar{
  display:none;
}

.date-divider{
  display:flex;
  align-items:center;
  justify-content:center;
  margin:18px 0;
  font-size:12px;
  color:#888;
  font-weight:600;
}

.date-divider::before,
.date-divider::after{
  content:"";
  flex:1;
  height:1px;
  background:var(--line);
  margin:0 12px;
}

.msg{
  display:flex;
  margin-bottom:12px;
  align-items:flex-end;
}

.msg.me{
  justify-content:flex-end;
}

.msg.other{
  justify-content:flex-start;
}

.msg-body{
  position:relative;
  display:inline-block;
  word-break:break-word;
  overflow-wrap:anywhere;
}

.msg-body--text{
  max-width:min(72%, 360px);
  padding:10px 12px 18px;
  border-radius:18px;
}

.msg.me .msg-body--text{
  background:#2563eb;
  color:#fff;
  border-bottom-right-radius:6px;
}

.msg.other .msg-body--text{
  background:#f3f4f6;
  color:#111;
  border-bottom-left-radius:6px;
}

.msg-text{
  font-size:14px;
  line-height:1.4;
  white-space:pre-wrap;
  padding-right:48px;
}

.msg-body--media{
  padding:0;
  background:transparent !important;
  border-radius:18px;
  overflow:hidden;
  max-width:min(320px, 72vw);
}

.msg-media{
  margin:0;
  display:block;
  position:relative;
}

.msg-media img{
  display:block;
  width:100%;
  max-width:100%;
  height:auto;
  max-height:420px;
  border-radius:18px;
  border:1px solid rgba(0,0,0,.08);
}

.msg-time{
  font-size:11px;
  line-height:1;
}

.msg-body--text .msg-time{
  position:absolute;
  right:12px;
  bottom:7px;
  opacity:.7;
}

.msg.me .msg-body--text .msg-time{
  color:rgba(255,255,255,.9);
}

.msg.other .msg-body--text .msg-time{
  color:#6b7280;
}

.msg-body--media .msg-time{
  position:absolute;
  right:8px;
  bottom:8px;
  margin:0;
  padding:3px 6px;
  border-radius:10px;
  background:rgba(0,0,0,.45);
  color:#fff;
  opacity:1;
}

.attachments-preview{
  display:flex;
  gap:8px;
  padding:10px 14px;
  flex-wrap:wrap;
  background:#fff;
  border-top:1px solid var(--line-soft);
}

.preview-item{
  position:relative;
}

.preview-item img{
  width:70px;
  height:70px;
  object-fit:cover;
  border-radius:10px;
}

.preview-remove{
  position:absolute;
  top:-6px;
  right:-6px;
  width:20px;
  height:20px;
  background:#000;
  color:#fff;
  border-radius:50%;
  font-size:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

.composer{
  display:flex;
  gap:10px;
  padding:14px;
  border-top:1px solid var(--line-soft);
  background:#fff;
  position:sticky;
  bottom:0;
}

.composer input{
  flex:1 1 auto;
  min-width:0;
  border:1px solid #ddd;
  border-radius:12px;
  padding:12px 14px;
  font-size:16px;
  background:#fafafa;
}

.composer input:focus{
  outline:none;
  border-color:#ddd;
  box-shadow:none;
}

.mini-btn{
  width:44px;
  height:44px;
  flex:0 0 44px;
  border-radius:12px;
  border:1px solid #ddd;
  background:#fff;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:24px;
  line-height:1;
}

.mini-btn:hover{
  background:#f5f5f5;
}

.send-btn{
  width:44px;
  height:44px;
  flex:0 0 44px;
  border:none;
  border-radius:12px;
  background:var(--primary-chat);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

.send-btn:hover{
  opacity:.92;
}

/* ===== SYSTEM MESSAGE ===== */

.msg-system{
  justify-content:center;
  margin:14px 0;
}

.msg-body--system{
  position:relative;
  max-width:min(88%, 560px);
  background:var(--system-bg);
  border:1px solid var(--system-line);
  color:var(--system-text);
  border-radius:16px;
  padding:12px 14px 22px;
  text-align:left;
}

.msg-system-badge{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:22px;
  padding:0 10px;
  border-radius:999px;
  background:var(--system-badge-bg);
  color:var(--system-badge-text);
  font-size:11px;
  font-weight:800;
  letter-spacing:.04em;
  text-transform:uppercase;
  margin-bottom:8px;
}

.msg-system-text{
  font-size:14px;
  line-height:1.45;
}

.msg-time--system{
  position:absolute;
  right:12px;
  bottom:8px;
  color:var(--system-badge-text);
  opacity:.75;
}

.tp-system-link{
  color:var(--system-badge-text);
  font-weight:700;
  text-decoration:underline;
}

.tp-system-link:hover{
  opacity:.85;
}

/* ===== REVIEW ===== */

.review-title{
  font-size:16px;
  font-weight:500;
  letter-spacing:.06em;
  text-transform:uppercase;
  color:#9ca3af;
  margin-bottom:18px;
}

.review-stars-input{
  display:flex;
  gap:6px;
  font-size:36px;
  line-height:1;
  cursor:pointer;
  margin:10px 0 16px;
}

.review-stars-input .star{
  color:#d1d5db;
  padding:8px;
  border-radius:12px;
}

.review-stars-input.r5{ color:#facc15; }
.review-stars-input.r4{ color:#fbbf24; }
.review-stars-input.r3{ color:#f59e0b; }
.review-stars-input.r2{ color:#ef4444; }
.review-stars-input.r1{ color:#991b1b; }

.review-stars-input .star.filled{
  color:currentColor;
}

.review-textarea-wrap{
  position:relative;
}

.review-textarea{
  width:100%;
  margin-top:8px;
  padding:14px 16px;
  border-radius:14px;
  border:1px solid var(--line);
  background:#fff;
  font-family:Inter, Arial, sans-serif;
  font-size:15px;
  font-weight:400;
  line-height:1.6;
  resize:vertical;
  min-height:110px;
  outline:none;
  transition:.15s ease;
}

.review-textarea:focus{
  border-color:#2563eb;
  box-shadow:0 0 0 3px rgba(37,99,235,.12);
}

.review-error{
  margin-top:6px;
  font-size:13px;
  color:#dc2626;
  font-weight:500;
  min-height:18px;
}

.review-counter{
  position:absolute;
  right:14px;
  bottom:10px;
  font-size:12px;
  color:#9ca3af;
  font-weight:500;
  pointer-events:none;
  transition:.2s ease;
}

.review-counter.warn{
  color:#6b7280;
}

.review-counter.limit{
  color:#dc2626;
}

/* ===== TABLET ===== */

@media (max-width:768px){
  .page{
    margin:0;
    padding:0 0 calc(80px + env(safe-area-inset-bottom));
  }

  .order-card{
    background:transparent;
    border-radius:0;
    box-shadow:none;
    padding:0 16px 24px;
    margin-bottom:16px;
  }

  .order-top{
    flex-direction:column;
  }

  .order-info{
    width:100%;
    min-width:0;
    padding-right:0;
  }

  .order-params{
    grid-template-columns:1fr;
  }

  .order-desc-section{
    padding-right:0;
  }

  .tp-gallery{
    width:100vw;
    height:45vh;
    margin-left:calc(50% - 50vw);
    border-radius:0;
    overflow:hidden;
  }

  .tp-gallery__arrow{
    display:none !important;
  }

.order-chat-card{
  margin:0 16px;
  height:64svh;
  min-height:64svh;
  max-height:64svh;
  border-radius:16px;
}

  .messages{
    flex:1 1 auto;
    min-height:0;
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
    padding:16px;
  }

  .attachments-preview{
    flex:0 0 auto;
  }

  .composer{
    flex:0 0 auto;
  }

  .msg-body--text{
    max-width:82%;
  }

  .msg-body--media{
    max-width:min(78vw, 320px);
  }

  .msg-text{
    padding-right:44px;
  }

  .chat-notify-btn,
  .chat-report-btn{
    width:40px;
    height:40px;
  }

  .chat-notify-btn svg{
    width:26px;
    height:26px;
  }

  .chat-report-btn svg{
    width:22px;
    height:22px;
  }
}

@media (max-width:640px){
  .page{
    padding-bottom:calc(88px + env(safe-area-inset-bottom));
  }

  .order-card{
    padding:0 12px 20px;
  }

  .order-chat-card{
    width:100vw;
    margin-left:calc(50% - 50vw);
    margin-right:0;
    border-radius:0;
    border-left:none;
    border-right:none;
    height:64svh;
    min-height:64svh;
    max-height:64svh;
  }

  .right-top{
    flex:0 0 auto;
    padding:14px 12px;
  }

  .messages{
    flex:1 1 auto;
    min-height:0;
    overflow-y:auto;
    overflow-x:hidden;
    -webkit-overflow-scrolling:touch;
    padding:14px 12px;
  }

  .composer{
    flex:0 0 auto;
    gap:8px;
    padding:10px 12px;
    padding-bottom:calc(10px + env(safe-area-inset-bottom));
  }

  .mini-btn{
    width:40px;
    height:40px;
    flex:0 0 40px;
    border-radius:12px;
    font-size:22px;
  }

  .send-btn{
    width:40px;
    height:40px;
    flex:0 0 40px;
    border-radius:12px;
  }

  .composer input{
    height:40px;
    padding:0 12px;
    font-size:15px;
    border-radius:12px;
  }

  .msg-media img{
    max-height:340px;
  }

  .msg-body--system{
    max-width:94%;
  }
}
.attachments-preview:empty{
  display:none;
}
.order-desc-section .section-title{
  font-size:16px;
  font-weight:400;
  letter-spacing:.06em;
  text-transform:uppercase;
  color:#9ca3af;
}
/* ===== RESOLUTION MESSAGE ===== */

.msg-resolution{
  justify-content:flex-start;
}

.msg-resolution-wrap{
  max-width:min(78%, 420px);
}

.msg-resolution-head{
  display:flex;
  align-items:center;
  gap:8px;
  margin:0 0 6px 2px;
  min-width:0;
  max-width:100%;
}

.msg-resolution-name{
  font-size:13px;
  font-weight:800;
  color:var(--resolution-name);
  min-width:0;
  max-width:100%;
}

.msg-resolution .msg-body--text{
  background:var(--resolution-bg);
  border:1px solid var(--resolution-line);
  color:var(--resolution-text);
  border-bottom-left-radius:6px;
}

.msg-resolution .msg-time{
  color:var(--resolution-text);
  opacity:.75;
}

.msg-resolution .tp-name-with-badge{
  display:inline-flex;
  align-items:center;
  gap:8px;
  min-width:0;
  max-width:100%;
}

.msg-resolution .tp-name-text{
  min-width:0;
  max-width:100%;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
/* ===== RESOLUTION DECISION PANEL ===== */

.resolution-decision{
  margin-top:14px;
  padding:14px;
  border:1px solid var(--resolution-line);
  background:#faf7ff;
  border-radius:14px;
}

.resolution-decision-title{
  font-size:13px;
  font-weight:800;
  color:var(--resolution-name);
  margin-bottom:8px;
  text-transform:uppercase;
  letter-spacing:.04em;
}

.resolution-decision-text{
  width:100%;
  min-height:96px;
  resize:vertical;
  border:1px solid #d8d4fe;
  border-radius:12px;
  padding:12px 14px;
  font:inherit;
  line-height:1.5;
  background:#fff;
  color:#111;
  outline:none;
}

.resolution-decision-text:focus{
  border-color:#8b5cf6;
  box-shadow:0 0 0 3px rgba(139,92,246,.12);
}

.resolution-decision-actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:12px;
}

.btnResolutionConfirm{
  background:#16a34a;
  border-color:#16a34a;
  color:#fff;
}

.btnResolutionConfirm:hover{
  background:#15803d;
}

.btnResolutionRefund{
  background:#dc2626;
  border-color:#dc2626;
  color:#fff;
}

.btnResolutionRefund:hover{
  background:#b91c1c;
}
</style>
</head>
<body>

<div id="header-container"></div>

<main class="page-content">
  <div class="page">

<script>
const orderId = new URLSearchParams(location.search).get("id");
if(!orderId){
  alert("Не указан заказ");
  location.href = "/";
}

const token = localStorage.getItem("tp_token");
let myEmail = localStorage.getItem("tp_user_email") || "";
let meLoaded = Boolean(myEmail);
const orderChatCard = document.getElementById("orderChatCard");
const titleEl = document.getElementById("title");
const priceEl = document.getElementById("price");
const orderNumberEl = document.getElementById("orderNumber");
const orderDateEl = document.getElementById("orderDate");
const orderGameLineEl = document.getElementById("orderGameLine");
const statusBadgeEl = document.getElementById("statusBadge");
const descEl = document.getElementById("desc");
const expandTitleBtnEl = document.getElementById("expandTitleBtn");
const expandDescBtnEl = document.getElementById("expandDescBtn");
const msgInputEl = document.getElementById("msgInput");
const filePickerEl = document.getElementById("filePicker");
const attachBtnEl = document.getElementById("attachBtn");
const sendBtnEl = document.getElementById("sendBtn");
const reviewBlockEl = document.getElementById("reviewBlock");
const composerEl = document.getElementById("composer");
const resolutionDecisionBoxEl = document.getElementById("resolutionDecisionBox");
const resolutionDecisionTextEl = document.getElementById("resolutionDecisionText");
const resolutionConfirmBtnEl = document.getElementById("resolutionConfirmBtn");
const resolutionRefundBtnEl = document.getElementById("resolutionRefundBtn");

async function ensureUserEmail(force = false){
  if (meLoaded && myEmail && !force) {
    return myEmail;
  }

  const res = await fetch("/auth/me", {
    headers:{ Authorization:"Bearer " + token }
  });

  const data = await res.json().catch(() => ({}));

  if (!data.success || !data.user?.email) {
    location.href = "/auth.html?mode=login";
    throw new Error("Unauthorized");
  }

  myEmail = data.user.email;
  localStorage.setItem("tp_user_email", myEmail);
  meLoaded = true;

  return myEmail;
}

let chatId = null;
let role = null;              // buyer | seller | staff
let viewerRole = "user";      // user | resolution | super_admin ...
let canUseOrderChat = false;
let canWriteResolutionChat = false;
let currentOrder = null;

function isParticipantRole(){
  return role === "buyer" || role === "seller";
}

function isResolutionWriter(){
  return canWriteResolutionChat && (
    viewerRole === "resolution" ||
    viewerRole === "super_admin"
  );
}

const DEFAULT_AVATAR = "/img/avatar-default.svg";
const MUTED_CHATS_KEY = "tp_muted_chats";
const i18nReady = window.tpI18n?.load
  ? window.tpI18n.load(window.tpI18n.currentLang)
  : Promise.resolve();

function pageT(key, params = {}){
  return window.tpI18n?.t
    ? window.tpI18n.t(`page.${key}`, params)
    : key;
}

function getMutedChats(){
  try{
    const raw = JSON.parse(localStorage.getItem(MUTED_CHATS_KEY) || "[]");
    return Array.isArray(raw) ? raw : [];
  }catch{
    return [];
  }
}

function setMutedChats(list){
  localStorage.setItem(MUTED_CHATS_KEY, JSON.stringify(list));
}

function isChatMuted(id){
  if(!id) return false;
  return getMutedChats().includes(id);
}

function toggleMutedChat(id){
  if(!id) return false;

  const muted = getMutedChats();

  if(muted.includes(id)){
    setMutedChats(muted.filter(x => x !== id));
    return false;
  }

  muted.push(id);
  setMutedChats(muted);
  return true;
}

function updateChatNotifyButton(){
  const btn = document.getElementById("chatNotifyBtn");
  if(!btn) return;

  const muted = isChatMuted(chatId);

  btn.classList.toggle("is-muted", muted);
  btn.title = muted ? pageT("chat.unmute") : pageT("chat.mute");
  btn.setAttribute("aria-label", muted ? pageT("chat.unmute") : pageT("chat.mute"));
}

function updateChatActionLabels(){
  const reportBtn = document.getElementById("chatReportBtn");
  if(reportBtn){
    reportBtn.title = pageT("chat.report");
    reportBtn.setAttribute("aria-label", pageT("chat.report"));
  }

  updateChatNotifyButton();
}

function statusText(s){
  if(s==="pending") return "В процессе";
  if(s==="completed") return "Завершено";
  if(s==="refunded") return "Возврат";
  return s;
}
function formatMode(mode){
  if(!mode) return "";

  return mode
    .replace(/_/g," ")
    .replace(/\b\w/g,l=>l.toUpperCase());
}

async function loadOrder(){
  await i18nReady;
  if(!token){
    location.href="/auth.html?mode=login";
    return;
  }

await ensureUserEmail(true);

  const res = await fetch("/api/orders/"+orderId,{
    headers:{ Authorization:"Bearer "+token }
  });
  const data = await res.json();
  if(!data.success){
    alert(data.message || "Заказ не найден");
    return;
  }

const o = data.order;
currentOrder = o;
role = o.role || null;
viewerRole = o.viewerRole || "user";
chatId = o.chatId || null;
canUseOrderChat = Boolean(o.canUseOrderChat);
canWriteResolutionChat = Boolean(o.canWriteResolutionChat);

if (orderChatCard) {
  orderChatCard.style.display = canUseOrderChat ? "flex" : "none";
}

const canSendMessages = isParticipantRole() || isResolutionWriter();

if (composerEl) {
  composerEl.style.display = canSendMessages ? "flex" : "none";
}

if (attachBtnEl) {
  attachBtnEl.style.display = isParticipantRole() ? "flex" : "none";
}

if (msgInputEl) {
  msgInputEl.placeholder = isResolutionWriter()
    ? "Напишите сообщение от лица арбитража"
    : pageT("chat.writeMessage");
}

if (canUseOrderChat) {
  await loadChatHeader();
}

const liveOffer = o.offer || null;
const snapshot = o.offerSnapshot || {};

const offer = {
  ...(liveOffer || {}),
  ...snapshot
};

if (!offer.images || !offer.images.length) {
  offer.images = offer.imageUrl ? [offer.imageUrl] : [];
}

titleEl.textContent = buildOfferTitle(offer);
const gameObj = (window.GAMES_LIST || []).find(g => g.id === offer.game);
const gameTitle = gameObj ? gameObj.name : offer.game;

const gameLine = [
  gameTitle,
  formatMode(offer.mode)
].filter(Boolean).join(", ");

orderGameLineEl.textContent = gameLine || "";

orderNumberEl.textContent =
  "Заказ " + (o.orderNumber || "#" + o.id.slice(0,8));

const created = new Date(o.createdAt || Date.now());

let dateText =
  "Создан: " +
  created.toLocaleDateString("ru-RU", {
    day:"numeric",
    month:"short",
    year:"numeric"
  });

if(o.status === "completed" && o.completedAt){
  const completed = new Date(o.completedAt);

  dateText +=
    "\nЗавершён: " +
    completed.toLocaleDateString("ru-RU", {
      day:"numeric",
      month:"short",
      year:"numeric"
    });
}

if(o.status === "refunded" && o.refundedAt){
  const refunded = new Date(o.refundedAt);

  dateText +=
    "\nВозврат: " +
    refunded.toLocaleDateString("ru-RU", {
      day:"numeric",
      month:"short",
      year:"numeric"
    });
}

orderDateEl.textContent = dateText;

  const lang = localStorage.getItem("tp_lang") || "ru";
const description =
  offer.description?.[lang] ||
  offer.description?.ru ||
  "";

descEl.textContent = description || "Описание не указано.";
statusBadgeEl.textContent = statusText(o.status);
statusBadgeEl.className = "order-badge " + o.status;

const actions = document.getElementById("actions");
actions.innerHTML = "";

// buyer
if(role === "buyer" && o.status === "pending"){
  actions.innerHTML += `
    <button class="btn btnBlue" onclick="confirmOrder()">
      Подтвердить получение
    </button>
  `;
}

// seller
if(role === "seller" && o.status === "pending"){
  actions.innerHTML += `
    <button class="btn btnGray" onclick="refundOrder()">
      Вернуть деньги
    </button>
  `;
}

// resolution / super_admin
const canResolveNow =
  isResolutionWriter() &&
  o.status === "pending" &&
  (o.disputeStatus === "requested" || o.disputeStatus === "in_review");

if (resolutionDecisionBoxEl) {
  resolutionDecisionBoxEl.style.display = canResolveNow ? "block" : "none";

  if (!canResolveNow) {
    resolutionDecisionTextEl.value = "";
  }
}

function setupExpand(el, btn){

  setTimeout(()=>{
    if(el.scrollHeight > el.clientHeight){
      btn.style.display = "inline-block";
    }
  },50);

  btn.onclick = ()=>{
    el.style.webkitLineClamp = "unset";
    el.style.display = "block";
    el.style.overflow = "visible";
    btn.style.display = "none";
  };
}
  // ⭐ отзыв: только покупатель и только после завершения
if (reviewBlockEl) {
  if (o.status === "completed" && role === "buyer") {
    if (!o.sellerEmail) {
      reviewBlockEl.style.display = "none";
    } else {
      const check = await fetch(`/api/users/${encodeURIComponent(o.sellerEmail)}/reviews`);
      const rdata = await check.json();

      const already = rdata.reviews?.some(r => r.orderId === o.id);
      reviewBlockEl.style.display = already ? "none" : "block";
    }
  } else {
    reviewBlockEl.style.display = "none";
  }
}

let displayPrice = o.price;

// Если продавец — показываем его чистую сумму
if(role === "seller"){
  displayPrice = o.sellerAmount || o.price;
}

if (window.tpMoney) {
priceEl.textContent = await window.tpMoney.formatPrice(displayPrice);
} else {
  const currency = localStorage.getItem("tp_currency") || "UAH";

  const symbols = {
    UAH: "₴",
    USD: "$",
    EUR: "€"
  };

priceEl.textContent = displayPrice + " " + (symbols[currency] || "");
}

initGallery({
  images: offer.images || [offer.imageUrl],
  trackId: "galTrack",
  prevId: "galPrev",
  nextId: "galNext",
  galleryId: "gallery"
});

if (canUseOrderChat) {
  await loadMessages();
}

filePickerEl.value = "";
setupExpand(titleEl, expandTitleBtnEl);
setupExpand(descEl, expandDescBtnEl);

initReviewStars();   // ← ДОБАВЬ СЮДА

}

function getLastSeenText(lastSeen){
  if(!lastSeen) return pageT("chat.offline");

  const diff = Date.now() - lastSeen;
  const minutes = Math.floor(diff / 60000);

  if(minutes < 1) return pageT("chat.justNow");
  if(minutes < 60) return pageT("chat.minutesAgo", { count: minutes });

  const hours = Math.floor(minutes / 60);
  if(hours < 24) return pageT("chat.hoursAgo", { count: hours });

  const days = Math.floor(hours / 24);
  return pageT("chat.daysAgo", { count: days });
}

function formatMessageTime(createdAt){
  return new Date(createdAt).toLocaleTimeString("ru-RU", {
    hour: "2-digit",
    minute: "2-digit",
    hour12: false
  });
}

function renderMessageBody(m){
  const text = String(m.text || "").trim();
  const media = Array.isArray(m.media) ? m.media : [];

  const hasText = Boolean(text);
  const hasMedia = media.length > 0;

  const safeText = window.tpBadges?.escapeHtml
    ? window.tpBadges.escapeHtml(text)
    : text;

  if (hasMedia && !hasText) {
    return `
      <div class="msg-body msg-body--media">
        <div class="msg-media">
          ${media.map(url => `<img src="${url}" alt="">`).join("")}
        </div>
        <span class="msg-time">${formatMessageTime(m.createdAt)}</span>
      </div>
    `;
  }

  return `
    <div class="msg-body msg-body--text">
      ${hasText ? `<div class="msg-text">${safeText}</div>` : ""}
      ${hasMedia ? `
        <div class="msg-media" style="margin-top:8px;">
          ${media.map(url => `<img src="${url}" alt="">`).join("")}
        </div>
      ` : ""}
      <span class="msg-time">${formatMessageTime(m.createdAt)}</span>
    </div>
  `;
}

function isResolutionMessage(m){
  return (
    m?.messageType === "resolution" ||
    m?.kind === "resolution" ||
    m?.fromRole === "resolution"
  );
}

function getResolutionName(m){
  return (
    m?.fromUsername ||
    m?.username ||
    m?.authorName ||
    "Сотрудник"
  );
}

function renderResolutionMessageItem(m){
  const text = String(m.text || "").trim();
  const media = Array.isArray(m.media) ? m.media : [];

  const safeText = window.tpBadges?.escapeHtml
    ? window.tpBadges.escapeHtml(text)
    : text;

  const nameHtml = window.tpBadges?.renderNameWithBadge
    ? window.tpBadges.renderNameWithBadge(getResolutionName(m), "resolution")
    : `
      <span class="tp-name-with-badge">
        <span class="tp-name-text">${getResolutionName(m)}</span>
        <span class="tp-badge tp-badge--resolution">Арбитраж</span>
      </span>
    `;

  return `
    <div class="msg msg-resolution" data-msg-id="${m.id}">
      <div class="msg-resolution-wrap">
        <div class="msg-resolution-head">
          <div class="msg-resolution-name">${nameHtml}</div>
        </div>

        <div class="msg-body msg-body--text">
          ${text ? `<div class="msg-text">${safeText}</div>` : ""}
          ${media.length ? `
            <div class="msg-media" style="margin-top:8px;">
              ${media.map(url => `<img src="${url}" alt="">`).join("")}
            </div>
          ` : ""}
          <span class="msg-time">${formatMessageTime(m.createdAt)}</span>
        </div>
      </div>
    </div>
  `;
}

function renderMessageItem(m){
  if (window.tpChatSystem?.isSystemMessage?.(m)) {
    return window.tpChatSystem.renderSystemMessage(m);
  }

  if (isResolutionMessage(m)) {
    return renderResolutionMessageItem(m);
  }

  return `
    <div class="msg ${m.fromEmail === myEmail ? "me" : "other"}" data-msg-id="${m.id}">
      ${renderMessageBody(m)}
    </div>
  `;
}

function appendMessageToOrderChat(m){
  const box = document.getElementById("messages");

  if (box.querySelector(`[data-msg-id="${m.id}"]`)) return;

  const messageDate = new Date(m.createdAt);
  const messageDateString = messageDate.toDateString();

  const dividers = box.querySelectorAll(".date-divider");
  const lastDivider = dividers.length ? dividers[dividers.length - 1] : null;
  const lastDividerDate = lastDivider ? lastDivider.dataset.date : null;

  if (lastDividerDate !== messageDateString) {
    const divider = document.createElement("div");
    divider.className = "date-divider";
    divider.dataset.date = messageDateString;
    divider.textContent = formatDateDivider(messageDate);
    box.appendChild(divider);
  }

  box.insertAdjacentHTML("beforeend", renderMessageItem(m));
}

async function loadChatHeader(){
  if(!chatId) return;

  await i18nReady;

  const actions = document.getElementById("chatActions");

  // Для арбитража / staff не пытаемся показывать "другого пользователя",
  // потому что chat route возвращает otherUser корректно только для участника чата.
  if(!isParticipantRole()){
    document.getElementById("chatAva").innerHTML =
      `<img src="${DEFAULT_AVATAR}" alt="">`;

    document.getElementById("chatName").textContent = "Чат заказа";
    document.getElementById("chatSub").textContent = isResolutionWriter()
      ? "Арбитражный чат"
      : "Просмотр сообщений";

    if(actions) actions.style.display = "none";
    return;
  }

  const res = await fetch(`/api/chats/${chatId}`,{
    headers:{ Authorization:"Bearer " + token }
  });

  const data = await res.json();
  if(!data.success) return;

  const user = data.chat?.otherUser;

  if(!user){
    if(actions) actions.style.display = "none";
    return;
  }

  if(actions) actions.style.display = "flex";

  const avatar =
    user.avatarUrl ||
    user.avatarDataUrl ||
    DEFAULT_AVATAR;

  document.getElementById("chatAva").innerHTML = `<img src="${avatar}" alt="">`;

  window.tpBadges.applyNameWithBadge(
    document.getElementById("chatName"),
    user.username || "Пользователь",
    user.role || "user"
  );

  document.getElementById("chatSub").textContent =
    user.online ? pageT("chat.online") : getLastSeenText(user.lastSeen);

  updateChatActionLabels();
}

function formatDateDivider(date){
  const today = new Date();
  const d = new Date(date);

  const isToday = d.toDateString() === today.toDateString();

  const yesterday = new Date();
  yesterday.setDate(today.getDate() - 1);

  const isYesterday = d.toDateString() === yesterday.toDateString();

  if(isToday) return "Сегодня";
  if(isYesterday) return "Вчера";

  const options = { day:'numeric', month:'long' };

  if(d.getFullYear() !== today.getFullYear()){
    options.year = 'numeric';
  }

  return d.toLocaleDateString("ru-RU", options);
}

async function loadMessages(){
  if(!chatId) return;

  await ensureUserEmail();

  const res = await fetch(`/api/chats/${chatId}/messages`,{
    headers:{ Authorization:"Bearer " + token }
  });

  const data = await res.json();
  if(!data.success) return;

  const box = document.getElementById("messages");
  box.innerHTML = "";

  data.messages.forEach(m => {
    appendMessageToOrderChat(m);
  });

  box.scrollTop = box.scrollHeight;

if (isParticipantRole()) {
  fetch(`/api/chats/${chatId}/read`, {
    method:"POST",
    headers:{ Authorization:"Bearer " + token }
  }).catch(()=>{});
}
}

async function sendMsg(){
  if(!chatId) return;

  const canSendMessages = isParticipantRole() || isResolutionWriter();
  if(!canSendMessages) return;

  const input = document.getElementById("msgInput");
  const sendBtn = document.getElementById("sendBtn");
  const attachBtn = document.getElementById("attachBtn");

  const text = input.value.trim();
  if(!text) return;

  sendBtn.disabled = true;
  attachBtn.disabled = true;
  input.disabled = true;

  try{
    const isResolution = isResolutionWriter();

    const res = await fetch(
      isResolution
        ? `/api/orders/${orderId}/resolution-message`
        : `/api/chats/${chatId}/messages`,
      {
        method:"POST",
        headers:{
          "Content-Type":"application/json",
          Authorization:"Bearer " + token
        },
        body: JSON.stringify(
          isResolution
            ? { text, media: [] }
            : { text }
        )
      }
    );

    const data = await res.json();

    if(!data.success){
      alert(data.message || "Ошибка отправки сообщения");
      return;
    }

    if(data.message){
      appendMessageToOrderChat(data.message);
    }

    input.value = "";

    const box = document.getElementById("messages");
    box.scrollTop = box.scrollHeight;

    if(isParticipantRole()){
      fetch(`/api/chats/${chatId}/read`, {
        method:"POST",
        headers:{ Authorization:"Bearer " + token }
      }).catch(()=>{});
    }

  } finally {
    sendBtn.disabled = false;
    attachBtn.disabled = false;
    input.disabled = false;
    input.focus();
  }
}

async function confirmOrder(){
if(!confirm("Подтвердить получение? Деньги будут переведены продавцу.")) return;

  const r = await fetch(`/api/orders/${orderId}/confirm`,{
    method:"POST",
    headers:{ Authorization:"Bearer "+token }
  });
  const d = await r.json();
  if(!d.success) alert(d.message || "Ошибка");
  loadOrder();
}

async function refundOrder(){
if(!confirm("Вернуть деньги покупателю?")) return;

  const r = await fetch(`/api/orders/${orderId}/refund`,{
    method:"POST",
    headers:{ Authorization:"Bearer "+token }
  });
  const d = await r.json();
  if(!d.success) alert(d.message || "Ошибка");
  loadOrder();
}

async function sendResolutionDecision(decision){
  if(!isResolutionWriter()) return;
  if(!currentOrder) return;

  const text = String(resolutionDecisionTextEl?.value || "").trim();

  if(!text){
    alert("Напишите текст решения");
    resolutionDecisionTextEl?.focus();
    return;
  }

  const isConfirm = decision === "confirm";

  const ok = confirm(
    isConfirm
      ? "Подтвердить заказ решением арбитража?"
      : "Сделать возврат решением арбитража?"
  );

  if(!ok) return;

  if(resolutionConfirmBtnEl) resolutionConfirmBtnEl.disabled = true;
  if(resolutionRefundBtnEl) resolutionRefundBtnEl.disabled = true;

  try{
    const res = await fetch(`/api/orders/${orderId}/resolution-decision`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        Authorization: "Bearer " + token
      },
      body: JSON.stringify({
        decision,
        text
      })
    });

    const data = await res.json();

    if(!data.success){
      alert(data.message || "Ошибка решения по спору");
      return;
    }

    if(resolutionDecisionTextEl){
      resolutionDecisionTextEl.value = "";
    }

    await loadOrder();
  } finally {
    if(resolutionConfirmBtnEl) resolutionConfirmBtnEl.disabled = false;
    if(resolutionRefundBtnEl) resolutionRefundBtnEl.disabled = false;
  }
}

if (isParticipantRole()) {

const reviewBtn = document.getElementById("sendReviewBtn");

if (reviewBtn) {
  reviewBtn.addEventListener("click", async () => {

    const rating = Number(document.getElementById("reviewRating").value);
    const errorEl = document.getElementById("reviewError");

    if (rating === 0) {
      errorEl.textContent = "Поставьте оценку";
      return;
    }

    errorEl.textContent = "";
    reviewBtn.disabled = true;

    const text = document.getElementById("reviewText").value;

    const res = await fetch("/api/reviews", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        Authorization: "Bearer " + token
      },
      body: JSON.stringify({
        orderId,
        rating,
        text
      })
    });

    const data = await res.json();

    if (!data.success) {
      alert(data.message || "Ошибка при отправке отзыва");
      reviewBtn.disabled = false;
      return;
    }

    document.getElementById("reviewText").value = "";
    loadOrder();
  });
}

window.addEventListener("tp:new-message", async (e) => {
  const m = e.detail;

  if(!m || !chatId) return;
  if(m.chatId !== chatId) return;

  await ensureUserEmail();

  if (window.tpChatSystem?.isSystemMessage?.(m)) {
    await loadOrder();
    return;
  }

  if(m.fromEmail === myEmail) return;

  appendMessageToOrderChat(m);

  const box = document.getElementById("messages");
  box.scrollTop = box.scrollHeight;

  if (isParticipantRole()) {
    fetch(`/api/chats/${chatId}/read`, {
      method:"POST",
      headers:{ Authorization:"Bearer " + token }
    }).catch(()=>{});
  }
});

function initReviewStars(){
  const container = document.getElementById("reviewStars");
  const input = document.getElementById("reviewRating");

  if(!container) return;

  container.innerHTML = "";

  for(let i=1;i<=5;i++){
    const star = document.createElement("span");
    star.className = "star";
    star.textContent = "★";
    star.dataset.value = i;

    star.onclick = ()=>{
      input.value = i;
      renderStarsInput(i);
    };

    container.appendChild(star);
  }

renderStarsInput(Number(input.value) || 0);

}
function renderStarsInput(val){
  val = Number(val);

  const container = document.getElementById("reviewStars");

  container.classList.remove("r1","r2","r3","r4","r5");

  if(val > 0){
    container.classList.add("r" + val);
  }

  container.querySelectorAll(".star").forEach(star=>{
    star.classList.toggle(
      "filled",
      Number(star.dataset.value) <= val
    );
  });
  document.getElementById("reviewError").textContent = "";
}
const reviewText = document.getElementById("reviewText");
const reviewCount = document.getElementById("reviewCount");
const reviewCounter = document.querySelector(".review-counter");

if(reviewText){
  reviewText.addEventListener("input", () => {

    const length = reviewText.value.length;
    reviewCount.textContent = length;

    reviewCounter.classList.remove("warn","limit");

    if(length >= 80 && length < 100){
      reviewCounter.classList.add("warn");
    }

    if(length >= 100){
      reviewCounter.classList.add("limit");
    }

  });
}
