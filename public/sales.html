<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Мои продажи — TyPlace</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="/header.css">
  <link rel="stylesheet" href="/card.css">

  <style>
    body{
      margin:0;
      font-family: Inter, Arial, sans-serif;
      background:#f6f7f9;
    }

    .page{
      max-width:1200px;
      margin:24px auto;
      padding:0 16px;
    }

    .sales-grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
      gap:16px;
    }

    .empty{
      padding:24px;
      color:#777;
    }

    /* ===== TOPBAR как в покупках ===== */
    .topbar{
      display:flex;
      align-items:center;
      gap:12px;
      margin-bottom:14px;
    }

    /* ===== FILTER как в покупках ===== */
    .filters{
      margin-left:auto;
      max-width:220px;
    }

    .select{
      height: 40px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background:#fff;
      padding: 0 12px;
      font-size: 14px;
      outline:none;
    }

    .select:focus{
      border-color:#cbd5e1;
    }

    /* ===== CARD 1-в-1 как в покупках ===== */
    .offer-card{
      position:relative;
      background:#fff;
      border-radius:16px;
      border:1px solid #e5e7eb;
      overflow:hidden;
      cursor:pointer;
      display:flex;
      flex-direction:column;
    }

    .order-badge{
      position:absolute;
      top:10px;
      left:10px;
      padding:4px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:700;
      color:#fff;
      z-index:5;
    }

    .order-badge.pending{ background:#f59e0b; }
    .order-badge.completed{ background:#16a34a; }
    .order-badge.refunded{ background:#dc2626; }

    .offer-image{
      position:relative;
      width:100%;
      aspect-ratio:4/3;
      background:#f3f4f6;
    }

    .offer-image img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .offer-body{
      padding:12px;
      display:flex;
      flex-direction:column;
      gap:6px;
      flex:1;
    }

    .offer-title{
      font-size:14px;
      font-weight:700;
      line-height:1.3;

      display:-webkit-box;
      -webkit-line-clamp:2;
      -webkit-box-orient:vertical;
      overflow:hidden;

      min-height:36px;
    }

    .order-meta{
      font-size:13px;
      color:#6b7280;
      font-weight:600;
    }

    .order-number{
      font-size:12px;
      color:#9ca3af;
    }

    .offer-price{
      font-size:18px;
      font-weight:800;
      margin-top:auto;
    }
    .order-date{
  font-size:12px;
  color:#9ca3af;
}

  </style>
</head>

<body>

  <div id="header-container"></div>

  <div class="page">
    <div class="topbar">
      <h2 style="margin:0;">Мои продажи</h2>

      <div class="filters">
        <select class="select" id="statusFilter">
          <option value="all">Статус</option>
          <option value="pending">В процессе</option>
          <option value="completed">Завершено</option>
          <option value="refunded">Возврат</option>
        </select>
      </div>
    </div>

    <div id="list" class="sales-grid"></div>
  </div>

<script src="/socket.io/socket.io.js"></script>
<script src="/games.list.js"></script>
<script src="/header.js"></script>
<script src="/tp-money.js"></script>
<script src="/offer-title.js"></script>

  <script>
    const token = localStorage.getItem("tp_token");
    if(!token){
      location.href = "/auth.html?mode=login";
    }

    const list = document.getElementById("list");
    const statusFilter = document.getElementById("statusFilter");
    let allSales = [];

    fetch("/api/my-sales", {
      headers:{ Authorization:"Bearer " + token }
    })
    .then(r => r.json())
    .then(d => {
      if(!d.success){
        list.innerHTML = "<div class='empty'>Ошибка загрузки</div>";
        return;
      }

      allSales = d.sales || [];
      renderList();
    });

    function renderList(){
      list.innerHTML = "";

      const selectedStatus = statusFilter.value;

      let filtered = allSales;

      if(selectedStatus !== "all"){
        filtered = allSales.filter(s => s.status === selectedStatus);
      }

      if(!filtered.length){
        list.innerHTML = `
          <div class="empty" style="grid-column:1/-1;">
            Продаж пока нет
          </div>
        `;
        return;
      }

      filtered.forEach(renderSale);
      updatePrices();
    }

    function renderSale(s){
      const offer = s.offer || {};

      let statusText = "";
      let statusClass = "";

      if(s.status === "pending"){
        statusText = "В процессе";
        statusClass = "pending";
      } else if(s.status === "completed"){
        statusText = "Завершено";
        statusClass = "completed";
      } else if(s.status === "refunded"){
        statusText = "Возврат";
        statusClass = "refunded";
      } else {
        statusText = "В процессе";
        statusClass = "pending";
      }

      const image = offer.imageUrl || offer.imageDataUrl || "/img/offer-default.png";

const title = buildOfferTitle(offer);

const gameObj = (window.GAMES_LIST || []).find(g => g.id === offer.game);
const gameTitle = gameObj ? gameObj.name : offer.game;

const gameLine = [
  gameTitle,
  offer.mode
].filter(Boolean).join(", ");

      const orderNumber = s.orderNumber || "—";

      const created = new Date(s.createdAt || Date.now());
      const dateText = created.toLocaleDateString("ru-RU", {
        day:"numeric",
        month:"short",
        year:"numeric"
      });

      const card = document.createElement("div");
      card.className = "offer-card";

      card.innerHTML = `
        <div class="order-badge ${statusClass}">
          ${statusText}
        </div>

        <div class="offer-image">
          <img src="${image}" onerror="this.src='/img/offer-default.png'">
        </div>

        <div class="offer-body">
          <div class="offer-title">${title}</div>

          <div class="order-meta">
            ${gameLine}
          </div>

<div class="order-number">
  Заказ ${orderNumber}
</div>
<div class="order-date">
  ${dateText}
</div>


<div class="offer-price" data-price="${s.sellerAmount || s.price}">
  —
</div>
        </div>
      `;

      card.onclick = () => {
        location.href = "/order.html?id=" + s.id;
      };

      list.appendChild(card);
    }

    statusFilter.addEventListener("change", renderList);
  async function updatePrices(){
  const els = document.querySelectorAll(".offer-price");

  for(const el of els){
    const base = Number(el.dataset.price);
    if(!base) continue;

    el.textContent = await tpMoney.formatPrice(base);
  }
}

window.addEventListener("tp:currency-change", updatePrices);

  </script>

</body>
</html>
