<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Обращение — TyPlace</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/header.css">
<link rel="stylesheet" href="/footer.css">

<style>
body{
  margin:0;
  font-family:Inter,Arial,sans-serif;
  background:#f6f7f9;
}

.page{
  max-width:1100px;
  margin:40px auto;
  padding:0 16px;
}

.support-nav{
  max-width:1100px;
  margin:20px auto 0 auto;
  padding:0 16px;
  display:flex;
  align-items:center;
  gap:6px;
  font-size:13px;
  font-weight:600;
  color:#6b7280;
}

.support-nav a{
  text-decoration:none;
  color:#6b7280;
}

.support-nav a:hover{
  color:#111827;
}

.support-nav .current{
  color:#111827;
}

.support-layout{
  display:flex;
  gap:24px;
  align-items:flex-start;
}

.chat-section{
  flex:1;
  background:#fff;
  border-radius:16px;
  border:1px solid #e5e7eb;

  display:flex;
  flex-direction:column;
  height:100%;
  min-height:500px;
  overflow:hidden; /* важно */
}


.ticket-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.ticket-status{
  display:inline-flex;
  align-items:center;

  padding:8px 14px;
  border-radius:8px;     /* не 999px */

  font-size:13px;
  font-weight:600;
  letter-spacing:0.2px;

  color:#fff;
}

.ticket-sidebar{
  width:340px;
}

.sidebar-card{
  background:#fff;
  border-radius:16px;
  border:1px solid #e5e7eb;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:12px;
  font-size:14px;
}

.close-ticket-btn{
  margin-top:10px;
  border:none;
  border-radius:12px;
  padding:10px;
  font-weight:700;
  cursor:pointer;
  background:#f3f4f6;
}

.message-wrapper.user{
  flex-direction:row-reverse;
}
.messages{
  flex:1;
  display:flex;
  flex-direction:column;
  gap:18px;
  padding:24px;
  overflow-y:auto;
  min-height:0;

  scrollbar-width:none;
  -ms-overflow-style:none;
}

.messages::-webkit-scrollbar{
  display:none;               /* Chrome */
}

.message-wrapper{
  display:flex;
  gap:12px;
  align-items:flex-start;
}

.message-wrapper.user{
  flex-direction:row-reverse;
}

.msg-avatar{
  width:40px;
  height:40px;
  border-radius:50%;
  object-fit:cover;
  border:1px solid #e5e7eb;
}

.message-content{
  max-width:75%;
  display:inline-block;
}
.msg-name{
  font-size:13px;
  font-weight:600;
  margin-bottom:4px;
  color:#6b7280;
}

.message{
  padding:14px 16px;
  border-radius:14px;
  font-size:14px;
  line-height:1.6;
  word-break:break-word;
  display:inline-block;
}

.message.user{
  background:#2563eb;
  color:#fff;
  border-top-right-radius:6px;
}

.message.support{
  background:#f3f4f6;
  border-top-left-radius:6px;
}

.msg-time{
  font-size:11px;
  color:#9ca3af;
  margin-top:6px;
}
.chat-input{
  position:relative;
  padding:16px 24px;
  background:#fff;

  display:flex;
  flex-direction:column;
}

.chat-input textarea{
  flex:1;
  height:44px;

  padding:10px 14px;

  border:1px solid #e5e7eb;
  border-radius:10px;

  font-size:14px;
  font-family:Inter, Arial, sans-serif;
  line-height:1.4;

  resize:none;
  outline:none;

  overflow-y:auto;
  box-sizing:border-box;

  scrollbar-width:none;       /* Firefox */
  -ms-overflow-style:none;    /* IE */
}

.chat-input textarea::-webkit-scrollbar{
  display:none;               /* Chrome */
}

.chat-input textarea:focus{
  border-color:#e5e7eb;
  box-shadow:none;
}

.ticket-status.waiting{
  background:#16a34a; /* зелёный */
  color:#fff;
}

.ticket-status.in_progress{
  background:#f59e0b; /* оранжевый */
  color:#fff;
}

.ticket-status.resolved{
  background:#6b7280; /* серый */
  color:#fff;
}

.sidebar-card{
  transition:0.2s;
}

.sidebar-card:hover{
  box-shadow:0 8px 20px rgba(0,0,0,0.04);
}
.sidebar-inner{
  display:flex;
  flex-direction:column;
  gap:18px;
}

.sidebar-section{
  display:flex;
  flex-direction:column;
  gap:8px;
  align-items:flex-start;   /* 🔥 вот это важно */
}


.sidebar-label{
  font-size:12px;
  font-weight:700;
  text-transform:uppercase;
  color:#9ca3af;
  letter-spacing:0.5px;
}

.sidebar-meta{
  display:flex;
  flex-direction:column;
  gap:6px;
  font-size:14px;
  color:#374151;
}

.sidebar-divider{
  height:1px;
  background:#e5e7eb;
}
.attach-btn{
  display:inline-flex;
  align-items:center;
  gap:6px;
  background:#f3f4f6;
  border:1px solid #e5e7eb;
  border-radius:10px;
  padding:12px 14px;
  font-size:14px;
  font-weight:600;
  cursor:pointer;
  transition:0.2s;
  color:#111827;
}
.attach-btn:hover{ background:#e5e7eb; }


.file-link:hover{
  background:#eef2ff;
  border-color:#c7d2fe;
  color:#2563eb;
}

.file-left{
  display:flex;
  align-items:center;
  gap:6px;
}

.file-icon{
  width:16px;
  height:16px;
  color:#6b7280;
}

.file-link-name{
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.chat-input-row{
  display:flex;
  gap:10px;
  align-items:stretch; /* 👈 ВАЖНО */
  width:100%;
}


.attach-icon-btn{
  width:44px;
  height:44px;

  display:flex;
  align-items:center;
  justify-content:center;

  background:#f3f4f6;
  border-radius:10px;
  cursor:pointer;
  font-size:18px;
  font-weight:700;

  flex-shrink:0;
}

.attach-icon-btn:hover{
  background:#e5e7eb;
}

.attachments-preview{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:12px;
}


.attachments-preview::-webkit-scrollbar{
  display:none;
}

.msg-attachments{
  margin-top:10px;
  display:flex;
  flex-direction:column;
  gap:8px;
  max-width:260px;
}

/* Чтобы текст не вылазил */
.file-link-name{
  max-width:90px;
}

/* ВНУТРИ синего сообщения — инверсия */
.message.user .file-link{
  background:rgba(255,255,255,0.18);
  border-color:rgba(255,255,255,0.25);
  color:#fff;
}

.message.user .file-icon{
  color:rgba(255,255,255,0.85);
}
.file-preview-item{
  position:relative;
  display:inline-block;
}

.file-preview-item .file-link{
  background:#f3f4f6;
  border:1px solid #e5e7eb;
  border-radius:12px;
  padding:8px 12px;
  display:inline-flex;
  align-items:center;
  gap:8px;
  cursor:pointer;
}

.file-preview-item .file-link:hover{
  background:#eef2ff;
}

.file-preview-item .file-remove{
  position:absolute;
  top:-10px;
  right:-10px;

  width:30px;
  height:30px;

  background:#ef4444;
  color:#fff;

  border-radius:50%;

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:18px;
  font-weight:700;

  cursor:pointer;
}
.file-link{
  display:inline-flex;
  align-items:center;
  justify-content:space-between;

  background:#f9fafb;
  border:1px solid #e5e7eb;
  border-radius:12px;

  padding:10px 14px;

  font-size:15px;
  font-weight:600;

  cursor:pointer;
  transition:0.2s;
}

.file-link-name{
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

.file-remove{
  font-size:20px;
  font-weight:900;
  color:#6b7280;
  cursor:pointer;
  margin-left:12px;
}

.file-remove:hover{
  color:#ef4444;
}
@media (max-width:900px){

.page{
  margin:16px auto;
}

.support-layout{
  flex-direction:column;
  gap:14px;
  align-items:stretch;
}

/* SIDEBAR */
.ticket-sidebar{
  width:100%;
}

/* CHAT */
.chat-section{
  width:100%;
  height:62vh;
  height:62svh;
  min-height:62vh;
  min-height:62svh;
  max-height:62vh;
  max-height:62svh;
}

/* MESSAGES */
.messages{
  padding:16px;
}

.message-content{
  max-width:85%;
}

.msg-avatar{
  width:34px;
  height:34px;
}

.message{
  font-size:13px;
  padding:12px 14px;
}

.msg-name{
  font-size:12px;
}

.msg-time{
  font-size:10px;
}

/* INPUT */
.chat-input{
  padding:12px 16px;
}

.chat-input-row{
  gap:8px;
}

.chat-input textarea{
  font-size:16px;
}

.chat-input button{
  padding:0 14px;
}

.attach-icon-btn{
  width:40px;
  height:40px;
}

}
.page-content{
  padding-bottom:90px;
}
.send-btn{
  width:44px;
  height:44px;
  background:#1e8bd4;
  border:none;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

</style>
</head>

<body>

<div id="header-container"></div>
<main class="page-content">

<div class="support-nav">
  <a href="/help.html">Главная</a>
  <span>/</span>
  <a href="/support-history.html" id="breadcrumbBackLink">История обращений</a>
  <span>/</span>
  <span class="current" id="breadcrumbTicket"></span>
</div>

<div class="page support-layout">

  <div class="chat-section">

<div class="messages" id="messages"></div>

<div class="chat-input" style="flex-direction:column; gap:10px;">
<div id="chatAttachmentsPreview" class="attachments-preview"></div>
<div class="chat-input-row">

  <label class="attach-icon-btn">
<input type="file" id="chatAttachmentsInput" multiple accept="image/*" hidden>
    +
  </label>

  <textarea 
    placeholder="Сообщение"
    id="chatText"
  ></textarea>

<button class="send-btn" id="chatSendBtn">
<svg width="20" height="20" viewBox="0 0 24 24">
<path fill="white"
d="M2 21L23 12L2 3L2 10L17 12L2 14Z"/>
</svg>
</button>

</div>

</div>


  </div>

  <div class="ticket-sidebar">
<div class="sidebar-card" id="sidebar"></div>

  </div>

</div>
<div id="imageModal" style="
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  align-items:center;
  justify-content:center;
  z-index:9999;
">

  <span id="imageModalClose" style="
    position:absolute;
    top:20px;
    right:30px;
    font-size:32px;
    color:#fff;
    cursor:pointer;
    font-weight:700;
  ">✕</span>

  <img id="imageModalImg" style="
    max-width:90%;
    max-height:90%;
    border-radius:12px;
    box-shadow:0 10px 40px rgba(0,0,0,0.5);
  ">
</div>
</main>

<script src="/socket.io/socket.io.js"></script>
<script src="/games.list.js"></script>
<script src="/i18n.js"></script>
<script src="/header.js"></script>
<script src="/footer.js"></script>

<script>
const token = localStorage.getItem("tp_token");
if(!token){
  location.href = "/auth.html?mode=login";
  throw new Error("No token");
}

const socket = io();
socket.on("connect", () => {
  socket.emit("auth", { token });
});

const ADMIN_PANEL_ROLES = new Set(["admin", "super_admin"]);
function handleAuthStatus(status){
  if (status === 401) {
    localStorage.removeItem("tp_token");
    localStorage.removeItem("tp_user_email");
    localStorage.removeItem("tp_user_id");
    location.href = "/auth.html?mode=login";
    return true;
  }

  if (status === 403) {
    localStorage.removeItem("tp_token");
    localStorage.removeItem("tp_user_email");
    localStorage.removeItem("tp_user_id");
    location.href = "/banned.html";
    return true;
  }

  return false;
}
const params = new URLSearchParams(window.location.search);
const ticketId = params.get("id");

if(!ticketId){
  location.href = "/support-history.html";
  throw new Error("No ticket id");
}

const breadcrumb = document.getElementById("breadcrumbTicket");
const messagesEl = document.getElementById("messages");
const sidebarEl = document.getElementById("sidebar");
let currentUserRole = "user";
let currentUserEmail = "";

async function loadMe(){
  const r = await fetch("/auth/me", {
    headers:{ Authorization:"Bearer " + token }
  });

  if (handleAuthStatus(r.status)) {
    return false;
  }

  const d = await r.json().catch(() => ({}));

if(!d.success){
  localStorage.removeItem("tp_token");
  localStorage.removeItem("tp_user_email");
  localStorage.removeItem("tp_user_id");
  location.href = "/auth.html?mode=login";
  return false;
}

currentUserEmail = d.user.email || "";
currentUserRole = d.user.role || "user";

if (
  currentUserRole === "support" ||
  currentUserRole === "resolution" ||
  currentUserRole === "admin" ||
  currentUserRole === "super_admin"
) {
  breadcrumbBackLink.href = "/support-admin.html";
  breadcrumbBackLink.textContent = "Панель поддержки";
}

return true;
}

const chatText = document.getElementById("chatText");
const chatAttachmentsInput = document.getElementById("chatAttachmentsInput");

const chatSendBtn = document.getElementById("chatSendBtn");
const chatPreview = document.getElementById("chatAttachmentsPreview");

let selectedChatFiles = [];
let isSendingMessage = false;



chatAttachmentsInput.onchange = () => {

  const files = Array.from(chatAttachmentsInput.files);

  const spaceLeft = 2 - selectedChatFiles.length;

  if(spaceLeft <= 0){
    chatAttachmentsInput.value = "";
    return;
  }

files.slice(0, spaceLeft).forEach(file=>{

  if(file.size > 5 * 1024 * 1024){
    alert("Максимальный размер файла 5MB");
    return;
  }

  selectedChatFiles.push(file);

});

  chatAttachmentsInput.value = "";

  renderChatFiles();
};

function renderChatFiles(){
  chatPreview.innerHTML = "";

  selectedChatFiles.forEach((file, index) => {

    const extension = file.name.split(".").pop();
    const shortName = "photo." + extension;

    const fileLink = document.createElement("div");
    fileLink.className = "file-link";
    fileLink.style.position = "relative";

    fileLink.innerHTML = `
      <div class="file-left">
        <svg class="file-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="18" height="18" rx="3"></rect>
          <circle cx="8.5" cy="8.5" r="1.5"></circle>
          <path d="M21 15l-5-5L5 21"></path>
        </svg>
        <div class="file-link-name">${shortName}</div>
      </div>
      <div class="file-remove">×</div>
    `;

    fileLink.querySelector(".file-remove").onclick = (e) => {
      e.stopPropagation();
      selectedChatFiles.splice(index,1);
      renderChatFiles();
    };

    fileLink.onclick = () => {
      const reader = new FileReader();
      reader.onload = (e) => {
        openImageModal(e.target.result);
      };
      reader.readAsDataURL(file);
    };

    chatPreview.appendChild(fileLink);
  });
const attachBtn = document.querySelector(".attach-icon-btn");

if(selectedChatFiles.length >= 2){
  chatAttachmentsInput.disabled = true;
  attachBtn.style.opacity = "0.5";
  attachBtn.style.pointerEvents = "none";
} else {
  chatAttachmentsInput.disabled = false;
  attachBtn.style.opacity = "1";
  attachBtn.style.pointerEvents = "auto";
}
}

function formatDate(ts){
  const d = new Date(ts);
  return d.toLocaleDateString("ru-RU") + " " +
         d.toLocaleTimeString("ru-RU",{hour:"2-digit",minute:"2-digit"});
}

function esc(s){
  return String(s || "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;");
}

async function loadTicket(){

  const r = await fetch("/api/support/tickets/" + ticketId,{
    headers:{
      Authorization:"Bearer " + token
    }
  });

  if (handleAuthStatus(r.status)) {
    return;
  }

  const d = await r.json().catch(() => ({}));

  if(!d.success){
    alert(d.message || "Ошибка загрузки");
    return;
  }

  const t = d.ticket;
  const msgs = d.messages || [];

  currentUserRole = d.userRole || currentUserRole || "user";

  // Заголовок
  const short = t.shortId || t.id;
breadcrumb.textContent = "Обращение " + short;

  // Сообщения
  messagesEl.innerHTML = "";

msgs.forEach(m=>{
  const wrapper = document.createElement("div");
  wrapper.className = "message-wrapper " + (m.from === "user" ? "user" : "support");

  const avatar = document.createElement("img");
  avatar.className = "msg-avatar";

  if(m.from === "user"){
    avatar.src = m.avatarDataUrl || m.avatarUrl || "/img/avatar-default.svg";
  } else {
    avatar.src = "/img/avatar-default.svg";
  }

  const content = document.createElement("div");
  content.className = "message-content";

  const name = document.createElement("div");
  name.className = "msg-name";
name.textContent = m.from === "user"
  ? m.username
  : m.username || "Поддержка TyPlace";

  const text = document.createElement("div");
  text.className = "message " + (m.from === "user" ? "user" : "support");
text.innerHTML = esc(m.text).replace(/\n/g, "<br>");
if(m.attachments && m.attachments.length > 0){

const attachmentsBlock = document.createElement("div");
attachmentsBlock.className = "msg-attachments";


  m.attachments.forEach(url => {

    const fileName = url.split("/").pop();
    const extension = fileName.split(".").pop();
    const shortName = "photo." + extension;

    const fileLink = document.createElement("div");
    fileLink.className = "file-link";

    fileLink.innerHTML = `
      <div class="file-left">
        <svg class="file-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="18" height="18" rx="3"></rect>
          <circle cx="8.5" cy="8.5" r="1.5"></circle>
          <path d="M21 15l-5-5L5 21"></path>
        </svg>
        <div class="file-link-name">${shortName}</div>
      </div>
    `;

    fileLink.onclick = () => openImageModal(url);

    attachmentsBlock.appendChild(fileLink);
  });

  text.appendChild(attachmentsBlock);
}


  const time = document.createElement("div");
time.className = "msg-time";
time.textContent = formatDate(m.createdAt);

content.appendChild(name);
content.appendChild(text);
content.appendChild(time);

  wrapper.appendChild(avatar);
  wrapper.appendChild(content);

  messagesEl.appendChild(wrapper);
});

  messagesEl.scrollTop = messagesEl.scrollHeight;

// Блокируем ввод если обращение решено
const chatInput = document.querySelector(".chat-input");

const canAssignToMe =
  t.status !== "resolved" &&
  !t.assignedTo &&
  (
    currentUserRole === "support" ||
    currentUserRole === "admin" ||
    currentUserRole === "super_admin"
  );

const canWrite =
  t.status !== "resolved" &&
  (
    ADMIN_PANEL_ROLES.has(currentUserRole) ||
    currentUserRole === "user" ||
    (
      currentUserRole === "support" &&
      (!t.assignedTo || t.assignedTo === currentUserEmail)
    ) ||
    (
      currentUserRole === "resolution" &&
      t.assignedTo === currentUserEmail
    )
  );

chatInput.style.display = canWrite ? "flex" : "none";

const canCloseAsStaff =
  t.status !== "resolved" &&
  (
    ADMIN_PANEL_ROLES.has(currentUserRole) ||
    (
      (currentUserRole === "support" || currentUserRole === "resolution") &&
      t.assignedTo === currentUserEmail
    )
  );

const canCloseAsUser =
  t.status === "in_progress" && currentUserRole === "user";

const canReopenAsUser =
  t.status === "resolved" &&
  currentUserRole === "user" &&
  Number(t.reopenCount || 0) < 1;

  // Sidebar
sidebarEl.innerHTML = `
<div class="sidebar-inner">

  <div class="sidebar-section">
    <div class="sidebar-label">Статус</div>
    <div class="ticket-status ${t.status}">
      ${getStatusText(t.status)}
    </div>

    <div class="sidebar-meta">
      <div><b>Создано:</b> ${formatDate(t.createdAt)}</div>
    </div>
  </div>

  <div class="sidebar-divider"></div>

  <div class="sidebar-section">
    <div class="sidebar-label">Детали обращения</div>

<div class="sidebar-meta">
  <div><b>Категория:</b> ${esc(t.categoryLabel || t.category)}</div>
  <div><b>Тема:</b> ${esc(t.subject)}</div>
  ${t.orderId ? `<div><b>Номер заказа:</b> ${esc(t.orderId)}</div>` : ""}
  ${t.userId ? `<div><b>ID пользователя:</b> ${esc(t.userId)}</div>` : ""}
  ${t.offerId ? `<div><b>ID объявления:</b> ${esc(t.offerId)}</div>` : ""}
  ${t.priority === "high" ? `<div><b>Приоритет:</b> Высокий</div>` : ""}
</div>
  </div>

  ${
    t.assignedUser 
      ? `
      <div class="sidebar-divider"></div>
      <div class="sidebar-section">
        <div class="sidebar-label">Ответственный</div>
        <div class="sidebar-meta">
          ${esc(t.assignedUser.username)}
        </div>
      </div>
      `
      : ""
  }

${
  canAssignToMe
    ? `<button class="close-ticket-btn" onclick="assignTicket()">Взять тикет</button>`
    : ""
}

${
  canCloseAsStaff
    ? `<button class="close-ticket-btn" onclick="closeTicket()">Отметить как решено</button>`
    : ""
}

${
  canCloseAsUser
    ? `<button class="close-ticket-btn" onclick="closeTicket()">Закрыть обращение</button>`
    : ""
}

${
  canReopenAsUser
    ? `<button class="close-ticket-btn" onclick="reopenTicket()">Переоткрыть обращение</button>`
    : ""
}

${
  (
    currentUserRole === "support" ||
    currentUserRole === "resolution" ||
    currentUserRole === "admin" ||
    currentUserRole === "super_admin"
  )
    ? `
      <a href="/support-admin.html" class="close-ticket-btn" style="text-decoration:none;text-align:center;">
        К списку тикетов
      </a>
    `
    : ""
}

</div>
`;

}
function getStatusText(status){
  if(status === "waiting") return "Ожидает ответа";
  if(status === "in_progress") return "В процессе";
  if(status === "resolved") return "Решено";
  return status;
}

async function sendMessage(){
  const text = chatText.value.trim();

  if (!text && selectedChatFiles.length === 0) return;

  if (text.length > 2000) {
    alert("Сообщение слишком длинное");
    return;
  }

  if (isSendingMessage) return;
  isSendingMessage = true;
  chatSendBtn.disabled = true;

  try{
    const formData = new FormData();
    formData.append("text", text);

    selectedChatFiles.forEach(file => {
      formData.append("attachments", file);
    });

    const r = await fetch("/api/support/tickets/" + ticketId + "/message",{
      method:"POST",
      headers:{
        Authorization:"Bearer " + token
      },
      body: formData
    });

    if (handleAuthStatus(r.status)) {
      return;
    }

    const d = await r.json().catch(() => null);

    if (d && d.success === false) {
      alert(d.message || "Ошибка");
      return;
    }

    chatText.value = "";
    selectedChatFiles = [];
    renderChatFiles();

    await loadTicket();
  } finally {
    isSendingMessage = false;
    chatSendBtn.disabled = false;
  }
}

async function assignTicket(){
  const r = await fetch("/api/support/tickets/" + ticketId + "/assign",{
    method:"POST",
    headers:{
      Authorization:"Bearer " + token
    }
  });

  if (handleAuthStatus(r.status)) {
    return;
  }

  const d = await r.json().catch(() => null);

  if(!d || !d.success){
    alert((d && d.message) || "Не удалось взять тикет");
    return;
  }

  await loadTicket();
}

async function closeTicket(){
  if(!confirm("Закрыть обращение?")) return;

  const r = await fetch("/api/support/tickets/" + ticketId + "/close",{
    method:"POST",
    headers:{
      Authorization:"Bearer " + token
    }
  });

  if (handleAuthStatus(r.status)) {
    return;
  }

  const data = await r.json().catch(() => null);

  if(!data || !data.success){
    alert((data && data.message) || "Ошибка закрытия");
    return;
  }

  await loadTicket();
}

async function reopenTicket(){
  if(!confirm("Переоткрыть обращение?")) return;

  const r = await fetch("/api/support/tickets/" + ticketId + "/reopen",{
    method:"POST",
    headers:{
      Authorization:"Bearer " + token
    }
  });

  if (handleAuthStatus(r.status)) {
    return;
  }

  const d = await r.json().catch(() => null);

  if(!d || !d.success){
    alert((d && d.message) || "Ошибка переоткрытия");
    return;
  }

  await loadTicket();
}

chatSendBtn.addEventListener("click", sendMessage);

chatText.addEventListener("keydown", e=>{
  if(e.key === "Enter" && !e.shiftKey){
    e.preventDefault();
    sendMessage();
  }
});

loadMe().then((ok) => {
  if (!ok) return;
  loadTicket();
});

socket.on("new-support-message", (data) => {
  if(data.ticketId === ticketId){
    loadTicket();
  }
});

socket.on("support-ticket-updated", (data) => {
  if(data.ticketId === ticketId){
    loadTicket();
  }
});
const imageModal = document.getElementById("imageModal");
const imageModalImg = document.getElementById("imageModalImg");
const imageModalClose = document.getElementById("imageModalClose");

function openImageModal(url){
  imageModal.style.display = "flex";
  imageModalImg.src = url;
}

function closeImageModal(){
  imageModal.style.display = "none";
  imageModalImg.src = "";
}

imageModalClose.onclick = closeImageModal;

imageModal.onclick = (e) => {
  if(e.target === imageModal){
    closeImageModal();
  }
};
