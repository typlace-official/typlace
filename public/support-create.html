<html lang="ru">
<head>
  <meta charset="UTF-8">
<title data-i18n="page.title"></title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="/header.css">
  <link rel="stylesheet" href="/footer.css">

  <style>
    body{
      margin:0;
      font-family:Inter, Arial, sans-serif;
      background:#f6f7f9;
      color:#111827;
    }

.page{
  max-width:1100px;
  margin:40px auto;
  padding:0 16px;
}

.form{
  max-width:720px;

  background:#fff;
  border:1px solid #e5e7eb;
  border-radius:16px;
  padding:24px;
  display:flex;
  flex-direction:column;
  gap:18px;
}

#formFields{
  display:none;
  flex-direction:column;
  gap:18px;
}

h1{
  font-size:24px;
  margin:20px 0 24px 0;
}

    .field{
      display:flex;
      flex-direction:column;
      gap:6px;
    }
.field-row{
  display:flex;
  gap:12px;
}

.field-row .field{
  flex:1;
  min-width:0;
}
    .label{
      font-size:13px;
      font-weight:800;
      color:#6b7280;
    }

    .input, .select, .textarea{
      border:1px solid #e5e7eb;
      border-radius:5px;
      padding:12px;
      font-size:16px;
      font-weight:500;
      outline:none;
      background:#fff;
    }

    .textarea{
      min-height:120px;
      resize:vertical;
    }

    .input:focus, .select:focus, .textarea:focus{
      border-color:#cbd5e1;
    }

    .btn{
      margin-top:10px;
      border:none;
      border-radius:5px;
      padding:14px;
      font-size:15px;
      font-weight:900;
      cursor:pointer;
      background:#1E50D4;
      color:#fff;
    }

    .btn:hover{
      opacity:.9;
    }
.support-nav{
  max-width:1100px;
  margin:20px auto 0 auto;
  padding:0 16px;

  display:flex;
  align-items:center;
  gap:6px;              /* вместо margin */
  
  font-size:13px;
  font-weight:600;
  color:#6b7280;
}

.support-nav a,
.support-nav .current{
  text-decoration:none;
  color:#6b7280;
}

.support-nav a:hover{
  color:#111827;
}

.support-nav .current{
  color:#111827;
}
.attach-btn{
  display:inline-flex;
  align-items:center;
  gap:8px;

  width:auto;
  align-self:flex-start;

  background:#f3f4f6;
  border:1px solid #e5e7eb;
  border-radius:5px;

  padding:10px 16px;
  font-size:16px;

  cursor:pointer;
  transition:0.2s;
}

.attach-btn:hover{
  background:#e5e7eb;
}

.attach-icon{
  width:20px;
  height:20px;
}

.attachments-preview{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-top:10px;
}

.file-chip{
  display:flex;
  align-items:center;
  justify-content:space-between;

  background:#f9fafb;
  border:1px solid #e5e7eb;
  border-radius:5px;

  padding:8px 12px;
  min-width:240px;
  max-width:100%;

  font-size:14px;
}

.file-left{
  display:flex;
  align-items:center;
  gap:8px;
  overflow:hidden;
}

.file-name{
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  max-width:180px;
}

.file-icon{
  width:18px;
  height:18px;
  color:#6b7280;
}

.file-remove{
  cursor:pointer;
  font-size:16px;
  font-weight:600;
  color:#6b7280;
}

.file-remove:hover{
  color:#ef4444;
}
.textarea{
  min-height:120px;
  resize:none;

  font-family: Inter, Arial, sans-serif; /* чтобы точно такой же */
  font-size:16px;
  font-weight:400;   /* 👈 обычный текст */
  line-height:1.6;
}

.textarea-footer{
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:12px;
  margin-top:4px;
  color:#9ca3af;
}

.textarea-error{
  color:#ef4444;
}

.textarea.invalid{
  border-color:#ef4444;
}
.file-link{
  display:inline-flex;
  align-items:center;
  justify-content:space-between;

  background:#f9fafb;
  border:1px solid #e5e7eb;
  border-radius:5px;

  padding:10px 14px;

  font-size:15px;
  font-weight:600;

  cursor:pointer;
  transition:0.2s;
}

.file-link:hover{
  background:#eef2ff;
  border-color:#c7d2fe;
  color:#2563eb;
}

.file-link-name{
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

.file-remove{
  font-size:20px;
  font-weight:900;
  color:#6b7280;
  cursor:pointer;
  margin-left:12px;
}

.file-remove:hover{
  color:#ef4444;
}
@media (max-width:640px){

.form{
  background:transparent;
  border:none;
  border-radius:0;
  padding:0;
}

.page{
  margin:16px auto;
}

.field-row{
  flex-direction:column;
}

}

  </style>
</head>

<body>

<div id="header-container"></div>

<main class="page-content">

<div class="support-nav">
<a href="/help.html" data-i18n="common.home"></a>
  <span>/</span>
<span class="current" data-i18n="page.title"></span>
</div>

<div class="page">
<h1 data-i18n="page.title"></h1>

<form class="form" id="supportForm">
<div class="field">
<div class="label" data-i18n="page.category"></div>
<select class="select" name="category" required></select>
</div>
<div id="formFields">
<div class="field-row">
<div class="field" id="roleField" style="display:none;">

</div>

<div class="field">
<div class="label" data-i18n="page.description"></div>

<textarea 
  class="textarea" 
  name="message" 
  id="messageInput"
  maxlength="10000"
  required
></textarea>

  <div class="textarea-footer">
    <span id="messageError" class="textarea-error"></span>
    <span id="messageCounter">0 / 10000</span>
  </div>
</div>

<div class="field">

  <input 
    type="file" 
    id="attachmentsInput"
    name="attachments"
    multiple
    accept="image/*"
    hidden
  >

<button type="button" class="attach-btn" id="attachBtn">
  <svg class="attach-icon" viewBox="0 0 24 24">
    <path d="M21.44 11.05l-8.49 8.49a5 5 0 01-7.07-7.07l9.19-9.19a3.5 3.5 0 114.95 4.95l-9.19 9.19a2 2 0 11-2.83-2.83l8.49-8.49"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"/>
  </svg>

</div>
<div id="imageModal" style="
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  align-items:center;
  justify-content:center;
  z-index:9999;
">

  <span id="imageModalClose" style="
    position:absolute;
    top:20px;
    right:30px;
    font-size:32px;
    color:#fff;
    cursor:pointer;
    font-weight:700;
  ">✕</span>

  <img id="imageModalImg" style="
    max-width:90%;
    max-height:90%;
    border-radius:12px;
    box-shadow:0 10px 40px rgba(0,0,0,0.5);
  ">
</div>
</main>
<div id="footer-container"></div>

<script src="/socket.io/socket.io.js"></script>
<script src="/games.list.js"></script>
<script src="/i18n.js"></script>
<script src="/header.js"></script>
<script src="/footer.js"></script>

<script>
const token = localStorage.getItem("tp_token");

function tr(key, fallback = ""){
  const value = String(key || "").trim();
  if(!value) return fallback;

  const translated = window.tpI18n?.t ? window.tpI18n.t(value) : value;

  if (translated && translated !== value) {
    return translated;
  }

  return fallback || value;
}

if(!token){
  location.href = "/auth.html?mode=login";
}

const form = document.getElementById("supportForm");
const categorySelect = form.querySelector("[name='category']");
const subjectField = document.getElementById("subjectField");
const roleField = document.getElementById("roleField");
const roleSelect = document.getElementById("roleSelect");
const subjectSelect = document.getElementById("subjectSelect");
const orderField = document.getElementById("orderField");
const reportUserField = document.getElementById("reportUserField");
const reportOfferField = document.getElementById("reportOfferField");
const formFields = document.getElementById("formFields");
let SUPPORT_CONFIG = null;

function normalizePrefixedId(value, prefix){
  let v = String(value || "")
    .toUpperCase()
    .replace(/\s+/g, "")
    .replace(/[^A-Z0-9:]/g, "");

  if (!v) return "";

  if (/^\d+$/.test(v)) {
    return prefix + ":" + v.slice(0, 8);
  }

  if (v === prefix) {
    return prefix + ":";
  }

  if (v.startsWith(prefix) && !v.startsWith(prefix + ":")) {
    v = prefix + ":" + v.slice(prefix.length).replace(/:/g, "");
  }

  if (!v.startsWith(prefix + ":")) {
    const digits = v.replace(/\D/g, "");
    return digits ? (prefix + ":" + digits.slice(0, 8)) : "";
  }

  const parts = v.split(":");
  const digits = (parts[1] || "").replace(/\D/g, "").slice(0, 8);

  return prefix + ":" + digits;
}

const params = new URLSearchParams(window.location.search);

const prefillCategory = String(
  params.get("category") || params.get("type") || ""
).trim();

const prefillUserId = String(params.get("userId") || "").trim();
const prefillOfferId = String(params.get("offerId") || "").trim();
const prefillOrderId = String(params.get("orderId") || "").trim();
const prefillChatId = String(params.get("chatId") || "").trim();
const prefillRole = String(params.get("role") || "").trim();
const prefillSubject = String(params.get("subject") || "").trim();

// 1️⃣ Загружаем конфиг с сервера
async function loadConfig(){
  const r = await fetch("/api/support/config", {
    headers:{ Authorization:"Bearer " + token }
  });

const d = await r.json();

if(!d.success){
alert(tpI18n.t("page.errors.configLoad"));
  return;
}

SUPPORT_CONFIG = d.config;

  // очищаем категории
categorySelect.innerHTML = "";

const placeholder = document.createElement("option");
placeholder.value = "";
placeholder.textContent = tpI18n.t("page.chooseCategory");
categorySelect.appendChild(placeholder);

Object.entries(SUPPORT_CONFIG).forEach(([key, value]) => {

  const option = document.createElement("option");
  option.value = key;
  option.textContent = tr(value.labelKey, value.labelKey);

  categorySelect.appendChild(option);

});

}

document.addEventListener("DOMContentLoaded", async () => {
  await tpI18n.load(tpI18n.currentLang);
  await loadConfig();
  await applyPrefillFromUrl();
  tpI18n.apply();

  validateMessage();
  autoResize(messageInput);
});

async function applyPrefillFromUrl(){
  if (!SUPPORT_CONFIG) return;

  const orderInput = form.querySelector("[name='orderId']");
  const userInput = form.querySelector("[name='userId']");
  const offerInput = form.querySelector("[name='offerId']");

  if (prefillCategory && SUPPORT_CONFIG[prefillCategory]) {
    categorySelect.value = prefillCategory;
    categorySelect.dispatchEvent(new Event("change"));
  }

  if (prefillOrderId && orderInput) {
    orderInput.value = prefillOrderId;
  }

  if (prefillUserId && userInput) {
    userInput.value = normalizePrefixedId(prefillUserId, "UID");
  }

  if (prefillOfferId && offerInput) {
    offerInput.value = normalizePrefixedId(prefillOfferId, "OID");
  }

  if (prefillCategory === "order" && prefillRole) {
    const hasRoleOption = Array.from(roleSelect.options).some(
      option => option.value === prefillRole
    );

    if (hasRoleOption) {
      roleSelect.value = prefillRole;
      roleSelect.dispatchEvent(new Event("change"));
    }
  }

  if (prefillSubject) {
    const hasSubjectOption = Array.from(subjectSelect.options).some(
      option => option.value === prefillSubject
    );

    if (hasSubjectOption) {
      subjectSelect.value = prefillSubject;
    }
  }

  if (prefillCategory === "report" && prefillChatId && !prefillUserId) {
    try {
      const r = await fetch("/api/chats/" + prefillChatId, {
        headers:{ Authorization:"Bearer " + token }
      });

      const d = await r.json();

      if (d.success && d.chat?.otherUser?.userId && userInput) {
        userInput.value = normalizePrefixedId(d.chat.otherUser.userId, "UID");
      }
    } catch(e){}
  }
}

// 2️⃣ Отправка формы
form.onsubmit = async (e)=>{
  e.preventDefault();

  const formData = new FormData(form);

  formData.delete("attachments");

if(selectedFiles.length > 10){
alert(tpI18n.t("page.errors.maxFiles"));
    return;
  }

  selectedFiles.forEach(file => {
    formData.append("attachments", file);
  });

  const r = await fetch("/api/support/tickets", {
    method:"POST",
    headers:{
      Authorization:"Bearer " + token
    },
    body: formData
  });

const d = await r.json();

const orderError = document.getElementById("orderError");
const userError = document.getElementById("userError");
const offerError = document.getElementById("offerError");

if(orderError) orderError.textContent = "";
if(userError) userError.textContent = "";
if(offerError) offerError.textContent = "";

if(!d.success){
  const msg = String(d.message || "").trim();

  if(
    msg === tr("responses.orders.orderNotFound") ||
    msg === tr("page.errors.orderNotFound")
  ){
    if(orderError) orderError.textContent = tr("page.errors.orderNotFound");
    return;
  }

  if(
    msg === tr("responses.support.enterUserId") ||
    msg === tr("page.errors.enterUserId")
  ){
    if(userError) userError.textContent = tr("page.errors.enterUserId");
    return;
  }

  if(
    msg === tr("responses.common.userNotFound") ||
    msg === tr("page.errors.userNotFound")
  ){
    if(userError) userError.textContent = tr("page.errors.userNotFound");
    return;
  }

  if(
    msg === tr("responses.support.enterOfferId") ||
    msg === tr("page.errors.enterOfferId")
  ){
    if(offerError) offerError.textContent = tr("page.errors.enterOfferId");
    return;
  }

  if(
    msg === tr("responses.support.offerNotFound") ||
    msg === tr("page.errors.offerNotFound")
  ){
    if(offerError) offerError.textContent = tr("page.errors.offerNotFound");
    return;
  }

  alert(msg || tr("responses.common.internalError", "Ошибка"));
  return;
}

selectedFiles = [];
preview.innerHTML = "";
document.getElementById("attachmentsInput").value = "";

const newId = d.ticket.id;

sessionStorage.removeItem("tp_support_category");
location.href = "/support-ticket.html?id=" + newId;

};

categorySelect.addEventListener("change", ()=>{

roleSelect.value = "";

subjectSelect.value = "";
if(categorySelect.value){
  formFields.style.display = "flex";
}else{
  formFields.style.display = "none";
}

subjectSelect.innerHTML = "";

roleField.style.display = "none";
subjectField.style.display = "none";
orderField.style.display = "none";
reportUserField.style.display = "none";
reportOfferField.style.display = "none";

/* ===== ПРОБЛЕМА С ЗАКАЗОМ ===== */

if(categorySelect.value === "order"){

  roleField.style.display = "flex";
  orderField.style.display = "none";

subjectSelect.innerHTML =
  `<option value="">${tpI18n.t("page.selectRoleFirst")}</option>`;
  subjectSelect.required = true;

  return;
}

if(categorySelect.value === "report"){
  reportUserField.style.display = "flex";
}

if(categorySelect.value === "report_offer"){
  reportOfferField.style.display = "flex";
}

/* ===== ДРУГИЕ КАТЕГОРИИ ===== */

if(
  !SUPPORT_CONFIG ||
  !SUPPORT_CONFIG[categorySelect.value] ||
  !SUPPORT_CONFIG[categorySelect.value].topics ||
  SUPPORT_CONFIG[categorySelect.value].topics.length === 0
){
  subjectField.style.display = "none";
  subjectSelect.required = false;
  return;
}

subjectField.style.display = "flex";
subjectSelect.required = true;

const defaultOption = document.createElement("option");
defaultOption.value = "";
defaultOption.textContent = tpI18n.t("page.chooseSubject");
subjectSelect.appendChild(defaultOption);

SUPPORT_CONFIG[categorySelect.value].topics.forEach(topic=>{
  const option = document.createElement("option");
  option.value = topic;
    option.textContent = tr(topic, topic);
  subjectSelect.appendChild(option);
});

});
roleSelect.addEventListener("change", ()=>{

if(!roleSelect.value){

  subjectField.style.display = "none";
  orderField.style.display = "none";
  subjectSelect.innerHTML = "";

  return;
}

orderField.style.display = "flex";

subjectSelect.innerHTML = "";

const defaultOption = document.createElement("option");
defaultOption.value = "";
defaultOption.textContent = tpI18n.t("page.chooseSubject");
subjectSelect.appendChild(defaultOption);

subjectField.style.display = "flex";
subjectSelect.required = true;

const category = categorySelect.value;

if(!SUPPORT_CONFIG || !SUPPORT_CONFIG[category]) return;

const roles = SUPPORT_CONFIG[category]?.roles;

if(!roles) return;

const topics = roles[roleSelect.value];

if(!topics) return;

topics.forEach(topic=>{
  const option = document.createElement("option");
  option.value = topic;
    option.textContent = tr(topic, topic);
  subjectSelect.appendChild(option);
});

});
const input = document.getElementById("attachmentsInput");
const btn = document.getElementById("attachBtn");
const preview = document.getElementById("attachmentsPreview");

let selectedFiles = [];

btn.onclick = () => input.click();

input.onchange = () => {
  const files = Array.from(input.files);

if(selectedFiles.length + files.length > 10){
  alert(tpI18n.t("page.errors.maxFiles"));
  return;
}

  files.forEach(file => {
    selectedFiles.push(file);
  });

  renderFiles();
};

function renderFiles(){
  preview.innerHTML = "";

  selectedFiles.forEach((file, index) => {

    const extension = file.name.split(".").pop();
const shortName = tpI18n.t("page.file") + "." + extension;
    const chip = document.createElement("div");
    chip.className = "file-link";

    chip.innerHTML = `
      <div class="file-left">
        <svg class="file-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="18" height="18" rx="3"></rect>
          <circle cx="8.5" cy="8.5" r="1.5"></circle>
          <path d="M21 15l-5-5L5 21"></path>
        </svg>
        <div class="file-link-name">${shortName}</div>
      </div>
      <div class="file-remove">×</div>
    `;

    // открыть модал
    chip.querySelector(".file-left").onclick = () => {
      const reader = new FileReader();
      reader.onload = (e) => {
        openImageModal(e.target.result);
      };
      reader.readAsDataURL(file);
    };

    // удалить
    chip.querySelector(".file-remove").onclick = (e) => {
      e.stopPropagation();
      selectedFiles.splice(index,1);
      renderFiles();
    };

    preview.appendChild(chip);
  });
}

const messageInput = document.getElementById("messageInput");
const messageCounter = document.getElementById("messageCounter");
const messageError = document.getElementById("messageError");
const submitBtn = form.querySelector(".btn");

// авто-рост
function autoResize(el){
  el.style.height = "auto";
  el.style.height = el.scrollHeight + "px";
}

const MAX_LENGTH = 10000;

function validateMessage(){
  const length = messageInput.value.length;
messageCounter.textContent =
  tpI18n.t("page.counter", { current:length, max:MAX_LENGTH });
  if(length > MAX_LENGTH){
messageError.textContent =
  tpI18n.t("page.errors.maxLength", {count: MAX_LENGTH});
    messageInput.classList.add("invalid");
    submitBtn.disabled = true;
    submitBtn.style.opacity = ".6";
  } else {
    messageError.textContent = "";
    messageInput.classList.remove("invalid");
    submitBtn.disabled = false;
    submitBtn.style.opacity = "1";
  }
}

messageInput.addEventListener("input", () => {
  autoResize(messageInput);
  validateMessage();
});

const imageModal = document.getElementById("imageModal");
const imageModalImg = document.getElementById("imageModalImg");
const imageModalClose = document.getElementById("imageModalClose");

function openImageModal(src){
  imageModal.style.display = "flex";
  imageModalImg.src = src;
}

function closeImageModal(){
  imageModal.style.display = "none";
  imageModalImg.src = "";
}

imageModalClose.onclick = closeImageModal;

imageModal.onclick = (e) => {
  if(e.target === imageModal){
    closeImageModal();
  }
};
/* ===== ОГРАНИЧЕНИЕ ID ПОЛЬЗОВАТЕЛЯ ===== */

const reportUserInput = form.querySelector("[name='userId']");
const reportOfferInput = form.querySelector("[name='offerId']");

if(reportUserInput){
  reportUserInput.addEventListener("input", () => {
    reportUserInput.value = normalizePrefixedId(reportUserInput.value, "UID");
  });

  reportUserInput.addEventListener("blur", () => {
    reportUserInput.value = normalizePrefixedId(reportUserInput.value, "UID");
  });
}

if(reportOfferInput){
  reportOfferInput.addEventListener("input", () => {
    reportOfferInput.value = normalizePrefixedId(reportOfferInput.value, "OID");
  });

  reportOfferInput.addEventListener("blur", () => {
    reportOfferInput.value = normalizePrefixedId(reportOfferInput.value, "OID");
  });
}


/* ===== ОГРАНИЧЕНИЕ НОМЕРА ЗАКАЗА ===== */

const orderInput = form.querySelector("[name='orderId']");

if(orderInput){
  orderInput.addEventListener("input", () => {

    let value = orderInput.value
      .toUpperCase()
      .replace(/[^A-Z0-9#]/g,""); // только латиница и цифры

    if(value && value[0] !== "#"){
      value = "#" + value.replace("#","");
    }

    orderInput.value = value.slice(0,8); // максимум 8 символов

  });
}

const userInput = form.querySelector("[name='userId']");
const offerInput = form.querySelector("[name='offerId']");
const orderInputClear = form.querySelector("[name='orderId']");

if(userInput){
  userInput.addEventListener("input", ()=>{
    const userErrorEl = document.getElementById("userError");
    if(userErrorEl) userErrorEl.textContent = "";
  });
}

if(offerInput){
  offerInput.addEventListener("input", ()=>{
    const offerErrorEl = document.getElementById("offerError");
    if(offerErrorEl) offerErrorEl.textContent = "";
  });
}

if(orderInputClear){
  orderInputClear.addEventListener("input", ()=>{
    const orderErrorEl = document.getElementById("orderError");
    if(orderErrorEl) orderErrorEl.textContent = "";
  });
}

window.addEventListener("tp:lang-change", async () => {
  const currentCategory = categorySelect.value;
  const currentRole = roleSelect.value;
  const currentSubject = subjectSelect.value;

  await loadConfig();

  if (currentCategory && SUPPORT_CONFIG[currentCategory]) {
    categorySelect.value = currentCategory;
    categorySelect.dispatchEvent(new Event("change"));

    if (currentCategory === "order" && currentRole) {
      roleSelect.value = currentRole;
      roleSelect.dispatchEvent(new Event("change"));
    }

    if (currentSubject) {
      subjectSelect.value = currentSubject;
    }
  }

  tpI18n.apply();
  validateMessage();
  autoResize(messageInput);
});

</script>
